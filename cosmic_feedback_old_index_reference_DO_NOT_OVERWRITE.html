function withVersion(path){
  if(!path) return path;
  return `${path}${path.includes('?') ? '&' : '?'}v=${VERSION}`;
}

// Van interior is now built from an EMPTY Astro Van background plus separate furniture sprites.
// This build checks the common GitHub Pages asset locations used by this project.
// If no empty background file exists at those paths, it draws a clean empty van base instead of showing the old baked-furniture interior.
function makeImageCandidates(prefix, folders, names){
  const out=[];
  const used=new Set();
  folders.forEach(folder=>{
    names.forEach(name=>{
      const cleanFolder = String(folder || '').replace(/\/$/, '');
      const cleanName = String(name || '').replace(/^\//, '').replace(/\.png$/i, '');
      const path = `${cleanFolder}/${cleanName}.png`;
      if(used.has(path)) return;
      used.add(path);
      out.push({ key:`${prefix}_${out.length}`, path });
    });
  });
  return out;
}

function zoneCenter(z){ return { x:z.x + z.w/2, y:z.y + z.h/2 }; }
function pointInZone(px, py, z){ return px >= z.x && px <= z.x+z.w && py >= z.y && py <= z.y+z.h; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function collectedKey(chunkId, pickupId){ return `${chunkId}:${pickupId}`; }
function ownsItem(id){ return (GAME_STATE.inventory.items[id] || 0) > 0; }
function equipSuit(id){ if(!ownsItem(id)) return false; GAME_STATE.equipment.suit = id; return true; }
function unequipSuit(){ GAME_STATE.equipment.suit = null; }
function equipMask(id){ if(!ownsItem(id)) return false; GAME_STATE.equipment.mask = id; return true; }
function unequipMask(){ GAME_STATE.equipment.mask = null; }
function hasSpaceSuitEquipped(){ return !!(GAME_STATE.equipment.suit && EQUIPMENT_DATA.suits[GAME_STATE.equipment.suit]?.allowsSpaceWalk); }
function hasO2MaskEquipped(){ return !!(GAME_STATE.equipment.mask && EQUIPMENT_DATA.masks[GAME_STATE.equipment.mask]?.allowsThinAtmosphere); }
function getEquippedSuitName(){ return GAME_STATE.equipment.suit ? EQUIPMENT_DATA.suits[GAME_STATE.equipment.suit]?.name || GAME_STATE.equipment.suit : 'Normal Clothes'; }
function getEquippedMaskName(){ return GAME_STATE.equipment.mask ? EQUIPMENT_DATA.masks[GAME_STATE.equipment.mask]?.name || GAME_STATE.equipment.mask : 'None'; }
function hasHolsterEquipped(){ return !!GAME_STATE.equipment.holster; }
function getEquippedHolsterName(){ return GAME_STATE.equipment.holster ? 'Tight Brown Holster' : 'None'; }
function equipHolster(){ GAME_STATE.equipment.holster = 'donny_tight_holster_brown'; return true; }
function unequipHolster(){ GAME_STATE.equipment.holster = null; }
function getAtmosphereStatus(planetId='dust_9'){
  const atm = PLANET_ATMOSPHERES[planetId] || PLANET_ATMOSPHERES.dust_9;
  if(hasSpaceSuitEquipped()) return `${atm.name}: sealed suit`;
  if(hasO2MaskEquipped()) return `${atm.name}: O2 mask`;
  return `${atm.name}: no O2 mask`;
}
function canBreatheOnPlanet(planetId='dust_9'){
  const atm = PLANET_ATMOSPHERES[planetId] || PLANET_ATMOSPHERES.dust_9;
  if(atm.requiresSuit && !hasSpaceSuitEquipped()) return false;
  if(atm.requiresMask && !hasSpaceSuitEquipped() && !hasO2MaskEquipped()) return false;
  return true;
}
function getDonnyTextureForArea(area){ return hasSpaceSuitEquipped() ? 'donny_spacesuit' : 'donny_overhead'; }
function getRiffTextureForArea(area){ return hasSpaceSuitEquipped() ? 'riff_spacesuit' : 'riff'; }

function getWeaponDataMap() {
  return window.WEAPON_DATA || FALLBACK_WEAPONS;
}
function getEquippedWeaponId() {
  return GAME_STATE.equipment[GAME_STATE.equipment.currentWeaponSlot] || GAME_STATE.equipment.melee || 'black_guitar';
}
function getEquippedWeapon() {
  const id = getEquippedWeaponId();
  return getWeaponDataMap()[id] || FALLBACK_WEAPONS[id] || FALLBACK_WEAPONS.black_guitar;
}
function cycleWeaponSlot() {
  const current = GAME_STATE.equipment.currentWeaponSlot || 'melee';
  let idx = WEAPON_SLOT_ORDER.indexOf(current);
  if (idx < 0) idx = 0;
  for (let i=1; i<=WEAPON_SLOT_ORDER.length; i++) {
    const slot = WEAPON_SLOT_ORDER[(idx+i) % WEAPON_SLOT_ORDER.length];
    const weaponId = GAME_STATE.equipment[slot];
    if (weaponId && GAME_STATE.inventory.weapons[weaponId]) {
      GAME_STATE.equipment.currentWeaponSlot = slot;
      return getEquippedWeapon();
    }
  }
  GAME_STATE.equipment.currentWeaponSlot = 'melee';
  return getEquippedWeapon();
}
function weaponDirVector(dir) {
  if (dir === 'up') return {x:0,y:-1,angle:-Math.PI/2};
  if (dir === 'down') return {x:0,y:1,angle:Math.PI/2};
  if (dir === 'left') return {x:-1,y:0,angle:Math.PI};
  return {x:1,y:0,angle:0};
}

const GAME_INPUT = {
  vx:0,
  vy:0,
  moveMag:0,
  confirm:false,
  back:false,
  jump:false,
  crawl:false,
  slide:false,
  punch:false,
  shoot:false,
  consumeConfirm(){ const hit=this.confirm; this.confirm=false; return hit; },
  consumeBack(){ const hit=this.back; this.back=false; return hit; },
  consumeJump(){ const hit=this.jump; this.jump=false; return hit; },
  consumeCrawl(){ const hit=this.crawl; this.crawl=false; return hit; },
  consumeSlide(){ const hit=this.slide; this.slide=false; return hit; },
  consumePunch(){ const hit=this.punch; this.punch=false; return hit; },
  consumeShoot(){ const hit=this.shoot; this.shoot=false; return hit; }
};

(function setupDomControls(){
  const base=document.getElementById('stickBase'), knob=document.getElementById('stickKnob');
  const btnY=document.getElementById('btnY'), btnA=document.getElementById('btnA'), btnX=document.getElementById('btnX'), btnB=document.getElementById('btnB'), btnStart=document.getElementById('btnStart');
  let activePointerId=null; const maxDist=44; let lastBTap=0;
  function setKnob(dx,dy){
    const len=Math.max(1,Math.sqrt(dx*dx+dy*dy)), dist=Math.min(maxDist,len);
    const nx=(dx/len)*dist, ny=(dy/len)*dist;
    GAME_INPUT.vx=nx/maxDist; GAME_INPUT.vy=ny/maxDist; GAME_INPUT.moveMag=dist/maxDist;
    knob.style.transform=`translate(${nx}px, ${ny}px)`;
  }
  function resetStick(){ activePointerId=null; GAME_INPUT.vx=0; GAME_INPUT.vy=0; GAME_INPUT.moveMag=0; knob.style.transform='translate(0px, 0px)'; }
  function updateFromPointer(e){ const r=base.getBoundingClientRect(); setKnob(e.clientX-(r.left+r.width/2), e.clientY-(r.top+r.height/2)); }
  base.addEventListener('pointerdown',e=>{e.preventDefault();activePointerId=e.pointerId;base.setPointerCapture(e.pointerId);updateFromPointer(e);});
  base.addEventListener('pointermove',e=>{if(e.pointerId!==activePointerId)return;e.preventDefault();updateFromPointer(e);});
  base.addEventListener('pointerup',e=>{if(e.pointerId!==activePointerId)return;e.preventDefault();resetStick();});
  base.addEventListener('pointercancel',resetStick); base.addEventListener('lostpointercapture',resetStick);

  btnA.addEventListener('pointerdown',e=>{e.preventDefault();GAME_INPUT.confirm=true;GAME_INPUT.jump=true;});
  btnY.addEventListener('pointerdown',e=>{e.preventDefault();GAME_INPUT.shoot=true;});
  btnX.addEventListener('pointerdown',e=>{e.preventDefault();GAME_INPUT.punch=true;});
  btnB.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const now=performance.now();
    if(now-lastBTap<320) GAME_INPUT.slide=true;
    else GAME_INPUT.crawl=true;
    lastBTap=now;
  });
  btnStart.addEventListener('pointerdown',e=>{e.preventDefault();GAME_INPUT.back=true;});
})();

class BaseScene extends Phaser.Scene {
  createCommonInput(){
    this.cursors=this.input.keyboard.createCursorKeys();
    this.keys=this.input.keyboard.addKeys('W,A,S,D,E,Y,ENTER,SPACE,ESC,UP,DOWN,J,K,Q,X,C,SHIFT,L');
  }
  getMoveVector(){
    let vx=0, vy=0;
    if(this.cursors.left.isDown || this.keys.A.isDown) vx-=1;
    if(this.cursors.right.isDown || this.keys.D.isDown) vx+=1;
    if(this.cursors.up.isDown || this.keys.W.isDown) vy-=1;
    if(this.cursors.down.isDown || this.keys.S.isDown) vy+=1;
    vx += GAME_INPUT.vx || 0; vy += GAME_INPUT.vy || 0;
    const len=Math.sqrt(vx*vx+vy*vy); if(len>1){vx/=len;vy/=len;}
    return {vx,vy};
  }
  consumeConfirm(){
    return Phaser.Input.Keyboard.JustDown(this.keys.E) ||
      Phaser.Input.Keyboard.JustDown(this.keys.ENTER) ||
      Phaser.Input.Keyboard.JustDown(this.keys.SPACE) ||
      GAME_INPUT.consumeConfirm();
  }
  consumeBack(){ return Phaser.Input.Keyboard.JustDown(this.keys.ESC) || GAME_INPUT.consumeBack(); }
  consumeJump(){ return Phaser.Input.Keyboard.JustDown(this.keys.SPACE) || GAME_INPUT.consumeJump(); }
  consumeCrawl(){ return Phaser.Input.Keyboard.JustDown(this.keys.C) || GAME_INPUT.consumeCrawl(); }
  consumeSlide(){ return Phaser.Input.Keyboard.JustDown(this.keys.K) || GAME_INPUT.consumeSlide(); }
  consumePunch(){ return Phaser.Input.Keyboard.JustDown(this.keys.J) || GAME_INPUT.consumePunch(); }
  consumeShoot(){
    return Phaser.Input.Keyboard.JustDown(this.keys.X) ||
      Phaser.Input.Keyboard.JustDown(this.keys.Y) ||
      Phaser.Input.Keyboard.JustDown(this.keys.L) ||
      GAME_INPUT.consumeShoot();
  }
  wantsRun(){ return this.keys.SHIFT?.isDown || (GAME_INPUT.moveMag || 0) > 0.88; }
  createDonny(texture,x,y){
    const p=this.add.sprite(x,y,texture,0).setOrigin(0.5,1).setScale(DONNY.scale).setDepth(20);
    p.dir='down';
    p.textureKey=texture;
    p.walkBobPhase=0;
    return p;
  }
  createDonnyAnimations(texture){
    const cfg = getDonnyMoveConfig(texture);
    Object.keys(cfg.anims).forEach(dir=>{
      const key=`${texture}_${dir}`;
      if(!this.anims.exists(key)){
        this.anims.create({ key, frames:cfg.anims[dir].frames.map(frame=>({key:texture,frame})), frameRate:cfg.walkFrameRate || 8, repeat:-1 });
      }
    });
  }
  refreshDonnyTexture(player,area,forceFrame=false){
    if(!player) return;
    const texture=getDonnyTextureForArea(area);
    const textureChanged = player.textureKey !== texture;

    if(textureChanged){
      if(player.anims) player.anims.stop();
      player.setTexture(texture);
      player.textureKey=texture;
    }

    /*
      WALK ANIMATION FIX:
      Do not call setFrame() every update while Donny is walking.
      The old version reset Donny to the standing frame before player.play(),
      so he moved across the screen but looked like he was sliding.
    */
    const isPlaying = !!(player.anims && player.anims.isPlaying);
    if(forceFrame || textureChanged || !isPlaying){
      const cfg = getDonnyMoveConfig(texture);
      player.setFrame(cfg.directionFrame[player.dir] || 0);
    }
  }
  playDonnyMoveAnim(player,dir){
    if(!player) return;

    const animKey = `${player.textureKey}_${dir}`;
    if(!this.anims.exists(animKey)){
      const cfg = getDonnyMoveConfig(player.textureKey);
      player.anims?.stop();
      player.setFrame(cfg.directionFrame[dir] || 0);
      return;
    }

    const currentKey = player.anims?.currentAnim?.key;
    if(currentKey !== animKey || !player.anims.isPlaying){
      player.play(animKey, true);
    }
  }

  getMoveBlockers(){
    return this.moveBlockers || [];
  }
  collidesWithMoveBlocker(x,y,pad=16, player=null){
    const px=x;
    const py=y-12;

    // If Donny is standing on the Astro Van roof, let him move inside the roof platform.
    if(player && player.onVanRoof && this.chunk && this.chunk.id === VAN_COLLISION.chunkId){
      if(pointInRect(px, py, VAN_COLLISION.roof)) return false;
    }

    return this.getMoveBlockers().some(b =>
      px >= b.x - pad &&
      px <= b.x + b.w + pad &&
      py >= b.y - pad &&
      py <= b.y + b.h + pad
    );
  }
  moveActorWithBlockers(player,nx,ny,bounds){
    nx=clamp(nx,bounds.x,bounds.x+bounds.w);
    ny=clamp(ny,bounds.y,bounds.y+bounds.h);
    const oldX=player.x;
    const oldY=player.y;
    if(!this.collidesWithMoveBlocker(nx,oldY,16,player)) player.x=nx;
    if(!this.collidesWithMoveBlocker(player.x,ny,16,player)) player.y=ny;
  }
  findSlideTarget(player,vx,vy,distance,bounds){
    let lastX=player.x;
    let lastY=player.y;
    const steps=10;
    for(let i=1;i<=steps;i++){
      const tx=clamp(player.x + vx*distance*(i/steps), bounds.x, bounds.x+bounds.w);
      const ty=clamp(player.y + vy*distance*(i/steps), bounds.y, bounds.y+bounds.h);
      if(this.collidesWithMoveBlocker(tx,ty,16,player)) break;
      lastX=tx; lastY=ty;
    }
    return {x:lastX,y:lastY};
  }
  drawMoveBlockers(){
    if(!SHOW_WALK_BLOCKERS) return;
    this.getMoveBlockers().forEach(b=>{
      this.add.rectangle(b.x+b.w/2,b.y+b.h/2,b.w,b.h,0xff0000,0.18)
        .setStrokeStyle(2,0xff0000,0.72)
        .setDepth(1400);
      this.add.text(b.x+3,b.y+3,b.id || 'block',{fontFamily:'Arial',fontSize:'10px',color:'#fff',backgroundColor:'rgba(0,0,0,.45)'})
        .setDepth(1401);
    });
  }

  moveDonny(player,bounds,dt,area){
    if(player.isResting){
      player.setDepth(20 + player.y);
      this.updateHolsterSprite(player);
      this.updateHeldWeaponSprite(player);
      return;
    }
    if(player.actionLocked){
      this.updateHolsterSprite(player);
      return;
    }
    const {vx,vy}=this.getMoveVector();
    const moving=Math.abs(vx)>0.08 || Math.abs(vy)>0.08;
    if(player.isCrawling){
      const action = this.getDonnyAction('crawl');
      if(moving){
        const speed=DONNY.speed*0.48;
        this.moveActorWithBlockers(player, player.x + vx*speed*dt, player.y + vy*speed*dt, bounds);
        player.dir = Math.abs(vx)>Math.abs(vy) ? (vx<0?'left':'right') : (vy<0?'up':'down');
        player.textureKey=action.tex;
        player.setTexture(action.tex);
        player.setScale(DONNY_ACTION.scale);
        player.play(`${action.prefix}_${player.dir}`, true);
      } else {
        player.anims.stop();
        player.textureKey=action.tex;
        player.setTexture(action.tex);
        player.setScale(DONNY_ACTION.scale);
        player.setFrame(this.getActionFrameForDir(action, player.dir));
      }
      player.setDepth(20 + player.y);
      this.updateHolsterSprite(player);
      return;
    }
    if(area) this.refreshDonnyTexture(player,area,false);
    if(moving){
      const suitStats=GAME_STATE.equipment.suit ? EQUIPMENT_DATA.suits[GAME_STATE.equipment.suit]?.stats : null;
      const runBoost=this.wantsRun() ? 1.28 : 1;
      const speed=DONNY.speed * (1 + (suitStats?.speedMod || 0)) * runBoost;
      this.moveActorWithBlockers(player, player.x + vx*speed*dt, player.y + vy*speed*dt, bounds);

      player.dir = Math.abs(vx)>Math.abs(vy) ? (vx<0?'left':'right') : (vy<0?'up':'down');

      player.walkBobPhase = (player.walkBobPhase || 0) + dt * 18;
      const bob = Math.sin(player.walkBobPhase) * 0.012;
      player.setScale(DONNY.scale + bob, DONNY.scale - bob * 0.35);

      /*
        WALK ANIMATION FIX:
        Play the directional loop only when the animation key changes.
        Do not let idle/setFrame overwrite the walking frames.
      */
      this.playDonnyMoveAnim(player,player.dir);
    } else {
      player.walkBobPhase = 0;
      player.setScale(DONNY.scale);
      player.anims?.stop();
      if(area) this.refreshDonnyTexture(player,area,true);
      else {
        const cfg = getDonnyMoveConfig(player.textureKey);
        player.setFrame(cfg.directionFrame[player.dir] || 0);
      }
    }
    player.setDepth(20 + player.y);
    this.updateHolsterSprite(player);
  }
  createRiffAnimations(texture){
    Object.keys(RIFF.anims).forEach(dir=>{
      const key=`${texture}_${dir}`;
      if(!this.anims.exists(key)){
        this.anims.create({ key, frames:RIFF.anims[dir].frames.map(frame=>({key:texture,frame})), frameRate:8, repeat:-1 });
      }
    });
  }
  createRiff(texture,x,y){
    const r=this.add.sprite(x,y,texture,0).setOrigin(0.5,1).setScale(RIFF.scale).setDepth(18);
    r.dir='down'; r.textureKey=texture; return r;
  }
  refreshRiffTexture(riff,area,forceFrame=false){
    if(!riff) return;
    const texture=getRiffTextureForArea(area);
    const textureChanged = riff.textureKey !== texture;

    if(textureChanged){
      if(riff.anims) riff.anims.stop();
      riff.setTexture(texture);
      riff.textureKey=texture;
    }

    if(forceFrame || textureChanged || !(riff.anims && riff.anims.isPlaying)){
      riff.setFrame({up:12,right:4,left:8,down:0}[riff.dir] || 0);
    }
  }
  updateRiffFollow(riff,player,dt,area){
    if(!riff || !player) return;
    this.refreshRiffTexture(riff,area,false);
    const offset={
      up:{x:42,y:58,dir:'up'},
      down:{x:-42,y:-46,dir:'down'},
      left:{x:58,y:28,dir:'left'},
      right:{x:-58,y:28,dir:'right'}
    }[player.dir] || {x:-42,y:34,dir:'down'};
    const tx=player.x+offset.x;
    const ty=player.y+offset.y;
    const dx=tx-riff.x;
    const dy=ty-riff.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>RIFF.followDistance){
      const vx=dx/dist, vy=dy/dist;
      riff.x += vx * RIFF.speed * dt;
      riff.y += vy * RIFF.speed * dt;
      riff.dir = Math.abs(vx)>Math.abs(vy) ? (vx<0?'left':'right') : (vy<0?'up':'down');
      riff.play(`${riff.textureKey}_${riff.dir}`, true);
    } else {
      riff.anims.stop();
      riff.dir = offset.dir || riff.dir;
      riff.setFrame({up:12,right:4,left:8,down:0}[riff.dir] || 0);
    }
    riff.setDepth(18 + riff.y);
  }


  createDonnyActionAnimations(){
    const map = [
      {tex:'donny_empty_pistol_pose', prefix:'donny_pistol_empty', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_unarmed_punch', prefix:'donny_punch', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_jump_4dir', prefix:'donny_jump', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_crawl_4dir', prefix:'donny_crawl', fps:7, repeat:-1, rows:['down','right','left','up'], cols:4},
      {tex:'donny_slide_4dir', prefix:'donny_slide', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_sit_4dir', prefix:'donny_sit', fps:4, repeat:-1, rows:['down','right','left','up']},
      {tex:'donny_sleep_4dir', prefix:'donny_sleep', fps:4, repeat:-1, rows:['down','right','left','up']},

      {tex:'donny_spacesuit_empty_pistol_4dir', prefix:'donny_spacesuit_pistol_empty', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_spacesuit_unarmed_punch_4dir', prefix:'donny_spacesuit_punch', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_spacesuit_jump_4dir', prefix:'donny_spacesuit_jump', fps:10, repeat:0, rows:['down','right','left','up']},
      {tex:'donny_spacesuit_crawl_heavy_8f', prefix:'donny_spacesuit_crawl', fps:7, repeat:-1, rows:['down','right','left','up'], cols:8},
      {tex:'donny_spacesuit_slide_butt_8f', prefix:'donny_spacesuit_slide', fps:10, repeat:0, rows:['down','right','left','up'], cols:8},
      {tex:'donny_spacesuit_sit_4dir', prefix:'donny_spacesuit_sit', fps:4, repeat:-1, rows:['down','right','left','up']},
      {tex:'donny_spacesuit_sleep_4dir', prefix:'donny_spacesuit_sleep', fps:4, repeat:-1, rows:['down','right','left','up']}
    ];
    map.forEach(def=>{
      if(!this.textures.exists(def.tex)) return;
      def.rows.forEach((dir,row)=>{
        const key=`${def.prefix}_${dir}`;
        if(!this.anims.exists(key)){
          this.anims.create({
            key,
            frames:this.anims.generateFrameNumbers(def.tex,{start:row*(def.cols||4),end:row*(def.cols||4)+(def.cols||4)-1}),
            frameRate:def.fps,
            repeat:def.repeat
          });
        }
      });
    });
  }
  restoreDonnyMovement(player, area){
    if(!player) return;
    player.actionLocked=false;
    player.isCrawling=false;
    player.setScale(DONNY.scale);
    this.refreshDonnyTexture(player,area);
  }
  getDonnyAction(kind){
    const suited = hasSpaceSuitEquipped();
    const actions = {
      pistol: suited ? {tex:'donny_spacesuit_empty_pistol_4dir', prefix:'donny_spacesuit_pistol_empty', cols:4} : {tex:'donny_empty_pistol_pose', prefix:'donny_pistol_empty', cols:4},
      punch: suited ? {tex:'donny_spacesuit_unarmed_punch_4dir', prefix:'donny_spacesuit_punch', cols:4} : {tex:'donny_unarmed_punch', prefix:'donny_punch', cols:4},
      jump: suited ? {tex:'donny_spacesuit_jump_4dir', prefix:'donny_spacesuit_jump', cols:4} : {tex:'donny_jump_4dir', prefix:'donny_jump', cols:4},
      crawl: suited ? {tex:'donny_spacesuit_crawl_heavy_8f', prefix:'donny_spacesuit_crawl', cols:8} : {tex:'donny_crawl_4dir', prefix:'donny_crawl', cols:4},
      slide: suited ? {tex:'donny_spacesuit_slide_butt_8f', prefix:'donny_spacesuit_slide', cols:8} : {tex:'donny_slide_4dir', prefix:'donny_slide', cols:4},
      sit: suited ? {tex:'donny_spacesuit_sit_4dir', prefix:'donny_spacesuit_sit', cols:4} : {tex:'donny_sit_4dir', prefix:'donny_sit', cols:4},
      sleep: suited ? {tex:'donny_spacesuit_sleep_4dir', prefix:'donny_spacesuit_sleep', cols:4} : {tex:'donny_sleep_4dir', prefix:'donny_sleep', cols:4}
    };
    return actions[kind];
  }

  getActionFrameForDir(action, dir){
    const cols = action && action.cols ? action.cols : 4;
    const row = {down:0,right:1,left:2,up:3}[dir || 'down'] || 0;
    return row * cols;
  }

  playDonnyAction(player, tex, animPrefix, dir, opts={}){
    if(!player || !this.textures.exists(tex)) return false;
    const area = opts.area || 'planet';
    const animKey = `${animPrefix}_${dir || player.dir || 'down'}`;
    player.actionLocked = !!opts.lock;
    player.textureKey = tex;
    player.setTexture(tex);
    player.setScale(DONNY_ACTION.scale);
    const actionCols = (tex.includes('heavy_8f') || tex.includes('slide_butt_8f')) ? 8 : 4;
    const startAction = {cols:actionCols};
    player.setFrame(opts.startFrame !== undefined ? opts.startFrame : this.getActionFrameForDir(startAction, dir || player.dir || 'down'));
    if(this.anims.exists(animKey)){
      player.play(animKey, true);
      if(opts.once !== false){
        player.once(Phaser.Animations.Events.ANIMATION_COMPLETE, () => this.restoreDonnyMovement(player, area));
      }
    } else if(opts.duration){
      this.time.delayedCall(opts.duration, () => this.restoreDonnyMovement(player, area));
    }
    return true;
  }

  stopResting(player, area='planet'){
    if(!player || !player.isResting) return;
    player.isResting=false;
    player.restMode=null;
    player.restZoneId=null;
    player.restZone=null;
    player.actionLocked=false;
    player.setScale(DONNY.scale);
    this.refreshDonnyTexture(player, area);
    this.showMessage('Standing up.');
  }
  enterRestPose(player, zone, mode, area='planet'){
    if(!player || !zone) return;
    player.isCrawling=false;
    player.actionLocked=false;
    player.isResting=true;
    this.weaponVisibleUntil = 0;
    player.restMode=mode;
    player.restZoneId = zone.id || null;
    player.restZone = zone;
    player.restInputLockUntil = this.time.now + 260;

    const dir = zone.dir || player.dir || 'down';
    player.dir = dir;

    // Chair anchors: place Donny exactly on the painted chair seat.
    player.x = zone.sitX !== undefined ? zone.sitX : zone.x + zone.w/2;
    player.y = zone.sitY !== undefined ? zone.sitY : zone.y + zone.h;

    const restAction = this.getDonnyAction(mode === 'sleep' ? 'sleep' : 'sit');
    const tex = restAction.tex;
    const prefix = restAction.prefix;
    if(this.textures.exists(tex)){
      player.textureKey = tex;
      player.setTexture(tex);
      player.setScale(REST_ACTION.scale);

  getRestPrompt(player, area='planet'){
    if(!player || !player.isResting) return '';
    const isCockpit = area === 'ship' && player.restZone && player.restZone.cockpit;
    if(isCockpit) return GAME_STATE.flight?.inSpace ? 'A: Get Up    Y: Continue Driving' : 'A: Get Up    Y: Lift Off';
    return 'A: Get Up';
  }
  handleRestingControls(player, area='planet'){
    if(!player || !player.isResting) return false;

    const isCockpit = area === 'ship' && player.restZone && player.restZone.cockpit;
    if(this.prompt) this.prompt.setText(this.getRestPrompt(player, area));

    const depthOffset = player.restZone && player.restZone.chair ? REST_ACTION.chairDepthOffset : 0;
    player.setDepth(20 + player.y + depthOffset);
    this.updateHolsterSprite(player);
    this.updateHeldWeaponSprite(player);

    // Prevent the same A press that sat Donny down from instantly standing him back up.
    if(player.restInputLockUntil && this.time.now < player.restInputLockUntil) return true;

    const move=this.getMoveVector();
    const wantsMove = Math.abs(move.vx)>0.10 || Math.abs(move.vy)>0.10;

    if(isCockpit && this.consumeShoot()){
      if(this.startLiftOffFromCockpit) this.startLiftOffFromCockpit();
      else this.showMessage('Lift-off controls are not wired yet.');
      return true;
    }

    const wantsGetUp =
      wantsMove ||
      this.consumeConfirm() ||
      this.consumeJump() ||
      this.consumeCrawl() ||
      this.consumeSlide() ||
      this.consumePunch();

    if(wantsGetUp) this.stopResting(player, area);
    return true;
  }

  findVanRoofJumpTarget(player, dir){
    if(!this.chunk || this.chunk.id !== VAN_COLLISION.chunkId) return null;
    const roof = VAN_COLLISION.roof;
    const body = VAN_COLLISION.body;
    const v = weaponDirVector(dir || player.dir || 'down');

    const start = {x:player.x-10, y:player.y-24, w:20, h:28};
    const projected = {x:player.x + v.x*72 - 10, y:player.y + v.y*72 - 24, w:20, h:28};
    const nearVan = rectsOverlap(projected, body) ||
      Phaser.Math.Distance.Between(player.x, player.y-20, body.x+body.w/2, body.y+body.h/2) < 130;

    if(!nearVan) return null;

    return {
      x: clamp(player.x + v.x*36, roof.x+18, roof.x+roof.w-18),
      y: clamp(roof.topY + 28, roof.y+36, roof.y+roof.h-6)
    };
  }

  isOnVanRoof(player){
    if(!this.chunk || this.chunk.id !== VAN_COLLISION.chunkId) return false;
    return pointInRect(player.x, player.y-20, VAN_COLLISION.roof);
  }

  updateVanRoofState(player){
    if(!player || !this.chunk || this.chunk.id !== VAN_COLLISION.chunkId){
      if(player) player.onVanRoof=false;
      return;
    }

    if(player.onVanRoof){
      const roof = VAN_COLLISION.roof;
      player.x = clamp(player.x, roof.x+14, roof.x+roof.w-14);
      player.y = clamp(player.y, roof.y+34, roof.y+roof.h-4);
      player.setDepth(20 + player.y + 80);
    }
  }

  jumpOffVanRoof(player, dir='down'){
    const v = weaponDirVector(dir);
    player.onVanRoof = false;
    const bounds = this.bounds || {x:0,y:0,w:W,h:H};
    const landing = {
      x: clamp(player.x + v.x*82, bounds.x, bounds.x+bounds.w),
      y: clamp(player.y + v.y*82, bounds.y, bounds.y+bounds.h)
    };
    if(pointInRect(landing.x, landing.y-12, VAN_COLLISION.body)){
      landing.x = player.x;
      landing.y = player.y + 96;
    }
    return landing;
  }

  updateAtmosphere(delta, area='planet'){
    if(area !== 'planet' || !GAME_STATE.vitals) return;
    const atm = PLANET_ATMOSPHERES[GAME_STATE.location.planetId || 'dust_9'] || PLANET_ATMOSPHERES.dust_9;
    const dt = delta / 1000;
    if(hasSpaceSuitEquipped() || hasO2MaskEquipped()){
      GAME_STATE.vitals.o2 = Math.min(GAME_STATE.vitals.maxO2, GAME_STATE.vitals.o2 + atm.outdoorO2RecoverWithMask * dt);
      GAME_STATE.flags.o2WarningShown = false;
      return;
    }
    GAME_STATE.vitals.o2 = Math.max(0, GAME_STATE.vitals.o2 - atm.outdoorO2DrainNoMask * dt);
    if(GAME_STATE.vitals.o2 <= 35 && !GAME_STATE.flags.o2WarningShown){
      GAME_STATE.flags.o2WarningShown = true;
      this.showMessage('Dust-9 has thin air. Equip an O2 mask or return to the Astro Van.');
    }
    if(GAME_STATE.vitals.o2 <= 0){
      GAME_STATE.vitals.o2 = 20;
      this.showMessage('O2 critical. Donny retreats to the Astro Van.');
      this.scene.start('ShipHubScene');
    }
  }

  useUnarmedPunch(player, area='planet'){

    const v=weaponDirVector(dir);

  }
  useJump(player, area='planet'){
    this.weaponVisibleUntil = 0;
    if(player.actionLocked) return;

    const dir = player.dir || 'down';
    const v = weaponDirVector(dir);
    const isDust9 = area === 'planet' && (GAME_STATE.location.planetId || 'dust_9') === 'dust_9';

    if(!isDust9){
      const action = this.getDonnyAction('jump');
      this.playDonnyAction(player, action.tex, action.prefix, dir, {area, lock:true, startFrame:this.getActionFrameForDir(action, dir)});
      const target = player.onVanRoof ? this.jumpOffVanRoof(player, dir) : (this.findVanRoofJumpTarget(player, dir) || this.findSlideTarget(player,v.x,v.y,34,this.bounds || {x:0,y:0,w:W,h:H}));
      this.tweens.add({targets:player,x:target.x,y:target.y,duration:280,ease:'Sine.easeOut'});
      this.showMessage('Jump.');
      return;
    }

    // Dust-9 has lighter gravity: longer hang time, softer fall, and a visible hover arc.
    player.actionLocked = true;
    player.isJumping = true;
    const action = this.getDonnyAction('jump');
    player.textureKey = action.tex;
    player.setTexture(action.tex);
    player.setScale(DONNY_ACTION.scale);
    player.setFrame(this.getActionFrameForDir(action, dir));

    const animKey = `${action.prefix}_${dir}`;
    if(this.anims.exists(animKey)) player.play(animKey, true);

    const bounds = this.bounds || {x:0,y:0,w:W,h:H};
    const startX = player.x;
    const startY = player.y;
    const roofTarget = player.onVanRoof ? null : this.findVanRoofJumpTarget(player, dir);
    const target = player.onVanRoof ? this.jumpOffVanRoof(player, dir) : (roofTarget || this.findSlideTarget(player, v.x, v.y, 58, bounds));
    const floatArc = { t:0 };

    const shadow = this.add.ellipse(startX, startY-4, 42, 14, 0x000000, 0.36)
      .setDepth(Math.max(1, player.depth - 2));

    this.tweens.add({
      targets: floatArc,
      t: 1,
      duration: 640,
      ease: 'Sine.easeInOut',
      onUpdate: () => {
        const t = floatArc.t;
        const groundX = Phaser.Math.Linear(startX, target.x, t);
        const groundY = Phaser.Math.Linear(startY, target.y, t);
        const height = Math.sin(Math.PI * t) * 44;

        player.x = groundX;
        player.y = groundY - height;
        player.setDepth(20 + groundY);
        player.setScale(DONNY_ACTION.scale + height * 0.0018);

        shadow
          .setPosition(groundX, groundY - 4)
          .setScale(1 - height * 0.006, 1 - height * 0.009)
          .setAlpha(0.36 - height * 0.0045);

        this.updateHolsterSprite(player);
        this.updateHeldWeaponSprite(player);
      },
      onComplete: () => {
        player.x = target.x;
        player.y = target.y;
        player.isJumping = false;
        player.onVanRoof = !!roofTarget;
        if(player.onVanRoof) this.showMessage('Landed on Astro Van roof. Jump again to hop down.');
        if(shadow) shadow.destroy();
        this.restoreDonnyMovement(player, area);
      }
    });

    this.showMessage('Dust-9 low gravity jump.');
  }
  useSlide(player, bounds, area='planet'){
    if(player.actionLocked) return;
    const dir=player.dir || 'down';
    const action = this.getDonnyAction('slide');
    this.playDonnyAction(player, action.tex, action.prefix, dir, {area, lock:true, startFrame:this.getActionFrameForDir(action, dir)});
    const v=weaponDirVector(dir);
    const target=this.findSlideTarget(player,v.x,v.y,92,bounds);
    this.tweens.add({targets:player,x:target.x,y:target.y,duration:260,ease:'Quad.easeOut'});
    this.showMessage('Slide.');
  }
  setCrawling(player, on, area='planet'){
    if(!player) return;

    if(!on){ this.restoreDonnyMovement(player,area); return; }
    const dir=player.dir || 'down';

      .setScale(HOLSTER.scale)
      .setFrame(frame)
      .setDepth(player.depth+8)
      .setVisible(true);
  }

  openStartEquipmentMenu(){
    this.ensureStartEquipmentMenu();
    this.startMenuOpen=true;
    this.startMenuIndex=0;
    this.refreshStartEquipmentMenu();
  }
  closeStartEquipmentMenu(){
    if(!this.startMenuReady) return;
    this.startMenuOpen=false;
    this.startMenuBg.setVisible(false);
    this.startMenuTitle.setVisible(false);
    this.startMenuInfo.setVisible(false);

    this.startMenuInfo.setText(`Weapon: ${weapon.name}   Holster: ${getEquippedHolsterName()}\nMask: ${getEquippedMaskName()}   Suit: ${getEquippedSuitName()}\nButtons: A Jump / Confirm   B Crawl, double-tap B Slide   X Punch   Y Shoot   Full Stick/Shift Run`);
    this.startMenuTexts.forEach((t,i)=>{
      const opt=this.startMenuOptions[i];
      if(!opt){ t.setVisible(false); return; }

      t.setText(`${selected?'▶ ':'   '}${opt.label}`).setColor(selected?'#46ff87':'#fff').setVisible(true);

  chooseStartEquipmentOption(){
    const opt=this.startMenuOptions[this.startMenuIndex];
    if(!opt) return;
    if(opt.id==='laser'){ GAME_STATE.equipment.ranged='laser_revolver'; GAME_STATE.equipment.currentWeaponSlot='ranged'; this.showMessage('Laser Revolver equipped.'); }
    else if(opt.id==='guitar'){ GAME_STATE.equipment.melee='black_guitar'; GAME_STATE.equipment.currentWeaponSlot='melee'; this.showMessage('Black Guitar equipped.'); }
    else if(opt.id==='heavy'){ GAME_STATE.equipment.heavy='feedback_cannon'; GAME_STATE.equipment.currentWeaponSlot='heavy'; this.showMessage('Feedback Cannon equipped.'); }
    else if(opt.id==='holster'){
      if(hasHolsterEquipped()){ unequipHolster(); this.showMessage('Holster removed.'); }
      else { equipHolster(); this.showMessage('Holster equipped.'); }
    }
    else if(opt.id==='mask'){
      if(hasO2MaskEquipped()){ unequipMask(); this.showMessage('O2 mask removed.'); }
      else { equipMask('basic_o2_mask'); this.showMessage('O2 mask equipped.'); }
    }
    else if(opt.id==='suit'){
      if(hasSpaceSuitEquipped()){ unequipSuit(); this.showMessage('Space suit unequipped.'); }
      else { equipSuit('basic_space_suit'); this.showMessage('Space suit equipped.'); }
      if(this.player) this.refreshDonnyTexture(this.player, this.scene.key==='ShipHubScene'?'ship':'planet');
      if(this.riff) this.refreshRiffTexture(this.riff, this.scene.key==='ShipHubScene'?'ship':'planet');
    }
    else if(opt.id==='close'){ this.closeStartEquipmentMenu(); return; }
    if(this.player){
      this.weaponVisibleUntil = 0;
      this.updateHeldWeaponSprite(this.player);
      this.updateHolsterSprite(this.player);
    }
    if(this.updateHud) this.updateHud();
    this.refreshStartEquipmentMenu();
  }
  updateStartEquipmentMenu(delta){
    this.startMenuMoveCooldown-=delta;
    const move=this.getMoveVector();
    if(this.startMenuMoveCooldown<=0){
      if(move.vy<-0.55 || Phaser.Input.Keyboard.JustDown(this.keys.UP)){
        this.startMenuIndex=(this.startMenuIndex+this.startMenuOptions.length-1)%this.startMenuOptions.length;
        this.startMenuMoveCooldown=180;
        this.refreshStartEquipmentMenu();
      } else if(move.vy>0.55 || Phaser.Input.Keyboard.JustDown(this.keys.DOWN)){
        this.startMenuIndex=(this.startMenuIndex+1)%this.startMenuOptions.length;
        this.startMenuMoveCooldown=180;
        this.refreshStartEquipmentMenu();
      }
    }
    if(this.consumeBack()){ this.closeStartEquipmentMenu(); return; }
    if(this.consumeConfirm()) this.chooseStartEquipmentOption();
  }
  handleStartEquipmentMenu(delta){
    this.ensureStartEquipmentMenu();
    if(this.startMenuOpen){ this.updateStartEquipmentMenu(delta); return true; }
    if(this.consumeBack()){ this.openStartEquipmentMenu(); return true; }
    return false;
  }

    if(!this.weaponSprite || !player) return;
    const weapon = getEquippedWeapon();
    const spriteKey = weapon.sprite || `${weapon.id}_hold`;
    if(this.textures.exists(spriteKey) && this.weaponSprite.texture.key !== spriteKey) {
      this.weaponSprite.setTexture(spriteKey);
    }
    const dir = player.dir || 'down';
    const o = (weapon.offset && (weapon.offset[dir] || weapon.offset.down)) || {x:0,y:-42,rotation:0};
    const f = weapon.directionFrame ? (weapon.directionFrame[dir] ?? 0) : null;
    if(f !== null && this.weaponSprite.setFrame) this.weaponSprite.setFrame(f);

    // Weapons stay hidden while equipped.
    // The gun only appears during the shot window triggered by Y / shoot.
    const visible = !!this.weaponVisibleUntil && this.time.now < this.weaponVisibleUntil;

    this.weaponSprite
      .setPosition(player.x + o.x, player.y + o.y)
      .setRotation(o.rotation || 0)
      .setScale(weapon.scale || 0.4)
      .setDepth(player.depth + 12)
      .setVisible(visible);
  }
  consumeAttack(){
    return Phaser.Input.Keyboard.JustDown(this.keys.J) ||
      Phaser.Input.Keyboard.JustDown(this.keys.X);
  }
  cycleWeaponAndMessage(){
    const weapon = cycleWeaponSlot();
    this.showMessage(`Equipped ${weapon.name}.`);
    this.updateHeldWeaponSprite(this.player);
    if(this.updateHud) this.updateHud();
  }
  playFx(key, animKey, x, y, scale=0.35, rotation=0, depth=900){
    if(!this.textures.exists(key)) return null;
    const fx = this.add.sprite(x, y, key, 0)
      .setOrigin(0.5)
      .setScale(scale)
      .setRotation(rotation)
      .setDepth(depth);
    if(this.anims.exists(animKey)) {
      fx.play(animKey);
      fx.once(Phaser.Animations.Events.ANIMATION_COMPLETE, () => fx.destroy());
    } else {
      this.time.delayedCall(160, () => fx.destroy());
    }
    return fx;
  }
  spawnSimpleProjectile(player, weapon, muzzle){
    const dir = player.dir || 'right';
    const v = weaponDirVector(dir);
    const range = weapon.range || 320;
    const speed = weapon.type === 'rifle' ? 620 : 500;
    const color = weapon.type === 'heavy' ? 0xff2aa1 : 0x21d7ff;
    const bullet = this.add.circle(muzzle.x, muzzle.y, weapon.type === 'heavy' ? 8 : 4, color, 0.95)
      .setStrokeStyle(2, 0xffffff, 0.7)
      .setDepth(950);
    const life = (range / speed) * 1000;
    this.tweens.add({
      targets: bullet,
      x: muzzle.x + v.x * range,
      y: muzzle.y + v.y * range,
      duration: life,
      ease:'Linear',
      onComplete:()=>bullet.destroy()
    });
  }
  useEquippedWeapon(player){
    const now = this.time.now;
    if(this.lastWeaponUse && now - this.lastWeaponUse < 120) return;
    const weapon = getEquippedWeapon();
    const cooldown = weapon.cooldown || 400;
    if(this.weaponCooldownUntil && now < this.weaponCooldownUntil) return;
    this.lastWeaponUse = now;
    this.weaponCooldownUntil = now + cooldown;

    const dir = player.dir || 'down';
    const v = weaponDirVector(dir);
    const baseX = player.x;
    const baseY = player.y - 48;
    const muzzleOffset = weapon.muzzle?.[dir] || {x:v.x*42, y:-42 + v.y*38};
    const muzzle = { x: player.x + muzzleOffset.x, y: player.y + muzzleOffset.y };

    if(weapon.type === 'melee') {
      this.showHeldWeaponFor(player, 180);
      this.playFx('neon_slash_arc', 'fx_slash', baseX + v.x*48, baseY + v.y*40, 0.34, v.angle, player.depth + 10);
      this.showMessage(`${weapon.name}: ${weapon.damage} damage swing.`);
    } else if(weapon.type === 'pistol' || weapon.type === 'rifle') {
      this.showHeldWeaponFor(player, weapon.type === 'rifle' ? 280 : 240);
      if(weapon.type === 'pistol') {
        const action = this.getDonnyAction('pistol');
        this.playDonnyAction(player, action.tex, action.prefix, dir, {area:'planet', lock:true, startFrame:this.getActionFrameForDir(action, dir)});
      }
      const ammoType = weapon.ammoType || 'light_cells';
      if((GAME_STATE.inventory.ammo[ammoType] || 0) <= 0) {
        this.showMessage(`No ${ammoType.replace('_',' ')} ammo.`);
        return;
      }
      GAME_STATE.inventory.ammo[ammoType] -= 1;
      this.playFx('muzzle_flash_burst', 'fx_muzzle', muzzle.x, muzzle.y, weapon.type === 'rifle' ? 0.24 : 0.18, v.angle, player.depth + 12);
      this.spawnSimpleProjectile(player, weapon, muzzle);
      this.showMessage(`${weapon.name} fired. ${GAME_STATE.inventory.ammo[ammoType]} ${ammoType.replace('_',' ')} left.`);
      if(this.updateHud) this.updateHud();
    } else if(weapon.type === 'heavy') {
      this.showHeldWeaponFor(player, 320);
      const ammoType = weapon.ammoType || 'heavy_cells';
      const cost = weapon.ammoCost || 1;
      if((GAME_STATE.inventory.ammo[ammoType] || 0) < cost) {
        this.showMessage(`No ${ammoType.replace('_',' ')} ammo.`);
        return;
      }
      GAME_STATE.inventory.ammo[ammoType] -= cost;
      this.playFx('plasma_ring_blast', 'fx_plasma', baseX + v.x*78, baseY + v.y*66, 0.42, v.angle, player.depth + 12);
      this.playFx('rainbow_hit_burst', 'fx_hit', baseX + v.x*145, baseY + v.y*120, 0.34, 0, player.depth + 11);
      this.spawnSimpleProjectile(player, weapon, muzzle);
      this.showMessage(`${weapon.name}: heavy blast. ${GAME_STATE.inventory.ammo[ammoType]} ${ammoType.replace('_',' ')} left.`);
      if(this.updateHud) this.updateHud();
    } else {
      this.showMessage(`${weapon.name} used.`);
    }
    this.updateHeldWeaponSprite(player);
  }

  makeDialog(){
    this.dialogBg=this.add.rectangle(W/2,H-36,760,58,0x05070c,0.82).setStrokeStyle(2,0xff2aa1,0.75).setDepth(1500).setVisible(false);
    this.dialogText=this.add.text(W/2,H-36,'',{fontFamily:'Arial',fontSize:'18px',color:'#ffffff',align:'center',wordWrap:{width:720}}).setOrigin(0.5).setDepth(1501).setVisible(false);
  }
  showMessage(msg){
    if(!this.dialogBg || !this.dialogText) return;
    this.dialogBg.setVisible(true); this.dialogText.setVisible(true).setText(msg); this.dialogTimer=2000;
  }
  updateDialog(delta){
    if(this.dialogTimer>0){ this.dialogTimer-=delta; if(this.dialogTimer<=0){ this.dialogBg.setVisible(false); this.dialogText.setVisible(false); } }
  }
}

  getInteractZones(){
    const zones=[...(this.chunk.interactZones || [])];
    if(this.chunk.id==='0,1'){
      zones.push({id:'astroVan',label:'Astro Van',x:250,y:265,w:185,h:150,targetScene:'ShipHubScene',message:'Enter the Astro Van.'});
      zones.push({id:'bountyOfficeDoor',label:"Donny's Bounty Office",x:650,y:220,w:145,h:150,targetScene:'BountyOfficeScene',message:"Enter Donny's Bounty Office."});
    }
    if(this.chunk.id==='2,1'){
      zones.push({id:'scavengerHut',label:'Scavenger Hut',x:78,y:150,w:165,h:135,targetScene:'ScavengerHutScene',message:'Enter Scavenger Hut.'});
      zones.push({id:'mechanicHut',label:'Mechanic Hut',x:330,y:125,w:170,h:135,targetScene:'MechanicHutScene',message:'Enter Mechanic Hut.'});
      zones.push({id:'familyHut',label:'Family Hut',x:90,y:320,w:180,h:125,targetScene:'FamilyHutScene',message:'Enter Family Hut.'});

    this.interactZones.forEach(z=>{
      if(z.id === 'astroVan') return;
      this.add.rectangle(z.x+z.w/2,z.y+z.h/2,z.w,z.h,0x21d7ff,0.05).setStrokeStyle(1,0x21d7ff,0.22).setDepth(6);
    });
  }
  createPickups(){
    (this.chunk.pickups || []).forEach(p=>{
      const key=collectedKey(this.chunk.id,p.id);
      if(GAME_STATE.collected[key]) return;
      if(p.type==='cosmic_spark_plug' || p.type==='fuel_cell'){
        const body=this.add.rectangle(p.x,p.y,18,34,0xe7ecff,1).setStrokeStyle(2,0xffd447,1).setDepth(12);
        const tip=this.add.circle(p.x,p.y-22,8,p.type==='fuel_cell'?0x46ff87:0x21d7ff,0.9).setDepth(12);

      } else {
        const scrap=this.add.rectangle(p.x,p.y,24,24,0xffd447,0.96).setRotation(Math.PI/4).setStrokeStyle(2,0xffffff,0.75).setDepth(12);

  collectPickup(p){
    if(p.collected) return;

    p.sprites.forEach(s=>s.destroy());
    GAME_STATE.inventory.items[p.data.type]=(GAME_STATE.inventory.items[p.data.type]||0)+1;
    const label={cosmic_spark_plug:'Cosmic Spark Plug',scrap_metal:'Scrap Metal',fuel_cell:'Fuel Cell'}[p.data.type] || p.data.type;
    this.showMessage(`Collected ${label}.`); this.updateHud();
  }
  updateHud(){
    if(!this.hud) return;
    const weapon = getEquippedWeapon();
    const o2 = Math.round(GAME_STATE.vitals?.o2 ?? 100);
    this.hud.setText(`Dust-9 Air: ${hasO2MaskEquipped() || hasSpaceSuitEquipped() ? 'OK' : 'THIN'}  O2:${o2}%  Mask:${getEquippedMaskName()}  Suit:${getEquippedSuitName()}  Weapon:${weapon.name}`);
  }
  nearestZone(){
    let best=null,bestD=9999;
    this.interactZones.forEach(z=>{
      const c=zoneCenter(z), d=Phaser.Math.Distance.Between(this.player.x,this.player.y-35,c.x,c.y);
      if(d<bestD){bestD=d;best=z;}
    });
    return bestD<105 ? best : null;
  }
  handleZone(zone){
    if(zone.targetScene === 'ShipHubScene'){ this.scene.start('ShipHubScene'); return; }
    const interiorId = TARGET_SCENE_TO_INTERIOR[zone.targetScene];
    if(interiorId){ this.scene.start('InteriorScene', { interiorId }); return; }
    this.showMessage(zone.message || zone.label || 'Nothing here yet.');
  }
  tryChunkExit(){
    const edge=6;
    if(this.player.x<=this.bounds.x+edge) return this.goDirection('west');
    if(this.player.x>=this.bounds.x+this.bounds.w-edge) return this.goDirection('east');
    if(this.player.y<=this.bounds.y+edge) return this.goDirection('north');
    if(this.player.y>=this.bounds.y+this.bounds.h-edge) return this.goDirection('south');
    return false;
  }
  goDirection(dir){
    const next=this.chunk.exits?.[dir];
    if(!next){
      const msg=this.chunk.blocked?.[dir] || 'Route blocked by sandstorm.';
      this.showMessage(msg);
      if(dir==='west') this.player.x+=20; if(dir==='east') this.player.x-=20; if(dir==='north') this.player.y+=20; if(dir==='south') this.player.y-=20;
      return true;
    }
    const entrySide={west:'east',east:'west',north:'south',south:'north'}[dir];
    this.scene.start('PlanetChunkScene', {planetId:this.planetId, chunkId:next, entrySide});
    return true;
  }
  update(time,delta){
    const dt=delta/1000;
    if(this.handleStartEquipmentMenu(delta)){ this.updateDialog(delta); return; }
    this.updateAtmosphere(delta,'planet');
    if(this.handleRestingControls(this.player,'planet')){ this.updateDialog(delta); return; }
    this.moveDonny(this.player,this.bounds,dt,'planet');
    this.updateVanRoofState(this.player);
    this.updateHolsterSprite(this.player);
    this.updateHeldWeaponSprite(this.player);
    this.updateRiffFollow(this.riff,this.player,dt,'planet');
    this.pickupSprites.forEach(p=>{
      if(!p.collected && Phaser.Math.Distance.Between(this.player.x,this.player.y-40,p.data.x,p.data.y)<54) this.collectPickup(p);
    });
    const zone=this.nearestZone();
    const weapon = getEquippedWeapon();
    this.prompt.setText(zone ? `A: ${zone.label}   X:Punch Y:Draw/Shoot B:Crawl 2xB:Slide Full Stick:Run` : `A:Jump  X:Punch  Y:Draw/Shoot ${weapon.name}  B:Crawl 2xB:Slide Full Stick:Run START:Equipment`);
    const confirmPressed = this.consumeConfirm();
    const jumpPressed = this.consumeJump();
    const slidePressed = this.consumeSlide();
    const crawlPressed = this.consumeCrawl();
    const punchPressed = this.consumePunch();
    const shootPressed = this.consumeShoot();
    if(crawlPressed) this.setCrawling(this.player, !this.player.isCrawling, 'planet');
    else if(slidePressed) this.useSlide(this.player,this.bounds,'planet');
    else if(zone && confirmPressed) this.handleZone(zone);
    else if(jumpPressed && !zone) this.useJump(this.player,'planet');
    else if(punchPressed) this.useUnarmedPunch(this.player,'planet');
    else if(shootPressed) this.useRangedWeapon(this.player);
    this.tryChunkExit();
    this.updateDialog(delta);
  }
}

    this.zones.forEach(z=>{
      const c=zoneCenter(z), d=Phaser.Math.Distance.Between(this.player.x,this.player.y-35,c.x,c.y);
      if(d<bestD){bestD=d;best=z;}
    });
    return bestD<105 ? best : null;
  }
  leave(){
    const target=this.dataObj.exit?.targetChunkId || this.dataObj.parentChunk || '0,1';
    const entry=this.dataObj.exit?.entrySide || 'interior';
    this.scene.start('PlanetChunkScene', {planetId:'dust_9', chunkId:target, entrySide:entry});
  }
  update(time,delta){
    const dt=delta/1000;
    if(this.handleStartEquipmentMenu(delta)){ this.updateDialog(delta); return; }
    this.moveDonny(this.player,this.bounds,dt,'planet');
    this.updateHolsterSprite(this.player);
    this.updateHeldWeaponSprite(this.player);
    this.updateRiffFollow(this.riff,this.player,dt,'planet');
    const zone=this.nearestZone();
    const zonePrompt = zone ? (isLayZone(zone) ? `A: ${zone.label}   Move: stand up` : (isSitZone(zone) ? `A: ${zone.label}   Move: stand up` : `A: ${zone.label}   X:Punch Y:Draw/Shoot B:Crawl 2xB:Slide`)) : `A:Jump  X:Punch  Y:Draw/Shoot ${getEquippedWeapon().name}  START:Equipment`;
    this.prompt.setText(zonePrompt);
    const confirmPressed = this.consumeConfirm();
    const jumpPressed = this.consumeJump();
    const slidePressed = this.consumeSlide();
    const crawlPressed = this.consumeCrawl();
    const punchPressed = this.consumePunch();
    const shootPressed = this.consumeShoot();
    if(crawlPressed) this.setCrawling(this.player, !this.player.isCrawling, 'planet');
    else if(slidePressed) this.useSlide(this.player,this.bounds,'planet');
    else if(zone && confirmPressed){
      if(isLayZone(zone)) this.layDonny(this.player, zone, 'planet');
      else if(isSitZone(zone)) this.sitDonny(this.player, zone, 'planet');
      else if(zone.id==='exitDoor') this.leave();
      else this.showMessage(zone.message || zone.label || 'Nothing here yet.');
    } else if(jumpPressed && !zone) this.useJump(this.player,'planet');
    else if(punchPressed) this.useUnarmedPunch(this.player,'planet');
    else if(shootPressed) this.useRangedWeapon(this.player);
    this.updateDialog(delta);
  }
}

    this.starLayers.forEach(layer=>{
      layer.stars.forEach(star=>{

        if(star.y > H+4){
          star.y = -4;
          star.x = Phaser.Math.Between(0,W);
        }
      });
    });

    this.orbitFloaters.forEach(f=>{
      if(!f.obj) return;
      f.obj.x = f.baseX + Math.sin(time*f.speed) * f.ampX;
      f.obj.y = f.baseY + Math.cos(time*f.speed*0.85) * f.ampY;
    });

    if(this.spaceStation) this.spaceStation.setAngle(Math.sin(time*0.0008)*2.5);
    if(this.van && this.van.setAngle) this.van.setAngle(Math.sin(time*0.0012)*1.7);

    const getUp = this.consumeConfirm() || this.consumeJump();
    const keepDriving = this.consumeShoot();

    if(getUp) this.openInteriorFromDrive();
    else if(keepDriving) this.showMessage('Holding course in Dust-9 orbit.');

    this.updateDialog(delta);
  }
}

    this.add.text(W/2,52,'EMPTY VAN BASE GENERATED - EXACT BACKGROUND FILE NOT FOUND',{fontFamily:'Arial',fontSize:'11px',color:'#9be7ff',backgroundColor:'rgba(0,0,0,.45)',padding:{x:6,y:3}}).setOrigin(0.5).setDepth(1400);
  }
  addShipFurnitureFromAssets(){
    this.shipFurnitureSprites = [];

    SHIP_FURNITURE_LAYOUT.forEach(item=>{
      const candidates = SHIP_FURNITURE_ASSET_CANDIDATES[item.kind] || [];
      const loadedKey = this.getFirstLoadedTexture(candidates);
      const key = (item.texture && this.textures.exists(item.texture)) ? item.texture : loadedKey;

      if(!key){
        console.warn('SHIP PROP NOT FOUND:', item.id, candidates.map(c=>c.path));
        return;
      }

      const obj = this.add.image(item.x,item.y,key)
        .setOrigin(0.5,0.5)
        .setDisplaySize(item.displayW,item.displayH)
        .setDepth(typeof item.depth === 'number' ? item.depth : (item.foreground ? 1250 : 20 + item.y));

      this.shipFurnitureSprites.push(obj);
    });
  }
  drawFurnitureFallback(item){

    const c = this.add.container(item.x,item.y).setDepth(20 + item.y);

      .setStrokeStyle(2,f.stroke || 0xffffff,0.7);
    c.add(body);

    if(item.kind === 'cockpitConsole'){
      c.add(this.add.rectangle(0,-18,f.w-28,24,0x02040d,0.9).setStrokeStyle(1,0x46e4ff,0.38));
      c.add(this.add.circle(-48,10,6,0x46ff87,0.75));
      c.add(this.add.circle(-24,10,6,0xffd447,0.75));
      c.add(this.add.circle(0,10,6,0xff2aa1,0.75));
      c.add(this.add.rectangle(42,12,52,10,0x21d7ff,0.5));
    } else if(item.kind === 'leftBed'){
      c.add(this.add.rectangle(-22,-12,f.w*0.45,22,0x1b2030,0.85).setStrokeStyle(1,0xffffff,0.28));
      c.add(this.add.rectangle(32,8,f.w*0.38,34,0x713f8f,0.7));
    } else if(item.kind === 'kitchenCounter'){

      c.add(this.add.rectangle(34,-12,72,14,0xffd447,0.35));
      c.add(this.add.rectangle(0,18,f.w-34,8,0x111722,0.55));
    } else if(item.kind === 'table'){
      c.add(this.add.ellipse(0,0,f.w*0.82,f.h*0.58,0x8a5c32,0.95).setStrokeStyle(2,0xffd447,0.45));
      c.add(this.add.rectangle(-42,38,28,14,0x2b1d15,0.85));
      c.add(this.add.rectangle(42,38,28,14,0x2b1d15,0.85));
    } else if(item.kind === 'gearLocker' || item.kind === 'storageCabinet'){
      c.add(this.add.rectangle(-22,0,3,f.h-18,0xffffff,0.18));
      c.add(this.add.circle(-10,4,3,0xffd447,0.8));
      c.add(this.add.circle(24,4,3,0xffd447,0.8));
    } else if(item.kind === 'medStation'){
      c.add(this.add.rectangle(0,0,f.w-36,28,0x78e6ff,0.18).setStrokeStyle(1,0x78e6ff,0.5));
      c.add(this.add.rectangle(0,-2,14,48,0xffffff,0.72));
      c.add(this.add.rectangle(0,-2,48,14,0xffffff,0.72));
    } else if(item.kind === 'upgradeStation'){
      c.add(this.add.circle(0,0,18,0xff2aa1,0.35).setStrokeStyle(2,0xff2aa1,0.6));
      c.add(this.add.circle(0,0,7,0x46e4ff,0.8));
    } else if(item.kind === 'guitarRack'){
      c.add(this.add.rectangle(-28,0,12,58,0xffd447,0.5));
      c.add(this.add.rectangle(0,0,12,58,0xff2aa1,0.45));
      c.add(this.add.rectangle(28,0,12,58,0x46e4ff,0.45));
    }

    return c;
  }
  createVanInteriorOrbitOverlay(){
    this.spaceInteriorFloaters=[];

    // Always mark the cockpit as usable. In orbit, draw a visible asset-based space view over the van windows.
    const stateLabel = this.spaceMode ? 'DUST-9 ORBIT' : 'DUST-9 SURFACE';
    const statusColor = this.spaceMode ? '#46e4ff' : '#ffd447';

    this.add.rectangle(724,72,264,92,0x02040d,this.spaceMode ? 0.80 : 0.28)
      .setStrokeStyle(2,this.spaceMode ? 0x46e4ff : 0xffd447,this.spaceMode ? 0.45 : 0.24)
      .setDepth(4);

    if(this.spaceMode){
      const win=this.add.container(0,0).setDepth(5);
      win.add(this.add.rectangle(724,72,246,76,0x00020a,0.74).setStrokeStyle(1,0x9be7ff,0.25));

      for(let i=0;i<34;i++){
        const sx=Phaser.Math.Between(612,838);
        const sy=Phaser.Math.Between(40,104);
        const alpha=Phaser.Math.FloatBetween(0.25,0.82);
        win.add(this.add.rectangle(sx,sy,1,1,0xffffff,alpha));
      }

      let planet;
      if(this.textures.exists('dust9_planet_space')){
        planet=this.add.image(644,94,'dust9_planet_space').setDisplaySize(38,38).setDepth(5);
      } else {
        planet=this.add.container(644,94);
        planet.add(this.add.circle(0,0,19,0xb8662d,1));
        planet.add(this.add.circle(-6,-6,7,0xe4a35e,0.35));
        planet.add(this.add.ellipse(2,4,35,7,0x6b351d,0.24));
        planet.add(this.add.circle(8,8,4,0x2b170d,0.22));
      }
      win.add(planet);

      let moon;
      if(this.textures.exists('dust9_dead_moon')){
        moon=this.add.image(776,47,'dust9_dead_moon').setDisplaySize(14,14).setDepth(5);
      } else {
        moon=this.add.container(776,47);
        moon.add(this.add.circle(0,0,6,0xc7d2e6,0.92));
        moon.add(this.add.circle(-2,-1,2,0x6f7888,0.32));
      }
      win.add(moon);

      let station;
      if(this.textures.exists('neon_space_station')){
        station=this.add.image(810,78,'neon_space_station').setDisplaySize(44,25).setDepth(5);
      } else {
        station=this.add.container(810,78);
        station.add(this.add.rectangle(0,0,25,6,0xb8c7d9,0.86).setStrokeStyle(1,0xffffff,0.34));
        station.add(this.add.rectangle(-22,0,16,4,0x3e86ff,0.68));
        station.add(this.add.rectangle(22,0,16,4,0x3e86ff,0.68));
        station.add(this.add.rectangle(0,-8,4,12,0xd8e1ef,0.72));
        station.add(this.add.circle(0,0,3,0xfff0a8,0.86));
        station.setScale(0.72);
      }
      win.add(station);

      this.spaceInteriorFloaters.push({obj:planet,baseX:644,baseY:94,ampX:4,ampY:2,speed:0.0011});
      this.spaceInteriorFloaters.push({obj:moon,baseX:776,baseY:47,ampX:3,ampY:2,speed:0.0008});
      this.spaceInteriorFloaters.push({obj:station,baseX:810,baseY:78,ampX:5,ampY:3,speed:0.0014});

      this.add.rectangle(724,128,254,30,0x001622,0.72).setDepth(6).setStrokeStyle(1,0x46e4ff,0.28);
      this.add.text(724,127,'AUTO-PILOT HOLDING DUST-9 ORBIT',{fontFamily:'Arial',fontSize:'12px',color:'#bff6ff',align:'center'}).setOrigin(0.5).setDepth(7);
      this.add.text(724,151,'Sit in cockpit chair + press Y to keep driving',{fontFamily:'Arial',fontSize:'11px',color:'#ffffff',backgroundColor:'rgba(0,0,0,.36)',padding:{x:5,y:2}}).setOrigin(0.5).setDepth(7);
      this.add.ellipse(480,512,420,34,0x46e4ff,0.07).setDepth(3);
    } else {
      this.add.text(724,78,'COCKPIT READY',{fontFamily:'Arial',fontSize:'14px',color:'#ffd447',backgroundColor:'rgba(0,0,0,.38)',padding:{x:6,y:3}}).setOrigin(0.5).setDepth(6);
      this.add.text(724,104,'Sit in pilot chair + press Y for lift-off',{fontFamily:'Arial',fontSize:'12px',color:'#ffffff',backgroundColor:'rgba(0,0,0,.32)',padding:{x:5,y:2}}).setOrigin(0.5).setDepth(6);
    }

    this.add.text(92,72,stateLabel,{fontFamily:'Arial Black',fontSize:'15px',color:statusColor,backgroundColor:'rgba(0,0,0,.52)',padding:{x:8,y:4}}).setDepth(8);
  }
  updateVanInteriorOrbitOverlay(time){
    if(!this.spaceInteriorFloaters) return;
    this.spaceInteriorFloaters.forEach(f=>{
      if(!f.obj) return;
      f.obj.x = f.baseX + Math.sin(time*f.speed) * f.ampX;
      f.obj.y = f.baseY + Math.cos(time*f.speed*0.9) * f.ampY;
    });
  }
  updateHud(){
    if(this.hudText) this.hudText.destroy();
    const flightText = GAME_STATE.flight?.inSpace ? '   Flight: In Space' : '';
    this.hudText=this.add.text(W-12,12,`Suit: ${getEquippedSuitName()}   Mask: ${getEquippedMaskName()}   Weapon: ${getEquippedWeapon().name}   O2:${Math.round(GAME_STATE.vitals?.o2 ?? 100)}%${flightText}`,{fontFamily:'Arial',fontSize:'14px',color:(hasO2MaskEquipped()||hasSpaceSuitEquipped())?'#46ff87':'#ffd447',backgroundColor:'rgba(0,0,0,.48)',padding:{x:8,y:4}}).setOrigin(1,0).setDepth(1500);
  }
  nearestZone(){
    let best=null,bestD=9999;
    [...SHIP_ZONES, ...SHIP_REST_ZONES].forEach(z=>{const c=zoneCenter(z),d=Phaser.Math.Distance.Between(this.player.x,this.player.y-35,c.x,c.y);if(d<bestD){bestD=d;best=z;}});
    return bestD<95 ? best : null;
  }
  createGearLockerMenu(){
    this.menuOpen=false; this.menuIndex=0; this.menuMoveCooldown=0;
    this.menuBg=this.add.rectangle(W/2,H/2,650,330,0x05070c,0.93).setStrokeStyle(3,0xff2aa1,0.9).setDepth(2200).setVisible(false);
    this.menuTitle=this.add.text(W/2,H/2-135,'GEAR LOCKER',{fontFamily:'Arial',fontSize:'30px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5).setDepth(2201).setVisible(false);
    this.menuInfo=this.add.text(W/2,H/2-94,'',{fontFamily:'Arial',fontSize:'16px',color:'#cbd4ff',align:'center',wordWrap:{width:560}}).setOrigin(0.5).setDepth(2201).setVisible(false);
    this.menuOptions=['Equip O2 Mask','Remove O2 Mask','Equip Basic Space Suit','Unequip Space Suit','Close'];
    this.menuTexts=this.menuOptions.map((label,i)=>this.add.text(W/2,H/2-34+i*48,label,{fontFamily:'Arial',fontSize:'22px',color:'#fff',align:'center'}).setOrigin(0.5).setDepth(2201).setVisible(false));
    this.menuHelp=this.add.text(W/2,H/2+130,'Left stick / Up Down = select    A = choose    START/Esc = close',{fontFamily:'Arial',fontSize:'14px',color:'#fff',align:'center'}).setOrigin(0.5).setDepth(2201).setVisible(false);
  }
  openGearLockerMenu(){ this.menuOpen=true; this.menuIndex=GAME_STATE.equipment.mask?1:0; this.refreshGearLockerMenu(); }
  closeGearLockerMenu(){ this.menuOpen=false; this.menuBg.setVisible(false); this.menuTitle.setVisible(false); this.menuInfo.setVisible(false); this.menuHelp.setVisible(false); this.menuTexts.forEach(t=>t.setVisible(false)); }
  refreshGearLockerMenu(){
    const suitEquipped=GAME_STATE.equipment.suit==='basic_space_suit';
    const maskEquipped=GAME_STATE.equipment.mask==='basic_o2_mask';
    this.menuBg.setVisible(true); this.menuTitle.setVisible(true); this.menuInfo.setVisible(true); this.menuHelp.setVisible(true);
    this.menuInfo.setText(`Dust-9: atmosphere present, O2 mask required outside.\nSuit: ${getEquippedSuitName()}   Mask: ${getEquippedMaskName()}\nOwned: ${ownsItem('basic_space_suit')?'Basic Space Suit':'No Suit'} / ${ownsItem('basic_o2_mask')?'Basic O2 Mask':'No Mask'}`);
    this.menuTexts.forEach((t,i)=>{
      let label=this.menuOptions[i];
      if(i===0) label=maskEquipped?'O2 Mask Equipped':'Equip O2 Mask';
      if(i===1) label=maskEquipped?'Remove O2 Mask':'Remove O2 Mask (none equipped)';
      if(i===2) label=suitEquipped?'Basic Space Suit Equipped':'Equip Basic Space Suit';
      if(i===3) label=suitEquipped?'Unequip Space Suit':'Unequip Space Suit (none equipped)';
      if(i===4) label='Close';
      const selected=i===this.menuIndex; t.setText(`${selected?'▶ ':'   '}${label}`).setColor(selected?'#46ff87':'#fff').setVisible(true);
    });
  }
  chooseGearLockerOption(){
    if(this.menuIndex===0){
      if(equipMask('basic_o2_mask')) this.showMessage('O2 mask equipped. Dust-9 surface travel ready.');
      else this.showMessage('No O2 mask in inventory.');
      this.updateHud();
    }
    if(this.menuIndex===1){
      if(!GAME_STATE.equipment.mask){this.showMessage('No O2 mask equipped.');return;}
      unequipMask(); this.showMessage('O2 mask removed. Do not go outside on Dust-9.');
      this.updateHud();
    }
    if(this.menuIndex===2){
      equipSuit('basic_space_suit'); this.showMessage('Basic Space Suit equipped.');
      this.refreshDonnyTexture(this.player,'ship'); this.refreshRiffTexture(this.riff,'ship'); this.updateHud();
    }
    if(this.menuIndex===3){
      if(!GAME_STATE.equipment.suit){this.showMessage('No suit equipped.');return;}
      unequipSuit(); this.showMessage('Space suit unequipped. Normal clothes restored.');
      this.refreshDonnyTexture(this.player,'ship'); this.refreshRiffTexture(this.riff,'ship'); this.updateHud();
    }
    if(this.menuIndex===4){ this.closeGearLockerMenu(); return; }
    this.refreshGearLockerMenu();
  }
  updateGearLockerMenu(delta){
    this.menuMoveCooldown-=delta; const move=this.getMoveVector();
    if(this.menuMoveCooldown<=0){
      if(move.vy<-0.55 || Phaser.Input.Keyboard.JustDown(this.keys.UP)){this.menuIndex=(this.menuIndex+this.menuOptions.length-1)%this.menuOptions.length;this.menuMoveCooldown=180;this.refreshGearLockerMenu();}
      else if(move.vy>0.55 || Phaser.Input.Keyboard.JustDown(this.keys.DOWN)){this.menuIndex=(this.menuIndex+1)%this.menuOptions.length;this.menuMoveCooldown=180;this.refreshGearLockerMenu();}
    }
    if(this.consumeBack()){this.closeGearLockerMenu();return;}
    if(this.consumeConfirm()) this.chooseGearLockerOption();
  }
  startLiftOffFromCockpit(){
    GAME_STATE.flight.inSpace = true;
    GAME_STATE.flight.driving = true;
    GAME_STATE.flight.lastDriveScene = 'Dust-9 Orbit';
    this.showMessage(this.spaceMode ? 'Returning to space driving.' : 'Lift-off sequence started.');
    this.time.delayedCall(180,()=>this.scene.start('SpaceDriveScene',{fromLiftOff:true,orbit:'dust_9'}));
  }
  tryUseAirlock(){
    if(GAME_STATE.flight?.inSpace){
      this.showMessage('Airlock locked during space flight. Sit in the cockpit and press Y to keep driving.');
      return;
    }
    if(!canBreatheOnPlanet('dust_9')){
      this.showMessage('Dust-9 has thin atmosphere. Equip the O2 mask or a space suit before leaving.');
      return;
    }
    const mode = hasSpaceSuitEquipped() ? 'space suit sealed' : 'O2 mask active';
    this.showMessage(`Airlock opened. Dust-9 atmosphere detected — ${mode}.`);
    this.time.delayedCall(260,()=>this.scene.start('PlanetChunkScene',{planetId:'dust_9',chunkId:GAME_STATE.location.chunkId || '0,1',entrySide:'ship'}));
  }
  update(time,delta){
    this.updateVanInteriorOrbitOverlay(time);
    if(this.menuOpen){ this.updateGearLockerMenu(delta); this.updateDialog(delta); return; }
    if(this.handleStartEquipmentMenu(delta)){ this.updateDialog(delta); return; }
    const dt=delta/1000;
    if(this.handleRestingControls(this.player,'ship')){ this.updateDialog(delta); return; }
    this.moveDonny(this.player,this.bounds,dt,'ship');
    this.updateHolsterSprite(this.player);
    this.updateHeldWeaponSprite(this.player);
    this.updateRiffFollow(this.riff,this.player,dt,'ship');
    const jumpPressed = this.consumeJump();
    const slidePressed = this.consumeSlide();
    const crawlPressed = this.consumeCrawl();
    const punchPressed = this.consumePunch();
    const shootPressed = this.consumeShoot();
    if(crawlPressed) this.setCrawling(this.player, !this.player.isCrawling, 'ship');
    else if(slidePressed) this.useSlide(this.player,this.bounds,'ship');
    else if(jumpPressed) this.useJump(this.player,'ship');
    else if(punchPressed) this.useUnarmedPunch(this.player,'ship');
    else if(shootPressed) this.useRangedWeapon(this.player);
    const zone=this.nearestZone();
    let zoneLabel = zone ? zone.label : '';
    if(zone && zone.cockpit && this.spaceMode) zoneLabel = 'Sit in cockpit chair / continue driving';
    this.prompt.setText(zone ? `A: ${zoneLabel}` : (this.spaceMode ? 'Walk around the van. Sit in cockpit chair to continue driving. START:Equipment' : 'A:Jump  B:Crawl  2xB:Slide  X:Punch  Y:Draw/Shoot  START:Equipment'));
    if(zone && this.consumeConfirm()){
      if(isLayZone(zone)) this.layDonny(this.player, zone, 'ship');
      else if(isSitZone(zone)) this.sitDonny(this.player, zone, 'ship');
      else if(zone.id==='gearLocker') this.openGearLockerMenu();
      else if(zone.id==='airlock') this.tryUseAirlock();
      else this.showMessage(zone.message);
    }
    this.updateDialog(delta);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  parent:'game',
  width:W,
  height:H,
  backgroundColor:'#000000',
  pixelArt:true,
  roundPixels:true,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,width:W,height:H},
  scene:[BootScene, PlanetChunkScene, InteriorScene, ShipHubScene, SpaceDriveScene]
});
</script>
