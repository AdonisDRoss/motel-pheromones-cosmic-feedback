<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Cosmic Feedback — Glasswell Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
*{
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  width:100%;
  height:100%;
  overflow:hidden;
  touch-action:none;
  overscroll-behavior:none;
}

body{
  position:fixed;
  inset:0;
}

#game{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

canvas{
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
</style>
</head>

<body>
<div id="game"></div>

<script>
const VERSION = "glasswell-van-frame-fix-001";

const GAME_W = 960;
const GAME_H = 540;

const ASSETS = {
  mapC3: "assets/maps/GLASSWELL_C3_base.png?v=" + VERSION,

  // IMPORTANT:
  // This must be a clean sheet:
  // 1 row x 8 columns
  // each frame 128x96
  // total image size should be 1024x96
  astroVanDrive: "assets/vehicles/astro_van_8dir_drive_1x8_128x96_TRANSPARENT_FIXED.png?v=" + VERSION
};

const VAN_FRAME = {
  SOUTH: 0,
  SOUTHEAST: 1,
  EAST: 2,
  NORTHEAST: 3,
  NORTH: 4,
  NORTHWEST: 5,
  WEST: 6,
  SOUTHWEST: 7
};

function normalizeAxis(v){
  if (v > 0.25) return 1;
  if (v < -0.25) return -1;
  return 0;
}

function getVanDirectionFrame(dx, dy, fallbackFrame){
  dx = normalizeAxis(dx);
  dy = normalizeAxis(dy);

  if (dx === 0 && dy > 0) return VAN_FRAME.SOUTH;
  if (dx > 0 && dy > 0) return VAN_FRAME.SOUTHEAST;
  if (dx > 0 && dy === 0) return VAN_FRAME.EAST;
  if (dx > 0 && dy < 0) return VAN_FRAME.NORTHEAST;
  if (dx === 0 && dy < 0) return VAN_FRAME.NORTH;
  if (dx < 0 && dy < 0) return VAN_FRAME.NORTHWEST;
  if (dx < 0 && dy === 0) return VAN_FRAME.WEST;
  if (dx < 0 && dy > 0) return VAN_FRAME.SOUTHWEST;

  return fallbackFrame;
}

class GlasswellScene extends Phaser.Scene {
  constructor(){
    super("GlasswellScene");

    this.van = null;
    this.currentVanFrame = VAN_FRAME.EAST;
    this.vanEntered = true;

    this.keys = null;

    this.joy = {
      active:false,
      baseX:135,
      baseY:405,
      knobX:135,
      knobY:405,
      dx:0,
      dy:0,
      radius:70,
      pointerId:null
    };

    this.buttons = {};
  }

  preload(){
    this.load.image("glasswell_c3", ASSETS.mapC3);

    this.load.spritesheet("astro_van_drive", ASSETS.astroVanDrive, {
      frameWidth: 128,
      frameHeight: 96,
      margin: 0,
      spacing: 0
    });
  }

  create(){
    this.cameras.main.setBackgroundColor("#000000");

    this.map = this.add.image(0, 0, "glasswell_c3")
      .setOrigin(0, 0)
      .setDepth(0);

    const mapW = this.map.width;
    const mapH = this.map.height;

    this.physics.world.setBounds(0, 0, mapW, mapH);

    this.cameras.main.setBounds(0, 0, mapW, mapH);

    // ASTRO VAN
    // Do NOT animate this sheet.
    // The 8 frames are direction frames, not driving animation frames.
    this.van = this.physics.add.sprite(900, 452, "astro_van_drive", this.currentVanFrame);
    this.van.setOrigin(0.5, 0.65);
    this.van.setScale(1);
    this.van.setDepth(this.van.y);

    this.van.body.setCollideWorldBounds(true);
    this.van.body.setSize(72, 42);
    this.van.body.setOffset(28, 42);

    this.cameras.main.startFollow(this.van, true, 0.12, 0.12);

    this.keys = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.UP,
      down: Phaser.Input.Keyboard.KeyCodes.DOWN,
      left: Phaser.Input.Keyboard.KeyCodes.LEFT,
      right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
      w: Phaser.Input.Keyboard.KeyCodes.W,
      a: Phaser.Input.Keyboard.KeyCodes.A,
      s: Phaser.Input.Keyboard.KeyCodes.S,
      d: Phaser.Input.Keyboard.KeyCodes.D,
      b: Phaser.Input.Keyboard.KeyCodes.B,
      y: Phaser.Input.Keyboard.KeyCodes.Y,
      h: Phaser.Input.Keyboard.KeyCodes.H
    });

    this.createHUD();
    this.createTouchControls();

    this.debugText = this.add.text(16, 12, "", {
      fontFamily:"monospace",
      fontSize:"13px",
      color:"#eee",
      backgroundColor:"rgba(0,0,0,0.48)",
      padding:{x:8,y:5}
    }).setScrollFactor(0).setDepth(5000);

    // Safety check for the van sheet.
    const tex = this.textures.get("astro_van_drive");
    console.log("Astro Van frame count:", tex.frameTotal - 1);
    console.log("Expected van frames: 8 direction frames, 128x96 each.");
  }

  createHUD(){
    this.hud = this.add.text(16, 12, "", {
      fontFamily:"monospace",
      fontSize:"13px",
      color:"#eee",
      backgroundColor:"rgba(0,0,0,0.48)",
      padding:{x:8,y:5}
    }).setScrollFactor(0).setDepth(5000);
  }

  createTouchControls(){
    const cam = this.cameras.main;

    this.joyBaseOuter = this.add.circle(this.joy.baseX, this.joy.baseY, this.joy.radius, 0x00a6b8, 0.20)
      .setStrokeStyle(5, 0xa8f5ff, 0.35)
      .setScrollFactor(0)
      .setDepth(4000);

    this.joyBaseInner = this.add.circle(this.joy.baseX, this.joy.baseY, this.joy.radius * 0.62, 0x8a0078, 0.12)
      .setStrokeStyle(3, 0xff2ad4, 0.35)
      .setScrollFactor(0)
      .setDepth(4001);

    this.joyKnob = this.add.circle(this.joy.knobX, this.joy.knobY, 34, 0xffffff, 0.18)
      .setStrokeStyle(4, 0xffffff, 0.75)
      .setScrollFactor(0)
      .setDepth(4002);

    this.moveLabel = this.add.text(this.joy.baseX - 38, this.joy.baseY + 88, "MOVE ON", {
      fontFamily:"monospace",
      fontSize:"18px",
      color:"#ffffff",
      fontStyle:"bold"
    }).setScrollFactor(0).setDepth(4003);

    this.makeButton("Y", 790, 285, 42, 0xb0007f);
    this.makeButton("X", 715, 360, 42, 0x9b7a00);
    this.makeButton("A", 865, 360, 42, 0x006676);
    this.makeButton("B", 790, 435, 42, 0x008a36);

    this.startButton = this.add.roundRectangle(GAME_W / 2, 480, 150, 42, 18, 0x111111, 0.65)
      .setStrokeStyle(2, 0xffffff, 0.45)
      .setScrollFactor(0)
      .setDepth(4000);

    this.startText = this.add.text(GAME_W / 2, 480, "START", {
      fontFamily:"monospace",
      fontSize:"19px",
      color:"#ffffff",
      fontStyle:"bold"
    }).setOrigin(0.5).setScrollFactor(0).setDepth(4001);

    this.startButton.setInteractive({useHandCursor:true});
  }

  makeButton(label, x, y, r, color){
    const btn = this.add.circle(x, y, r, color, 0.55)
      .setStrokeStyle(4, 0xffffff, 0.75)
      .setScrollFactor(0)
      .setDepth(4000)
      .setInteractive({useHandCursor:true});

    const txt = this.add.text(x, y, label, {
      fontFamily:"Arial",
      fontSize:"24px",
      color:"#ffffff",
      fontStyle:"bold"
    }).setOrigin(0.5).setScrollFactor(0).setDepth(4001);

    this.buttons[label] = {
      button:btn,
      text:txt,
      down:false
    };

    btn.on("pointerdown", () => {
      this.buttons[label].down = true;
    });

    btn.on("pointerup", () => {
      this.buttons[label].down = false;
    });

    btn.on("pointerout", () => {
      this.buttons[label].down = false;
    });
  }

  handleTouchJoystick(){
    const pointers = this.input.manager.pointers;

    let activePointer = null;

    for (let i = 0; i < pointers.length; i++){
      const p = pointers[i];
      if (!p || !p.isDown) continue;

      const screenX = p.x;
      const screenY = p.y;

      if (this.joy.pointerId === null){
        const d = Phaser.Math.Distance.Between(screenX, screenY, this.joy.baseX, this.joy.baseY);
        if (d <= this.joy.radius + 60){
          this.joy.pointerId = p.id;
          activePointer = p;
          break;
        }
      } else if (p.id === this.joy.pointerId){
        activePointer = p;
        break;
      }
    }

    if (!activePointer){
      this.joy.pointerId = null;
      this.joy.active = false;
      this.joy.dx = 0;
      this.joy.dy = 0;
      this.joy.knobX = this.joy.baseX;
      this.joy.knobY = this.joy.baseY;
      this.joyKnob.setPosition(this.joy.knobX, this.joy.knobY);
      return;
    }

    this.joy.active = true;

    let dx = activePointer.x - this.joy.baseX;
    let dy = activePointer.y - this.joy.baseY;

    const len = Math.sqrt(dx * dx + dy * dy);
    const max = this.joy.radius;

    if (len > max){
      dx = dx / len * max;
      dy = dy / len * max;
    }

    this.joy.knobX = this.joy.baseX + dx;
    this.joy.knobY = this.joy.baseY + dy;

    this.joy.dx = dx / max;
    this.joy.dy = dy / max;

    this.joyKnob.setPosition(this.joy.knobX, this.joy.knobY);
  }

  getMovementInput(){
    let dx = 0;
    let dy = 0;

    if (this.keys.left.isDown || this.keys.a.isDown) dx -= 1;
    if (this.keys.right.isDown || this.keys.d.isDown) dx += 1;
    if (this.keys.up.isDown || this.keys.w.isDown) dy -= 1;
    if (this.keys.down.isDown || this.keys.s.isDown) dy += 1;

    if (Math.abs(this.joy.dx) > 0.18 || Math.abs(this.joy.dy) > 0.18){
      dx = this.joy.dx;
      dy = this.joy.dy;
    }

    const len = Math.sqrt(dx * dx + dy * dy);

    if (len > 1){
      dx /= len;
      dy /= len;
    }

    return {dx, dy};
  }

  update(){
    this.handleTouchJoystick();

    if (!this.van) return;

    const move = this.getMovementInput();

    const moving = Math.abs(move.dx) > 0.05 || Math.abs(move.dy) > 0.05;

    if (moving){
      const speed = 168;
      this.van.setVelocity(move.dx * speed, move.dy * speed);

      // MAIN FIX:
      // Change direction frame only.
      // Do NOT play an animation for this 1x8 sheet.
      this.currentVanFrame = getVanDirectionFrame(move.dx, move.dy, this.currentVanFrame);
      this.van.setFrame(this.currentVanFrame);
    } else {
      this.van.setVelocity(0, 0);
      this.van.setFrame(this.currentVanFrame);
    }

    this.van.setDepth(this.van.y);

    if (Phaser.Input.Keyboard.JustDown(this.keys.b) || this.buttons.B.down){
      console.log("B pressed: exit van placeholder");
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.y) || Phaser.Input.Keyboard.JustDown(this.keys.h)){
      console.log("Y/H pressed: horn / lights placeholder");
    }

    this.hud.setText(
      "C3 — Main Civic Gate | Astro Van | " +
      Math.round(this.van.x) + "," + Math.round(this.van.y) +
      "\nFuel: 81% | Van asset: astro_van_8dir_drive_1x8_128x96_TRANSPARENT_FIXED | B exits | hold Y lights | tap Y horn" +
      "\nVan frame: " + this.currentVanFrame + " | setFrame only — no drive animation"
    );
  }
}

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: GAME_W,
  height: GAME_H,
  backgroundColor: "#000000",
  pixelArt: true,
  roundPixels: true,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: GAME_W,
    height: GAME_H
  },
  physics: {
    default: "arcade",
    arcade: {
      gravity: {y:0},
      debug: false
    }
  },
  scene: [GlasswellScene]
};

window.addEventListener("load", () => {
  new Phaser.Game(config);
});
</script>
</body>
</html>
