<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Cosmic Feedback - Blacklight District A1 v31b</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#05070b;color:#d8f7ff;overflow:hidden!important;position:fixed;inset:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none;overscroll-behavior:none;}
#game{position:fixed;left:0;top:0;width:100dvw;height:100dvh;background:#05070b;overflow:hidden;}
#game canvas{position:absolute!important;left:0!important;top:0!important;width:100dvw!important;height:100dvh!important;display:block!important;}
.hud{position:fixed;left:calc(env(safe-area-inset-left) + 6px);top:calc(env(safe-area-inset-top) + 5px);z-index:20;width:138px;max-width:25vw;padding:4px 6px;border:1px solid rgba(124,217,255,.38);background:rgba(4,10,18,.48);box-shadow:0 0 6px rgba(102,33,255,.14);backdrop-filter:blur(2px);font:7px/1.1 monospace;pointer-events:none;text-shadow:0 0 3px #0ff;}
.hud .title{font-weight:700;color:#9eefff;letter-spacing:.6px;margin-bottom:1px;}
.bar{height:4px;background:rgba(0,0,0,.42);margin:1px 0 2px;border:1px solid rgba(255,255,255,.10);}
.fill.hp{height:100%;width:100%;background:#39e886;} .fill.sta{height:100%;width:100%;background:#8d5cff;} .fill.water{height:100%;width:80%;background:#26c9ff;}
.tag{color:#b9bdd7}
#objectiveHud{position:fixed;left:calc(env(safe-area-inset-left) + 6px);top:calc(env(safe-area-inset-top) + 72px);z-index:21;width:160px;max-width:28vw;padding:4px 6px;border:1px solid rgba(190,95,255,.38);background:rgba(12,5,22,.50);color:#f1eaff;font:7px/1.2 monospace;pointer-events:none;text-shadow:0 0 4px #8a5cff;}
#objectiveHud .objTitle{color:#d9b8ff;font-weight:800;letter-spacing:.6px;margin-bottom:3px;}
#hint{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 7px);transform:translateX(-50%);z-index:22;padding:4px 7px;border:1px solid rgba(160,210,255,.50);background:rgba(0,0,0,.62);color:#e8fbff;font:9px monospace;display:none;white-space:nowrap;max-width:70vw;overflow:hidden;text-overflow:ellipsis;}
#dialogue{position:fixed;left:calc(env(safe-area-inset-left) + 10px);bottom:calc(env(safe-area-inset-bottom) + 96px);z-index:70;width:min(560px,62vw);max-width:62vw;padding:6px 8px;border:1px solid rgba(124,217,255,.58);background:rgba(2,5,12,.86);box-shadow:0 0 14px rgba(115,32,255,.22);display:none;color:#e8fbff;font:11px/1.18 system-ui,-apple-system,Segoe UI,sans-serif;pointer-events:auto;}
#dialogue .name{font-size:13px;font-weight:800;color:#9eefff;letter-spacing:.5px;margin-bottom:3px;}
#dialogue .choices{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
#dialogue button{background:#122033;color:#e8fbff;border:1px solid #4a79a8;border-radius:5px;padding:5px 7px;font-size:11px;font-weight:650;touch-action:manipulation;}
.stick{position:fixed;left:calc(env(safe-area-inset-left) + 20px);bottom:calc(env(safe-area-inset-bottom) + 30px);width:116px;height:116px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.05);z-index:25;touch-action:none;}
.nub{position:absolute;width:48px;height:48px;border-radius:50%;left:34px;top:34px;background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.35);}
.buttons{position:fixed;right:calc(env(safe-area-inset-right) + 18px);bottom:calc(env(safe-area-inset-bottom) + 22px);z-index:25;touch-action:none;}
.btn{position:absolute;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font:9px/1.05 monospace;border:2px solid rgba(255,255,255,.18);background:rgba(60,90,120,.38);user-select:none;}
.a{right:0;bottom:28px;background:rgba(55,150,75,.40)} .b{right:58px;bottom:0;background:rgba(150,55,70,.40)} .x{right:58px;bottom:64px;background:rgba(60,120,170,.40)} .y{right:116px;bottom:28px;background:rgba(150,140,60,.40)} .r{right:0;bottom:92px;background:rgba(120,70,180,.48)}
.version{position:fixed;right:calc(env(safe-area-inset-right) + 12px);bottom:calc(env(safe-area-inset-bottom) + 8px);z-index:15;color:#9eefff;background:rgba(0,0,0,.45);border:1px solid rgba(124,217,255,.3);padding:3px 6px;font:9px monospace;}
#toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 8px);transform:translateX(-50%);z-index:80;display:none;max-width:70vw;padding:7px 10px;border:1px solid rgba(124,217,255,.55);background:rgba(2,5,12,.82);color:#e8fbff;font:11px/1.2 monospace;text-align:center;box-shadow:0 0 14px rgba(115,32,255,.20);pointer-events:none;}

#shop{
  position:fixed;
  left:calc(env(safe-area-inset-left) + 10px);
  right:calc(env(safe-area-inset-right) + 10px);
  top:calc(env(safe-area-inset-top) + 38px);
  bottom:calc(env(safe-area-inset-bottom) + 86px);
  z-index:90;
  display:none;
  border:1px solid rgba(124,217,255,.62);
  background:rgba(2,5,12,.91);
  color:#e8fbff;
  box-shadow:0 0 18px rgba(115,32,255,.25);
  font:11px/1.2 monospace;
  overflow:hidden;
  pointer-events:auto;
}
#shopHeader{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 9px;border-bottom:1px solid rgba(124,217,255,.32);
  color:#9eefff;font-weight:800;letter-spacing:.5px;
}
#shopBody{display:flex;gap:8px;padding:8px;height:calc(100% - 48px);box-sizing:border-box;}
.shopPanel{flex:1;min-width:0;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035);overflow:auto;padding:6px;}
.shopPanel h4{margin:0 0 5px 0;color:#d9b8ff;font-size:10px;}
.shopItem{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px;border-bottom:1px solid rgba(255,255,255,.08);}
.shopItem span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.shopItem button,#shopClose{background:#122033;color:#e8fbff;border:1px solid #4a79a8;border-radius:5px;padding:4px 6px;font-size:10px;font-weight:700;}
#shopLog{color:#bdefff;font-size:9px;margin-top:5px;min-height:22px;}
@media (max-width:760px) and (orientation:landscape){
  #shop{top:30px;bottom:74px;font-size:10px;}
  #shopBody{padding:6px;gap:6px;}
  .shopItem{padding:4px;}
  .shopItem button,#shopClose{font-size:9px;padding:3px 5px;}
}

</style>
</head>
<body>
<div id="game"></div>
<div class="hud"><div class="title">DONNY</div><div><span class="tag">MODE:</span> <span id="mode">ON FOOT</span> <span class="tag">ZONE:</span> A1</div><div><span class="tag">HP</span></div><div class="bar"><div class="fill hp"></div></div><div><span class="tag">STA</span></div><div class="bar"><div class="fill sta"></div></div><div><span class="tag">WATER</span></div><div class="bar"><div class="fill water"></div></div><div id="coordLine"><span class="tag">XY:</span> --</div></div>
<div id="objectiveHud"><div class="objTitle">OBJECTIVE</div><div id="objectiveText">Find Kira Volt</div></div>
<div id="toast"></div><div id="hint"></div>
<div id="dialogue"><div class="name" id="dlgName"></div><div id="dlgText"></div><div class="choices" id="dlgChoices"></div></div>

<div id="shop">
  <div id="shopHeader">
    <div>NEON VENDOR // BUY / SELL</div>
    <div><span id="creditLine">Credits: 0</span> <button id="shopClose">CLOSE</button></div>
  </div>
  <div id="shopBody">
    <div class="shopPanel">
      <h4>BUY</h4>
      <div id="shopBuyList"></div>
    </div>
    <div class="shopPanel">
      <h4>SELL</h4>
      <div id="shopSellList"></div>
      <div id="shopLog"></div>
    </div>
  </div>
</div>

<div class="stick" id="stick"><div class="nub" id="nub"></div></div>
<div class="buttons"><div class="btn r" data-btn="r">R<br>BST</div><div class="btn x" data-btn="x">X<br>USE</div><div class="btn a" data-btn="a">A<br>GAS</div><div class="btn b" data-btn="b">B<br>BRK</div><div class="btn y" data-btn="y">Y<br>LTS</div></div>
<div class="version">Blacklight District A1 v31b</div>
<script>
(() => {
const qs = new URLSearchParams(location.search);
const AREA = qs.get("area") || "a1";
const COLLISION_MODE = qs.get("collision") || "mask";
const MAPS = {
  a1: {
    key:"blacklight_a1",
    zone:"BLACKLIGHT A1",
    base:"assets/maps/dust9/glasswell/blacklight_district/a1/layers/GLASSWELL_BLACKLIGHT_A1_base.png",
    mask:"assets/maps/dust9/glasswell/blacklight_district/a1/masks/GLASSWELL_BLACKLIGHT_A1_collision_mask.png",
    spawn:[0.18,0.72],
    objective:"Find Kira Volt",
    exitText:"Return to Westgate Connector"
  },
  westgate: {
    key:"westgate",
    zone:"WESTGATE",
    base:"assets/maps/dust9/glasswell/outer_ring/west_blacklight/layers/GLASSWELL_WESTGATE_BLACKLIGHT_CONNECTOR_base.png",
    mask:"assets/maps/dust9/glasswell/outer_ring/west_blacklight/masks/GLASSWELL_WESTGATE_BLACKLIGHT_CONNECTOR_collision_mask.png",
    spawn:[0.50,0.50],
    objective:"Enter Blacklight District",
    exitText:"Enter Blacklight District"
  }
};
const mapCfg = MAPS[AREA] || MAPS.a1;
const WORLD_SCALE = AREA === "a1" ? 3.0 : 1.0;
const DONNY = {
  idle:"assets/sprites/player/donny/donny_idle_4dir.png",
  walk:"assets/sprites/player/donny/donny_walk_4dir.png",
  run:"assets/sprites/player/donny/donny_run_4dir.png"
};
const NPC_ASSETS = {
  blacklight_kid: {
    idle:"assets/sprites/npcs/blacklight_kid/blacklight_kid_idle_4dir_128.png",
    walk:"assets/sprites/npcs/blacklight_kid/blacklight_kid_walk_4dir_128.png"
  },
  neon_vendor: {
    idle:"assets/sprites/npcs/neon_vendor/neon_vendor_idle_4dir_128.png",
    walk:"assets/sprites/npcs/neon_vendor/neon_vendor_walk_4dir_128.png"
  },
  blacklight_bouncer: {
    idle:"assets/sprites/npcs/blacklight_bouncer/blacklight_bouncer_idle_4dir_128.png",
    walk:"assets/sprites/npcs/blacklight_bouncer/blacklight_bouncer_walk_4dir_128.png"
  },
  blacklight_runner: {
    idle:"assets/sprites/npcs/blacklight_runner/blacklight_runner_idle_4dir_128.png",
    walk:"assets/sprites/npcs/blacklight_runner/blacklight_runner_walk_4dir_128.png"
  },
  kira_volt: {
    idle:"assets/sprites/npcs/kira_volt/kira_volt_idle_4dir_128.png",
    walk:"assets/sprites/npcs/kira_volt/kira_volt_walk_4dir_128.png"
  }
};
const PROPS = {
  vendorStall:"assets/props/blacklight/neon_vendor_stall_idle_256.png",
  doorMarker:"assets/props/blacklight/blacklight_door_marker_idle_128.png"
};
const hint=document.getElementById("hint"), toast=document.getElementById("toast"), objectiveText=document.getElementById("objectiveText"), dlg=document.getElementById("dialogue"), dlgName=document.getElementById("dlgName"), dlgText=document.getElementById("dlgText"), dlgChoices=document.getElementById("dlgChoices"), coordLine=document.getElementById("coordLine"), shop=document.getElementById("shop"), shopBuyList=document.getElementById("shopBuyList"), shopSellList=document.getElementById("shopSellList"), creditLine=document.getElementById("creditLine"), shopLog=document.getElementById("shopLog");
let input={x:0,y:0,r:false,usePressed:false}, dialogueOpen=false, shopOpen=false;
function showHint(t){hint.textContent=t;hint.style.display="block";} function hideHint(){hint.style.display="none";}
function showToast(t){toast.innerHTML=t.replace(/\n/g,"<br>");toast.style.display="block";clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.style.display="none",2600);}
function closeDialogue(){dlg.style.display="none";dialogueOpen=false;if(!shopOpen){document.querySelector(".buttons").style.opacity="1";document.querySelector(".buttons").style.pointerEvents="auto";}}
function showDialogue(name,text,choices){dialogueOpen=true;dlg.style.display="block";document.querySelector(".buttons").style.opacity=".28";document.querySelector(".buttons").style.pointerEvents="none";dlgName.textContent=name;dlgText.textContent=text;dlgChoices.innerHTML="";choices.forEach(c=>{const b=document.createElement("button");b.textContent=c.label;b.onclick=c.onClick;dlgChoices.appendChild(b);});}
const ShopState = {
  items:[
    {id:"water_pouch", name:"Water Pouch", buy:8, sell:3},
    {id:"battery_cell", name:"Battery Cell", buy:12, sell:5},
    {id:"cheap_noodles", name:"Cheap Noodles", buy:5, sell:2},
    {id:"glow_tab", name:"Glow Tab", buy:9, sell:4},
    {id:"signal_charm", name:"Hacked Signal Charm", buy:18, sell:8},
    {id:"wristband", name:"Bootleg Wristband", buy:14, sell:6},
    {id:"scrap_cable", name:"Scrap Cable", buy:6, sell:2}
  ],
  load(){
    this.credits = parseInt(localStorage.getItem("cf_credits") || "100", 10);
    try { this.inv = JSON.parse(localStorage.getItem("cf_inventory") || "{}"); } catch(e){ this.inv = {}; }
  },
  save(){
    localStorage.setItem("cf_credits", String(this.credits));
    localStorage.setItem("cf_inventory", JSON.stringify(this.inv));
  },
  qty(id){ return this.inv[id] || 0; },
  buy(id){
    const it = this.items.find(x=>x.id===id); if(!it) return;
    if(this.credits < it.buy){ shopLog.textContent = "Not enough credits."; return; }
    this.credits -= it.buy; this.inv[id] = this.qty(id)+1; this.save(); renderShop(); shopLog.textContent = "Bought: " + it.name;
  },
  sell(id){
    const it = this.items.find(x=>x.id===id); if(!it) return;
    if(this.qty(id) <= 0){ shopLog.textContent = "You do not have that."; return; }
    this.inv[id] = this.qty(id)-1; this.credits += it.sell; this.save(); renderShop(); shopLog.textContent = "Sold: " + it.name;
  }
};
function renderShop(){
  ShopState.load();
  creditLine.textContent = "Credits: " + ShopState.credits;
  shopBuyList.innerHTML = ""; shopSellList.innerHTML = "";
  ShopState.items.forEach(it=>{
    const buy = document.createElement("div");
    buy.className = "shopItem";
    buy.innerHTML = `<span>${it.name} // ${it.buy}cr</span>`;
    const bb = document.createElement("button"); bb.textContent = "BUY"; bb.onclick = ()=>ShopState.buy(it.id); buy.appendChild(bb);
    shopBuyList.appendChild(buy);

    const sell = document.createElement("div");
    sell.className = "shopItem";
    sell.innerHTML = `<span>${it.name} x${ShopState.qty(it.id)} // ${it.sell}cr</span>`;
    const sb = document.createElement("button"); sb.textContent = "SELL"; sb.onclick = ()=>ShopState.sell(it.id); sell.appendChild(sb);
    shopSellList.appendChild(sell);
  });
}
function openShop(){
  closeDialogue();
  shopOpen = true; shop.style.display = "block";
  document.querySelector(".buttons").style.opacity=".28";
  document.querySelector(".buttons").style.pointerEvents="none";
  renderShop(); shopLog.textContent = "Junk, snacks, batteries. No refunds.";
}
function closeShop(){
  shopOpen = false; shop.style.display = "none";
  document.querySelector(".buttons").style.opacity="1";
  document.querySelector(".buttons").style.pointerEvents="auto";
}
function unlockControls(){
  dialogueOpen=false;
  shopOpen=false;
  dlg.style.display="none";
  shop.style.display="none";
  document.querySelector(".buttons").style.opacity="1";
  document.querySelector(".buttons").style.pointerEvents="auto";
}
document.getElementById("shopClose").onclick = closeShop;

function invQty(id){
  ShopState.load();
  return ShopState.qty(id);
}
function hasItem(id){
  return invQty(id) > 0;
}
function setObjective(text){
  objectiveText.textContent = text;
  localStorage.setItem("cf_objective", text);
}
function setFlag(name, value="1"){
  localStorage.setItem("cf_flag_" + name, value);
}
function hasFlag(name){
  return localStorage.getItem("cf_flag_" + name) === "1";
}
function currentMissionText(){
  if(!hasFlag("talked_kira")) return "Talk to Kira Volt";
  if(!hasItem("signal_charm")) return "Buy Hacked Signal Charm";
  if(!hasFlag("talked_runner")) return "Talk to Blacklight Runner";
  if(!hasFlag("talked_bouncer")) return "Talk to Club Bouncer";
  return "Enter Blacklight Club";
}
function refreshMission(){
  setObjective(currentMissionText());
}


class GameScene extends Phaser.Scene {
 preload(){
  this.load.image("map", mapCfg.base); this.load.image("mask", mapCfg.mask);
  this.load.spritesheet("donny_idle", DONNY.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("donny_walk", DONNY.walk, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("donny_run", DONNY.run, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("blacklight_kid_idle", NPC_ASSETS.blacklight_kid.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("neon_vendor_idle", NPC_ASSETS.neon_vendor.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("blacklight_bouncer_idle", NPC_ASSETS.blacklight_bouncer.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("blacklight_runner_idle", NPC_ASSETS.blacklight_runner.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("kira_volt_idle", NPC_ASSETS.kira_volt.idle, {frameWidth:128,frameHeight:128});
  this.load.spritesheet("vendor_stall", PROPS.vendorStall, {frameWidth:256,frameHeight:256});
  this.load.spritesheet("door_marker", PROPS.doorMarker, {frameWidth:128,frameHeight:128});
 }
 create(){
  objectiveText.textContent = mapCfg.objective;
  if(AREA==="a1") refreshMission();
  this.map=this.add.image(0,0,"map").setOrigin(0,0).setScale(WORLD_SCALE); this.mapW=this.map.width * WORLD_SCALE; this.mapH=this.map.height * WORLD_SCALE;
  this.physics.world.setBounds(0,0,this.mapW,this.mapH);
  this.cameras.main.setBounds(0,0,this.mapW,this.mapH);
  this.applyCover=()=>{const vw=this.scale.width||innerWidth, vh=this.scale.height||innerHeight; const cover=Math.max(vw/this.mapW,vh/this.mapH); const z = AREA==="a1" ? 1.25 : Phaser.Math.Clamp(cover,.7,3.2); this.cameras.main.setZoom(z); this.cameras.main.setDeadzone(70,50);};
  this.applyCover();
  try{const src=this.textures.get("mask").getSourceImage();this.maskCanvas=document.createElement("canvas");this.maskCanvas.width=src.width;this.maskCanvas.height=src.height;this.maskCtx=this.maskCanvas.getContext("2d",{willReadFrequently:true});this.maskCtx.drawImage(src,0,0);this.maskReady=true;}catch(e){this.maskReady=false;}
  this.makeAnims();
  this.player=this.physics.add.sprite(this.mapW*mapCfg.spawn[0],this.mapH*mapCfg.spawn[1],"donny_idle",0).setDepth(this.player.y).setScale(0.68);
  this.player.body.setSize(30,38).setOffset(49,76); this.player.dir="down"; this.player.play("donny_idle_down");
  this.cameras.main.startFollow(this.player,true,1,1);
  this.npcs=[];
  if(AREA==="a1") {
    // v20: place reusable Neon Vendor Stall prop beside the vendor.
    this.vendorStall=this.add.sprite(this.mapW*.635,this.mapH*.405,"vendor_stall",0).setDepth(19).setScale(0.62);
    this.vendorStall.play("vendor_stall_idle"); this.vendorStall.setDepth(this.vendorStall.y-10);

    this.addNpc("KIRA VOLT", .62,.35, "The club hears everything.", "Find the hidden signal relay.", "talk", "kira_volt");
    this.addNpc("NEON VENDOR", .595,.445, "Water, batteries, noodles, glow junk. Buying or selling?", "Buy or sell supplies.", "vendor", "neon_vendor");
    this.addNpc("BLACKLIGHT RUNNER", .885,.555, "Concord patrol rolled through an hour ago.", "Get the passphrase from the runner.", "talk", "blacklight_runner");
    this.addNpc("CLUB BOUNCER", .370,.370, "Passphrase first. Door second.", "Bring the passphrase to the club door.", "talk", "blacklight_bouncer");
    this.exitZone=new Phaser.Geom.Rectangle(this.mapW*.03,this.mapH*.65,this.mapW*.16,this.mapH*.25);
    this.clubDoorZone=new Phaser.Geom.Rectangle(this.mapW*.33,this.mapH*.25,this.mapW*.13,this.mapH*.16);
  } else {
    this.addNpc('KADE "STATIC"', .40,.34, "You looking for the club?", "Blacklight opens for signal.", "talk", "blacklight_kid");
    this.exitZone=new Phaser.Geom.Rectangle(this.mapW*.55,this.mapH*.30,this.mapW*.18,this.mapH*.18);
  }
  // v26: NPCs are solid. Donny cannot walk through them.
  this.npcs.forEach(n=>{
    n.body.immovable = true;
    n.body.moves = false;
  });

  this.keys=this.input.keyboard.addKeys("W,A,S,D,UP,DOWN,LEFT,RIGHT,E,X,SPACE,ESC");
  this.input.keyboard.on("keydown-E",()=>this.handleUse()); this.input.keyboard.on("keydown-X",()=>this.handleUse());
  showToast(AREA==="a1" ? "BLACKLIGHT DISTRICT A1\nMission chain active" : "WESTGATE CONNECTOR");
  localStorage.setItem("cf_checkpoint", AREA==="a1" ? "blacklight_a1" : "westgate_connector");
 }
 addNpc(name,xn,yn,line,mission,kind="talk",assetKey="blacklight_kid"){
  const texKey = this.textures.exists(`${assetKey}_idle`) ? `${assetKey}_idle` : "blacklight_kid_idle";
  const n=this.physics.add.sprite(this.mapW*xn,this.mapH*yn,texKey,0).setScale(.82); n.setDepth(n.y);
  n.body.setSize(30,38).setOffset(49,75); n.body.immovable=true; n.play(this.anims.exists(`${assetKey}_idle_down`) ? `${assetKey}_idle_down` : "blacklight_kid_idle_down");
  n.npc={name,line,mission,kind,assetKey};
  this.add.text(n.x,n.y-48,name,{fontFamily:"monospace",fontSize:"7px",color:"#9eefff",backgroundColor:"rgba(0,0,0,.55)",padding:{x:2,y:1}}).setOrigin(.5).setDepth(999);
  this.npcs.push(n);
 }
 makeAnims(){
  const donnyRows = {down:0, right:2, left:2, up:3};
  ["down","right","left","up"].forEach((d,r)=>{
    const dr=donnyRows[d];
    this.anims.create({key:`donny_idle_${d}`,frames:this.anims.generateFrameNumbers("donny_idle",{start:dr*8,end:dr*8+3}),frameRate:4,repeat:-1});
    this.anims.create({key:`donny_walk_${d}`,frames:this.anims.generateFrameNumbers("donny_walk",{start:dr*8,end:dr*8+7}),frameRate:9,repeat:-1});
    this.anims.create({key:`donny_run_${d}`,frames:this.anims.generateFrameNumbers("donny_run",{start:dr*8,end:dr*8+7}),frameRate:12,repeat:-1});
  });

  const npcKeys = ["blacklight_kid","neon_vendor","blacklight_bouncer","blacklight_runner","kira_volt"];
  ["down","right","left","up"].forEach((d,r)=>{
    npcKeys.forEach(k=>{
      const textureKey = `${k}_idle`;
      if(this.textures.exists(textureKey)){
        // v25: hold a single clean idle frame so NPCs do not cycle through bad generated frames.
        this.anims.create({key:`${k}_idle_${d}`,frames:[{key:textureKey, frame:r*4}],frameRate:1,repeat:-1});
      }
    });
  });

  if(this.textures.exists("vendor_stall")){
    this.anims.create({key:"vendor_stall_idle",frames:this.anims.generateFrameNumbers("vendor_stall",{start:0,end:3}),frameRate:4,repeat:-1});
  }
  if(this.textures.exists("door_marker")){
    this.anims.create({key:"door_marker_idle",frames:this.anims.generateFrameNumbers("door_marker",{start:0,end:7}),frameRate:8,repeat:-1});
  }
 }

 blocked(x,y){
  if(COLLISION_MODE==="off") return false;
  if(x<4||y<4||x>this.mapW-4||y>this.mapH-4) return true;
  if(!this.maskReady) return false;
  const mx=Phaser.Math.Clamp(Math.floor(x/this.mapW*this.maskCanvas.width),0,this.maskCanvas.width-1);
  const my=Phaser.Math.Clamp(Math.floor(y/this.mapH*this.maskCanvas.height),0,this.maskCanvas.height-1);
  let black=0; for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){const p=this.maskCtx.getImageData(Phaser.Math.Clamp(mx+ox,0,this.maskCanvas.width-1),Phaser.Math.Clamp(my+oy,0,this.maskCanvas.height-1),1,1).data; if((p[0]+p[1]+p[2])/3<128) black++;}
  return black>=5;
 }
 tryMove(dx,dy){const nx=this.player.x+dx,ny=this.player.y+dy;if(!this.blocked(nx,ny+20))this.player.setPosition(nx,ny);else{if(!this.blocked(this.player.x+dx,this.player.y+20))this.player.x+=dx;if(!this.blocked(this.player.x,this.player.y+dy+20))this.player.y+=dy;}}
 update(_,dt){
  if(Phaser.Input.Keyboard.JustDown(this.keys.ESC)) unlockControls();
  if(dialogueOpen||shopOpen)return; this.applyCover();
  let vx=0,vy=0; if(this.keys.LEFT.isDown||this.keys.A.isDown)vx--; if(this.keys.RIGHT.isDown||this.keys.D.isDown)vx++; if(this.keys.UP.isDown||this.keys.W.isDown)vy--; if(this.keys.DOWN.isDown||this.keys.S.isDown)vy++; vx+=input.x;vy+=input.y;
  const len=Math.hypot(vx,vy), moving=len>.15; if(moving){vx/=len;vy/=len;}
  const running=input.r||this.keys.SPACE.isDown, speed=running?190:125;
  if(moving){
    this.tryMove(vx*speed*dt/1000,vy*speed*dt/1000);
    this.player.dir=Math.abs(vx)>Math.abs(vy)?(vx>0?"right":"left"):(vy>0?"down":"up");
    this.player.setFlipX(this.player.dir==="right");
    if(this.player.dir==="down"||this.player.dir==="up") this.player.setFlipX(false);
    this.player.play(`donny_${running?"run":"walk"}_${this.player.dir}`,true);
  } else {
    this.player.setFlipX(this.player.dir==="right");
    if(this.player.dir==="down"||this.player.dir==="up") this.player.setFlipX(false);
    this.player.play(`donny_idle_${this.player.dir}`,true);
  }
  let near=null; for(const n of this.npcs) if(Phaser.Math.Distance.Between(this.player.x,this.player.y,n.x,n.y)<42) near=n;
  if(near) showHint(`X / E: Talk to ${near.npc.name}`);
  else if(this.clubDoorZone && Phaser.Geom.Rectangle.Contains(this.clubDoorZone,this.player.x,this.player.y)) showHint("X / E: Enter Blacklight Club");
  else if(Phaser.Geom.Rectangle.Contains(this.exitZone,this.player.x,this.player.y)) showHint(`X / E: ${mapCfg.exitText}`);
  else hideHint();
  if(input.usePressed){input.usePressed=false;this.handleUse();}
  const cam=this.cameras.main, viewW=cam.width/cam.zoom, viewH=cam.height/cam.zoom; cam.scrollX=Phaser.Math.Clamp(cam.scrollX,0,Math.max(0,this.mapW-viewW));cam.scrollY=Phaser.Math.Clamp(cam.scrollY,0,Math.max(0,this.mapH-viewH));
  // v26: y-sort all characters so NPCs are not always above Donny.
  this.player.setDepth(this.player.y);
  this.npcs.forEach(n=>n.setDepth(n.y));
  coordLine.innerHTML=`<span class="tag">XY:</span> ${Math.round(this.player.x)}, ${Math.round(this.player.y)} <span class="tag">COL:</span> ${COLLISION_MODE} ${this.maskReady?"READY":"NO MASK"}`;
 }
 handleUse(){
  let near=null; for(const n of this.npcs) if(Phaser.Math.Distance.Between(this.player.x,this.player.y,n.x,n.y)<48) near=n;
  if(near){
    if(near.npc.name==="KIRA VOLT"){
      showDialogue("KIRA VOLT", "You want in? Buy a hacked signal charm. Runner will tell you which route is clean.", [
        {label:"Got it.", onClick:()=>{setFlag("talked_kira"); refreshMission(); showToast("NEW OBJECTIVE\nBuy Hacked Signal Charm"); closeDialogue();}},
        {label:"Leave", onClick:closeDialogue}
      ]);
      return;
    }

    if(near.npc.kind==="vendor"){
      showDialogue(near.npc.name, near.npc.line, [
        {label:"BUY / SELL", onClick:()=>{openShop(); refreshMission();}},
        {label:"Ask", onClick:()=>showDialogue(near.npc.name, "Charm costs 18 credits. No charm, no club door.", [{label:"Close",onClick:()=>{refreshMission(); closeDialogue();}}])},
        {label:"Leave", onClick:()=>{refreshMission(); closeDialogue();}}
      ]);
      return;
    }

    if(near.npc.name==="BLACKLIGHT RUNNER"){
      if(!hasItem("signal_charm")){
        showDialogue("BLACKLIGHT RUNNER", "Get a hacked signal charm first. Then I’ll tell you which door is listening.", [{label:"Close",onClick:closeDialogue}]);
      } else {
        showDialogue("BLACKLIGHT RUNNER", "Passphrase is: static drinks water. Tell the bouncer and keep moving.", [
          {label:"Memorized.", onClick:()=>{setFlag("talked_runner"); refreshMission(); showToast("PASS PHRASE LEARNED\nTalk to Club Bouncer"); closeDialogue();}},
          {label:"Close", onClick:closeDialogue}
        ]);
      }
      return;
    }

    if(near.npc.name==="CLUB BOUNCER"){
      if(!hasItem("signal_charm")){
        showDialogue("CLUB BOUNCER", "No charm, no door.", [{label:"Close",onClick:closeDialogue}]);
      } else if(!hasFlag("talked_runner")){
        showDialogue("CLUB BOUNCER", "Charm checks out. Passphrase is still missing.", [{label:"Close",onClick:closeDialogue}]);
      } else {
        showDialogue("CLUB BOUNCER", "Static drinks water. Good. Door’s yours.", [
          {label:"Enter.", onClick:()=>{setFlag("talked_bouncer"); refreshMission(); showToast("CLUB ACCESS CLEARED"); closeDialogue();}},
          {label:"Close", onClick:closeDialogue}
        ]);
      }
      return;
    }

    showDialogue(near.npc.name, near.npc.line, [{label:"Ask about signal",onClick:()=>{setObjective(near.npc.mission);showDialogue(near.npc.name,near.npc.mission,[{label:"Close",onClick:closeDialogue}]);}},{label:"Leave",onClick:closeDialogue}]);return;}
  if(Phaser.Geom.Rectangle.Contains(this.exitZone,this.player.x,this.player.y)){
    if(AREA==="a1") showDialogue("WESTGATE ROUTE","Return to Westgate Connector?",[{label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v31b&area=westgate&collision=mask"},{label:"NO",onClick:closeDialogue}]);
    else showDialogue("BLACKLIGHT DISTRICT","Enter Blacklight District A1?",[{label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v31b&area=a1&collision=mask"},{label:"NO",onClick:closeDialogue}]);
  }
 }
}
function setupControls(){const stick=document.getElementById("stick"),nub=document.getElementById("nub");let active=false,base=null;function center(){nub.style.left="34px";nub.style.top="34px";input.x=0;input.y=0;}stick.addEventListener("pointerdown",e=>{active=true;stick.setPointerCapture(e.pointerId);const r=stick.getBoundingClientRect();base={x:r.left+r.width/2,y:r.top+r.height/2};});stick.addEventListener("pointermove",e=>{if(!active)return;const dx=e.clientX-base.x,dy=e.clientY-base.y,dist=Math.min(42,Math.hypot(dx,dy)),ang=Math.atan2(dy,dx),nx=Math.cos(ang)*dist,ny=Math.sin(ang)*dist;nub.style.left=(34+nx)+"px";nub.style.top=(34+ny)+"px";input.x=nx/42;input.y=ny/42;});stick.addEventListener("pointerup",()=>{active=false;center();});stick.addEventListener("pointercancel",()=>{active=false;center();});document.querySelectorAll(".btn").forEach(btn=>{const name=btn.dataset.btn;btn.addEventListener("pointerdown",e=>{e.preventDefault();if(name==="x")input.usePressed=true;if(name==="r")input.r=true;});btn.addEventListener("pointerup",e=>{e.preventDefault();if(name==="r")input.r=false;});});}
setupControls();
function viewportW(){return Math.max(320,Math.floor(window.visualViewport?window.visualViewport.width:innerWidth));} function viewportH(){return Math.max(240,Math.floor(window.visualViewport?window.visualViewport.height:innerHeight));}
const game=new Phaser.Game({type:Phaser.AUTO,parent:"game",backgroundColor:"#05070b",scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.NO_CENTER,width:viewportW(),height:viewportH()},physics:{default:"arcade",arcade:{debug:false}},scene:[GameScene],render:{pixelArt:false,antialias:true}});
function forceResize(){const w=viewportW(),h=viewportH();document.getElementById("game").style.width=w+"px";document.getElementById("game").style.height=h+"px";if(game&&game.scale)game.scale.resize(w,h);}
addEventListener("resize",forceResize);addEventListener("orientationchange",()=>setTimeout(forceResize,250));if(visualViewport)visualViewport.addEventListener("resize",forceResize);setTimeout(forceResize,100);
})();
</script>
