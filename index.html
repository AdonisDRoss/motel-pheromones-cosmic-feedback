<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donny Phaser-Ready Sprite Test</title>
  <style>
    html, body { margin:0; padding:0; background:#101014; color:#f0f0f0; font-family:Arial, Helvetica, sans-serif; }
    #game-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; padding:10px; }
    #info { max-width:960px; line-height:1.4; font-size:14px; opacity:0.95; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; border:1px solid #333; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="game-wrap">
    <div id="info">
      <strong>Donny Phaser-Ready Sprite Test</strong><br>
      Arrow keys move. LEFT/RIGHT use walk/side idle. UP/DOWN switch to front/back idle.
      SPACE plays the empty-hand shooting animation.
      Assets are in <code>assets/sprites/player/donny/</code> and use 160x160 frames with transparent backgrounds.
    </div>
    <div id="game"></div>
  </div>
  <script src="scripts/game.js"></script>
</body>
</html>
