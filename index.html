function showBootError(message){
  const box=document.getElementById('bootError');
  if(!box)return;
  box.style.display='block';
  box.textContent=message;
}
window.addEventListener('error', e => {
  const msg = e.message || 'unknown error';
  if(String(msg).toLowerCase().includes('failed to start the audio device')) return;
  showBootError('GAME ERROR: ' + msg);
});
window.addEventListener('unhandledrejection', e => {
  const msg = (e.reason && (e.reason.message || e.reason)) || 'unhandled promise rejection';
  if(String(msg).toLowerCase().includes('failed to start the audio device')) return;
  showBootError('GAME ERROR: ' + msg);
});

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

const TOUCH = {x:0,y:0,active:false,a:false,b:false,xBtn:false,y:false,start:false};

function setupTouch(){
  if(window.__GLASSWELL_TOUCH_READY)return;
  window.__GLASSWELL_TOUCH_READY=true;
  const knob=document.getElementById('stickKnob');
  const label=document.getElementById('moveLabel');
  let active=null,center=null;
  const max=52;
  const prevent=e=>{if(e&&e.cancelable)e.preventDefault()};
  const getCenter=()=>{const el=document.getElementById('stickBase');const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
  const set=(x,y)=>{
    center=center||getCenter();
    let dx=x-center.x,dy=y-center.y;
    const len=Math.hypot(dx,dy);
    if(len>max){dx=dx/len*max;dy=dy/len*max}
    TOUCH.x=Math.abs(dx/max)<.08?0:dx/max;
    TOUCH.y=Math.abs(dy/max)<.08?0:dy/max;
    TOUCH.active=true;
    if(knob)knob.style.transform=`translate(${dx}px,${dy}px)`;
    if(label)label.textContent='MOVE ON';
  };
  const stop=()=>{
    active=null;center=null;TOUCH.x=0;TOUCH.y=0;TOUCH.active=false;
    if(knob)knob.style.transform='translate(0,0)';
    if(label)label.textContent='MOVE';
  };
  document.addEventListener('pointerdown',e=>{
    if(e.target.closest&&e.target.closest('.touchBtn,#btnStart'))return;
    if(e.clientX<innerWidth*.50){active=e.pointerId;center=getCenter();set(e.clientX,e.clientY);prevent(e);}
  },{capture:true,passive:false});
  document.addEventListener('pointermove',e=>{if(e.pointerId===active){set(e.clientX,e.clientY);prevent(e)}},{capture:true,passive:false});
  document.addEventListener('pointerup',e=>{if(e.pointerId===active){stop();prevent(e)}},{capture:true,passive:false});
  const bind=(id,prop)=>{
    const el=document.getElementById(id);
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';
    el.addEventListener('pointerdown',e=>{prevent(e);TOUCH[prop]=true;setTimeout(()=>TOUCH[prop]=false,120);},{passive:false});
  };
  bind('btnA','a'); bind('btnB','b'); bind('btnX','xBtn'); bind('btnY','y'); bind('btnStart','start');
}

class BootScene extends Phaser.Scene{
  constructor(){super('BootScene')}
  preload(){
    this.cameras.main.setBackgroundColor('#050608');
    this.add.text(480,240,'LOADING GLASSWELL...', {fontFamily:'Arial Black',fontSize:'26px',color:'#9ff4ff'}).setOrigin(.5);
    this.badAssets=[];
    this.load.on('loaderror', file => { this.badAssets.push(file && (file.src || file.key) || 'unknown asset'); console.warn('Asset failed:', file); });

    Object.values(PAGES).forEach(p=>{
      if(p.synthetic)return;
      this.load.image(key(p.id,'base'),version(p.root+p.base));
      this.load.image(key(p.id,'fg'),version(p.root+p.fg));
      this.load.image(key(p.id,'mask'),version(p.root+p.mask));
    });

    this.load.spritesheet('donny_idle',version(DONNY_ASSETS.idle),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_overhead',version(DONNY_ASSETS.move),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_run',version(DONNY_ASSETS.run),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_jump',version(DONNY_ASSETS.jump),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_slide',version(DONNY_ASSETS.slide),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_crawl',version(DONNY_ASSETS.crawl),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_pistol',version(DONNY_ASSETS.pistol),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_punch',version(DONNY_ASSETS.punch),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('donny_kick',version(DONNY_ASSETS.kick),{frameWidth:128,frameHeight:128});
    this.load.spritesheet(GUN_PROP.key,version(DONNY_ASSETS.laserOverlay),{frameWidth:128,frameHeight:128});
    this.load.spritesheet(HOLSTER.key,version(DONNY_ASSETS.holster),{frameWidth:128,frameHeight:128});

    VAN_ASSETS.candidates.forEach(v=>{
      this.load.spritesheet(v.key,version(v.path),{frameWidth:v.frameWidth,frameHeight:v.frameHeight,margin:0,spacing:0});
    });
    this.load.spritesheet(VAN.openKey,version(VAN_ASSETS.open),{frameWidth:VAN.openFrame.w,frameHeight:VAN.openFrame.h,margin:0,spacing:0});
  }
  create(){
    createFallbackTextures(this);
    createDonnyAnimations(this);
    createVanAnimations(this);
    if(this.badAssets.length)console.warn('Missing assets loaded with fallback where possible:',this.badAssets);
    this.scene.start('TitleScene');
  }
}

function createFallbackTextures(scene){
  if(!scene.textures.exists('donny_fallback')){
    const g=scene.add.graphics();
    g.fillStyle(0,0.35).fillEllipse(64,108,44,10);
    g.fillStyle(0x111111).fillRect(52,84,9,24).fillRect(68,84,9,24);
    g.fillStyle(0x09090b).fillRoundedRect(45,50,38,38,7);
    g.lineStyle(2,0x2f3338).strokeRoundedRect(45,50,38,38,7);
    g.fillStyle(0x2b1b12).fillRoundedRect(54,33,22,18,5);
    g.fillStyle(0x0b0b0c).fillRoundedRect(48,25,34,12,5);
    g.fillStyle(0xd89a25).fillCircle(68,29,3);
    g.generateTexture('donny_fallback',128,128);
    g.destroy();
  }
  if(!scene.textures.exists(VAN.driveKey)){
    const g=scene.add.graphics();
    g.fillStyle(0x000000,.32).fillEllipse(64,80,90,18);
    g.fillStyle(0x101820).fillRoundedRect(15,28,98,42,8);
    g.fillStyle(0x26333b).fillRoundedRect(20,32,88,32,5);
    g.fillStyle(0x78eaff).fillRect(38,35,28,11);
    g.fillStyle(0xff2aa1).fillRect(35,52,54,5);
    g.fillStyle(0x080808).fillCircle(32,70,11).fillCircle(96,70,11);
    g.generateTexture(VAN.driveKey,128,96);
    g.destroy();
  }
  if(!scene.textures.exists('pickup_dot')){
    const g=scene.add.graphics();
    g.fillStyle(0x76f5ff,1).fillCircle(10,10,8);
    g.lineStyle(2,0x222222,1).strokeCircle(10,10,8);
    g.generateTexture('pickup_dot',20,20);
    g.destroy();
  }
  if(!scene.textures.exists('laser_bolt')){
    const g=scene.add.graphics();
    g.lineStyle(5,0x9ff4ff,1).lineBetween(0,4,34,4);
    g.lineStyle(2,0xffffff,1).lineBetween(6,4,34,4);
    g.generateTexture('laser_bolt',36,8);
    g.destroy();
  }
}

function createDonnyAnimations(scene){
  const dirs=['down','right','left','up'];
  const make=(prefix,textureKey,frameRate=8,repeat=-1)=>{
    if(!scene.textures.exists(textureKey))return;
    dirs.forEach(dir=>{
      const animKey=`${prefix}_${dir}`;
      if(scene.anims.exists(animKey))return;
      scene.anims.create({key:animKey,frames:DONNY.anims[dir].map(frame=>({key:textureKey,frame})),frameRate,repeat});
    });
  };
  make('donny_idle','donny_idle',6,-1);
  make('donny_walk','donny_overhead',8,-1);
  make('donny_run','donny_run',11,-1);
  make('donny_crawl','donny_crawl',6,-1);
  make('donny_punch','donny_punch',14,0);
  make('donny_kick','donny_kick',14,0);
  make('donny_jump','donny_jump',10,0);
  make('donny_slide','donny_slide',13,0);
  make('donny_shoot','donny_pistol',12,0);
}

function selectVanDriveTexture(scene){
  const found = VAN_ASSETS.candidates.find(v=>scene.textures.exists(v.key));
  if(found){
    VAN.activeDriveKey = found.key;
    VAN.activeLayout = found.layout;
    VAN.driveFrame = {w:found.frameWidth,h:found.frameHeight};
    VAN.columns = found.columns;
    console.log('Using Astro Van asset:', found.path);
    return found;
  }

  VAN.activeDriveKey = VAN.driveKey;
  VAN.activeLayout = 'fallback';
  VAN.columns = 1;
  console.warn('No Astro Van drive asset found in', VAN_FOLDER, 'using generated fallback van.');
  return null;
}

function createVanAnimations(scene){
  const found = selectVanDriveTexture(scene);
  const driveKey = VAN.activeDriveKey;

  if(!scene.textures.exists(driveKey))return;

  if(found && found.layout === '8dir11'){
    const rows=['down','downRight','right','upRight','up','upLeft','left','downLeft'];
    rows.forEach((dir,row)=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;
      const frames=[];
      for(let c=0;c<11;c++)frames.push({key:driveKey,frame:row*11+c});
      scene.anims.create({key:animKey,frames,frameRate:8,repeat:-1});
    });
    VAN.idleFrame={down:0,downRight:11,right:22,upRight:33,up:44,upLeft:55,left:66,downLeft:77};
    return;
  }

  if(found && found.layout === '4dir4'){
    const map={down:0,right:4,left:8,up:12,downRight:4,upRight:4,upLeft:8,downLeft:8};
    Object.entries(map).forEach(([dir,start])=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;
      const frames=[];
      for(let c=0;c<4;c++)frames.push({key:driveKey,frame:start+c});
      scene.anims.create({key:animKey,frames,frameRate:6,repeat:-1});
    });
    VAN.idleFrame={down:0,downRight:4,right:4,upRight:4,up:12,upLeft:8,left:8,downLeft:8};
    return;
  }

  // Fallback generated single-frame van.
  Object.keys(VAN.anim).forEach(dir=>{
    const animKey=VAN.anim[dir];
    if(scene.anims.exists(animKey))return;
    scene.anims.create({key:animKey,frames:[{key:driveKey,frame:0}],frameRate:1,repeat:-1});
  });
  VAN.idleFrame={down:0,downRight:0,right:0,upRight:0,up:0,upLeft:0,left:0,downLeft:0};
}

class MapScene extends Phaser.Scene{
  constructor(){
    super('MapScene');
    this.pageId='GLASSWELL_C3';
    this.playerDir='down';
    this.inVan=false;
    this.vanDir='right';
    this.isCrawling=false;
    this.isInventoryOpen=false;
    this.weaponEquipped=true;
    this.pistolAmmo=24;
    this.bag=[];
    this.actionUntil=0;
    this.actionType='';
    this.slideUntil=0;
    this.moveHoldStart=0;
    this.jumpZ=0;
    this.jumpVel=0;
    this.routeCooldown=0;
  }

  init(data){this.startPage=data?.pageId||'GLASSWELL_C3';this.startSpawn=data?.spawn||'donny_city_start'}

  create(){
    setupTouch();
    this.keys=this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT,SPACE,X,J,B,K,Y,E,ENTER,I,TAB,ESC');
    this.input.keyboard.on('keydown-SPACE',()=>this.handleA());
    this.input.keyboard.on('keydown-X',()=>this.handleX());
    this.input.keyboard.on('keydown-J',()=>this.handleX());
    this.input.keyboard.on('keydown-B',()=>this.handleB());
    this.input.keyboard.on('keydown-K',()=>this.handleB());
    this.input.keyboard.on('keydown-Y',()=>this.handleY());
    this.input.keyboard.on('keydown-E',()=>this.handleY());
    this.input.keyboard.on('keydown-ENTER',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-I',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-TAB',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-ESC',()=>this.isInventoryOpen?this.toggleInventory():this.scene.start('TitleScene'));

    this.makeHud();
    this.loadPage(this.startPage,this.startSpawn);
  }

  makeHud(){
    this.hud=this.add.text(10,8,'',{fontFamily:'Arial Black',fontSize:'13px',color:'#d7faff',backgroundColor:'rgba(0,0,0,.55)',padding:{x:8,y:5}}).setScrollFactor(0).setDepth(20000);
    this.status=this.add.text(GAME_W-14,8,'',{fontFamily:'Arial Black',fontSize:'13px',color:'#f0e5be',backgroundColor:'rgba(0,0,0,.55)',padding:{x:8,y:5}}).setOrigin(1,0).setScrollFactor(0).setDepth(20000);
    this.prompt=this.add.text(10,GAME_H-34,'',{fontFamily:'Arial',fontSize:'14px',color:'#f0e5be',backgroundColor:'rgba(0,0,0,.62)',padding:{x:8,y:6}}).setScrollFactor(0).setDepth(20000);
  }

  loadPage(id,spawnId){
    this.children.list.filter(o=>o.mapObj).forEach(o=>o.destroy());
    this.pageId=id;
    const p=PAGES[id];
    let w,h;
    if(p.synthetic){w=p.width;h=p.height;this.createDesertMap(w,h);}
    else{
      const tex=this.textures.exists(key(id,'base'))?key(id,'base'):null;
      if(tex){
        const img=this.textures.get(tex).getSourceImage();
        w=img.width;h=img.height;
        this.add.image(0,0,tex).setOrigin(0).setDepth(0).setData('mapObj',true);
      } else {
        w=1536;h=1152;this.createDesertMap(w,h);
      }
    }
    this.mapW=w;this.mapH=h;this.data=buildPageData(id,w,h);

    const sp=this.data.spawns[spawnId]||this.data.spawns.donny_city_start||Object.values(this.data.spawns)[0]||{x:w*.5,y:h*.55};
    this.playerX=sp.x;this.playerY=sp.y;
    this.createPlayerSprites();

    if(!this.van || id==='GLASSWELL_C3'){
      this.spawnVanNearDonny();
    } else {
      this.van.setVisible(id===this.vanPage);
    }

    if(!p.synthetic && this.textures.exists(key(id,'fg'))){
      this.add.image(0,0,key(id,'fg')).setOrigin(0).setDepth(9000).setData('mapObj',true);
    }
    this.cameras.main.setBounds(0,0,w,h);
    this.cameras.main.startFollow(this.inVan?this.van:this.player,true,.12,.12);
    this.message(p.label);
  }

  createDesertMap(w,h){
    const g=this.add.graphics().setDepth(0).setData('mapObj',true);
    g.fillStyle(0x171411,1).fillRect(0,0,w,h);
    g.fillStyle(0x2a241c,1);
    for(let y=0;y<h;y+=96)g.fillRect(0,y+46,w,2);
    g.fillStyle(0x3a3127,.8);
    for(let x=0;x<w;x+=160)g.fillRect(x,0,2,h);
    g.lineStyle(4,0x6f6254,.9);
    g.strokeRect(80,80,w-160,h-160);
  }

  createPlayerSprites(){
    if(!this.player){
      const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
      this.player=this.add.sprite(this.playerX,this.playerY,texture,0).setOrigin(.5,.72).setScale(DONNY.scale).setDepth(this.playerY+1000);
      this.gun=this.add.sprite(this.playerX,this.playerY,GUN_PROP.key,0).setOrigin(.5,.5).setScale(GUN_PROP.scale).setVisible(false).setDepth(this.playerY+1005);
      this.holster=this.add.sprite(this.playerX,this.playerY,HOLSTER.key,0).setOrigin(.5,.5).setScale(HOLSTER.scale).setVisible(false).setDepth(this.playerY+1004);
    }
    this.player.setPosition(this.playerX,this.playerY).setVisible(!this.inVan).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.setDonnyIdle();
  }

  spawnVanNearDonny(){
    if(!this.van){
      this.van=this.add.sprite(this.playerX-165,this.playerY+105,VAN.activeDriveKey,VAN.idleFrame.right||0).setOrigin(.5,.68).setScale(VAN.renderScale).setDepth(this.playerY+900);
    } else {
      this.van.setPosition(this.playerX-165,this.playerY+105).setVisible(true);
    }
    this.vanX=this.van.x;this.vanY=this.van.y;this.vanPage=this.pageId;this.vanDir='right';
    this.enableVanPhysics();
  }

  inputVector(){
    let x=TOUCH.x,y=TOUCH.y;
    if(this.keys.LEFT.isDown||this.keys.A.isDown)x-=1;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)x+=1;
    if(this.keys.UP.isDown||this.keys.W.isDown)y-=1;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)y+=1;
    const l=Math.hypot(x,y);
    if(l>1){x/=l;y/=l}
    return {x,y,len:Math.min(1,l)};
  }

  directionFromVector(x,y,last='down'){
    if(Math.abs(x)<.05 && Math.abs(y)<.05)return last;

    // Strict 2.5D control rule:
    // If the stick has real up/down input, Donny must be allowed to face and walk up/down.
    // This prevents sideways drift from stealing vertical movement on iPhone touch controls.
    const ax=Math.abs(x);
    const ay=Math.abs(y);
    if(ay>.18 && ay>=ax*.45)return y>0?'down':'up';
    if(ax>.18)return x>0?'right':'left';
    return y>0?'down':'up';
  }

  vanDirectionFromVector(x,y,last='right'){
    if(Math.abs(x)<.05 && Math.abs(y)<.05)return last;
    const ang=Math.atan2(y,x);
    const oct=Math.round(ang/(Math.PI/4));
    const dirs={0:'right',1:'downRight',2:'down',3:'downLeft',4:'left',"-4":'left',"-3":'upLeft',"-2":'up',"-1":'upRight'};
    return dirs[oct]||last;
  }

  getVanFootprint(){
    if(!this.van || !this.van.visible || this.inVan)return null;
    const bw=VAN.body?.w || 112;
    const bh=VAN.body?.h || 48;
    const oy=VAN.body?.offsetY || -24;
    return {
      x:this.van.x-bw/2,
      y:this.van.y+oy-bh/2,
      w:bw,
      h:bh
    };
  }

  pointInRect(r,x,y){
    return !!r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h;
  }

  canDonnyStandAt(x,y){
    // Keep Donny in the page.
    if(x<20 || y<20 || x>this.mapW-20 || y>this.mapH-20)return false;

    // Van uses a small body/footprint, not the full image rectangle.
    const vanBox=this.getVanFootprint();
    if(!vanBox)return true;

    // If Donny is already inside the van body from a previous build, allow movement that escapes.
    const currentlyInside=this.pointInRect(vanBox,this.playerX,this.playerY);
    const nextInside=this.pointInRect(vanBox,x,y);
    if(!nextInside)return true;
    if(currentlyInside){
      const cx=vanBox.x+vanBox.w/2;
      const cy=vanBox.y+vanBox.h/2;
      const oldD=Math.hypot(this.playerX-cx,this.playerY-cy);
      const newD=Math.hypot(x-cx,y-cy);
      return newD>oldD;
    }
    return false;
  }

  moveDonnyWithCollision(dx,dy){
    if(!dx && !dy)return;

    // Try full movement first.
    const nx=this.playerX+dx;
    const ny=this.playerY+dy;
    if(this.canDonnyStandAt(nx,ny)){
      this.playerX=nx;
      this.playerY=ny;
      return;
    }

    // Then try vertical-only and horizontal-only.
    // This fixes cases where the van blocks one axis but should not stop up/down walking.
    if(dy && this.canDonnyStandAt(this.playerX,this.playerY+dy)){
      this.playerY+=dy;
    }
    if(dx && this.canDonnyStandAt(this.playerX+dx,this.playerY)){
      this.playerX+=dx;
    }
  }

  enableVanPhysics(){
    if(!this.physics || !this.van)return;
    if(!this.van.body)this.physics.add.existing(this.van);
    if(this.van.body){
      this.van.body.setAllowGravity(false);
      this.van.body.setImmovable(true);
      this.van.body.setSize(VAN.body?.w || 112, VAN.body?.h || 48, false);
      this.van.body.setOffset(
        (VAN.driveFrame.w-(VAN.body?.w || 112))/2,
        (VAN.driveFrame.h*.58)+(VAN.body?.offsetY || -24)
      );
    }
  }

  handleA(){
    if(this.isInventoryOpen){this.useInventory();return}
    if(this.inVan)return;
    if(this.jumpZ>1 || this.isCrawling)return;
    this.jumpVel=8.8;
    this.actionType='jump';
    this.actionUntil=this.time.now+420;
    this.playDonnyAction('jump');
  }

  handleX(){
    if(this.isInventoryOpen){this.nextInventory();return}
    if(this.inVan)return;
    if(this.weaponEquipped)this.shootPistol();
    else this.punch();
  }

  handleB(){
    if(this.isInventoryOpen){this.dropInventory();return}
    if(this.inVan){this.exitVan();return}
    const input=this.inputVector();
    if(this.isCrawling){this.isCrawling=false;this.setDonnyIdle();this.message('Crawl off');return}
    if(input.y>.55){this.isCrawling=true;this.message('Crawl on');return}
    if(input.len>.25){this.slide(input);return}
    this.kick();
  }

  handleY(){
    if(this.isInventoryOpen){this.toggleInventory();return}
    if(this.nearVan()){this.enterVan();return}
    this.message('No interaction here');
  }

  nearVan(){return this.van && this.van.visible && dist(this.playerX,this.playerY,this.van.x,this.van.y)<VAN.enterDistance}

  enterVan(){
    this.inVan=true;
    this.player.setVisible(false);
    this.gun.setVisible(false);
    this.holster.setVisible(false);
    this.cameras.main.startFollow(this.van,true,.12,.12);
    this.message('Entered Astro Van — B exits');
  }

  exitVan(){
    const off=VAN.exitOffset[this.playerDir]||VAN.exitOffset.down;
    this.inVan=false;
    this.playerX=clamp(this.van.x+off.x,20,this.mapW-20);
    this.playerY=clamp(this.van.y+off.y,20,this.mapH-20);
    this.player.setPosition(this.playerX,this.playerY).setVisible(true);
    this.cameras.main.startFollow(this.player,true,.12,.12);
    this.setDonnyIdle();
    this.message('Exited Astro Van');
  }

  punch(){this.actionType='punch';this.actionUntil=this.time.now+280;this.playDonnyAction('punch');this.message('Punch')}
  kick(){this.actionType='kick';this.actionUntil=this.time.now+320;this.playDonnyAction('kick');this.message('Kick')}
  slide(input){
    this.actionType='slide';this.slideUntil=this.time.now+360;this.actionUntil=this.slideUntil;this.slideVec={x:input.x,y:input.y};
    this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    this.playDonnyAction('slide');
    this.message('Slide');
  }

  shootPistol(){
    if(this.pistolAmmo<=0){this.message('Pistol empty');return}
    this.pistolAmmo--;
    this.actionType='shoot';
    this.actionUntil=this.time.now+ACTION.shootDuration;
    this.playDonnyAction('shoot');
    this.spawnLaserBolt();
    this.message('Pistol fired');
  }

  spawnLaserBolt(){
    const v={down:{x:0,y:1},right:{x:1,y:0},left:{x:-1,y:0},up:{x:0,y:-1}}[this.playerDir]||{x:1,y:0};
    const h=GUN_PROP.hand[this.playerDir]||GUN_PROP.hand.right;
    const bolt=this.add.image(this.playerX+h.x+v.x*22,this.playerY+h.y+v.y*22,'laser_bolt').setDepth(this.playerY+1200);
    if(this.playerDir==='down')bolt.setAngle(90);
    if(this.playerDir==='up')bolt.setAngle(-90);
    if(this.playerDir==='left')bolt.setAngle(180);
    this.tweens.add({targets:bolt,x:bolt.x+v.x*220,y:bolt.y+v.y*220,alpha:0,duration:280,onComplete:()=>bolt.destroy()});
  }

  playDonnyAction(action){
    const keyName= action==='shoot' ? 'donny_shoot' : `donny_${action}`;
    const anim=`${keyName}_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);
  }

  forceDirectionalSheet(textureKey){
    if(!this.textures.exists(textureKey))return false;
    const base=DONNY.directionFrame[this.playerDir] ?? 0;
    const frame=base + (Math.floor(this.time.now/95)%8);
    this.player.stop();
    this.player.setTexture(textureKey);
    this.player.setFrame(frame);
    return true;
  }

  setDonnyIdle(){
    const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
    this.player.stop();
    this.player.setTexture(texture);
    this.player.setFrame(DONNY.directionFrame[this.playerDir]||0);
  }

  updateGunOverlay(){
    if(!this.gun || !this.holster)return;

    const now=this.time?.now||0;
    const shooting =
      this.weaponEquipped &&
      this.actionType==='shoot' &&
      now>=this.actionUntil-ACTION.shootDuration+ACTION.gunShowDelay &&
      now<this.actionUntil-ACTION.gunHideBeforeEnd;

    const gunFrame = GUN_PROP.directionFrame[this.playerDir] ?? 1;
    const hand = GUN_PROP.hand[this.playerDir] || GUN_PROP.hand.right;

    this.gun
      .setFrame(gunFrame)
      .setScale(GUN_PROP.scale)
      .setPosition(this.playerX+hand.x, this.playerY+hand.y-this.jumpZ)
      .setDepth(this.playerY+1006)
      .setVisible(shooting && !this.inVan);

    const holsterFrame = HOLSTER.directionFrame[this.playerDir] ?? 0;
    const hip = HOLSTER.hip[this.playerDir] || HOLSTER.hip.down;

    // Hip placement matches the white dot reference from the screenshot.
    this.holster
      .setFrame(holsterFrame)
      .setScale(HOLSTER.scale)
      .setPosition(this.playerX+hip.x, this.playerY+hip.y-this.jumpZ)
      .setDepth(this.playerY+1004)
      .setVisible(HOLSTER.enabled && this.weaponEquipped && !shooting && !this.inVan && !this.isCrawling);
  }

  toggleInventory(){
    this.isInventoryOpen=!this.isInventoryOpen;
    if(this.isInventoryOpen)this.openInventory(); else this.closeInventory();
  }
  openInventory(){
    if(!this.invBox){
      this.invBox=this.add.container(0,0).setScrollFactor(0).setDepth(30000);
      const bg=this.add.rectangle(480,270,740,410,0x030506,.93).setStrokeStyle(3,0x67dce8,.85);
      this.invText=this.add.text(140,110,'',{fontFamily:'Courier New',fontSize:'16px',color:'#f4e7c2',lineSpacing:8});
      const title=this.add.text(140,70,'DONNY INVENTORY',{fontFamily:'Arial Black',fontSize:'24px',color:'#9ff4ff'});
      const help=this.add.text(140,430,'A equip/unequip/use | B drop | X next | Y/START close',{fontFamily:'Courier New',fontSize:'14px',color:'#d9b46a'});
      this.invBox.add([bg,title,this.invText,help]);
    }
    this.invBox.setVisible(true);this.refreshInventory();
  }
  closeInventory(){if(this.invBox)this.invBox.setVisible(false);this.message('Inventory closed')}
  refreshInventory(){
    if(!this.invText)return;
    this.invText.setText([
      `Weapon: ${this.weaponEquipped?'Pistol equipped':'empty'}`,
      `Ammo: ${this.pistolAmmo}/24`,
      `Bag: ${this.bag.length}`,
      '',
      'Selected:',
      '▶ Dust-9 Laser Pistol',
      '',
      'Press A to equip/unequip pistol.'
    ].join('\n'));
  }
  useInventory(){this.weaponEquipped=!this.weaponEquipped;this.refreshInventory();this.message(this.weaponEquipped?'Pistol equipped':'Pistol unequipped')}
  nextInventory(){this.refreshInventory()}
  dropInventory(){if(this.weaponEquipped){this.weaponEquipped=false;this.refreshInventory();this.message('Dropped/unequipped pistol')}}

  message(t){
    this.prompt.setText(t);
    this.time.delayedCall(1700,()=>{if(this.prompt.text===t)this.prompt.setText('')});
  }

  checkRoutes(){
    if(this.time.now<this.routeCooldown)return;
    const routes=this.data?.routes||[];
    const x=this.inVan?this.van.x:this.playerX;
    const y=this.inVan?this.van.y:this.playerY;
    const r=routes.find(rt=>rectHit(rt.r,x,y));
    if(r&&r.to){
      this.routeCooldown=this.time.now+800;
      this.loadPage(r.to,r.spawn);
    }
  }

  updateJump(delta){
    if(this.jumpZ>0 || this.jumpVel>0){
      this.jumpZ+=this.jumpVel*delta/16.67;
      this.jumpVel-=0.65*delta/16.67;
      if(this.jumpZ<=0){this.jumpZ=0;this.jumpVel=0}
    }
  }

  update(_,delta){
    const now=this.time.now;
    if(TOUCH.a){TOUCH.a=false;this.handleA()}
    if(TOUCH.xBtn){TOUCH.xBtn=false;this.handleX()}
    if(TOUCH.b){TOUCH.b=false;this.handleB()}
    if(TOUCH.y){TOUCH.y=false;this.handleY()}
    if(TOUCH.start){TOUCH.start=false;this.toggleInventory()}

    this.updateJump(delta);
    if(this.isInventoryOpen){this.updateGunOverlay();return}

    const input=this.inputVector();
    const moving=input.len>.08;

    if(this.inVan){
      if(moving){
        this.vanDir=this.vanDirectionFromVector(input.x,input.y,this.vanDir);
        this.van.x=clamp(this.van.x+input.x*VAN.speed*delta/1000,20,this.mapW-20);
        this.van.y=clamp(this.van.y+input.y*VAN.speed*delta/1000,20,this.mapH-20);
        if(this.van.body)this.van.body.updateFromGameObject();
        const anim=VAN.anim[this.vanDir];
        if(this.anims.exists(anim))this.van.play(anim,true);
        else this.van.setFrame(VAN.idleFrame[this.vanDir]||0);
      } else {
        this.van.stop();
        this.van.setFrame(VAN.idleFrame[this.vanDir] ?? 0);
      }
      this.van.setDepth(this.van.y+900);
      this.checkRoutes();
      this.hud.setText(`${PAGES[this.pageId].label} | Astro Van | ${Math.round(this.van.x)},${Math.round(this.van.y)}`);
      this.status.setText(`Driving | B exits | Pistol ammo: ${this.pistolAmmo}`);
      return;
    }

    if(moving){
      if(this.moveHoldStart===0)this.moveHoldStart=now;
      this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    } else {
      this.moveHoldStart=0;
    }

    let speed=DONNY.speed;
    let mode='WALK';
    if(this.isCrawling){speed=DONNY.crawlSpeed;mode='CRAWL'}
    else if(moving && input.len>.72 && now-this.moveHoldStart>350){speed=DONNY.runSpeed;mode='RUN'}

    if(this.actionType==='slide' && now<this.slideUntil){
      const sv=this.slideVec||input;
      this.moveDonnyWithCollision(sv.x*390*delta/1000, sv.y*390*delta/1000);
    } else if(moving && !(now<this.actionUntil && ['punch','kick','shoot'].includes(this.actionType))){
      this.moveDonnyWithCollision(input.x*speed*delta/1000, input.y*speed*delta/1000);
    }

    if(now>this.actionUntil && this.actionType){this.actionType='';}
    if(!this.actionType){
      if(this.isCrawling && moving && this.anims.exists(`donny_crawl_${this.playerDir}`))this.player.play(`donny_crawl_${this.playerDir}`,true);
      else if(mode==='RUN' && moving && this.anims.exists(`donny_run_${this.playerDir}`))this.player.play(`donny_run_${this.playerDir}`,true);
      else if(moving && this.anims.exists(`donny_walk_${this.playerDir}`))this.player.play(`donny_walk_${this.playerDir}`,true);
      else if(moving && this.forceDirectionalSheet('donny_overhead')){}
      else if(this.anims.exists(`donny_idle_${this.playerDir}`))this.player.play(`donny_idle_${this.playerDir}`,true);
      else this.setDonnyIdle();
    }

    this.player.setPosition(this.playerX,this.playerY-this.jumpZ).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.checkRoutes();

    if(this.nearVan())this.prompt.setText('Y: enter Astro Van');
    this.hud.setText(`${PAGES[this.pageId].label} | Donny | ${Math.round(this.playerX)},${Math.round(this.playerY)} | input ${input.x.toFixed(2)},${input.y.toFixed(2)} | 2.5D GTA-style open-city sci-fi RPG / brawler`);
    this.status.setText(`Weapon: ${this.weaponEquipped?'Pistol equipped':'empty'} | Bag: ${this.bag.length}`);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:'game',
  width:GAME_W,
  height:GAME_H,
  backgroundColor:'#000',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{
    default:'arcade',
    arcade:{
      gravity:{x:0,y:0},
      debug:false
    }
  },
  render:{pixelArt:true,antialias:false},
  scene:[BootScene,TitleScene,MapScene]
});
</script>
