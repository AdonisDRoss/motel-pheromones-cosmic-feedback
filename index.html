<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Cosmic Feedback</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-user-select:none;user-select:none;font-family:monospace}
#game{position:fixed;inset:0;background:#000}
canvas{image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>
<body><div id="game"></div>
<script>
(()=>{
'use strict';
const W=960,H=540,WORLD_W=1920;

/* ─── Asset paths ────────────────────────────────────────────────────── */
const A={
  video       :'assets/cosmic-feedback/video/title_intro.mp4',
  titleBg     :'assets/backgrounds/dust9/dust9_checkpoint_empty_1920x540.png',
  // Donny new walk sheet — 8 frames per direction, 181×272
  donnyWalk   :'assets/sprites/player/donny/donny_movement_walk_8x4_181x272.png',
  donnyCrawl  :'assets/sprites/player/donny/donny_crawl_8x4_181x272.png',
  donnySlide  :'assets/sprites/player/donny/donny_slide_sitting_8x4_222x222.png',
  holster     :'assets/sprites/equipment/holsters/donny_tight_holster_brown_4dir_1779504330.png',
  van         :'assets/sprites/vehicles/astro_van/astro_van_side_drive_idle_4f.png',
  weaponsJson :'assets/data/dust9/red_concord_weapons.json',
  // weapon/riff — non-blocking loads for later
  weaponOverlay:'assets/sprites/weapons/red_concord/red_concord_weapons_4dir_overlay.png',
  weaponPickup :'assets/sprites/weapons/red_concord/red_concord_weapon_pickups.png',
  weaponFx     :'assets/fx/red_concord/red_concord_weapon_fx.png',
  riff         :'assets/sprites/companions/riff/riff_movement.png',
};

/* ─── Walk animation frame map  (down 0-7 | right 8-15 | left 16-23 | up 24-31) ── */
const WALK_ANIMS={
  down :{start:0 ,end:7 },
  right:{start:8 ,end:15},
  left :{start:16,end:23},
  up   :{start:24,end:31},
};

/* ─── Holster overlay frame map  (128×128, same 4-dir layout) ────────── */
const HOLSTER_F={down:0,right:4,left:8,up:12};
// pixel offset of holster relative to Donny (origin=bottom-centre)
const HOLSTER_OFF={
  down :{x: 14,y:-80},
  right:{x: 20,y:-78},
  left :{x:-20,y:-78},
  up   :{x:-12,y:-86},
};

/* ─── Room definitions ───────────────────────────────────────────────── */
const ROOMS={
  // ── Story start ──────────────────────────────────────────────────────
  donny_office:{
    name:"Donny's Office",
    key:'bg_office',
    background:'assets/backgrounds/planets/dust_9/interiors/shops/bounty_office_interior.png',
    spawn:{x:960,y:400},
    walk:{x:0,y:200,width:1920,height:330},
    exits:{right:'sand_motel_lot'},
    label:'Exit to Sand Motel Lot →',
  },
  sand_motel_lot:{
    name:'Sand Motel Parking Lot',
    key:'bg_sand_motel',
    background:'assets/backgrounds/planets/dust_9/drive/dust9_road_chunk_01_no_vans.png',
    spawn:{x:200,y:400},
    walk:{x:0,y:240,width:1920,height:270},
    exits:{left:'donny_office'},
    vanX:680,vanY:435,
    label:'← Back to Office',
  },
  // ── Red Concord route (reached via Astro Van) ─────────────────────────
  checkpoint:{
    name:'Outer Red Concord Checkpoint',
    key:'bg_checkpoint',
    background:'assets/backgrounds/dust9/dust9_checkpoint_empty_1920x540.png',
    spawn:{x:170,y:410},
    walk:{x:0,y:250,width:1920,height:250},
    exits:{right:'prisoner_housing_yard'},
  },
  prisoner_housing_yard:{
    name:'Prisoner Housing Yard',
    key:'bg_prison_yard',
    background:'assets/backgrounds/dust9/dust9_prisoner_housing_yard_empty_1920x540.png',
    spawn:{x:140,y:405},
    walk:{x:0,y:235,width:1920,height:280},
    exits:{left:'checkpoint',right:'mining_yard'},
  },
  mining_yard:{
    name:'Outdoor Mining Yard',
    key:'bg_mining',
    background:'assets/backgrounds/dust9/dust9_mining_yard_empty_1920x540.png',
    spawn:{x:150,y:420},
    walk:{x:0,y:250,width:1920,height:260},
    exits:{left:'prisoner_housing_yard',right:'support_block'},
  },
  support_block:{
    name:'Support Block',
    key:'bg_support',
    background:'assets/backgrounds/dust9/dust9_support_block_empty_1920x540.png',
    spawn:{x:160,y:405},
    walk:{x:0,y:245,width:1920,height:275},
    exits:{left:'mining_yard',right:'high_command_tower'},
  },
  high_command_tower:{
    name:'High Command Tower',
    key:'bg_hq_tower',
    background:'assets/backgrounds/dust9/dust9_high_command_tower_exterior_empty_1920x540.png',
    spawn:{x:150,y:410},
    walk:{x:0,y:245,width:1920,height:275},
    exits:{left:'support_block',right:'control_room'},
  },
  control_room:{
    name:'Camp Control Room',
    key:'bg_control',
    background:'assets/backgrounds/dust9/dust9_control_room_empty_1920x540.png',
    spawn:{x:180,y:385},
    walk:{x:0,y:250,width:1920,height:250},
    exits:{left:'high_command_tower',right:'basement_prison'},
  },
  basement_prison:{
    name:'Basement Prison — Find Dex',
    key:'bg_prison',
    background:'assets/backgrounds/dust9/dust9_basement_prison_empty_1920x540.png',
    spawn:{x:160,y:390},
    walk:{x:0,y:245,width:1920,height:280},
    exits:{left:'control_room',right:'loading_pad'},
    dexMarker:true,
  },
  loading_pad:{
    name:'Loading Pad — Escape Route',
    key:'bg_loading',
    background:'assets/backgrounds/dust9/dust9_loading_pad_escape_route_empty_1920x540.png',
    spawn:{x:180,y:400},
    walk:{x:0,y:235,width:1920,height:290},
    exits:{left:'basement_prison'},
  },
};

/* ─── Utility ────────────────────────────────────────────────────────── */
function lbl(sc,x,y,txt,sz=14,col='#d9f7ff'){
  return sc.add.text(x,y,txt,{fontFamily:'monospace',fontSize:sz+'px',color:col,stroke:'#000',strokeThickness:3});
}

/* ═══════════════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════════════════ */
class Boot extends Phaser.Scene{
  constructor(){super('Boot')}

  preload(){
    this.load.on('loaderror',f=>console.warn('[asset missing — ok]',f.key,f.url));

    // Video + fallback bg
    this.load.video('title_video',A.video,'loadeddata',false,true);
    this.load.image('title_bg',A.titleBg);

    // Room backgrounds
    Object.values(ROOMS).forEach(r=>this.load.image(r.key,r.background));

    // Donny walk — 181×272, 8 frames/dir
    this.load.spritesheet('donny_walk',A.donnyWalk,{frameWidth:181,frameHeight:272});
    // Donny crawl — 181×272 (reserve for later)
    this.load.spritesheet('donny_crawl',A.donnyCrawl,{frameWidth:181,frameHeight:272});
    // Donny slide/sit — 222×222 (reserve for later)
    this.load.spritesheet('donny_slide',A.donnySlide,{frameWidth:222,frameHeight:222});

    // Holster overlay — 128×128
    this.load.spritesheet('holster',A.holster,{frameWidth:128,frameHeight:128});

    // Astro Van
    this.load.spritesheet('astro_van',A.van,{frameWidth:256,frameHeight:128});

    // Riff (non-blocking)
    this.load.spritesheet('riff',A.riff,{frameWidth:128,frameHeight:128});

    // Weapons data
    this.load.json('weapons_json',A.weaponsJson);

    // Weapon visuals (non-blocking, for later)
    this.load.image('weapon_overlay',A.weaponOverlay);
    this.load.image('weapon_pickup', A.weaponPickup);
    this.load.image('weapon_fx',     A.weaponFx);
  }

  create(){
    // Placeholder textures (used if real asset is missing)
    const mk=(k,w,h,c)=>{
      if(this.textures.exists(k))return;
      const g=this.add.graphics();
      g.fillStyle(c,1).fillRect(0,0,w,h);
      g.lineStyle(2,0xffffff,.5).strokeRect(1,1,w-2,h-2);
      g.generateTexture(k,w,h);g.destroy();
    };
    mk('ph_bg',WORLD_W,H,0x17131c);
    mk('ph_player',50,88,0x314dff);
    mk('ph_holster',32,32,0x8b6914);
    mk('ph_van',200,100,0x3a2d1a);

    // Build walk animations if sheet loaded
    if(this.textures.exists('donny_walk')){
      Object.entries(WALK_ANIMS).forEach(([dir,fr])=>{
        this.anims.create({key:'walk_'+dir,
          frames:this.anims.generateFrameNumbers('donny_walk',fr),
          frameRate:8,repeat:-1});
        // Idle = freeze on first frame of that direction
        this.anims.create({key:'idle_'+dir,
          frames:this.anims.generateFrameNumbers('donny_walk',{start:fr.start,end:fr.start}),
          frameRate:1,repeat:0});
      });
    }

    this.scene.start('Title');
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   TITLE
══════════════════════════════════════════════════════════════════════════ */
class Title extends Phaser.Scene{
  constructor(){super('Title')}

  create(){
    // Video background
    if(this.cache.video.exists('title_video')){
      this.vid=this.add.video(W/2,H/2,'title_video').setDepth(0);
      this.vid.setMute(true);this.vid.setLoop(true);this.vid.play(true);
      this.vid.once('play',()=>{
        const vw=this.vid.video.videoWidth||W,vh=this.vid.video.videoHeight||H;
        this.vid.setScale(Math.max(W/vw,H/vh));
      });
    } else {
      this.add.image(W/2,H/2,this.textures.exists('title_bg')?'title_bg':'ph_bg')
        .setDisplaySize(W,H).setDepth(0);
    }

    this.add.rectangle(0,0,W,H,0x000000,.48).setOrigin(0).setDepth(1);
    lbl(this,W/2,70,'COSMIC FEEDBACK',44,'#ffffff').setOrigin(.5).setDepth(2);
    lbl(this,W/2,123,'The signal starts on Dust-9',17,'#8ff9ff').setOrigin(.5).setDepth(2);

    const btn=(y,txt,cb)=>{
      const t=this.add.text(W/2,y,txt,{
        fontFamily:'monospace',fontSize:'22px',color:'#fff',
        backgroundColor:'#3b145c',padding:{x:26,y:14},
        stroke:'#000',strokeThickness:2
      }).setOrigin(.5).setDepth(3).setInteractive({useHandCursor:true});
      t.on('pointerover',()=>t.setStyle({backgroundColor:'#7a1f9a'}));
      t.on('pointerout', ()=>t.setStyle({backgroundColor:'#3b145c'}));
      t.on('pointerdown',cb);
    };

    btn(288,'START GAME',            ()=>this._go('donny_office'));
    btn(363,'TEST DUST-9 ROAD WORLD',()=>this._go('checkpoint'));
    btn(438,'DIRECT ROAD TEST PAGE', ()=>{window.location.href='dust9-road-test.html';});

    this.input.keyboard.once('keydown-ENTER',()=>this._go('donny_office'));
  }

  _go(room){
    if(this.vid) this.vid.stop();
    this.scene.start('Dust9',{room});
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   DUST-9
══════════════════════════════════════════════════════════════════════════ */
class Dust9 extends Phaser.Scene{
  constructor(){
    super('Dust9');
    this.roomId='donny_office';
    this.facing='down';
    this.touch={left:false,right:false,up:false,down:false};
    this._fWasDown=false;
    this._eWasDown=false;
    this.pistol={owned:true,state:'holstered',ammo:12,equipped:'pistol'};
  }

  init(d){if(d&&d.room)this.roomId=d.room;}

  create(){
    this.cameras.main.setBounds(0,0,WORLD_W,H);
    this.keys=this.input.keyboard.addKeys('W,A,S,D,F,E');
    this.cursors=this.input.keyboard.createCursorKeys();

    this.drawRoom(this.roomId);
    this.makePlayer();
    this.makeHud();
    this.makeMobileControls();
  }

  has(k){return this.textures.exists(k);}
  hasAnim(k){return this.anims.exists(k);}

  /* ── Room ─────────────────────────────────────────────────────────── */
  drawRoom(id){
    const r=ROOMS[id]||ROOMS.donny_office;
    this.roomId=id; this.room=r;

    // Destroy old objects
    ['bg','roomTxt','vanSprite','vanPrompt','dexMarker','riftSignalTxt'].forEach(k=>{
      if(this[k]){this[k].destroy();this[k]=null;}
    });

    this.bg=this.add.image(0,0,this.has(r.key)?r.key:'ph_bg')
      .setOrigin(0,0).setDepth(0).setDisplaySize(WORLD_W,H);

    this.roomTxt=lbl(this,16,12,'DUST-9 / '+r.name,13,'#86f7ff')
      .setScrollFactor(0).setDepth(100);

    // Riff signal in office
    if(id==='donny_office'){
      this.riftSignalTxt=lbl(this,W/2,56,
        'Riff: "Signal detected. Outer Rim. Dex signature. Move right to exit."',
        12,'#ffe97a').setOrigin(.5,0).setScrollFactor(0).setDepth(101);
    }

    // Red Concord entry warning
    if(id==='checkpoint'){
      lbl(this,W/2,56,'RED CONCORD TERRITORY — move right to advance',12,'#ff6633')
        .setOrigin(.5,0).setScrollFactor(0).setDepth(101);
    }

    // Astro Van in sand motel lot
    if(id==='sand_motel_lot'){
      const vx=r.vanX||680,vy=r.vanY||435;
      this.vanSprite=this.add.sprite(vx,vy,this.has('astro_van')?'astro_van':'ph_van',0)
        .setOrigin(.5,1).setScale(.78).setDepth(10);
      this.vanPrompt=lbl(this,vx,vy-108,'[E / BOARD] Board Van → Red Concord Route',13,'#ffe97a')
        .setOrigin(.5,1).setDepth(15).setAlpha(0);
    }

    // Dex rescue marker
    if(r.dexMarker){
      this.dexMarker=lbl(this,WORLD_W/2,300,'★  DEX IS HERE  ★\nRescue objective',16,'#ff6699')
        .setOrigin(.5).setDepth(50);
    }
  }

  /* ── Player + holster ─────────────────────────────────────────────── */
  makePlayer(){
    const s=this.room.spawn;
    const hasWalk=this.has('donny_walk');
    this.player=this.add.sprite(s.x,s.y,hasWalk?'donny_walk':'ph_player')
      .setOrigin(.5,1).setDepth(20)
      .setScale(hasWalk?0.44:1);   // 181*0.44 ≈ 80px wide on screen

    if(hasWalk&&this.hasAnim('idle_down')) this.player.play('idle_down');

    // Holster overlay
    this.holsterSprite=this.add.sprite(s.x,s.y,this.has('holster')?'holster':'ph_holster',0)
      .setDepth(21).setScale(0.44);

    this.cameras.main.startFollow(this.player,true,.08,.08);
  }

  /* ── HUD ──────────────────────────────────────────────────────────── */
  makeHud(){
    lbl(this,16,500,'HP: 100   VAN: OK   CREDITS: 25',12,'#f4e7ff')
      .setScrollFactor(0).setDepth(100);

    this.hudPistol=lbl(this,W-16,500,this._pistolLbl(),13,'#ffe97a')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100);
    lbl(this,W-16,517,'AMMO: '+this.pistol.ammo,12,'#ffd46a')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100);

    lbl(this,W-16,12,'← Menu',12,'#86f7ff')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100)
      .setInteractive({useHandCursor:true})
      .on('pointerdown',()=>this.scene.start('Title'));

    lbl(this,W/2,H-18,'[F] Draw/Holster   [E] Interact',11,'#8888aa')
      .setOrigin(.5,1).setScrollFactor(0).setDepth(100);
  }

  _pistolLbl(){return 'PISTOL: '+(this.pistol.state==='drawn'?'DRAWN':'HOLSTERED');}

  /* ── SNES-style mobile controls ───────────────────────────────────── */
  makeMobileControls(){
    // ── D-pad (lower-left) ──────────────────────────────────────────
    const dpadX=96,dpadY=H-70;
    const dpBtn=(ox,oy,txt,flag)=>{
      const b=this.add.text(dpadX+ox,dpadY+oy,txt,{
        fontFamily:'monospace',fontSize:'22px',color:'#eeeeee',
        backgroundColor:'rgba(30,12,55,.72)',padding:{x:13,y:9},
        stroke:'#000',strokeThickness:3
      }).setOrigin(.5).setScrollFactor(0).setDepth(200).setInteractive();
      b.on('pointerdown',()=>this.touch[flag]=true);
      ['pointerup','pointerout','pointerupoutside'].forEach(e=>b.on(e,()=>this.touch[flag]=false));
    };
    dpBtn(  0,-46,'▲','up');
    dpBtn(  0,  0,'▼','down');
    dpBtn(-48,-23,'◀','left');
    dpBtn( 48,-23,'▶','right');

    // ── Action buttons — SNES diamond (lower-right) ────────────────
    // A (right) = DRAW/HOLSTER, B (bottom) = reserved, X (top) = reserved, Y (left) = reserved
    const acX=W-88,acY=H-70;
    const acBtn=(ox,oy,txt,bgCol,lbl2,cb)=>{
      const b=this.add.text(acX+ox,acY+oy,txt,{
        fontFamily:'monospace',fontSize:'17px',color:'#fff',
        backgroundColor:bgCol,padding:{x:11,y:8},
        stroke:'#000',strokeThickness:2
      }).setOrigin(.5).setScrollFactor(0).setDepth(200).setInteractive();
      b.on('pointerdown',cb);
      if(lbl2) lbl(this,acX+ox,acY+oy-34,lbl2,9,'#ffdd88')
        .setOrigin(.5).setScrollFactor(0).setDepth(200);
      return b;
    };
    acBtn( 46,-23,'A','rgba(160,30,30,.75)','DRAW',()=>this._togglePistol());
    acBtn(  0,-46,'X','rgba(60,60,180,.65)','',   ()=>{});  // reserved
    acBtn(  0,  0,'B','rgba(30,110,30,.65)', '',   ()=>{});  // reserved
    acBtn(-46,-23,'Y','rgba(130,90,0,.65)',  '',   ()=>{});  // reserved

    // ── Board Van button (shows when near van) ─────────────────────
    this._boardBtn=this.add.text(W/2,H-22,'[ BOARD VAN ]',{
      fontFamily:'monospace',fontSize:'14px',color:'#ffe97a',
      backgroundColor:'rgba(60,30,100,.8)',padding:{x:16,y:8},
      stroke:'#000',strokeThickness:2
    }).setOrigin(.5,1).setScrollFactor(0).setDepth(200).setInteractive().setVisible(false);
    this._boardBtn.on('pointerdown',()=>this._boardVan());
  }

  /* ── Pistol toggle ────────────────────────────────────────────────── */
  _togglePistol(){
    this.pistol.state=this.pistol.state==='holstered'?'drawn':'holstered';
    this.hudPistol.setText(this._pistolLbl());
    if(this.holsterSprite) this.holsterSprite.setAlpha(this.pistol.state==='drawn'?0.35:1);
  }

  /* ── Van boarding ─────────────────────────────────────────────────── */
  _boardVan(){
    if(this.roomId==='sand_motel_lot') this.changeRoom('checkpoint','left');
  }

  /* ── Update loop ──────────────────────────────────────────────────── */
  update(){
    if(!this.player||!this.room) return;

    // F key
    const fDown=this.keys.F.isDown;
    if(fDown&&!this._fWasDown) this._togglePistol();
    this._fWasDown=fDown;

    // E key
    const eDown=this.keys.E.isDown;
    if(eDown&&!this._eWasDown) this._boardVan();
    this._eWasDown=eDown;

    // Movement
    const L=this.cursors.left.isDown  ||this.keys.A.isDown||this.touch.left;
    const R=this.cursors.right.isDown ||this.keys.D.isDown||this.touch.right;
    const U=this.cursors.up.isDown    ||this.keys.W.isDown||this.touch.up;
    const D=this.cursors.down.isDown  ||this.keys.S.isDown||this.touch.down;

    let prevFacing=this.facing,moving=false;
    if(L){this.player.x-=3.2;this.facing='left'; moving=true;}
    if(R){this.player.x+=3.2;this.facing='right';moving=true;}
    if(U){this.player.y-=3.2;this.facing='up';   moving=true;}
    if(D){this.player.y+=3.2;this.facing='down';  moving=true;}

    // Animate Donny
    if(this.has('donny_walk')){
      const wKey='walk_'+this.facing, iKey='idle_'+this.facing;
      const cur=this.player.anims.currentAnim?.key;
      if(moving){if(cur!==wKey)this.player.play(wKey,true);}
      else      {if(cur!==iKey)this.player.play(iKey,true);}
    }

    // Bounds
    const b=this.room.walk;
    this.player.x=Phaser.Math.Clamp(this.player.x,b.x+22,b.x+b.width-22);
    this.player.y=Phaser.Math.Clamp(this.player.y,b.y+44,b.y+b.height-5);

    // Holster tracks Donny
    if(this.holsterSprite){
      const off=HOLSTER_OFF[this.facing];
      this.holsterSprite.x=this.player.x+off.x;
      this.holsterSprite.y=this.player.y+off.y;
      this.holsterSprite.setFrame(HOLSTER_F[this.facing]);
    }

    // Van proximity in sand_motel_lot
    if(this.roomId==='sand_motel_lot'&&this.vanSprite){
      const near=Math.abs(this.player.x-this.vanSprite.x)<170&&
                 Math.abs(this.player.y-this.vanSprite.y)<130;
      if(this.vanPrompt) this.vanPrompt.setAlpha(near?1:0);
      if(this._boardBtn) this._boardBtn.setVisible(near);
    } else {
      if(this._boardBtn) this._boardBtn.setVisible(false);
    }

    // Room exits (walk to edge)
    const ex=this.room.exits||{};
    if(this.player.x>WORLD_W-36&&ex.right) this.changeRoom(ex.right,'left');
    if(this.player.x<36         &&ex.left)  this.changeRoom(ex.left,'right');
  }

  changeRoom(id,enterFrom){
    const r=ROOMS[id]; if(!r) return;
    this.drawRoom(id);
    this.player.x=enterFrom==='left'?72:WORLD_W-72;
    this.player.y=r.spawn.y;
    this.room=r;
    if(this.holsterSprite)
      this.holsterSprite.setAlpha(this.pistol.state==='drawn'?0.35:1);
  }
}

/* ─── Launch ─────────────────────────────────────────────────────────── */
new Phaser.Game({
  type:Phaser.AUTO,parent:'game',
  width:W,height:H,
  backgroundColor:'#000',
  pixelArt:true,roundPixels:true,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  input:{activePointers:5},
  scene:[Boot,Title,Dust9]
});
})();
</script>
</body>
</html>
