  const msg = e.message || 'unknown error';

});
window.addEventListener('unhandledrejection', e => {
  const msg = (e.reason && (e.reason.message || e.reason)) || 'unhandled promise rejection';

function selectVanDriveTexture(scene){
  // GLOBAL HARD FIX:
  // This function must exist before createVanAnimations() runs.
  // Missing this function causes:
  // ReferenceError: Can't find variable: selectVanDriveTexture

  const candidates = (typeof VAN_ASSETS !== 'undefined' && VAN_ASSETS.candidates) ? VAN_ASSETS.candidates : [];
  const found = candidates.find(v => scene.textures.exists(v.key));

  if(found){
    VAN.activeDriveKey = found.key;
    VAN.activeLayout = found.layout || '8dir11';
    VAN.driveFrame = { w: found.frameWidth || 128, h: found.frameHeight || 96 };
    VAN.columns = found.columns || 11;
    VAN.idleFrame = {down:0,downRight:11,right:22,upRight:33,up:44,upLeft:55,left:66,downLeft:77};
    console.log('Using Astro Van asset:', found.path);
    return found;
  }

  // No real van file loaded. Use safe generated fallback.
  VAN.activeDriveKey = 'astro_van_safe_right';
  VAN.activeLayout = 'fallback';
  VAN.driveFrame = {w:128,h:96};
  VAN.columns = 1;
  VAN.idleFrame = {down:0,downRight:0,right:0,upRight:0,up:0,upLeft:0,left:0,downLeft:0};
  console.warn('Astro Van real file did not load. Using safe fallback van.');
  return null;
}

function makeInventoryItem(id,qty=1){
  const base=ITEM_DB[id] || {id,name:id,type:'misc',weight:1};
  return {...base,qty};
}

function itemStackWeight(item){
  if(!item)return 0;
  return (Number(item.weight)||0) * (Number(item.qty)||1);
}

function inventoryWeight(items){
  return (items||[]).reduce((sum,item)=>sum+itemStackWeight(item),0);
}

function formatWeight(n){
  n=Number(n)||0;
  return `${Math.round(n*10)/10} lb`;
}

function setupTouch(){
  if(window.__GLASSWELL_TOUCH_READY)return;
  window.__GLASSWELL_TOUCH_READY=true;
  const knob=document.getElementById('stickKnob');
  const label=document.getElementById('moveLabel');
  let active=null,center=null;
  const max=52;
  const prevent=e=>{if(e&&e.cancelable)e.preventDefault()};
  const getCenter=()=>{const el=document.getElementById('stickBase');const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
  const set=(x,y)=>{
    center=center||getCenter();
    let dx=x-center.x,dy=y-center.y;
    const len=Math.hypot(dx,dy);
    if(len>max){dx=dx/len*max;dy=dy/len*max}
    TOUCH.moveX=Math.abs(dx/max)<.06?0:dx/max;
    TOUCH.moveY=Math.abs(dy/max)<.06?0:dy/max;
    TOUCH.active=true;
    if(knob)knob.style.transform=`translate(${dx}px,${dy}px)`;
    if(label)label.textContent='MOVE ON';
  };
  const stop=()=>{
    active=null;center=null;TOUCH.moveX=0;TOUCH.moveY=0;TOUCH.active=false;
    if(knob)knob.style.transform='translate(0,0)';
    if(label)label.textContent='MOVE';
  };
  document.addEventListener('pointerdown',e=>{
    if(e.target.closest&&e.target.closest('.touchBtn,#btnStart'))return;
    if(e.clientX<innerWidth*.50){active=e.pointerId;center=getCenter();set(e.clientX,e.clientY);prevent(e);}
  },{capture:true,passive:false});
  document.addEventListener('pointermove',e=>{if(e.pointerId===active){set(e.clientX,e.clientY);prevent(e)}},{capture:true,passive:false});
  document.addEventListener('pointerup',e=>{if(e.pointerId===active){stop();prevent(e)}},{capture:true,passive:false});
  const bind=(id,prop)=>{
    const el=document.getElementById(id);
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';
    el.addEventListener('pointerdown',e=>{prevent(e);TOUCH[prop]=true;setTimeout(()=>TOUCH[prop]=false,120);},{passive:false});
  };

  const bindYHold=()=>{
    const el=document.getElementById('btnY');
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';

    el.addEventListener('pointerdown',e=>{
      prevent(e);
      TOUCH.yDown=true;
      TOUCH.yDownAt=performance.now();
    },{passive:false});

    el.addEventListener('pointerup',e=>{
      prevent(e);
      const held=performance.now()-(TOUCH.yDownAt||0);
      TOUCH.yDown=false;
      if(held>=520)TOUCH.yHold=true;
      else TOUCH.btnY=true;
      TOUCH.yDownAt=0;
    },{passive:false});

    el.addEventListener('pointercancel',e=>{
      prevent(e);
      TOUCH.yDown=false;
      TOUCH.yDownAt=0;
    },{passive:false});
  };

  bind('btnA','a'); bind('btnB','b'); bind('btnX','xBtn'); bindYHold(); bind('btnStart','start');
}

  if(!scene.textures.exists('donny_fallback')){
    const g=scene.add.graphics();
    g.fillStyle(0,0.35).fillEllipse(64,108,44,10);
    g.fillStyle(0x111111).fillRect(52,84,9,24).fillRect(68,84,9,24);
    g.fillStyle(0x09090b).fillRoundedRect(45,50,38,38,7);
    g.lineStyle(2,0x2f3338).strokeRoundedRect(45,50,38,38,7);
    g.fillStyle(0x2b1b12).fillRoundedRect(54,33,22,18,5);
    g.fillStyle(0x0b0b0c).fillRoundedRect(48,25,34,12,5);
    g.fillStyle(0xd89a25).fillCircle(68,29,3);
    g.generateTexture('donny_fallback',128,128);
    g.destroy();
  }

  createGeneratedVanTextures(scene);

  if(!scene.textures.exists('pickup_dot')){
    const g=scene.add.graphics();
    g.fillStyle(0x76f5ff,1).fillCircle(10,10,8);
    g.lineStyle(2,0x222222,1).strokeCircle(10,10,8);

    g.destroy();

  if(!scene.textures.exists('laser_bolt')){
    const g=scene.add.graphics();
    g.lineStyle(5,0x9ff4ff,1).lineBetween(0,4,34,4);
    g.lineStyle(2,0xffffff,1).lineBetween(6,4,34,4);
    g.generateTexture('laser_bolt',36,8);
    g.destroy();
  }
}

function createGeneratedVanTextures(scene){
  if(scene.textures.exists('astro_van_safe_right'))return;

  const makeSide=(key,flip=false)=>{
    const g=scene.add.graphics();
    g.fillStyle(0x000000,.30).fillEllipse(64,82,100,18);
    g.fillStyle(0x0b101c,1).fillRoundedRect(16,34,96,38,8);
    g.fillStyle(0x293240,1).fillRoundedRect(21,28,78,36,6);
    g.fillStyle(0x111722,1).fillRect(35,21,44,10);
    g.fillStyle(0x6fe7f5,1).fillRect(43,34,30,12);
    g.fillStyle(0x2d3647,1).fillRect(76,36,21,13);
    g.fillStyle(0x9b2378,1).fillRect(29,55,66,5);
    g.fillStyle(0x05070b,1).fillCircle(35,72,10).fillCircle(92,72,10);
    g.fillStyle(0xb5c0c4,1).fillCircle(35,72,4).fillCircle(92,72,4);
    g.fillStyle(0xb88630,1).fillRect(101,43,8,5);
    g.generateTexture(key,128,96);
    g.destroy();

    if(flip){
      const src=scene.textures.get(key).getSourceImage();
      const canvas=scene.textures.createCanvas(key+'_tmp',128,96);
      const ctx=canvas.getContext();
      ctx.translate(128,0);
      ctx.scale(-1,1);
      ctx.drawImage(src,0,0);
      canvas.refresh();
      scene.textures.remove(key);
      scene.textures.renameTexture(key+'_tmp',key);
    }
  };

  const makeFront=(key,back=false)=>{
    const g=scene.add.graphics();
    g.fillStyle(0x000000,.28).fillEllipse(64,82,60,17);
    g.fillStyle(0x0b101c,1).fillRoundedRect(38,20,52,60,7);
    g.fillStyle(0x293240,1).fillRoundedRect(43,25,42,50,5);
    g.fillStyle(0x6fe7f5,1).fillRect(52,30,24,12);
    g.fillStyle(0x9b2378,1).fillRect(47,55,34,5);
    g.fillStyle(0x05070b,1).fillRect(31,46,9,26).fillRect(88,46,9,26);
    if(back){
      g.fillStyle(0xd02030,1).fillRect(45,68,8,6).fillRect(76,68,8,6);
    }else{
      g.fillStyle(0xe8fbff,1).fillRect(45,21,10,5).fillRect(73,21,10,5);
    }
    g.generateTexture(key,128,96);
    g.destroy();
  };

  makeSide('astro_van_safe_right',false);
  makeSide('astro_van_safe_left',true);
  makeFront('astro_van_safe_down',false);
  makeFront('astro_van_safe_up',true);
  makeSide('astro_van_safe_downRight',false);
  makeSide('astro_van_safe_upRight',false);
  makeSide('astro_van_safe_downLeft',true);
  makeSide('astro_van_safe_upLeft',true);
}

function createDonnyAnimations(scene){
  const make=(name,keyName,frames=8,offset=0,loop=true)=>{
    if(!scene.textures.exists(keyName))return;
    Object.entries(DONNY.anims).forEach(([dir,arr])=>{
      const anim=`${name}_${dir}`;
      if(scene.anims.exists(anim))return;
      scene.anims.create({
        key:anim,
        frames:arr.slice(0,frames).map(i=>({key:keyName,frame:i+offset})),
        frameRate: loop ? 8 : 1,
        repeat: loop ? -1 : 0
      });
    });
  };

  // HARD FIX:
  // Idle should not walk/turn in place. Use one locked frame per direction.
  // This fixes Donny sliding left/right while showing the back/up perspective.
  if(scene.textures.exists('donny_idle')){
    Object.entries(DONNY.idleFrame || DONNY.directionFrame).forEach(([dir,frame])=>{
      const anim=`donny_idle_${dir}`;
      if(scene.anims.exists(anim))scene.anims.remove(anim);
      scene.anims.create({
        key:anim,
        frames:[{key:'donny_idle',frame}],
        frameRate:1,
        repeat:-1
      });
    });
  }

  make('donny_walk','donny_overhead',8,0,true);
  make('donny_run','donny_run',8,0,true);
  make('donny_jump','donny_jump',4,0,false);
  make('donny_slide','donny_slide',4,0,false);
  make('donny_crawl','donny_crawl',8,0,true);
  make('donny_punch','donny_punch',8,0,false);
  make('donny_kick','donny_kick',8,0,false);
  make('donny_shoot','donny_pistol',12,0,false);
}

function createVanAnimations(scene){
  const found = selectVanDriveTexture(scene);

  // Real 8-direction, 11-frame-per-row van sheet.
  if(found && found.layout === '8dir11' && scene.textures.exists(VAN.activeDriveKey)){
    const rows=['down','downRight','right','upRight','up','upLeft','left','downLeft'];

    rows.forEach((dir,row)=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;

      const frames=[];
      for(let c=0;c<11;c++){
        frames.push({key:VAN.activeDriveKey,frame:row*11+c});
      }

      scene.anims.create({key:animKey,frames,frameRate:8,repeat:-1});
    });

    VAN.idleFrame={down:0,downRight:11,right:22,upRight:33,up:44,upLeft:55,left:66,downLeft:77};
    return;
  }

  // Real 4-direction fallback sheet.
  if(found && found.layout === '4dir4' && scene.textures.exists(VAN.activeDriveKey)){
    const map={down:0,right:4,left:8,up:12,downRight:4,upRight:4,upLeft:8,downLeft:8};

    Object.entries(map).forEach(([dir,start])=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;

      const frames=[];
      for(let c=0;c<4;c++){
        frames.push({key:VAN.activeDriveKey,frame:start+c});
      }

      scene.anims.create({key:animKey,frames,frameRate:6,repeat:-1});
    });

    VAN.idleFrame={down:0,downRight:4,right:4,upRight:4,up:12,upLeft:8,left:8,downLeft:8};
    return;
  }

  // Safe fallback generated van textures.
  const safeMap={
    right:'astro_van_safe_right',
    left:'astro_van_safe_left',
    down:'astro_van_safe_down',
    up:'astro_van_safe_up',
    downRight:'astro_van_safe_downRight',
    upRight:'astro_van_safe_upRight',
    downLeft:'astro_van_safe_downLeft',
    upLeft:'astro_van_safe_upLeft'
  };

  Object.entries(safeMap).forEach(([dir,key])=>{
    const animKey=VAN.anim[dir];
    if(scene.anims.exists(animKey))return;
    if(scene.textures.exists(key)){
      scene.anims.create({key:animKey,frames:[{key,frame:0}],frameRate:1,repeat:-1});
    }
  });

  VAN.idleFrame={down:0,downRight:0,right:0,upRight:0,up:0,upLeft:0,left:0,downLeft:0};
}

    this.lastMoveInput={x:0,y:1};

    this.jumpVel=0;
    this.routeCooldown=0;
  }

  init(data){this.startPage=data?.pageId||'GLASSWELL_C3';this.startSpawn=data?.spawn||'donny_city_start'}

  create(){
    setupTouch();
    this.keys=this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT,SPACE,X,J,B,K,Y,E,R,ENTER,I,TAB,ESC');
    this.input.keyboard.on('keydown-SPACE',()=>this.handleA());
    this.input.keyboard.on('keydown-X',()=>this.handleX());
    this.input.keyboard.on('keydown-J',()=>this.handleX());
    this.input.keyboard.on('keydown-B',()=>this.handleB());
    this.input.keyboard.on('keydown-K',()=>this.handleB());
    this.yKeyDownAt=0;
    this.input.keyboard.on('keydown-Y',e=>{
      if(e.repeat)return;
      this.yKeyDownAt=this.time.now;
    });
    this.input.keyboard.on('keyup-Y',()=>{
      const held=this.time.now-(this.yKeyDownAt||0);
      this.yKeyDownAt=0;
      if(this.inVan && held>=520)this.toggleHeadlights();
      else this.handleY();
    });

    // E remains a quick interact key for desktop testing.
    this.input.keyboard.on('keydown-E',()=>this.handleY());
    this.input.keyboard.on('keydown-R',()=>this.refillVanFuel(FUEL.max));
    this.input.keyboard.on('keydown-ENTER',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-I',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-TAB',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-ESC',()=>this.isInventoryOpen?this.toggleInventory():this.scene.start('TitleScene'));

    this.makeHud();
    this.loadPage(this.startPage,this.startSpawn);
  }

  makeHud(){
    this.hud=this.add.text(10,8,'',{fontFamily:'Arial Black',fontSize:'13px',color:'#d7faff',backgroundColor:'rgba(0,0,0,.55)',padding:{x:8,y:5}}).setScrollFactor(0).setDepth(20000);

    // In-car HUD gauges: Donny HP on top, car fuel under it.
    this.carGauge=this.add.graphics().setScrollFactor(0).setDepth(20001).setVisible(false);
    this.hpGaugeLabel=this.add.text(12,42,'',{fontFamily:'Arial Black',fontSize:'12px',color:'#ffffff'}).setScrollFactor(0).setDepth(20002).setVisible(false);
    this.fuelGaugeLabel=this.add.text(12,64,'',{fontFamily:'Arial Black',fontSize:'12px',color:'#ffffff'}).setScrollFactor(0).setDepth(20002).setVisible(false);
  }

  updateCarHudGauges(){
    if(!this.carGauge || !this.hpGaugeLabel || !this.fuelGaugeLabel)return;
    const show=!!this.inVan;
    this.carGauge.setVisible(show);
    this.hpGaugeLabel.setVisible(show);
    this.fuelGaugeLabel.setVisible(show);

    if(!show){
      this.carGauge.clear();
      return;
    }

    const x=10;
    const y=40;
    const w=180;
    const h=10;
    const gap=22;

    const hpPct=clamp((this.playerHp||0)/(this.playerMaxHp||100),0,1);
    const fuelPct=clamp((this.vanFuel||0)/(FUEL.max||100),0,1);

    this.carGauge.clear();

    // HP backing and fill.
    this.carGauge.fillStyle(0x08090b,.88).fillRoundedRect(x,y,w,h,3);
    this.carGauge.fillStyle(0x1fef69,1).fillRoundedRect(x,y,w*hpPct,h,3);
    this.carGauge.lineStyle(1,0xffffff,.7).strokeRoundedRect(x,y,w,h,3);

    // Fuel backing and fill.
    this.carGauge.fillStyle(0x08090b,.88).fillRoundedRect(x,y+gap,w,h,3);
    this.carGauge.fillStyle(0xffc43b,1).fillRoundedRect(x,y+gap,w*fuelPct,h,3);
    this.carGauge.lineStyle(1,0xffffff,.7).strokeRoundedRect(x,y+gap,w,h,3);

    this.hpGaugeLabel.setText(`DONNY HP ${Math.ceil(this.playerHp||0)}/${this.playerMaxHp||100}`).setPosition(x,y-17);
    this.fuelGaugeLabel.setText(`ASTRO VAN FUEL ${Math.ceil(this.vanFuel||0)}%`).setPosition(x,y+gap-17);
  }

  loadPage(id,spawnId){
    this.children.list.filter(o=>o.mapObj).forEach(o=>o.destroy());
    this.pageId=id;
    const p=PAGES[id];
    let w,h;
    if(p.synthetic){w=p.width;h=p.height;this.createDesertMap(w,h);}
    else{
      const tex=this.textures.exists(key(id,'base'))?key(id,'base'):null;
      if(tex){
        const img=this.textures.get(tex).getSourceImage();
        w=img.width;h=img.height;
        this.add.image(0,0,tex).setOrigin(0).setDepth(0).setData('mapObj',true);
      } else {
        w=1536;h=1152;this.createDesertMap(w,h);
      }
    }
    this.mapW=w;this.mapH=h;this.data=buildPageData(id,w,h);

    const sp=this.data.spawns[spawnId]||this.data.spawns.donny_city_start||Object.values(this.data.spawns)[0]||{x:w*.5,y:h*.55};
    this.playerX=sp.x;this.playerY=sp.y;
    this.createPlayerSprites();

    if(!this.van || id==='GLASSWELL_C3'){
      this.spawnVanNearDonny();
    } else {
      this.van.setVisible(id===this.vanPage);
    }

    this.spawnStartingFuelCan();

    if(!p.synthetic && this.textures.exists(key(id,'fg'))){
      this.add.image(0,0,key(id,'fg')).setOrigin(0).setDepth(9000).setData('mapObj',true);
    }
    this.cameras.main.setBounds(0,0,w,h);
    this.cameras.main.startFollow(this.inVan?this.van:this.player,true,.12,.12);
    this.message(p.label);
  }

  spawnStartingFuelCan(){
    if(this.pageId!=='GLASSWELL_C3')return;
    if(this.startFuelCanPicked)return;

    if(this.startFuelCan && this.startFuelCan.destroy)this.startFuelCan.destroy();

    const x=clamp((this.playerX||this.mapW*.5)+92,60,this.mapW-60);
    const y=clamp((this.playerY||this.mapH*.55)+46,60,this.mapH-60);

    const tex=this.textures.exists('fuel_can_pickup') ? 'fuel_can_pickup' : 'pickup_dot';
    this.startFuelCan=this.add.image(x,y,tex)
      .setOrigin(.5,1)
      .setScale(tex==='fuel_can_pickup' ? .55 : 1)
      .setDepth(y+700)
      .setData('mapObj',true);
  }

  nearFuelPickup(){
    return !!(this.startFuelCan && this.startFuelCan.visible && !this.inVan && dist(this.playerX,this.playerY,this.startFuelCan.x,this.startFuelCan.y)<58);
  }

  addToPlayer(id,qty=1){
    const item=makeInventoryItem(id,qty);
    if(this.getPlayerWeight()+itemStackWeight(item)>this.playerWeightLimit){
      this.message('Donny inventory full');
      return false;
    }
    const existing=this.playerInventory.find(x=>x.id===id);
    if(existing)existing.qty=(existing.qty||1)+qty;
    else this.playerInventory.push(item);
    this.bag=this.playerInventory;
    this.syncInventoryFlags();
    return true;
  }

  pickupStartingFuelCan(){
    if(!this.nearFuelPickup())return false;
    if(!this.addToPlayer('fuel_can',1))return true;

    this.startFuelCanPicked=true;
    if(this.startFuelCan)this.startFuelCan.destroy();
    this.startFuelCan=null;
    this.message('Picked up fuel can');
    return true;
  }

  createDesertMap(w,h){
    const g=this.add.graphics().setDepth(0).setData('mapObj',true);
    g.fillStyle(0x171411,1).fillRect(0,0,w,h);
    g.fillStyle(0x2a241c,1);
    for(let y=0;y<h;y+=96)g.fillRect(0,y+46,w,2);
    g.fillStyle(0x3a3127,.8);
    for(let x=0;x<w;x+=160)g.fillRect(x,0,2,h);
    g.lineStyle(4,0x6f6254,.9);
    g.strokeRect(80,80,w-160,h-160);
  }

  createPlayerSprites(){
    if(!this.player){
      const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
      this.player=this.add.sprite(this.playerX,this.playerY,texture,0).setOrigin(.5,DONNY.originY || .90).setScale(DONNY.scale).setDepth(this.playerY+1000);
      this.gun=this.add.sprite(this.playerX,this.playerY,GUN_PROP.key,0).setOrigin(.5,.5).setScale(GUN_PROP.scale).setVisible(false).setDepth(this.playerY+1005);
      this.holster=this.add.sprite(this.playerX,this.playerY,HOLSTER.key,0).setOrigin(.5,.5).setScale(HOLSTER.scale).setVisible(false).setDepth(this.playerY+1004);
      this.fuelCan=this.add.sprite(this.playerX,this.playerY,FUEL_CAN_PROP.key,0).setOrigin(.5,.5).setScale(FUEL_CAN_PROP.scale).setVisible(false).setDepth(this.playerY+1007);
    }
    this.player.setPosition(this.playerX,this.playerY).setVisible(!this.inVan).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.updateFuelCanOverlay();
    this.setDonnyIdle();
  }

  spawnVanNearDonny(){
    // Van starts visible with safe fallback, then upgrades to runtime-cropped real sheet.
    const vx=clamp(this.mapW*.46,100,this.mapW-100);
    const vy=clamp(this.mapH*.56,100,this.mapH-100);

    const safeTex=(this.safeVanTextureForDir ? this.safeVanTextureForDir('right') : 'astro_van_safe_right');

    if(!this.van){
      this.van=this.add.sprite(vx,vy,safeTex,0).setOrigin(.5,.68).setScale(VAN.renderScale).setDepth(vy+900);
    } else {
      this.van.setPosition(vx,vy).setVisible(true).setTexture(safeTex);
    }

    this.vanX=this.van.x;
    this.vanY=this.van.y;
    this.vanPage=this.pageId;
    this.vanDir='right';

    this.updateVanVisual(false);
    this.createVanLightObjects();
    this.enableVanPhysics();
  }

  inputVector(){
    let x = Number(TOUCH.moveX) || 0;
    let y = Number(TOUCH.moveY) || 0;

    if(this.keys.LEFT.isDown||this.keys.A.isDown)x-=1;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)x+=1;
    if(this.keys.UP.isDown||this.keys.W.isDown)y-=1;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)y+=1;

    if(!Number.isFinite(x))x=0;
    if(!Number.isFinite(y))y=0;

    // Small deadzone only. Do not erase vertical movement.
    if(Math.abs(x)<.05)x=0;
    if(Math.abs(y)<.05)y=0;

    const len0=Math.hypot(x,y);
    if(len0>1){x/=len0;y/=len0}

    const len=Math.min(1,Math.hypot(x,y));

    return {
      x:Number.isFinite(x)?x:0,
      y:Number.isFinite(y)?y:0,
      len:Number.isFinite(len)?len:0
    };
  }

  directionFromVector(x,y,last='down'){
    x=Number(x)||0;
    y=Number(y)||0;

    const ax=Math.abs(x);
    const ay=Math.abs(y);
    if(ax<.05 && ay<.05)return last;

    // Prioritize vertical if it is a real input.
    if(ay>.08 && ay>=ax*.55)return y>0?'down':'up';
    if(ax>.08)return x>0?'right':'left';
    return y>0?'down':'up';
  }

  vanDirectionFromVector(x,y,last='right'){
    if(Math.abs(x)<.05 && Math.abs(y)<.05)return last;
    const ang=Math.atan2(y,x);
    const oct=Math.round(ang/(Math.PI/4));
    const dirs={0:'right',1:'downRight',2:'down',3:'downLeft',4:'left',"-4":'left',"-3":'upLeft',"-2":'up',"-1":'upRight'};
    return dirs[oct]||last;
  }

  getVanFootprint(){
    if(!this.van || !this.van.visible || this.inVan)return null;
    const bw=VAN.body?.w || 112;
    const bh=VAN.body?.h || 48;
    const oy=VAN.body?.offsetY || -24;
    return {
      x:this.van.x-bw/2,
      y:this.van.y+oy-bh/2,
      w:bw,
      h:bh
    };
  }

  pointInRect(r,x,y){
    return !!r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h;
  }

  canDonnyStandAt(x,y){
    // Keep Donny in the page.
    if(x<20 || y<20 || x>this.mapW-20 || y>this.mapH-20)return false;

    // Van uses a small body/footprint, not the full image rectangle.
    const vanBox=this.getVanFootprint();
    if(!vanBox)return true;

    // If Donny is already inside the van body from a previous build, allow movement that escapes.
    const currentlyInside=this.pointInRect(vanBox,this.playerX,this.playerY);
    const nextInside=this.pointInRect(vanBox,x,y);
    if(!nextInside)return true;
    if(currentlyInside){
      const cx=vanBox.x+vanBox.w/2;
      const cy=vanBox.y+vanBox.h/2;
      const oldD=Math.hypot(this.playerX-cx,this.playerY-cy);
      const newD=Math.hypot(x-cx,y-cy);
      return newD>oldD;
    }
    return false;
  }

  moveDonnyWithCollision(dx,dy){
    if(!dx && !dy)return;

    // First try normal collision-safe move.
    const nx=this.playerX+dx;
    const ny=this.playerY+dy;
    if(this.canDonnyStandAt(nx,ny)){
      this.playerX=nx;
      this.playerY=ny;
      return;
    }

    // Axis separation. This prevents the van from blocking north/south if only one axis is bad.
    if(dy && this.canDonnyStandAt(this.playerX,this.playerY+dy)){
      this.playerY+=dy;
      return;
    }
    if(dx && this.canDonnyStandAt(this.playerX+dx,this.playerY)){
      this.playerX+=dx;
      return;
    }

    // Emergency vertical escape from previous large van-box builds.
    // If user is pressing mostly up/down, let vertical movement happen so Donny can get unstuck.
    if(Math.abs(dy)>Math.abs(dx)*.75){
      this.playerY=clamp(this.playerY+dy,20,this.mapH-20);
    }
  }

  enableVanPhysics(){
    if(!this.physics || !this.van)return;
    if(!this.van.body)this.physics.add.existing(this.van);
    if(this.van.body){
      this.van.body.setAllowGravity(false);
      this.van.body.setImmovable(true);
      this.van.body.setSize(VAN.body?.w || 112, VAN.body?.h || 48, false);
      this.van.body.setOffset(
        (VAN.driveFrame.w-(VAN.body?.w || 112))/2,
        (VAN.driveFrame.h*.58)+(VAN.body?.offsetY || -24)
      );
    }
  }

  burnVanFuel(inputLen,delta){
    if(!this.inVan)return;
    if(this.vanFuel<=0)return;

    const burn=(FUEL.burnPerSecond||2.8)*Math.max(0,inputLen||0)*delta/1000;
    this.vanFuel=clamp(this.vanFuel-burn,0,FUEL.max);

    if(this.vanFuel<=0){
      this.vanFuel=0;
      this.message('Out of fuel');
    }
  }

  canDriveVan(inputLen){
    if((inputLen||0)<=.08)return false;
    if(this.vanFuel>0)return true;

    if(this.time.now-this.lastFuelWarning>(FUEL.emptyWarningCooldown||1400)){
      this.lastFuelWarning=this.time.now;
      this.message('Out of fuel — refill at a fuel station');
    }
    return false;
  }

  refillVanFuel(amount=FUEL.max){
    const before=this.vanFuel;
    this.vanFuel=clamp(this.vanFuel+amount,0,FUEL.max);
    if(this.vanFuel>before)this.message(`Fuel refilled: ${Math.round(this.vanFuel)}%`);
  }

  fuelText(){
    return `${Math.max(0,Math.ceil(this.vanFuel))}%`;
  }

  realVanFrameForDir(dir=this.vanDir,animated=false){
    const base=VAN.idleFrame[dir] ?? 0;

    if(VAN.activeLayout==='8dir11'){
      const step=animated ? Math.floor(this.time.now/95)%11 : 0;
      return base + step;
    }

    if(VAN.activeLayout==='4dir4'){
      const step=animated ? Math.floor(this.time.now/130)%4 : 0;
      return base + step;
    }

    return base;
  }

  safeVanTextureForDir(dir=this.vanDir){
    const keyMap={
      right:'astro_van_safe_right',
      left:'astro_van_safe_left',
      down:'astro_van_safe_down',
      up:'astro_van_safe_up',
      downRight:'astro_van_safe_downRight',
      upRight:'astro_van_safe_upRight',
      downLeft:'astro_van_safe_downLeft',
      upLeft:'astro_van_safe_upLeft'
    };
    return keyMap[dir] || 'astro_van_safe_right';
  }

  realVanFrameForDir(dir=this.vanDir,animated=false){
    const base=VAN.idleFrame[dir] ?? 0;

    if(VAN.activeLayout==='8dir11'){
      const step=animated ? Math.floor(this.time.now/110)%11 : 0;
      return base + step;
    }

    if(VAN.activeLayout==='4dir4'){
      const step=animated ? Math.floor(this.time.now/140)%4 : 0;
      return base + step;
    }

    return 0;
  }

  canUseRealVan(){
    return !!(VAN.activeDriveKey && this.textures.exists(VAN.activeDriveKey) && VAN.activeDriveKey!=='astro_van_drive_fallback');
  }

  vanTextureForDir(dir=this.vanDir){
    const keyMap={
      right:'astro_van_generated_right',
      left:'astro_van_generated_left',
      down:'astro_van_generated_down',
      up:'astro_van_generated_up',
      downRight:'astro_van_generated_downRight',
      upRight:'astro_van_generated_upRight',
      downLeft:'astro_van_generated_downLeft',
      upLeft:'astro_van_generated_upLeft'
    };
    return keyMap[dir] || 'astro_van_generated_right';
  }

  ensureVanCropTexture(){
    if(this.vanCropReady)return this.textures.exists(VAN.cropKey);

    if(!this.textures.exists(VAN.fullImageKey))return false;

    const src=this.textures.get(VAN.fullImageKey).getSourceImage();
    if(!src || !src.width || !src.height)return false;

    const cols=11;
    const rows=8;
    const fw=Math.max(1,Math.floor(src.width/cols));
    const fh=Math.max(1,Math.floor(src.height/rows));

    VAN.cropFrame={w:fw,h:fh};
    VAN.columns=cols;
    VAN.cropReady=true;

    if(this.textures.exists(VAN.cropKey))this.textures.remove(VAN.cropKey);
    this.textures.createCanvas(VAN.cropKey,fw,fh);

    this.vanCropReady=true;
    this.updateVanVisual(false);
    return true;
  }

  vanRuntimeCropAvailable(){
    return !!(this.textures.exists(VAN.fullImageKey) && this.textures.get(VAN.fullImageKey)?.getSourceImage());
  }

  cleanVanRuntimeCrop(ctx,fw,fh){
    // Removes disconnected frame fragments caused by bad sheet slicing.
    // Keeps components that overlap the center of the van frame, plus large components.
    let img;
    try{ img=ctx.getImageData(0,0,fw,fh); }catch(e){ return; }

    const data=img.data;
    const total=fw*fh;
    const seen=new Uint8Array(total);
    const keep=new Uint8Array(total);
    const qx=[];
    const qy=[];

    const alphaAt=(i)=>data[i*4+3];

    for(let y=0;y<fh;y++){
      for(let x=0;x<fw;x++){
        const start=y*fw+x;
        if(seen[start] || alphaAt(start)<18)continue;

        let head=0;
        qx.length=0;
        qy.length=0;
        qx.push(x);
        qy.push(y);
        seen[start]=1;

        const pts=[];
        let minX=x,maxX=x,minY=y,maxY=y;

        while(head<qx.length){
          const cx=qx[head];
          const cy=qy[head++];
          const idx=cy*fw+cx;
          pts.push(idx);

          if(cx<minX)minX=cx;
          if(cx>maxX)maxX=cx;
          if(cy<minY)minY=cy;
          if(cy>maxY)maxY=cy;

          const neighbors=[
            [cx+1,cy],
            [cx-1,cy],
            [cx,cy+1],
            [cx,cy-1]
          ];

          for(const [nx,ny] of neighbors){
            if(nx<0||ny<0||nx>=fw||ny>=fh)continue;
            const ni=ny*fw+nx;
            if(seen[ni]||alphaAt(ni)<18)continue;
            seen[ni]=1;
            qx.push(nx);
            qy.push(ny);
          }
        }

        const area=pts.length;
        const overlapsCenter = maxX>=fw*.18 && minX<=fw*.82 && maxY>=fh*.30;
        const largeEnough = area>=65;
        const huge = area>=380;

        if((largeEnough && overlapsCenter) || huge){
          for(const p of pts)keep[p]=1;
        }
      }
    }

    for(let i=0;i<total;i++){
      if(alphaAt(i)>=18 && !keep[i]){
        data[i*4+3]=0;
      }
    }

    ctx.putImageData(img,0,0);
  }

  renderVanRuntimeCrop(animated=false){
    if(!this.van || !this.vanRuntimeCropAvailable())return false;

    const img=this.textures.get(VAN.fullImageKey).getSourceImage();
    if(!img || !img.width || !img.height)return false;

    const cols=11;
    const rows=8;

    // Use true image dimensions. This still supports imperfect exported sheets.
    const fw=Math.floor(img.width/cols);
    const fh=Math.floor(img.height/rows);

    if(fw<16 || fh<16)return false;

    // Direction correction:
    // - left/downLeft mirror the right/downRight rows.
    // - upRight/upLeft were visually reading as BACK-facing/reversing in-game.
    //   They now use the front diagonal row so NE/NW do not look like the van
    //   is driving backward.
    const sourceDirMap={
      left:'right',
      downLeft:'downRight',
      upRight:'downRight',
      upLeft:'downRight'
    };

    const sourceDir=sourceDirMap[this.vanDir] || this.vanDir;
    const flipX=(this.vanDir==='left' || this.vanDir==='downLeft' || this.vanDir==='upLeft');

    const rowMap={
      down:0,
      downRight:1,
      right:2,
      upRight:3,
      up:4,
      upLeft:5,
      left:6,
      downLeft:7
    };

    const row=rowMap[sourceDir] ?? 2;

    // Freeze to frame 0 for now. This stops cycling through any bad/cropped
    // drive frames until the van sheet is re-exported perfectly.
    const col=0;

    const key=VAN.cropKey || 'astro_van_drive_cropped_runtime';

    if(!this.textures.exists(key)){
      this.textures.createCanvas(key,fw,fh);
      VAN.cropFrame={w:fw,h:fh};
    }

    const tex=this.textures.get(key);
    const canvas=tex.getSourceImage();

    if(canvas.width!==fw || canvas.height!==fh){
      this.textures.remove(key);
      this.textures.createCanvas(key,fw,fh);
    }

    const tex2=this.textures.get(key);
    const ctx=tex2.getContext();

    ctx.clearRect(0,0,fw,fh);
    ctx.save();

    if(flipX){
      ctx.translate(fw,0);
      ctx.scale(-1,1);
      ctx.drawImage(img,col*fw,row*fh,fw,fh,0,0,fw,fh);
    } else {
      ctx.drawImage(img,col*fw,row*fh,fw,fh,0,0,fw,fh);
    }

    ctx.restore();

    // Remove any disconnected edge fragments from neighboring frames.
    if(this.cleanVanRuntimeCrop)this.cleanVanRuntimeCrop(ctx,fw,fh);

    tex2.refresh();

    this.van.setTexture(key);
    this.van.setOrigin(.5,.68);
    this.van.setScale(VAN.renderScale);
    return true;
  }

  updateVanVisual(animated=false){
    if(!this.van)return;

    // First choice: runtime crop from the exact full Astro Van sheet.
    // This prevents cut-off frames and multiple cars showing in one frame.
    if(this.renderVanRuntimeCrop && this.renderVanRuntimeCrop(animated)){
      return;
    }

    // Second choice: safe generated fallback, never invisible.
    const tex=this.safeVanTextureForDir ? this.safeVanTextureForDir(this.vanDir) : 'astro_van_safe_right';
    if(this.textures.exists(tex) && this.van.texture.key!==tex){
      this.van.setTexture(tex);
    }

    this.van.setOrigin(.5,.68);
    this.van.setScale(VAN.renderScale);
  }

  createVanLightObjects(){
    if(this.headlightBeam)return;

    this.headlightBeam=this.add.graphics()
      .setDepth(50)
      .setVisible(false);

    this.headlightCore=this.add.graphics()
      .setDepth(51)
      .setVisible(false);
  }

  getVanForwardVector(){
    const dir=this.vanDir || 'right';
    const map={
      right:{x:1,y:0},
      left:{x:-1,y:0},
      down:{x:0,y:1},
      up:{x:0,y:-1},
      downRight:{x:.707,y:.707},
      downLeft:{x:-.707,y:.707},
      upRight:{x:.707,y:-.707},
      upLeft:{x:-.707,y:-.707}
    };
    return map[dir] || map.right;
  }

  updateVanHeadlights(){
    if(!this.van || !this.headlightBeam || !this.headlightCore)return;

    const visible=this.headlightsOn && this.van.visible;
    this.headlightBeam.setVisible(visible);
    this.headlightCore.setVisible(visible);

    if(!visible){
      this.headlightBeam.clear();
      this.headlightCore.clear();
      return;
    }

    const f=this.getVanForwardVector();
    const side={x:-f.y,y:f.x};
    const originX=this.van.x + f.x*44;
    const originY=this.van.y + f.y*24 - 8;

    const leftLamp={
      x:originX + side.x*HEADLIGHTS.sideSpread,
      y:originY + side.y*HEADLIGHTS.sideSpread
    };
    const rightLamp={
      x:originX - side.x*HEADLIGHTS.sideSpread,
      y:originY - side.y*HEADLIGHTS.sideSpread
    };

    const tip={
      x:originX + f.x*HEADLIGHTS.length,
      y:originY + f.y*HEADLIGHTS.length
    };

    const sideWide={
      x:side.x*HEADLIGHTS.width,
      y:side.y*HEADLIGHTS.width
    };

    this.headlightBeam.clear();
    this.headlightCore.clear();

    // Wide soft cone.
    this.headlightBeam.fillStyle(HEADLIGHTS.color, HEADLIGHTS.alpha);
    this.headlightBeam.beginPath();
    this.headlightBeam.moveTo(leftLamp.x,leftLamp.y);
    this.headlightBeam.lineTo(tip.x+sideWide.x,tip.y+sideWide.y);
    this.headlightBeam.lineTo(tip.x-sideWide.x,tip.y-sideWide.y);
    this.headlightBeam.lineTo(rightLamp.x,rightLamp.y);
    this.headlightBeam.closePath();
    this.headlightBeam.fillPath();

    // Bright center cone.
    this.headlightCore.fillStyle(HEADLIGHTS.coreColor, HEADLIGHTS.coreAlpha);
    this.headlightCore.beginPath();
    this.headlightCore.moveTo(leftLamp.x,leftLamp.y);
    this.headlightCore.lineTo(tip.x+side.x*32,tip.y+side.y*32);
    this.headlightCore.lineTo(tip.x-side.x*32,tip.y-side.y*32);
    this.headlightCore.lineTo(rightLamp.x,rightLamp.y);
    this.headlightCore.closePath();
    this.headlightCore.fillPath();

    // Lamp bulbs.
    this.headlightCore.fillStyle(0xffffff, .95);
    this.headlightCore.fillCircle(leftLamp.x,leftLamp.y,5);
    this.headlightCore.fillCircle(rightLamp.x,rightLamp.y,5);

    this.headlightBeam.setDepth(this.van.y+850);
    this.headlightCore.setDepth(this.van.y+851);
  }

  toggleHeadlights(){
    this.headlightsOn=!this.headlightsOn;
    this.message(this.headlightsOn?'Headlights on':'Headlights off');
  }

  honkHorn(){
    this.hornUntil=this.time.now+380;
    this.message('HONK');
  }

  rearOfVanPoint(){
    if(!this.van)return {x:0,y:0};
    const f=this.getVanForwardVector ? this.getVanForwardVector() : {x:1,y:0};
    return {
      x:this.van.x - f.x*58,
      y:this.van.y - f.y*42
    };
  }

  nearRearOfVan(){
    if(!this.van || !this.van.visible || this.inVan)return false;
    const rear=this.rearOfVanPoint();
    return dist(this.playerX,this.playerY,rear.x,rear.y)<74;
  }

  refuelVanWithCan(){
    if(this.inVan)return false;
    if(!this.hasFuelCan || !this.fuelCanEquipped)return false;
    if(!this.nearRearOfVan())return false;

    if(this.vanFuel>=FUEL.max){
      this.message('Van fuel already full');
      return true;
    }

    // Reuse empty pistol/aiming pose; the fuel can overlay sits at the hand.
    this.actionType='refuel';
    this.actionUntil=this.time.now+650;
    const anim=`donny_shoot_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);

    this.refillVanFuel(FUEL.max);
    this.message('Refueled Astro Van');
    return true;
  }

  handleA(){
    if(this.rearMenuOpen){this.selectRearMenuOption();return}
    if(this.isInventoryOpen){this.useInventory();return}
    if(this.inVan){this.handBrakeVan();return}
    if(this.jumpZ>1 || this.isCrawling)return;
    this.jumpVel=8.8;
    this.actionType='jump';
    this.actionUntil=this.time.now+420;
    this.playDonnyAction('jump');
  }

  handleX(){
    if(this.rearMenuOpen){this.nextRearMenuOption();return}
    if(this.isInventoryOpen){this.nextInventory();return}
    if(this.inVan){
      this.toggleVanMusic();
      return;
    }
    if(this.fuelCanEquipped){
      this.actionType='hold_can';
      this.actionUntil=this.time.now+260;
      const anim=`donny_shoot_${this.playerDir}`;
      if(this.anims.exists(anim))this.player.play(anim,true);
      this.message('Fuel can ready');
      return;
    }
    if(this.weaponEquipped)this.shootPistol();
    else this.punch();
  }

  handleB(){
    if(this.rearMenuOpen){this.closeRearMenu();return}
    if(this.isInventoryOpen){this.dropInventory();return}
    if(this.inVan){this.brakeVan();return}
    if(this.nearRearOfVan && this.nearRearOfVan()){this.openRearMenu();return}
    const input=this.inputVector();
    if(this.isCrawling){this.isCrawling=false;this.setDonnyIdle();this.message('Crawl off');return}
    if(input.y>.55){this.isCrawling=true;this.message('Crawl on');return}
    if(input.len>.25){this.slide(input);return}
    this.kick();
  }

  getVanSpeed(){
    const v=this.vanVel||{x:0,y:0};
    return Math.hypot(v.x||0,v.y||0);
  }

  brakeVan(){
    const speed=this.getVanSpeed();
    if(speed<=18){
      this.exitVan();
      return;
    }
    this.vanVel.x*=0.45;
    this.vanVel.y*=0.45;
    this.message('Brake');
  }

  handBrakeVan(){
    if(!this.inVan)return;
    this.vanHandBrakeUntil=this.time.now+480;
    this.vanVel.x*=0.82;
    this.vanVel.y*=0.82;
    this.message('Handbrake slide');
  }

  toggleVanMusic(){
    this.musicOn=!this.musicOn;
    this.message(this.musicOn?'Music on':'Music off');
  }

  updateVanDrivingPhysics(input,delta){
    if(!this.van)return;

    const dt=Math.min(.05,Math.max(0,delta/1000));
    const h=ASTRO_VAN_HANDLING;
    this.vanVel=this.vanVel||{x:0,y:0};

    const movingInput=(input && input.len>.08);
    const handBraking=this.time.now<this.vanHandBrakeUntil;

    if(movingInput && this.canDriveVan(input.len)){
      const ix=input.x/input.len;
      const iy=input.y/input.len;

      // 8-direction visual facing follows steering input immediately.
      this.vanDir=this.vanDirectionFromVector(input.x,input.y,this.vanDir);

      // Break velocity into forward/input and lateral drift.
      const vx=this.vanVel.x;
      const vy=this.vanVel.y;
      const forward=vx*ix + vy*iy;
      const fx=ix*forward;
      const fy=iy*forward;
      let lx=vx-fx;
      let ly=vy-fy;

      const grip=handBraking ? h.handBrakeGrip : h.lateralGrip;
      lx*=Math.pow(grip,delta/16.67);
      ly*=Math.pow(grip,delta/16.67);

      this.vanVel.x=fx+lx+ix*h.accel*input.len*dt;
      this.vanVel.y=fy+ly+iy*h.accel*input.len*dt;

      this.burnVanFuel(input.len*(.35+this.getVanSpeed()/Math.max(1,h.maxSpeed)),delta);
    } else {
      if(movingInput)this.canDriveVan(input.len);
    }

    const friction=handBraking ? h.handBrakeFriction : (movingInput ? h.driveFriction : h.coastFriction);
    const decay=Math.pow(friction,delta/16.67);
    this.vanVel.x*=decay;
    this.vanVel.y*=decay;

    // Clamp max speed.
    const speed=this.getVanSpeed();
    if(speed>h.maxSpeed){
      const s=h.maxSpeed/speed;
      this.vanVel.x*=s;
      this.vanVel.y*=s;
    }

    // Very slow speed snaps to zero.
    if(this.getVanSpeed()<3 && !movingInput){
      this.vanVel.x=0;
      this.vanVel.y=0;
    }

    let nx=this.van.x+this.vanVel.x*dt;
    let ny=this.van.y+this.vanVel.y*dt;

    // Simple crude collision/bounds bounce.
    let bounced=false;
    if(nx<20 || nx>this.mapW-20){
      nx=clamp(nx,20,this.mapW-20);
      this.vanVel.x*=-h.collisionBounce;
      bounced=true;
    }
    if(ny<20 || ny>this.mapH-20){
      ny=clamp(ny,20,this.mapH-20);
      this.vanVel.y*=-h.collisionBounce;
      bounced=true;
    }
    if(bounced && this.getVanSpeed()>35)this.message('Impact');

    this.van.x=nx;
    this.van.y=ny;

    if(this.getVanSpeed()>18){
      this.vanDir=this.vanDirectionFromVector(this.vanVel.x,this.vanVel.y,this.vanDir);
    }

    if(this.van.body)this.van.body.updateFromGameObject();
    this.updateVanVisual(this.getVanSpeed()>10);
  }

  canEnterVanNow(){
    if(!this.nearVan())return false;
    const input=this.inputVector ? this.inputVector() : {len:0};
    if(input.len>.16){
      this.message('Stop moving, then press Y to enter');
      return false;
    }
    return true;
  }

  handleY(){
    if(this.rearMenuOpen){this.closeRearMenu();return}
    if(this.isInventoryOpen){this.toggleInventory();return}
    if(this.inVan){
      this.honkHorn();
      return;
    }
    if(this.pickupStartingFuelCan && this.pickupStartingFuelCan())return;
    if(this.canEnterVanNow()){this.enterVan();return}
    this.message('No interaction here');
  }

  nearVan(){return this.van && this.van.visible && dist(this.playerX,this.playerY,this.van.x,this.van.y)<VAN.enterDistance}

  enterVan(){
    this.inVan=true;
    this.player.setVisible(false);
    this.gun.setVisible(false);
    this.holster.setVisible(false);
    this.cameras.main.startFollow(this.van,true,.12,.12);
    this.message('Entered Astro Van — B exits');
  }

  exitVan(){
    const off=VAN.exitOffset[this.playerDir]||VAN.exitOffset.down;
    this.inVan=false;
    this.playerX=clamp(this.van.x+off.x,20,this.mapW-20);
    this.playerY=clamp(this.van.y+off.y,20,this.mapH-20);
    this.player.setPosition(this.playerX,this.playerY).setVisible(true);
    this.cameras.main.startFollow(this.player,true,.12,.12);
    this.setDonnyIdle();
    this.message('Exited Astro Van');
  }

  punch(){this.actionType='punch';this.actionUntil=this.time.now+280;this.playDonnyAction('punch');this.message('Punch')}
  kick(){this.actionType='kick';this.actionUntil=this.time.now+320;this.playDonnyAction('kick');this.message('Kick')}
  slide(input){
    this.actionType='slide';this.slideUntil=this.time.now+360;this.actionUntil=this.slideUntil;this.slideVec={x:input.x,y:input.y};
    this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    this.playDonnyAction('slide');
    this.message('Slide');
  }

  shootPistol(){
    if(this.pistolAmmo<=0){this.message('Pistol empty');return}
    this.pistolAmmo--;
    this.actionType='shoot';
    this.actionUntil=this.time.now+ACTION.shootDuration;
    this.playDonnyAction('shoot');
    this.spawnLaserBolt();
    this.message('Pistol fired');
  }

  spawnLaserBolt(){
    const v={down:{x:0,y:1},right:{x:1,y:0},left:{x:-1,y:0},up:{x:0,y:-1}}[this.playerDir]||{x:1,y:0};
    const h=GUN_PROP.hand[this.playerDir]||GUN_PROP.hand.right;
    const bolt=this.add.image(this.playerX+h.x+v.x*34,this.playerY+h.y+v.y*34,'laser_bolt').setDepth(this.playerY+1200);
    if(this.playerDir==='down')bolt.setAngle(90);
    if(this.playerDir==='up')bolt.setAngle(-90);
    if(this.playerDir==='left')bolt.setAngle(180);
    this.tweens.add({targets:bolt,x:bolt.x+v.x*220,y:bolt.y+v.y*220,alpha:0,duration:280,onComplete:()=>bolt.destroy()});
  }

  setDonnyVisual(mode='idle'){
    if(!this.player)return;

    const tex=this.player.texture ? this.player.texture.key : '';
    const usingClean = tex==='donny_idle_4dir_clean' || tex==='donny_walk_right_clean' || tex==='donny_walk_up_clean' || tex==='donny_walk_down_clean' || tex==='donny_shoot_right_empty_clean';
    const dirScale=(DONNY.dirScale && DONNY.dirScale[this.playerDir]) ? DONNY.dirScale[this.playerDir] : DONNY.scale;
    this.player.setScale(usingClean ? DONNY.cleanScale : dirScale);
    this.player.setOrigin(.5,DONNY.originY || .90);
  }

  playDonnyAction(action){
    this.setDonnyVisual('action');

    // Use the new empty-hand shooting sheet for side shooting.
    // The gun stays a separate overlay and attaches to the hand.
    if(action==='shoot' && this.textures.exists('donny_shoot_right_empty_clean') && (this.playerDir==='right' || this.playerDir==='left')){
      this.player.stop();
      this.player.setTexture('donny_shoot_right_empty_clean');
      this.player.setFlipX(this.playerDir==='left');
      this.setDonnyVisual('action');
      if(this.anims.exists('donny_shoot_right_empty_clean_anim')){
        this.player.play('donny_shoot_right_empty_clean_anim',true);
      } else {
        this.player.setFrame(0);
      }
      return;
    }

    this.player.setFlipX(false);
    const keyName= action==='shoot' ? 'donny_shoot' : `donny_${action}`;
    const anim=`${keyName}_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);
  }

  forceDirectionalSheet(textureKey,mode='walk'){
    // Use transparent Phaser-ready clean sheets first.
    if(mode==='walk'){
      if((this.playerDir==='right' || this.playerDir==='left') && this.textures.exists('donny_walk_right_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_right_clean');
        this.player.setFlipX(this.playerDir==='left');
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_right_clean_anim')){
          this.player.play('donny_walk_right_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }

      if(this.playerDir==='up' && this.textures.exists('donny_walk_up_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_up_clean');
        this.player.setFlipX(false);
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_up_clean_anim')){
          this.player.play('donny_walk_up_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }

      if(this.playerDir==='down' && this.textures.exists('donny_walk_down_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_down_clean');
        this.player.setFlipX(false);
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_down_clean_anim')){
          this.player.play('donny_walk_down_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }
    }

    this.player.setFlipX(false);
    if(!this.textures.exists(textureKey))return false;
    const base=DONNY.directionFrame[this.playerDir] ?? 0;
    const frame=base + (Math.floor(this.time.now/105)%8);
    this.player.stop();
    this.player.setTexture(textureKey);
    this.player.setFrame(frame);
    this.setDonnyVisual(mode);
    return true;
  }

  setDonnyIdle(){
    // Use the clean 4-direction idle sheet first.
    if(this.textures.exists('donny_idle_4dir_clean')){
      this.player.stop();
      this.player.setTexture('donny_idle_4dir_clean');
      this.player.setFlipX(false);

      const anim=`donny_idle_clean_${this.playerDir}`;
      if(this.anims.exists(anim)){
        this.player.play(anim,true);
      } else {
        const frame=(DONNY.cleanIdleFrame && DONNY.cleanIdleFrame[this.playerDir]) || 24;
        this.player.setFrame(frame);
      }

      this.setDonnyVisual('idle');
      return;
    }

    this.player.setFlipX(false);
    const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
    this.player.stop();
    this.player.setTexture(texture);
    this.player.setFrame(DONNY.directionFrame[this.playerDir]||0);
    this.setDonnyVisual('idle');
  }

  updateFuelCanOverlay(){
    if(!this.fuelCan)return;

    const visible = this.fuelCanEquipped && !this.inVan && !this.isCrawling;
    const frame = FUEL_CAN_PROP.directionFrame[this.playerDir] ?? 1;
    const hand = FUEL_CAN_PROP.hand[this.playerDir] || FUEL_CAN_PROP.hand.right;

    this.fuelCan
      .setFrame(frame)
      .setScale(FUEL_CAN_PROP.scale)
      .setPosition(this.playerX+hand.x, this.playerY+hand.y-this.jumpZ)
      .setDepth(this.playerY+1007)
      .setVisible(visible);
  }

  updateGunOverlay(){
    if(!this.gun || !this.holster)return;

    const now=this.time?.now||0;
    const shooting =
      this.weaponEquipped && !this.fuelCanEquipped &&
      this.actionType==='shoot' &&
      now>=this.actionUntil-ACTION.shootDuration+ACTION.gunShowDelay &&
      now<this.actionUntil-ACTION.gunHideBeforeEnd;

    const gunFrame = GUN_PROP.directionFrame[this.playerDir] ?? 1;
    const hand = GUN_PROP.hand[this.playerDir] || GUN_PROP.hand.right;

    this.gun
      .setFrame(gunFrame)
      .setScale(GUN_PROP.scale)
      .setPosition(this.playerX+hand.x, this.playerY+hand.y-this.jumpZ)
      .setDepth(this.playerY+1006)
      .setVisible(shooting && !this.inVan);

    const holsterFrame = HOLSTER.directionFrame[this.playerDir] ?? 0;
    const hip = HOLSTER.hip[this.playerDir] || HOLSTER.hip.down;

    // Hip placement matches the white dot reference from the screenshot.
    this.holster
      .setFrame(holsterFrame)
      .setScale(HOLSTER.scale)
      .setPosition(this.playerX+hip.x, this.playerY+hip.y-this.jumpZ)
      .setDepth(this.playerY+1004)
      .setVisible(HOLSTER.enabled && this.weaponEquipped && !this.fuelCanEquipped && !shooting && !this.inVan && !this.isCrawling);
  }

  toggleInventory(){
    this.isInventoryOpen=!this.isInventoryOpen;
    if(this.isInventoryOpen)this.openInventory(); else this.closeInventory();
  }
  getPlayerWeight(){
    return inventoryWeight(this.playerInventory);
  }

  getCarWeightLimit(){
    return this.carPurchased ? this.carPurchasedWeightLimit : this.carBaseWeightLimit;
  }

  getCarWeight(){
    return inventoryWeight(this.carInventory);
  }

  hasItem(id){
    return (this.playerInventory||[]).some(item=>item.id===id && (item.qty||1)>0);
  }

  removePlayerItem(id,qty=1){
    const item=(this.playerInventory||[]).find(x=>x.id===id);
    if(!item)return false;
    item.qty=(item.qty||1)-qty;
    if(item.qty<=0)this.playerInventory=this.playerInventory.filter(x=>x!==item);
    this.bag=this.playerInventory;
    return true;
  }

  addToCar(id,qty=1){
    const item=makeInventoryItem(id,qty);
    if(this.getCarWeight()+itemStackWeight(item)>this.getCarWeightLimit()){
      this.message('Car inventory full');
      return false;
    }
    const existing=this.carInventory.find(x=>x.id===id);
    if(existing)existing.qty=(existing.qty||1)+qty;
    else this.carInventory.push(item);
    return true;
  }

  syncInventoryFlags(){
    this.hasFuelCan=this.hasItem('fuel_can');
    if(!this.hasFuelCan)this.fuelCanEquipped=false;
    if(this.fuelCanEquipped)this.weaponEquipped=false;
  }

  openRearMenu(){
    if(this.rearMenuOpen)return;
    this.syncInventoryFlags();
    this.rearMenuOpen=true;
    this.rearMenuIndex=0;
    this.openRearMenuUI();
  }

  closeRearMenu(){
    this.rearMenuOpen=false;
    if(this.rearBox)this.rearBox.setVisible(false);
    this.message('Rear menu closed');
  }

  openRearMenuUI(){
    if(!this.rearBox){
      this.rearBox=this.add.container(0,0).setScrollFactor(0).setDepth(31000);
      const bg=this.add.rectangle(480,270,690,360,0x030506,.94).setStrokeStyle(3,0xff2aa1,.9);
      const title=this.add.text(150,92,'ASTRO VAN REAR MENU',{fontFamily:'Arial Black',fontSize:'22px',color:'#9ff4ff'});
      this.rearText=this.add.text(150,135,'',{fontFamily:'Courier New',fontSize:'16px',color:'#f4e7c2',lineSpacing:8});
      const help=this.add.text(150,410,'A select | X/Stick down next | B/Y walk away',{fontFamily:'Courier New',fontSize:'14px',color:'#d9b46a'});
      this.rearBox.add([bg,title,this.rearText,help]);
    }
    this.rearBox.setVisible(true);
    this.refreshRearMenu();
  }

  refreshRearMenu(){
    if(!this.rearText)return;
    const carLimit=this.getCarWeightLimit();
    const lines=[
      `Fuel: ${this.fuelText()}`,
      `Donny Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      `Car Storage: ${formatWeight(this.getCarWeight())} / ${formatWeight(carLimit)}${this.carPurchased?'':' (400 lb after purchase)'}`,
      '',
      'Rear Options:'
    ];

    this.rearMenuOptions.forEach((opt,i)=>{
      lines.push(`${i===this.rearMenuIndex?'▶':' '} ${opt}`);
    });

    this.rearText.setText(lines.join('\n'));
  }

  nextRearMenuOption(){
    this.rearMenuIndex=(this.rearMenuIndex+1)%this.rearMenuOptions.length;
    this.refreshRearMenu();
  }

  selectRearMenuOption(){
    const opt=this.rearMenuOptions[this.rearMenuIndex];
    if(opt==='Check Car Inventory'){
      this.showCarInventoryMenu();
      return;
    }
    if(opt==='Refuel'){
      this.refuelFromRearMenu();
      return;
    }
    this.closeRearMenu();
  }

  showCarInventoryMenu(){
    const carLimit=this.getCarWeightLimit();
    const lines=[
      `CAR INVENTORY`,
      `Storage: ${formatWeight(this.getCarWeight())} / ${formatWeight(carLimit)}`,
      this.carPurchased?'Purchased storage: 400 lb':'Unpurchased storage: 200 lb',
      '',
      ...(this.carInventory.length ? this.carInventory.map(item=>`- ${item.name} x${item.qty||1} = ${formatWeight(itemStackWeight(item))}`) : ['- empty']),
      '',
      `Donny Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      '',
      'B/Y = walk away'
    ];
    if(this.rearText)this.rearText.setText(lines.join('\n'));
  }

  refuelFromRearMenu(){
    this.syncInventoryFlags();
    if(!this.hasFuelCan){
      this.message('Need a fuel can');
      this.refreshRearMenu();
      return;
    }
    if(this.vanFuel>=FUEL.max){
      this.message('Van fuel already full');
      this.refreshRearMenu();
      return;
    }

    // Fuel can can be carried or equipped. If carried, Donny uses it for this action.
    this.fuelCanEquipped=true;
    this.weaponEquipped=false;

    this.actionType='refuel';
    this.actionUntil=this.time.now+650;
    const anim=`donny_shoot_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);

    this.refillVanFuel(FUEL.max);
    this.message('Refueled Astro Van');
    this.closeRearMenu();
  }

  updateRearMenuInput(now,input){
    if(!this.rearMenuOpen)return;
    if(now<this.rearMenuNavCooldown)return;
    if((input&&input.y>.45) || TOUCH.xBtn){
      TOUCH.xBtn=false;
      this.nextRearMenuOption();
      this.rearMenuNavCooldown=now+220;
    }
  }

  openInventory(){
    if(!this.invBox){
      this.invBox=this.add.container(0,0).setScrollFactor(0).setDepth(30000);
      const bg=this.add.rectangle(480,270,740,410,0x030506,.93).setStrokeStyle(3,0x67dce8,.85);
      this.invText=this.add.text(140,110,'',{fontFamily:'Courier New',fontSize:'16px',color:'#f4e7c2',lineSpacing:8});
      const title=this.add.text(140,70,'DONNY INVENTORY',{fontFamily:'Arial Black',fontSize:'24px',color:'#9ff4ff'});
      const help=this.add.text(140,430,'A equip/unequip/use | B drop | X next | Y/START close',{fontFamily:'Courier New',fontSize:'14px',color:'#d9b46a'});
      this.invBox.add([bg,title,this.invText,help]);
    }
    this.invBox.setVisible(true);this.refreshInventory();
  }
  closeInventory(){if(this.invBox)this.invBox.setVisible(false);this.message('Inventory closed')}
  refreshInventory(){
    if(!this.invText)return;
    this.syncInventoryFlags();
    const lines=[
      `DONNY INVENTORY`,
      `Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      `Weapon: ${this.weaponEquipped?'Pistol equipped':'empty'}`,
      `Ammo: ${this.pistolAmmo}/24`,
      `Astro Van Fuel: ${this.fuelText()}`,
      '',
      'Items:'
    ];

    if(this.playerInventory.length){
      this.playerInventory.forEach(item=>{
        let tag='';
        if(item.id==='fuel_can' && this.fuelCanEquipped)tag=' [EQUIPPED]';
        if(item.id==='laser_pistol' && this.weaponEquipped)tag=' [EQUIPPED]';
        lines.push(`- ${item.name} x${item.qty||1} — ${formatWeight(itemStackWeight(item))}${tag}`);
      });
    } else {
      lines.push('- empty');
    }

    lines.push('');
    lines.push('A = toggle fuel can / pistol');
    lines.push('B = drop equipped fuel can or unequip pistol');

    this.invText.setText(lines.join('\n'));
  }
  useInventory(){
    this.syncInventoryFlags();
    if(this.hasFuelCan && !this.fuelCanEquipped){
      this.fuelCanEquipped=true;
      this.weaponEquipped=false;
      this.refreshInventory();
      this.message('Fuel can equipped');
      return;
    }

    if(this.fuelCanEquipped){
      this.fuelCanEquipped=false;
      this.weaponEquipped=this.hasItem('laser_pistol');
      this.refreshInventory();
      this.message(this.weaponEquipped?'Pistol equipped':'Hands empty');
      return;
    }

    this.weaponEquipped=!this.weaponEquipped;
    this.refreshInventory();
    this.message(this.weaponEquipped?'Pistol equipped':'Pistol unequipped');
  }
  nextInventory(){this.refreshInventory()}
  dropInventory(){
    if(this.fuelCanEquipped){
      this.fuelCanEquipped=false;
      this.hasFuelCan=false;
      this.refreshInventory();
      this.message('Dropped fuel can');
      return;
    }
    if(this.weaponEquipped){
      this.weaponEquipped=false;
      this.refreshInventory();
      this.message('Dropped/unequipped pistol');
    }
  }

  message(t){
    this.prompt.setText(t);
    this.time.delayedCall(1700,()=>{if(this.prompt.text===t)this.prompt.setText('')});
  }

  checkRoutes(){
    if(this.time.now<this.routeCooldown)return;

    const x=this.inVan?this.van.x:this.playerX;
    const y=this.inVan?this.van.y:this.playerY;

    // Reliable C3 test transitions.
    if(this.pageId==='GLASSWELL_C3'){
      if(y < this.mapH*.12){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_C2','south_entry_from_C3');return;}
      if(y > this.mapH*.88){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_C4','north_entry_from_C3');return;}
      if(x > this.mapW*.92){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_D3','west_entry_from_C3');return;}
      if(x < this.mapW*.08){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_B3_DESERT_TEST','east_entry_from_C3');return;}
    }

    const routes=this.data?.routes||[];
    const r=routes.find(rt=>rectHit(rt.r,x,y));
    if(r&&r.to){
      this.routeCooldown=this.time.now+800;
      this.loadPage(r.to,r.spawn);
    }
  }

  updateJump(delta){
    if(this.jumpZ>0 || this.jumpVel>0){
      this.jumpZ+=this.jumpVel*delta/16.67;
      this.jumpVel-=0.65*delta/16.67;
      if(this.jumpZ<=0){this.jumpZ=0;this.jumpVel=0}
    }
  }

  update(_,delta){
    const now=this.time.now;
    if(TOUCH.a){TOUCH.a=false;this.handleA()}
    if(TOUCH.xBtn){TOUCH.xBtn=false;this.handleX()}
    if(TOUCH.b){TOUCH.b=false;this.handleB()}
    if(TOUCH.yHold){TOUCH.yHold=false;if(this.inVan)this.toggleHeadlights();else this.handleY()}
    if(TOUCH.btnY){TOUCH.btnY=false;this.handleY()}
    if(TOUCH.start){TOUCH.start=false;this.toggleInventory()}

    this.updateJump(delta);
    this.updateVanHeadlights();

    const input=this.inputVector();

    if(this.rearMenuOpen){
      this.updateRearMenuInput(now,input);
      this.updateGunOverlay();
      this.updateFuelCanOverlay();
      this.updateCarHudGauges();
      return;
    }

    if(this.isInventoryOpen){this.updateGunOverlay();this.updateFuelCanOverlay();this.updateCarHudGauges();return}

    let moving=input.len>.055;
    if(moving){
      this.lastMoveUntil=now+120;
      this.lastMoveInput={x:input.x,y:input.y};
    } else if(now<this.lastMoveUntil){
      moving=true;
      input.x=this.lastMoveInput.x;
      input.y=this.lastMoveInput.y;
      input.len=Math.min(1,Math.hypot(input.x,input.y));
    }

    if(this.inVan){
      this.updateVanDrivingPhysics(input,delta);
      this.van.setDepth(this.van.y+900);
      this.updateVanHeadlights();
      this.updateCarHudGauges();
      this.checkRoutes();
      this.hud.setText(`${PAGES[this.pageId].label} | Astro Van | ${Math.round(this.van.x)},${Math.round(this.van.y)}`);
      this.status.setText(`Fuel ${this.fuelText()} | Speed ${Math.round(this.getVanSpeed())} | ${this.musicOn?'Music on':'Music off'} | B brake/exit stopped | A handbrake | hold Y lights | tap Y horn`);
      return;
    }

    if(moving){
      if(this.moveHoldStart===0)this.moveHoldStart=now;
      this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    } else {
      this.moveHoldStart=0;
    }

    let speed=DONNY.speed;
    let mode='WALK';
    if(this.isCrawling){speed=DONNY.crawlSpeed;mode='CRAWL'}
    else if(false && moving && input.len>.72 && now-this.moveHoldStart>350){speed=DONNY.runSpeed;mode='RUN'}

    if(this.actionType==='slide' && now<this.slideUntil){
      const sv=this.slideVec||input;
      this.moveDonnyWithCollision(sv.x*390*delta/1000, sv.y*390*delta/1000);
    } else if(moving && !(now<this.actionUntil && ['punch','kick','shoot','refuel','hold_can'].includes(this.actionType))){
      this.moveDonnyWithCollision(input.x*speed*delta/1000, input.y*speed*delta/1000);
    }

    if(now>this.actionUntil && this.actionType){this.actionType='';}
    if(!this.actionType){
      if(this.isCrawling && moving && this.anims.exists(`donny_crawl_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('crawl');this.player.play(`donny_crawl_${this.playerDir}`,true);}
      else if(mode==='RUN' && moving && this.anims.exists(`donny_run_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('run');this.player.play(`donny_run_${this.playerDir}`,true);}
      else if(moving && this.forceDirectionalSheet('donny_overhead','walk')){}
      else if(moving && this.anims.exists(`donny_walk_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('walk');this.player.play(`donny_walk_${this.playerDir}`,true);}
      else this.setDonnyIdle();
    }

    this.player.setPosition(this.playerX,this.playerY-this.jumpZ).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.updateFuelCanOverlay();
    this.updateVanHeadlights();
    this.checkRoutes();

    this.updateCarHudGauges();

    if(this.nearFuelPickup && this.nearFuelPickup())this.prompt.setText('Y: pick up fuel can');
    else if(this.nearRearOfVan && this.nearRearOfVan())this.prompt.setText('B: rear menu');
    else if(this.nearVan())this.prompt.setText('Y: enter Astro Van (action)');
    this.hud.setText(`${PAGES[this.pageId].label} | Donny | HP ${Math.ceil(this.playerHp||0)}/${this.playerMaxHp||100} | ${Math.round(this.playerX)},${Math.round(this.playerY)} | 2.5D GTA-style open-city sci-fi RPG / brawler`);
    this.status.setText(`${this.fuelCanEquipped?'Fuel can equipped':(this.weaponEquipped?'Pistol equipped':'Hands empty')} | Load ${formatWeight(this.getPlayerWeight())}/${formatWeight(this.playerWeightLimit)} | Car ${formatWeight(this.getCarWeight())}/${formatWeight(this.getCarWeightLimit())} | Fuel ${this.fuelText()}`);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:'game',
  width:GAME_W,
  height:GAME_H,
  backgroundColor:'#000',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{
    default:'arcade',
    arcade:{
      gravity:{x:0,y:0},
      debug:false
    }
  },
  render:{pixelArt:true,antialias:false},
  scene:[BootScene,TitleScene,MapScene]
});
</script>
