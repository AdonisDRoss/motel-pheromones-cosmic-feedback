function showBootError(message){
  const box=document.getElementById('bootError');
  if(!box)return;
  box.style.display='block';
  box.textContent=message;
}

  const msg = e.message || 'unknown error';
  if(String(msg).toLowerCase().includes('failed to start the audio device')){
    console.warn('Ignored browser audio warning:', msg);
    return;
  }
  showBootError('GAME ERROR: ' + msg);
});
window.addEventListener('unhandledrejection', e => {
  const msg = (e.reason && (e.reason.message || e.reason)) || 'unhandled promise rejection';

const TOUCH = {x:0,y:0,active:false,a:false,b:false,xBtn:false,y:false,start:false};

function setupTouch(){
  if(window.__GLASSWELL_TOUCH_READY)return;
  window.__GLASSWELL_TOUCH_READY=true;

  const knob=document.getElementById('stickKnob');
  const label=document.getElementById('moveLabel');
  let active=null,center=null;
  const max=52;
  const prevent=e=>{if(e&&e.cancelable)e.preventDefault()};
  const getCenter=()=>{
    const el=document.getElementById('stickBase');
    const r=el.getBoundingClientRect();
    return{x:r.left+r.width/2,y:r.top+r.height/2};
  };
  const set=(x,y)=>{
    center=center||getCenter();
    let dx=x-center.x,dy=y-center.y;
    const len=Math.hypot(dx,dy);
    if(len>max){dx=dx/len*max;dy=dy/len*max}
    TOUCH.x=Math.abs(dx/max)<.08?0:dx/max;
    TOUCH.y=Math.abs(dy/max)<.08?0:dy/max;
    TOUCH.active=true;
    if(knob)knob.style.transform=`translate(${dx}px,${dy}px)`;
    if(label)label.textContent='MOVE ON';
  };
  const stop=()=>{
    active=null;center=null;
    TOUCH.x=0;TOUCH.y=0;TOUCH.active=false;
    if(knob)knob.style.transform='translate(0,0)';
    if(label)label.textContent='MOVE';
  };

  document.addEventListener('pointerdown',e=>{
    if(e.target.closest&&e.target.closest('.touchBtn,#btnStart'))return;
    if(e.clientX<innerWidth*.50){
      active=e.pointerId;center=getCenter();set(e.clientX,e.clientY);prevent(e);
    }
  },{capture:true,passive:false});

  document.addEventListener('pointermove',e=>{
    if(e.pointerId===active){set(e.clientX,e.clientY);prevent(e)}
  },{capture:true,passive:false});

  document.addEventListener('pointerup',e=>{
    if(e.pointerId===active){stop();prevent(e)}
  },{capture:true,passive:false});

  const bind=(id,prop)=>{
    const el=document.getElementById(id);
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';
    el.addEventListener('pointerdown',e=>{
      prevent(e);
      TOUCH[prop]=true;
      setTimeout(()=>TOUCH[prop]=false,120);
    }, {passive:false});
  };
  bind('btnA','a');
  bind('btnB','b');
  bind('btnX','xBtn');
  bind('btnY','y');
  bind('btnStart','start');
}

class BootScene extends Phaser.Scene{
  constructor(){super('BootScene')}

  preload(){
    this.cameras.main.setBackgroundColor('#050608');
    this.add.text(480,240,'LOADING GLASSWELL...',{
      fontFamily:'Arial Black',
      fontSize:'26px',
      color:'#9ff4ff'
    }).setOrigin(.5);
    this.add.text(480,278,'Loading maps, Donny, van, weapons, and audio',{
      fontFamily:'Courier New',
      fontSize:'15px',
      color:'#ffffff'
    }).setOrigin(.5);
    this.load.setCORS('anonymous');
    this.badAssets=[];
    this.load.on('loaderror', file => this.badAssets.push(file && (file.src || file.key) || 'unknown asset'));

    Object.values(PAGES).forEach(p=>{
      if(p.synthetic)return;
      this.load.image(key(p.id,'base'),version(p.root+p.base));
      this.load.image(key(p.id,'fg'),version(p.root+p.fg));
      this.load.image(key(p.id,'mask'),version(p.root+p.mask));
    });

    this.load.spritesheet('donny_idle',version(DONNY_ASSETS.idle),{frameWidth:DONNY.frameWidth,frameHeight:DONNY.frameHeight});
    this.load.spritesheet('donny_overhead',version(DONNY_ASSETS.move),{frameWidth:DONNY.frameWidth,frameHeight:DONNY.frameHeight});
    this.load.spritesheet('donny_run',version(DONNY_ASSETS.run),{frameWidth:DONNY.frameWidth,frameHeight:DONNY.frameHeight});
    this.load.spritesheet('donny_jump',version(DONNY_ASSETS.jump),{frameWidth:ACTION.frameWidth,frameHeight:ACTION.frameHeight});
    this.load.spritesheet('donny_slide',version(DONNY_ASSETS.slide),{frameWidth:ACTION.frameWidth,frameHeight:ACTION.frameHeight});
    this.load.spritesheet('donny_crawl',version(DONNY_ASSETS.crawl),{frameWidth:DONNY.frameWidth,frameHeight:DONNY.frameHeight});
    this.load.spritesheet('donny_pistol',version(DONNY_ASSETS.pistol),{frameWidth:ACTION.frameWidth,frameHeight:ACTION.frameHeight});
    this.load.spritesheet('donny_punch',version(DONNY_ASSETS.punch),{frameWidth:ACTION.frameWidth,frameHeight:ACTION.frameHeight});
    this.load.spritesheet('donny_kick',version(DONNY_ASSETS.kick),{frameWidth:ACTION.frameWidth,frameHeight:ACTION.frameHeight});
    this.load.spritesheet('donny_laser_gun_overlay',version(DONNY_ASSETS.laserOverlay),{frameWidth:GUN_PROP.frameWidth,frameHeight:GUN_PROP.frameHeight});

    this.load.spritesheet('weapon_pickups',version(WEAPON_ASSETS.pickups),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('weapon_overlay',version(WEAPON_ASSETS.overlay),{frameWidth:128,frameHeight:128});
    this.load.spritesheet('weapon_fx',version(WEAPON_ASSETS.fx),{frameWidth:128,frameHeight:128});

    this.load.spritesheet(VAN.driveKey,version(VAN_ASSETS.drive),{frameWidth:VAN.driveFrame.w,frameHeight:VAN.driveFrame.h,margin:0,spacing:0});
    this.load.spritesheet(VAN.openKey,version(VAN_ASSETS.open),{frameWidth:VAN.openFrame.w,frameHeight:VAN.openFrame.h,margin:0,spacing:0});
    if(DONNY_ASSETS.oldVan){ this.load.spritesheet('astro_van_old',version(DONNY_ASSETS.oldVan),{frameWidth:320,frameHeight:320}); }

    this.load.audio('glasswell_theme', version(AUDIO_ASSETS.glasswellTheme));
  }

  create(){
    createFallbackTextures(this);
    createDonnyAnimations(this);
    createVanAnimations(this);

    if(this.badAssets.length){
      console.warn('Missing/failed assets:',this.badAssets);
    }

    this.scene.start('TitleScene');
  }
}

function createDonnyAnimations(scene){
  const dirs=['down','right','left','up'];
  const make=(prefix,textureKey,frameRate=8,repeat=-1)=>{
    if(!scene.textures.exists(textureKey))return;
    dirs.forEach(dir=>{
      const animKey=`${prefix}_${dir}`;
      if(scene.anims.exists(animKey))return;
      scene.anims.create({
        key:animKey,
        frames:DONNY.anims[dir].map(frame=>({key:textureKey,frame})),
        frameRate,
        repeat
      });
    });
  };

  make('donny_walk','donny_overhead',8,-1);
  make('donny_run','donny_run',11,-1);
  make('donny_crawl','donny_crawl',6,-1);

  // Action sheets use 8 frames per direction row.
  make('donny_punch','donny_punch',14,0);
  make('donny_kick','donny_kick',14,0);
  make('donny_jump','donny_jump',10,0);
  make('donny_slide','donny_slide',13,0);
  make('donny_shoot','donny_pistol',12,0);
}

function createVanAnimations(scene){
  const make=(animKey,textureKey,start,end,frameRate,repeat)=>{
    if(scene.anims.exists(animKey))return;
    scene.anims.create({
      key:animKey,
      frames:scene.anims.generateFrameNumbers(textureKey,{start,end}),
      frameRate,
      repeat
    });
  };

  if(scene.textures.exists(VAN.driveKey)){
    const makeFrames=(animKey,frames,frameRate=7,repeat=-1)=>{
      if(scene.anims.exists(animKey))return;
      scene.anims.create({
        key:animKey,
        frames:frames.map(frame=>({key:VAN.driveKey,frame})),
        frameRate,
        repeat
      });
    };

    // Stable single-frame drive anims. The source sheet contains mixed angles, so looping
    // several frames makes the van spin. Use static direction frames for stable driving.
    makeFrames('astro_van_drive_down',[0],1,-1);
    makeFrames('astro_van_drive_right',[3],1,-1);
    makeFrames('astro_van_drive_left',[24],1,-1);
    makeFrames('astro_van_drive_up',[13],1,-1);

    // Optional turn anims kept available for later, but NOT auto-played during driving.
    makeFrames('astro_van_turn_down_to_right',[0,1,2,3],10,0);
    makeFrames('astro_van_turn_right_to_up',[3,2,1,13],10,0);
    makeFrames('astro_van_turn_up_to_left',[13,17,18,24],10,0);
    makeFrames('astro_van_turn_left_to_down',[24,33,34,0],10,0);

    makeFrames('astro_van_turn_down_to_left',[0,33,32,24],10,0);
    makeFrames('astro_van_turn_left_to_up',[24,18,17,13],10,0);
    makeFrames('astro_van_turn_up_to_right',[13,1,2,3],10,0);
    makeFrames('astro_van_turn_right_to_down',[3,2,1,0],10,0);
  }

  if(scene.textures.exists(VAN.openKey)){
    make('astro_van_door_front',VAN.openKey,0,7,8,0);
    make('astro_van_door_right',VAN.openKey,8,15,8,0);
    make('astro_van_door_left',VAN.openKey,16,23,8,0);
    make('astro_van_door_back',VAN.openKey,24,31,8,0);
  }
}

class CityScene extends Phaser.Scene{
  constructor(){
    super('CityScene');
    this.speed=DONNY.speed;
    this.debug=false;
    this.lastDir='down';
    this.cool=0;
    this.heldWeapon=null;
    this.weaponSprites=[];
    this.playerInVan=false;
    this.activeVehicle=null;
    this.pistolActionActive=false;
    this.punchActionActive=false;
    this.kickActionActive=false;
    this.jumpActionActive=false;
    this.slideActionActive=false;
    this.crawlMode=false;
    this.pausedForInventory=false;
    this.pistolEquipped=false;
  }

  init(d){
    this.startPage=d?.pageId||'GLASSWELL_C3';
    this.startSpawn=d?.spawn||'donny_city_start';
  }

  create(){
    setupTouch();

    this.keys=this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT,E,X,B,Y,J,K,C,I,P,SHIFT,ESC,SPACE');
    this.input.keyboard.on('keydown-E',()=>this.interact());
    this.input.keyboard.on('keydown-SPACE',()=>this.jump());
    this.input.keyboard.on('keydown-X',()=>this.primaryXAction());
    this.input.keyboard.on('keydown-Y',()=>this.jump());
    this.input.keyboard.on('keydown-J',()=>this.punch());
    this.input.keyboard.on('keydown-K',()=>this.kick());
    this.input.keyboard.on('keydown-C',()=>this.toggleCrawl());
    this.input.keyboard.on('keydown-I',()=>this.togglePauseInventory());
    this.input.keyboard.on('keydown-P',()=>this.togglePauseInventory());
    this.input.keyboard.on('keydown-B',()=>this.smartBAction());
    this.input.keyboard.on('keydown-ESC',()=>this.togglePauseInventory());

    this.makeHud();
    this.loadPage(this.startPage,this.startSpawn);
    this.startGlasswellMusic();
  }

  makeHud(){
    this.hud=this.add.text(10,8,'',{
      fontFamily:'Arial Black',
      fontSize:'13px',
      color:'#d7faff',
      backgroundColor:'rgba(0,0,0,.60)',
      padding:{x:8,y:5}
    }).setScrollFactor(0).setDepth(20000);

    this.prompt=this.add.text(10,this.scale.height-42,'',{
      fontFamily:'Arial',
      fontSize:'14px',
      color:'#f0e5be',
      backgroundColor:'rgba(0,0,0,.68)',
      padding:{x:8,y:6}
    }).setScrollFactor(0).setDepth(20000);

    this.weaponHud=this.add.text(this.scale.width-10,8,'Weapon: empty',{
      fontFamily:'Arial Black',
      fontSize:'13px',
      color:'#ffe0a8',
      backgroundColor:'rgba(0,0,0,.60)',
      padding:{x:8,y:5}
    }).setOrigin(1,0).setScrollFactor(0).setDepth(20000);

    this.pauseShade=this.add.rectangle(this.scale.width/2,this.scale.height/2,this.scale.width,this.scale.height,0x000000,.66)
      .setScrollFactor(0)
      .setDepth(30000)
      .setVisible(false);

    this.pausePanel=this.add.rectangle(this.scale.width/2,this.scale.height/2,460,292,0x07090f,.92)
      .setStrokeStyle(3,0xff2aa1,.8)
      .setScrollFactor(0)
      .setDepth(30001)
      .setVisible(false);

    this.pauseText=this.add.text(this.scale.width/2,this.scale.height/2,'',{
      fontFamily:'Courier New',
      fontSize:'17px',
      color:'#ffffff',
      align:'left',
      lineSpacing:8
    }).setOrigin(.5).setScrollFactor(0).setDepth(30002).setVisible(false);
  }

  startGlasswellMusic(){
    if(!this.sound || !this.cache.audio.exists('glasswell_theme'))return;

    const existing=this.sound.get('glasswell_theme');
    if(existing && existing.isPlaying)return;

    try{
      this.glasswellMusic=this.sound.add('glasswell_theme',{
        loop:true,
        volume:0.42
      });

      this.glasswellMusic.play();
    }catch(e){
      // iPhone/Safari can block audio until a tap. The game already starts from a tap,
      // but keep this safe so audio never black-screens the game.
      console.warn('Glasswell music start blocked:',e);
    }
  }

  togglePauseInventory(){
    this.pausedForInventory=!this.pausedForInventory;
    this.updatePauseInventoryUI();
  }

  updatePauseInventoryUI(){
    const visible=!!this.pausedForInventory;
    if(this.pauseShade)this.pauseShade.setVisible(visible);
    if(this.pausePanel)this.pausePanel.setVisible(visible);
    if(this.pauseText){
      this.pauseText.setVisible(visible);
      this.pauseText.setText(
        'PAUSED — INVENTORY\\n\\n' +
        `Pistol: ${this.pistolEquipped?'EQUIPPED':'PUT AWAY'}\\n` +
        `Held weapon: ${this.heldWeapon?this.heldWeapon.name:'none'}\\n\\n` +
        'Touch controls:\\n' +
        'A = equip / put away pistol\\n' +
        'B = resume\\n' +
        'START = resume\\n\\n' +
        'Keyboard:\\n' +
        'I / P / Esc = pause / resume\\n' +
        'E = equip / put away pistol'
      );
    }
  }

  togglePistolEquipped(){
    this.pistolEquipped=!this.pistolEquipped;
    if(this.gunOverlay)this.gunOverlay.setVisible(false);
    this.updatePauseInventoryUI();
    this.message(this.pistolEquipped?'Pistol equipped':'Pistol put away');
  }

  handlePauseInput(){
    if(TOUCH.start){
      TOUCH.start=false;
      this.togglePauseInventory();
      return;
    }
    if(TOUCH.a){
      TOUCH.a=false;
      this.togglePistolEquipped();
      return;
    }
    if(TOUCH.b){
      TOUCH.b=false;
      this.pausedForInventory=false;
      this.updatePauseInventoryUI();
      return;
    }

    if(Phaser.Input.Keyboard.JustDown(this.keys.E)){
      this.togglePistolEquipped();
    }
  }

  clearPage(){
    this.children.list.filter(o=>o.getData&&o.getData('mapObj')).forEach(o=>o.destroy());
    this.weaponSprites=[];
    this.maskCtx=null;
    this.base=null;
    this.fg=null;
    this.debugG=null;
    this.astroVan=null;
  }

  loadPage(id,spawnId,options={}){
    this.clearPage();

    this.pageId=id;
    this.cfg=PAGES[id];

    const baseKey=key(id,'base');
    const fgKey=key(id,'fg');
    const maskKey=key(id,'mask');

    const isSynthetic=!!this.cfg.synthetic;
    const baseTexture=isSynthetic?'fallback_desert':(this.textures.exists(baseKey)?baseKey:'fallback_map');
    this.base=this.add.image(0,0,baseTexture).setOrigin(0).setDepth(0).setData('mapObj',true);
    this.mapW=isSynthetic?(this.cfg.width||this.base.width):this.base.width;
    this.mapH=isSynthetic?(this.cfg.height||this.base.height):this.base.height;

    if(isSynthetic){
      this.base.setDisplaySize(this.mapW,this.mapH);
    }

    this.data=buildPageData(id,this.mapW,this.mapH);
    this.prepareMask(isSynthetic?null:maskKey);

    const sp=this.data.spawns[spawnId]||this.data.spawns.donny_city_start||this.data.spawns.desert_start||Object.values(this.data.spawns)[0]||{x:this.mapW/2,y:this.mapH/2};
    this.currentSpawn=sp;
    this.pendingKeepDriving=!!options.keepDriving;

    if(!this.player){
      this.createPlayer(sp.x,sp.y);
    } else {
      this.player.setPosition(sp.x,sp.y);
      this.player.setVisible(true);
      if(this.player.body)this.player.body.enable=true;
    }

    this.placeVan(options);
    this.placeWeapons();
    this.placeInteriorMarkers();

    if(!isSynthetic && this.textures.exists(fgKey)){
      this.fg=this.add.image(0,0,fgKey).setOrigin(0).setDepth(9000).setData('mapObj',true);
    }

    this.cameras.main.setBounds(0,0,this.mapW,this.mapH);
    this.physics.world.setBounds(0,0,this.mapW,this.mapH);
    if(options.keepDriving && this.astroVan){
      this.playerInVan=true;
      this.activeVehicle=this.astroVan;
      this.astroVan.hasDriver=true;
      this.player.setVisible(false);
      if(this.player.body)this.player.body.enable=false;
      if(this.holster)this.holster.setVisible(false);
      if(this.weaponOverlay)this.weaponOverlay.setVisible(false);
      this.cameras.main.startFollow(this.astroVan,true,.12,.12);
    } else {
      this.playerInVan=false;
      this.activeVehicle=null;
      this.cameras.main.startFollow(this.player,true,.12,.12);
    }

    this.cameras.main.fadeIn(140,0,0,0);

    this.cool=this.time.now+500;
    this.drawDebug();
    this.message(this.cfg.label);
  }

  createPlayer(x,y){
    const tex=this.textures.exists('donny_overhead')?'donny_overhead':'fallback_player';
    this.player=this.physics.add.sprite(x,y,tex,0);
    this.player.setOrigin(.5,.82);
    this.player.setScale(tex==='donny_overhead'?DONNY.scale:1);
    this.player.setCollideWorldBounds(true);

    if(this.player.body){
      this.player.body.setSize(42,58);
      this.player.body.setOffset(43,62);
    }

    // Holster is intentionally removed for now.
    this.holster=null;

    // Held Red Concord weapon overlay when a pickup is equipped.
    this.weaponOverlay=this.add.sprite(x,y,this.textures.exists('weapon_overlay')?'weapon_overlay':'fallback_weapon',0)
      .setVisible(false)
      .setOrigin(.5,.82)
      .setScale(this.textures.exists('weapon_overlay')?.72:1);

    // Laser gun prop appears only during shooting, then disappears.
    this.gunOverlay=this.add.sprite(x,y,this.textures.exists('donny_laser_gun_overlay')?'donny_laser_gun_overlay':'fallback_weapon',0)
      .setVisible(false)
      .setOrigin(.5,.82)
      .setScale(this.textures.exists('donny_laser_gun_overlay')?GUN_PROP.scale:1);
  }

  prepareMask(maskKey){
    this.maskCtx=null;
    if(!maskKey || !this.textures.exists(maskKey))return;

    try{
      const img=this.textures.get(maskKey).getSourceImage();
      const canvas=document.createElement('canvas');
      canvas.width=img.width;
      canvas.height=img.height;
      const ctx=canvas.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(img,0,0);
      this.maskCtx=ctx;
      this.maskW=canvas.width;
      this.maskH=canvas.height;
    }catch(e){
      console.warn('Mask sampling disabled:',e);
    }
  }

  placeVan(options={}){
    if(this.pageId!=='GLASSWELL_C3' && this.pageId!=='GLASSWELL_B3_DESERT_TEST')return;

    const useDrive=this.textures.exists(VAN.driveKey);
    const tex=useDrive?VAN.driveKey:(this.textures.exists('astro_van_old')?'astro_van_old':'fallback_van');
    const frame=useDrive?VAN.idleFrame.down:0;

    const spawn=this.currentSpawn||{x:this.mapW*.50,y:this.mapH*.55};
    const vanX=options.keepDriving?spawn.x:(this.pageId==='GLASSWELL_C3'?spawn.x+190:spawn.x-130);
    const vanY=options.keepDriving?spawn.y:(this.pageId==='GLASSWELL_C3'?spawn.y+30:spawn.y+10);

    this.astroVan=this.physics.add.sprite(vanX,vanY,tex,frame)
      .setOrigin(.5,.72)
      .setDepth(vanY+700)
      .setData('mapObj',true);

    this.astroVan.direction='down';
    this.astroVan.hasDriver=false;
    this.astroVan.isDoorAnimating=false;
    this.astroVan.setScale(useDrive?VAN.renderScale:.50);
    this.astroVan.setCollideWorldBounds(true);

    if(this.astroVan.body){
      this.astroVan.body.setImmovable(false);
      this.astroVan.body.setSize(useDrive?90:175,useDrive?48:108);
      this.astroVan.body.setOffset(useDrive?19:72,useDrive?38:105);
    }

    // No visible label in-game. Keep a hidden label object so older update code remains safe.
    this.vanLabel=this.add.text(this.astroVan.x,this.astroVan.y+78,'',{
      fontFamily:'Arial Black',
      fontSize:'14px',
      color:'#9ff4ff',
      backgroundColor:'rgba(0,0,0,0)',
      padding:{x:0,y:0}
    }).setOrigin(.5).setDepth(this.astroVan.depth+1).setVisible(false).setData('mapObj',true);
  }

  placeWeapons(){
    this.data.weapons.forEach(w=>{
      if(sessionStorage.getItem('picked_'+w.id))return;

      const tex=this.textures.exists('weapon_pickups')?'weapon_pickups':'fallback_weapon';
      const s=this.add.sprite(w.x,w.y,tex,w.frame||0)
        .setScale(tex==='weapon_pickups'?.78:1)
        .setDepth(w.y+500)
        .setData('mapObj',true);

      s.weaponData=w;
      this.weaponSprites.push(s);
    });
  }

  placeInteriorMarkers(){
    this.data.interiors.forEach(d=>{
      const r=this.add.rectangle(d.x+d.w/2,d.y+d.h/2,d.w,d.h,0x24dfff,.07)
        .setStrokeStyle(2,0x24dfff,.18)
        .setDepth(20)
        .setData('mapObj',true);
      r.interiorData=d;

      const t=this.add.text(d.x+d.w/2,d.y+d.h/2,d.label,{
        fontFamily:'Arial Black',
        fontSize:'12px',
        color:'#bdefff',
        backgroundColor:'rgba(0,0,0,.45)',
        padding:{x:5,y:2}
      }).setOrigin(.5).setDepth(21).setData('mapObj',true);

      t.setVisible(false);
      r.labelText=t;
    });
  }

  walkable(x,y){
    if(x<8||y<8||x>this.mapW-8||y>this.mapH-8)return false;
    if(!this.maskCtx)return true;

    const sx=Math.floor(Phaser.Math.Clamp(x,0,this.maskW-1));
    const sy=Math.floor(Phaser.Math.Clamp(y,0,this.maskH-1));

    try{
      const p=this.maskCtx.getImageData(sx,sy,1,1).data;
      return p[0]>=220 && p[1]>=220 && p[2]>=220;
    }catch(e){
      return true;
    }
  }

  canMove(nx,ny){
    const samples=[[0,0],[-15,5],[15,5],[0,18]];
    return samples.every(([ox,oy])=>this.walkable(nx+ox,ny+oy));
  }

  update(_,delta){
    if(TOUCH.start){
      TOUCH.start=false;
      this.togglePauseInventory();
    }

    if(this.pausedForInventory){
      this.handlePauseInput();
      return;
    }

    if(this.playerInVan && this.astroVan){
      this.updateVanDriving(delta);

      if(TOUCH.b){
        TOUCH.b=false;
        this.exitVan();
      }

      this.hud.setText(`${this.cfg.label} | Driving Astro Van — Donny inside | ${Math.round(this.astroVan.x)},${Math.round(this.astroVan.y)} | ${GAME_IDENTITY.genre}`);
      this.weaponHud.setText('Vehicle: Astro Van');
      return;
    }

    this.updateDonnyMovement(delta);
    this.updatePromptHints();
    this.updateOverlays();

    if(TOUCH.a){TOUCH.a=false;this.interact()}
    if(TOUCH.xBtn){TOUCH.xBtn=false;this.primaryXAction()}
    if(TOUCH.y){TOUCH.y=false;this.jump()}
    if(TOUCH.b){TOUCH.b=false;this.smartBAction()}

    this.hud.setText(`${this.cfg.label} | Donny | ${Math.round(this.player.x)},${Math.round(this.player.y)} | ${GAME_IDENTITY.genre}`);
    this.weaponHud.setText(`Weapon: ${this.heldWeapon?this.heldWeapon.name:'empty'} | Pistol: ${this.pistolEquipped?'equipped':'put away'} | X: ${this.heldWeapon?'weapon':(this.pistolEquipped?'shoot':'punch')}`);
  }

  updateDonnyMovement(delta){
    if(!this.player || this.anyBlockingAction())return;

    let vx=TOUCH.x,vy=TOUCH.y;

    if(this.keys.LEFT.isDown||this.keys.A.isDown)vx--;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)vx++;
    if(this.keys.UP.isDown||this.keys.W.isDown)vy--;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)vy++;

    const len=Math.hypot(vx,vy);
    const rawLen=len;
    if(len>1){vx/=len;vy/=len}

    if(Math.abs(vx)>Math.abs(vy)){
      if(vx>0)this.lastDir='right';
      else if(vx<0)this.lastDir='left';
    } else {
      if(vy>0)this.lastDir='down';
      else if(vy<0)this.lastDir='up';
    }

    const wantsRun=!this.crawlMode && (rawLen>.78 || this.keys.SHIFT?.isDown);
    const moveSpeed=this.crawlMode?DONNY.crawlSpeed:(wantsRun?DONNY.runSpeed:DONNY.speed);
    const step=moveSpeed*delta/1000;
    const nx=this.player.x+vx*step;
    const ny=this.player.y+vy*step;

    if(this.canMove(nx,this.player.y))this.player.x=Phaser.Math.Clamp(nx,0,this.mapW);
    if(this.canMove(this.player.x,ny))this.player.y=Phaser.Math.Clamp(ny,0,this.mapH);

    this.animateDonny(vx,vy,wantsRun);
    this.depthActors();
  }

  animateDonny(vx,vy,wantsRun=false){
    if(!this.textures.exists('donny_overhead'))return;

    const moving=Math.hypot(vx,vy)>.05;

    if(moving){
      let anim=`donny_walk_${this.lastDir}`;
      if(this.crawlMode && this.textures.exists('donny_crawl'))anim=`donny_crawl_${this.lastDir}`;
      else if(wantsRun && this.textures.exists('donny_run'))anim=`donny_run_${this.lastDir}`;

      if(this.player.anims.currentAnim?.key!==anim)this.player.play(anim,true);
    } else {
      this.player.anims.stop();
      const idleTex=this.crawlMode && this.textures.exists('donny_crawl')?'donny_crawl':(this.textures.exists('donny_idle')?'donny_idle':'donny_overhead');
      this.player.setTexture(idleTex);
      this.player.setFrame(DONNY.directionFrame[this.lastDir]||0);
      this.player.setScale(DONNY.scale);
    }
  }

  depthActors(){
    if(this.player)this.player.setDepth(this.player.y+1000);
    if(this.gunOverlay)this.gunOverlay.setDepth(this.player.depth+6);
    if(this.weaponOverlay)this.weaponOverlay.setDepth(this.player.depth+5);
    if(this.astroVan)this.astroVan.setDepth(this.astroVan.y+700);
    if(this.vanLabel&&this.astroVan){
      this.vanLabel.setPosition(this.astroVan.x,this.astroVan.y+78);
      this.vanLabel.setDepth(this.astroVan.depth+1);
    }
    this.weaponSprites.forEach(s=>s.setDepth(s.y+500));
  }

  updateOverlays(){
    if(!this.player)return;

    const offset=HOLSTER.offset[this.lastDir]||{x:0,y:0};

    // No separate holster prop for now.
    if(this.gunOverlay){
      const gunOffset=GUN_PROP.offset[this.lastDir]||{x:0,y:0};
      this.gunOverlay.setPosition(this.player.x+gunOffset.x,this.player.y+gunOffset.y);
      this.gunOverlay.setFrame(GUN_PROP.directionFrame[this.lastDir]||0);
      // Visibility is controlled precisely inside pistolAction().
    }

    if(this.weaponOverlay){
      if(!this.heldWeapon || !this.textures.exists('weapon_overlay')){
        this.weaponOverlay.setVisible(false);
      } else {
        this.weaponOverlay.setVisible(true);
        this.weaponOverlay.setPosition(this.player.x,this.player.y-2);
        this.weaponOverlay.setFrame(WEAPON_DIR_FRAME[this.lastDir]||0);
      }
    }
  }

  updateVanDriving(delta){
    const van=this.astroVan;
    if(!van || van.isDoorAnimating)return;

    let vx=TOUCH.x,vy=TOUCH.y;

    if(this.keys.LEFT.isDown||this.keys.A.isDown)vx--;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)vx++;
    if(this.keys.UP.isDown||this.keys.W.isDown)vy--;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)vy++;

    const len=Math.hypot(vx,vy);
    if(len>1){vx/=len;vy/=len}

    const moving=Math.hypot(vx,vy)>.05;

    if(moving){
      const oldDir=van.direction||'down';

      if(Math.abs(vx)>Math.abs(vy)){
        van.direction=vx>=0?'right':'left';
      } else {
        van.direction=vy>=0?'down':'up';
      }

      const nextX=van.x+vx*VAN.speed*delta/1000;
      const nextY=van.y+vy*VAN.speed*delta/1000;

      if(this.canMove(nextX,van.y))van.x=Phaser.Math.Clamp(nextX,0,this.mapW);
      if(this.canMove(van.x,nextY))van.y=Phaser.Math.Clamp(nextY,0,this.mapH);

      if(this.textures.exists(VAN.driveKey)){
        // Use direct frame selection instead of looping animation to prevent spinning.
        if(van.anims)van.anims.stop();
        van.setTexture(VAN.driveKey,VAN.idleFrame[van.direction]||0);
      }
    } else {
      if(van.anims)van.anims.stop();
      if(this.textures.exists(VAN.driveKey)){
        van.setTexture(VAN.driveKey,VAN.idleFrame[van.direction]||0);
      }
    }

    van.setDepth(van.y+700);

    if(this.player){
      this.player.setPosition(van.x,van.y);
    }

    if(this.vanLabel){
      this.vanLabel.setPosition(van.x,van.y+78).setDepth(van.depth+1);
    }

    const route=this.routeAt(van.x,van.y+12);
    if(route && !route.msg){
      this.route(route,'vehicle');
    }
  }

  nearestWeapon(){
    let best=null,bestD=999999;

    this.weaponSprites.forEach(s=>{
      const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,s.x,s.y);
      if(d<bestD){best=s;bestD=d}
    });

    return bestD<70?best:null;
  }

  routeAt(x,y){
    return this.data.routes.find(t=>rectHit(t.r,x,y));
  }

  currentRoute(){
    const x=this.player.x,y=this.player.y+12;
    return this.routeAt(x,y);
  }

  currentInterior(){
    const x=this.player.x,y=this.player.y+8;
    return this.data.interiors.find(t=>rectHit(t,x,y));
  }

  nearVan(){
    return this.astroVan && Phaser.Math.Distance.Between(this.player.x,this.player.y,this.astroVan.x,this.astroVan.y)<VAN.enterDistance;
  }

  updatePromptHints(){
    const w=this.nearestWeapon();
    if(w){this.prompt.setText(`A/E: pick up ${w.weaponData.name}`);return}

    if(this.nearVan()){this.prompt.setText('A/E: enter Astro Van');return}

    const interior=this.currentInterior();
    if(interior){this.prompt.setText(`A/E: ${interior.label}`);return}

    const r=this.currentRoute();
    if(r){this.prompt.setText(r.msg?r.msg:`A/E: ${r.label}`);return}
  }

  anyBlockingAction(){
    return this.pistolActionActive || this.punchActionActive || this.kickActionActive || this.jumpActionActive || this.slideActionActive;
  }

  isTryingToMove(){
    return Math.hypot(TOUCH.x,TOUCH.y)>.08 ||
      this.keys.LEFT?.isDown || this.keys.RIGHT?.isDown || this.keys.UP?.isDown || this.keys.DOWN?.isDown ||
      this.keys.A?.isDown || this.keys.D?.isDown || this.keys.W?.isDown || this.keys.S?.isDown;
  }

  actionOrJump(){
    if(this.playerInVan)return;
    if(this.nearestWeapon() || this.nearVan() || this.currentInterior() || this.currentRoute()){
      this.interact();
      return;
    }
    this.jump();
  }

  smartBAction(){
    if(this.playerInVan){
      this.exitVan();
      return;
    }
    if(this.heldWeapon){
      this.dropWeapon();
      return;
    }
    if(this.isTryingToMove()){
      this.slide();
      return;
    }
    this.kick();
  }

  toggleCrawl(){
    if(this.anyBlockingAction() || this.playerInVan)return;
    this.crawlMode=!this.crawlMode;
    this.restoreDonnyBaseFrame();
    this.message(this.crawlMode?'Crawl mode on':'Crawl mode off');
  }

  interact(){
    if(this.playerInVan)return;

    const w=this.nearestWeapon();
    if(w){this.pickWeapon(w);return}

    if(this.nearVan()){this.enterVan();return}

    const interior=this.currentInterior();
    if(interior){this.message(interior.msg);return}

    const r=this.currentRoute();
    if(r){this.route(r);return}

    this.message('No interaction here');
  }

  pickWeapon(sprite){
    if(this.heldWeapon){
      this.message('Already holding a weapon. Press B to drop it.');
      return;
    }

    this.heldWeapon=Object.assign({},sprite.weaponData);
    sessionStorage.setItem('picked_'+this.heldWeapon.id,'1');
    sprite.destroy();
    this.weaponSprites=this.weaponSprites.filter(s=>s!==sprite);
    this.message(`Picked up ${this.heldWeapon.name}`);
  }

  dropOrExit(){
    if(this.playerInVan){
      this.exitVan();
      return;
    }
    this.dropWeapon();
  }

  dropWeapon(){
    if(!this.heldWeapon){
      this.message('No weapon to drop');
      return;
    }

    const w=this.heldWeapon;
    this.heldWeapon=null;
    sessionStorage.removeItem('picked_'+w.id);

    w.x=this.player.x+(this.lastDir==='right'?45:this.lastDir==='left'?-45:0);
    w.y=this.player.y+(this.lastDir==='down'?45:this.lastDir==='up'?-45:0);

    const tex=this.textures.exists('weapon_pickups')?'weapon_pickups':'fallback_weapon';
    const s=this.add.sprite(w.x,w.y,tex,w.frame||0)
      .setScale(tex==='weapon_pickups'?.78:1)
      .setDepth(w.y+500)
      .setData('mapObj',true);

    s.weaponData=w;
    this.weaponSprites.push(s);
    this.message(`Dropped ${w.name}`);
  }

  primaryXAction(){
    if(this.playerInVan)return;
    if(this.time.now<this.cool)return;

    if(this.heldWeapon){
      this.cool=this.time.now+260;
      this.weaponAttack();
      return;
    }

    if(this.pistolEquipped){
      this.cool=this.time.now+360;
      this.pistolAction();
      return;
    }

    // No weapon and pistol put away: X punches.
    this.punch();
  }

  firePistolOrWeapon(){
    this.primaryXAction();
  }

  pistolAction(){
    if(this.anyBlockingAction())return;
    this.pistolActionActive=true;
    this.crawlMode=false;

    if(this.weaponOverlay)this.weaponOverlay.setVisible(false);
    if(this.gunOverlay)this.gunOverlay.setVisible(false);

    if(this.textures.exists('donny_pistol')){
      this.player.anims.stop();
      const anim=`donny_shoot_${this.lastDir}`;
      if(this.anims.exists(anim))this.player.play(anim,true);
      else this.player.setTexture('donny_pistol',ACTION.directionFrame[this.lastDir]||0);
      this.player.setScale(ACTION.scale);
    }

    // Gun appears when the shooting animation reaches the hand-out pose.
    this.time.delayedCall(ACTION.gunShowDelay,()=>{
      if(!this.pistolActionActive || !this.gunOverlay)return;
      const gunOffset=GUN_PROP.offset[this.lastDir]||{x:0,y:0};
      this.gunOverlay.setPosition(this.player.x+gunOffset.x,this.player.y+gunOffset.y);
      this.gunOverlay.setFrame(GUN_PROP.directionFrame[this.lastDir]||0);
      this.gunOverlay.setScale(GUN_PROP.scale);
      this.gunOverlay.setVisible(true);
      this.spawnMuzzleFx();
    });

    // Gun disappears before Donny drops his hand.
    this.time.delayedCall(Math.max(0,ACTION.shootDuration-ACTION.gunHideBeforeEnd),()=>{
      if(this.gunOverlay)this.gunOverlay.setVisible(false);
    });

    this.time.delayedCall(ACTION.shootDuration,()=>{
      this.pistolActionActive=false;
      if(this.gunOverlay)this.gunOverlay.setVisible(false);
      this.restoreDonnyBaseFrame();
    });
  }

  punch(){
    if(this.playerInVan || this.anyBlockingAction())return;
    if(this.time.now<this.cool)return;
    this.cool=this.time.now+260;
    this.crawlMode=false;
    this.playDonnyAction('punch','donny_punch','punchActionActive',ACTION.duration);
  }

  kick(){
    if(this.playerInVan || this.anyBlockingAction())return;
    if(this.time.now<this.cool)return;
    this.cool=this.time.now+280;
    this.crawlMode=false;
    this.playDonnyAction('kick','donny_kick','kickActionActive',ACTION.duration);
  }

  jump(){
    if(this.playerInVan || this.anyBlockingAction())return;
    if(this.time.now<this.cool)return;
    this.cool=this.time.now+360;
    this.crawlMode=false;
    this.playDonnyAction('jump','donny_jump','jumpActionActive',360,40);
  }

  slide(){
    if(this.playerInVan || this.anyBlockingAction())return;
    if(this.time.now<this.cool)return;
    this.cool=this.time.now+420;
    this.crawlMode=false;
    this.playDonnyAction('slide','donny_slide','slideActionActive',380,70);
  }

  playDonnyAction(label,textureKey,flag,duration,movePush=0){
    this[flag]=true;

    if(this.textures.exists(textureKey)){
      this.player.anims.stop();
      const anim=`${label==='shoot'?'donny_shoot':textureKey}_${this.lastDir}`;
      if(this.anims.exists(anim)){
        this.player.play(anim,true);
      } else {
        this.player.setTexture(textureKey,ACTION.directionFrame[this.lastDir]||0);
      }
      this.player.setScale(ACTION.scale);
    }

    if(movePush){
      const dx=this.lastDir==='right'?1:this.lastDir==='left'?-1:0;
      const dy=this.lastDir==='down'?1:this.lastDir==='up'?-1:0;
      this.tweens.add({
        targets:this.player,
        x:this.player.x+dx*movePush,
        y:this.player.y+dy*movePush,
        duration:duration*.55,
        ease:'Quad.easeOut'
      });
    }

    this.time.delayedCall(duration,()=>{
      this[flag]=false;
      this.restoreDonnyBaseFrame();
    });
  }

  weaponAttack(){
    this.spawnHitFx();
    this.message(`${this.heldWeapon.name} attack`);
  }

  restoreDonnyBaseFrame(){
    if(this.gunOverlay)this.gunOverlay.setVisible(false);

    const baseTex=this.crawlMode && this.textures.exists('donny_crawl')?'donny_crawl':(this.textures.exists('donny_idle')?'donny_idle':'donny_overhead');
    if(this.textures.exists(baseTex)){
      this.player.setTexture(baseTex,DONNY.directionFrame[this.lastDir]||0);
      this.player.setScale(DONNY.scale);
    } else {
      this.player.setTexture('fallback_player');
      this.player.setScale(1);
    }
  }

  spawnMuzzleFx(){
    // Tiny muzzle spark only. Do not use the weapon_fx sprite sheet here because it can look
    // like a flame near Donny's feet when frame origins differ.
    const ox=this.lastDir==='right'?36:this.lastDir==='left'?-36:0;
    const oy=this.lastDir==='down'?30:this.lastDir==='up'?-34:0;

    const spark=this.add.graphics()
      .setDepth(this.player.depth+12)
      .setData('mapObj',true);

    spark.lineStyle(3,0x9ff4ff,.95);
    spark.strokeCircle(this.player.x+ox,this.player.y+oy,7);
    spark.lineStyle(2,0xff2aa1,.85);
    spark.lineBetween(this.player.x+ox,this.player.y+oy,this.player.x+ox+(this.lastDir==='right'?15:this.lastDir==='left'?-15:0),this.player.y+oy+(this.lastDir==='down'?15:this.lastDir==='up'?-15:0));

    this.tweens.add({
      targets:spark,
      alpha:0,
      duration:110,
      onComplete:()=>spark.destroy()
    });
  }

  spawnHitFx(){
    const ox=this.lastDir==='right'?65:this.lastDir==='left'?-65:0;
    const oy=this.lastDir==='down'?55:this.lastDir==='up'?-70:0;
    const tex=this.textures.exists('weapon_fx')?'weapon_fx':'fallback_fx';

    const fx=this.add.sprite(this.player.x+ox,this.player.y+oy,tex,0)
      .setScale(.75)
      .setDepth(this.player.depth+10)
      .setData('mapObj',true);

    fx.setAlpha(.92);

    this.tweens.add({
      targets:fx,
      alpha:0,
      scale:1.05,
      duration:180,
      onComplete:()=>fx.destroy()
    });
  }

  getDirectionFromVanToPlayer(){
    const van=this.astroVan;
    const dx=this.player.x-van.x;
    const dy=this.player.y-van.y;

    if(Math.abs(dx)>Math.abs(dy)){
      return dx>=0?'right':'left';
    }

    return dy>=0?'down':'up';
  }

  enterVan(){
    const van=this.astroVan;
    if(!van || van.hasDriver || van.isDoorAnimating)return false;

    const dist=Phaser.Math.Distance.Between(this.player.x,this.player.y,van.x,van.y);
    if(dist>VAN.enterDistance){
      this.message('Move closer to Astro Van');
      return false;
    }

    const doorDir=this.getDirectionFromVanToPlayer();
    van.direction=doorDir;
    van.isDoorAnimating=true;

    this.player.setVisible(false);
    if(this.player.body)this.player.body.enable=false;
    if(this.holster)this.holster.setVisible(false);
    if(this.gunOverlay)this.gunOverlay.setVisible(false);
    if(this.weaponOverlay)this.weaponOverlay.setVisible(false);

    if(this.textures.exists(VAN.openKey)){
      van.setTexture(VAN.openKey,VAN.doorStartFrame[doorDir]||0);
      van.setOrigin(.5,.72);
      van.play(VAN.doorAnim[doorDir]);

      van.once(Phaser.Animations.Events.ANIMATION_COMPLETE,()=>{
        this.finishEnterVan(doorDir);
      });
    } else {
      this.finishEnterVan(doorDir);
    }

    this.message(`Entering Astro Van — ${doorDir} door`);
    return true;
  }

  finishEnterVan(doorDir){
    const van=this.astroVan;
    if(!van)return;

    van.hasDriver=true;
    van.isDoorAnimating=false;
    this.playerInVan=true;
    this.activeVehicle=van;

    if(this.textures.exists(VAN.driveKey)){
      van.setTexture(VAN.driveKey,VAN.idleFrame[doorDir]||0);
    }

    van.direction=doorDir;
    this.cameras.main.startFollow(van,true,.12,.12);
    this.message('Driving Astro Van — B exits');
  }

  exitVan(){
    const van=this.astroVan;
    if(!van || !this.playerInVan)return false;

    const dir=van.direction||'down';
    const off=VAN.exitOffset[dir]||VAN.exitOffset.down;

    van.hasDriver=false;
    van.isDoorAnimating=false;
    this.playerInVan=false;
    this.activeVehicle=null;

    if(van.anims)van.anims.stop();

    if(this.textures.exists(VAN.driveKey)){
      van.setTexture(VAN.driveKey,VAN.idleFrame[dir]||0);
    }

    this.player.setPosition(van.x+off.x,van.y+off.y);
    this.player.setVisible(true);
    if(this.player.body)this.player.body.enable=true;

    this.restoreDonnyBaseFrame();

    if(this.gunOverlay)this.gunOverlay.setVisible(false);
    if(this.holster)this.holster.setVisible(false);

    this.cameras.main.startFollow(this.player,true,.12,.12);
    this.message('Exited Astro Van');
    return true;
  }

  route(t,mode='player'){
    if(this.time.now<this.cool)return;

    if(t.msg){
      this.message(t.msg);
      this.cool=this.time.now+450;
      return;
    }

    this.cool=this.time.now+700;
    this.cameras.main.fadeOut(130,0,0,0);

    const keepDriving = mode==='vehicle' || this.playerInVan;

    this.time.delayedCall(150,()=>{
      this.loadPage(t.to,t.spawn,{keepDriving});
    });
  }

  toggleDebug(){
    this.debug=!this.debug;
    this.drawDebug();
    this.message(`Debug ${this.debug?'on':'off'}`);
  }

  drawDebug(){
    if(this.debugG)this.debugG.destroy();
    this.debugG=this.add.graphics().setDepth(14000).setData('mapObj',true);

    if(!this.debug)return;

    this.debugG.lineStyle(3,0x24dfff,.85);
    this.data.routes.forEach(t=>this.debugG.strokeRect(t.r.x,t.r.y,t.r.w,t.r.h));

    this.debugG.lineStyle(2,0xff2aa1,.65);
    this.data.interiors.forEach(t=>this.debugG.strokeRect(t.x,t.y,t.w,t.h));

    this.debugG.fillStyle(0xffd166,.35);
    this.weaponSprites.forEach(s=>this.debugG.fillCircle(s.x,s.y,18));
  }

  message(t){
    this.prompt.setText(t);
    this.time.delayedCall(1700,()=>{
      if(this.prompt.text===t)this.prompt.setText('');
    });
  }
}

function createFallbackTextures(scene){
  const g=scene.add.graphics();

  if(!scene.textures.exists('fallback_map')){
    g.clear();
    g.fillStyle(0x101319,1).fillRect(0,0,1536,1152);
    g.fillStyle(0x222a35,1).fillRect(0,500,1536,270);
    g.fillStyle(0x121820,1).fillRect(0,0,1536,230).fillRect(0,900,1536,252);
    g.lineStyle(6,0xff2aa1,.40).strokeRect(160,190,380,250).strokeRect(920,180,360,260);
    g.generateTexture('fallback_map',1536,1152);
  }

  if(!scene.textures.exists('fallback_player')){
    g.clear();
    g.fillStyle(0x000000,0).fillRect(0,0,128,128);
    g.fillStyle(0x09090b,1).fillRoundedRect(46,34,36,46,8);
    g.fillStyle(0xc79d72,1).fillRoundedRect(50,18,28,22,6);
    g.fillStyle(0x202035,1).fillRect(49,78,12,34).fillRect(67,78,12,34);
    g.lineStyle(4,0x2a2a2a,1).lineBetween(86,38,86,94);
