function showBootError(message){

  const msg = e.message || 'unknown error';

  showBootError('GAME ERROR: ' + msg);
});
window.addEventListener('unhandledrejection', e => {
  const msg = (e.reason && (e.reason.message || e.reason)) || 'unhandled promise rejection';

function selectVanDriveTexture(scene){
  // GLOBAL HARD FIX:
  // This function must exist before createVanAnimations() runs.
  // Missing this function causes:
  // ReferenceError: Can't find variable: selectVanDriveTexture

  const candidates = (typeof VAN_ASSETS !== 'undefined' && VAN_ASSETS.candidates) ? VAN_ASSETS.candidates : [];
  const found = candidates.find(v => scene.textures.exists(v.key));

  if(found){
    VAN.activeDriveKey = found.key;
    VAN.activeLayout = found.layout || '8dir11';
    VAN.driveFrame = { w: found.frameWidth || 128, h: found.frameHeight || 96 };
    VAN.columns = found.columns || 11;
    VAN.idleFrame = {down:0,downRight:11,right:22,upRight:33,up:44,upLeft:55,left:66,downLeft:77};
    console.log('Using Astro Van asset:', found.path);
    return found;
  }

  // No real van file loaded. Use safe generated fallback.
  VAN.activeDriveKey = 'astro_van_safe_right';
  VAN.activeLayout = 'fallback';
  VAN.driveFrame = {w:128,h:96};
  VAN.columns = 1;
  VAN.idleFrame = {down:0,downRight:0,right:0,upRight:0,up:0,upLeft:0,left:0,downLeft:0};
  console.warn('Astro Van real file did not load. Using safe fallback van.');
  return null;
}

function makeInventoryItem(id,qty=1){
  const base=ITEM_DB[id] || {id,name:id,type:'misc',weight:1};
  return {...base,qty};
}

function itemStackWeight(item){
  if(!item)return 0;
  return (Number(item.weight)||0) * (Number(item.qty)||1);
}

function inventoryWeight(items){
  return (items||[]).reduce((sum,item)=>sum+itemStackWeight(item),0);
}

function formatWeight(n){
  n=Number(n)||0;
  return `${Math.round(n*10)/10} lb`;
}

function setupTouch(){
  if(window.__GLASSWELL_TOUCH_READY)return;
  window.__GLASSWELL_TOUCH_READY=true;
  const knob=document.getElementById('stickKnob');
  const label=document.getElementById('moveLabel');
  let active=null,center=null;
  const max=52;
  const prevent=e=>{if(e&&e.cancelable)e.preventDefault()};
  const getCenter=()=>{const el=document.getElementById('stickBase');const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
  const set=(x,y)=>{
    center=center||getCenter();
    let dx=x-center.x,dy=y-center.y;
    const len=Math.hypot(dx,dy);
    if(len>max){dx=dx/len*max;dy=dy/len*max}
    TOUCH.moveX=Math.abs(dx/max)<.06?0:dx/max;
    TOUCH.moveY=Math.abs(dy/max)<.06?0:dy/max;
    TOUCH.active=true;
    if(knob)knob.style.transform=`translate(${dx}px,${dy}px)`;
    if(label)label.textContent='MOVE ON';
  };
  const stop=()=>{
    active=null;center=null;TOUCH.moveX=0;TOUCH.moveY=0;TOUCH.active=false;
    if(knob)knob.style.transform='translate(0,0)';
    if(label)label.textContent='MOVE';
  };
  document.addEventListener('pointerdown',e=>{
    if(e.target.closest&&e.target.closest('.touchBtn,#btnStart'))return;
    if(e.clientX<innerWidth*.50){active=e.pointerId;center=getCenter();set(e.clientX,e.clientY);prevent(e);}
  },{capture:true,passive:false});
  document.addEventListener('pointermove',e=>{if(e.pointerId===active){set(e.clientX,e.clientY);prevent(e)}},{capture:true,passive:false});
  document.addEventListener('pointerup',e=>{if(e.pointerId===active){stop();prevent(e)}},{capture:true,passive:false});
  const bind=(id,prop)=>{
    const el=document.getElementById(id);
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';
    el.addEventListener('pointerdown',e=>{prevent(e);TOUCH[prop]=true;setTimeout(()=>TOUCH[prop]=false,120);},{passive:false});
  };

  const bindYHold=()=>{
    const el=document.getElementById('btnY');
    if(!el||el.dataset.bound)return;
    el.dataset.bound='1';

    el.addEventListener('pointerdown',e=>{
      prevent(e);
      TOUCH.yDown=true;
      TOUCH.yDownAt=performance.now();
    },{passive:false});

    el.addEventListener('pointerup',e=>{
      prevent(e);
      const held=performance.now()-(TOUCH.yDownAt||0);
      TOUCH.yDown=false;
      if(held>=520)TOUCH.yHold=true;
      else TOUCH.btnY=true;
      TOUCH.yDownAt=0;
    },{passive:false});

    el.addEventListener('pointercancel',e=>{
      prevent(e);
      TOUCH.yDown=false;
      TOUCH.yDownAt=0;
    },{passive:false});
  };

  bind('btnA','a'); bind('btnB','b'); bind('btnX','xBtn'); bindYHold(); bind('btnStart','start');
}

function createGeneratedVanTextures(scene){

    g.fillStyle(0x000000,.30).fillEllipse(64,82,100,18);
    g.fillStyle(0x0b101c,1).fillRoundedRect(16,34,96,38,8);
    g.fillStyle(0x293240,1).fillRoundedRect(21,28,78,36,6);

    g.fillStyle(0xb88630,1).fillRect(101,43,8,5);
    g.generateTexture(key,128,96);
    g.destroy();

    if(flip){
      const src=scene.textures.get(key).getSourceImage();
      const canvas=scene.textures.createCanvas(key+'_tmp',128,96);
      const ctx=canvas.getContext();
      ctx.translate(128,0);
      ctx.scale(-1,1);
      ctx.drawImage(src,0,0);
      canvas.refresh();
      scene.textures.remove(key);
      scene.textures.renameTexture(key+'_tmp',key);

      g.fillStyle(0xd02030,1).fillRect(45,68,8,6).fillRect(76,68,8,6);

    g.generateTexture(key,128,96);

function createDonnyAnimations(scene){
  const make=(name,keyName,frames=8,offset=0,loop=true)=>{
    if(!scene.textures.exists(keyName))return;
    Object.entries(DONNY.anims).forEach(([dir,arr])=>{
      const anim=`${name}_${dir}`;
      if(scene.anims.exists(anim))return;
      scene.anims.create({
        key:anim,
        frames:arr.slice(0,frames).map(i=>({key:keyName,frame:i+offset})),
        frameRate: loop ? 8 : 1,
        repeat: loop ? -1 : 0
      });
    });
  };

  // HARD FIX:
  // Idle should not walk/turn in place. Use one locked frame per direction.
  // This fixes Donny sliding left/right while showing the back/up perspective.
  if(scene.textures.exists('donny_idle')){
    Object.entries(DONNY.idleFrame || DONNY.directionFrame).forEach(([dir,frame])=>{
      const anim=`donny_idle_${dir}`;
      if(scene.anims.exists(anim))scene.anims.remove(anim);
      scene.anims.create({
        key:anim,
        frames:[{key:'donny_idle',frame}],
        frameRate:1,
        repeat:-1
      });
    });
  }

  make('donny_walk','donny_overhead',8,0,true);
  make('donny_run','donny_run',8,0,true);
  make('donny_jump','donny_jump',4,0,false);
  make('donny_slide','donny_slide',4,0,false);
  make('donny_crawl','donny_crawl',8,0,true);
  make('donny_punch','donny_punch',8,0,false);
  make('donny_kick','donny_kick',8,0,false);
  make('donny_shoot','donny_pistol',12,0,false);
}

function createVanAnimations(scene){
  const found = selectVanDriveTexture(scene);

  // Real 8-direction, 11-frame-per-row van sheet.
  if(found && found.layout === '8dir11' && scene.textures.exists(VAN.activeDriveKey)){
    const rows=['down','downRight','right','upRight','up','upLeft','left','downLeft'];

    rows.forEach((dir,row)=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;

      const frames=[];
      for(let c=0;c<11;c++){
        frames.push({key:VAN.activeDriveKey,frame:row*11+c});
      }

      scene.anims.create({key:animKey,frames,frameRate:8,repeat:-1});
    });

    VAN.idleFrame={down:0,downRight:11,right:22,upRight:33,up:44,upLeft:55,left:66,downLeft:77};
    return;
  }

  // Real 4-direction fallback sheet.
  if(found && found.layout === '4dir4' && scene.textures.exists(VAN.activeDriveKey)){
    const map={down:0,right:4,left:8,up:12,downRight:4,upRight:4,upLeft:8,downLeft:8};

    Object.entries(map).forEach(([dir,start])=>{
      const animKey=VAN.anim[dir];
      if(scene.anims.exists(animKey))return;

      const frames=[];
      for(let c=0;c<4;c++){
        frames.push({key:VAN.activeDriveKey,frame:start+c});
      }

      scene.anims.create({key:animKey,frames,frameRate:6,repeat:-1});
    });

    VAN.idleFrame={down:0,downRight:4,right:4,upRight:4,up:12,upLeft:8,left:8,downLeft:8};
    return;
  }

  // Safe fallback generated van textures.
  const safeMap={
    right:'astro_van_safe_right',
    left:'astro_van_safe_left',
    down:'astro_van_safe_down',
    up:'astro_van_safe_up',
    downRight:'astro_van_safe_downRight',
    upRight:'astro_van_safe_upRight',
    downLeft:'astro_van_safe_downLeft',
    upLeft:'astro_van_safe_upLeft'
  };

  Object.entries(safeMap).forEach(([dir,key])=>{
    const animKey=VAN.anim[dir];
    if(scene.anims.exists(animKey))return;
    if(scene.textures.exists(key)){
      scene.anims.create({key:animKey,frames:[{key,frame:0}],frameRate:1,repeat:-1});
    }
  });

  VAN.idleFrame={down:0,downRight:0,right:0,upRight:0,up:0,upLeft:0,left:0,downLeft:0};
}

    this.playerInventory=[
      makeInventoryItem('laser_pistol',1),

    this.pistolAmmo=24;
    this.actionUntil=0;
    this.actionType='';
    this.slideUntil=0;
    this.moveHoldStart=0;
    this.lastMoveUntil=0;
    this.lastMoveInput={x:0,y:1};
    this.jumpZ=0;
    this.jumpVel=0;
    this.routeCooldown=0;
