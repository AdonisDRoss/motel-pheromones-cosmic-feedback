<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cosmic Feedback — Westgate Blacklight Connector</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#050505;overflow:hidden;touch-action:none;font-family:monospace}canvas{image-rendering:pixelated;image-rendering:crisp-edges}#rotateGate{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;text-align:center;background:#050505;color:#e8dfc8;padding:24px;box-sizing:border-box;font:18px monospace}#rotateGate strong{color:#9befff;font-size:24px;display:block;margin-bottom:12px}#buildTag{position:fixed;right:10px;bottom:8px;z-index:20;color:#9befff;font:12px monospace;background:rgba(0,0,0,.60);padding:6px 8px;border:1px solid rgba(155,239,255,.35)}@media (orientation:portrait){#rotateGate{display:flex}}
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="rotateGate"><div><strong>TURN PHONE SIDEWAYS</strong>Cosmic Feedback is landscape-only.<br><br>Rotate your phone for correct controls and map view.</div></div>
<div id="buildTag">Westgate Blacklight Connector v01</div>
<script>
"use strict";
const GAME_W=960,GAME_H=540;
const MAP_BASE_PATH="assets/maps/dust9/glasswell/outer_ring/west_blacklight/layers/GLASSWELL_WESTGATE_BLACKLIGHT_CONNECTOR_base.png";
const MAP_MASK_PATH="assets/maps/dust9/glasswell/outer_ring/west_blacklight/masks/GLASSWELL_WESTGATE_BLACKLIGHT_CONNECTOR_collision_mask.png";
const DONNY_SHEET_PATH="space_game_missing_assets_staging/assets/sprites/player/donny/donny_overhead_noguitar_phaser_ready_1779508629.png";
const DISTORTION_PATH="assets/vehicles/special/aurelix_distortion/distortion_topdown.png";
const DONNY={hpMax:100,hp:100,walkSpeed:220,rep:0};
const CAR={fuelMax:180,fuel:180,speed:0,maxSpeed:520,accel:470,reverseSpeed:210,drag:.985,turnSpeed:3.0,condition:"Parked",headlightsOn:true};
const CAR_VISUAL_OFFSET=Math.PI/2,ZOOM={foot:1.12,carSlow:.96,carFast:.78};
function qn(name,fallback){const n=Number(new URLSearchParams(location.search).get(name));return Number.isFinite(n)?n:fallback;}
class MainScene extends Phaser.Scene{
 constructor(){super("MainScene");this.failed=new Set();this.mapW=2048;this.mapH=2048;this.maskCanvas=null;this.maskCtx=null;}
 preload(){this.load.image("map_base",MAP_BASE_PATH);this.load.image("map_mask",MAP_MASK_PATH);this.load.spritesheet("donny_real",DONNY_SHEET_PATH,{frameWidth:192,frameHeight:288});this.load.image("distortion_asset",DISTORTION_PATH);this.load.on("loaderror",file=>{console.warn("LOAD ERROR",file.key,file.src||file.url||"");this.failed.add(file.key);});}
 create(){this.makeFallbacks();this.makeDonnyAnims();
  if(this.failed.has("map_base")||!this.textures.exists("map_base")){this.showMissingMapError();}
  else{const img=this.textures.get("map_base").getSourceImage();this.mapW=img.width||2048;this.mapH=img.height||2048;this.add.image(0,0,"map_base").setOrigin(0,0).setDepth(0);}
  this.physics.world.setBounds(0,0,this.mapW,this.mapH);this.cameras.main.setBounds(0,0,this.mapW,this.mapH);this.setupMask();
  const spawnX=qn("spawnX",Math.round(this.mapW*.52)),spawnY=qn("spawnY",Math.round(this.mapH*.84));const carX=qn("carX",spawnX-130),carY=qn("carY",spawnY+5);
  this.keys=this.input.keyboard.addKeys({up:"W,UP",down:"S,DOWN",left:"A,LEFT",right:"D,RIGHT",interact:"E",brake:"SPACE",boost:"SHIFT",lights:"H",debug:"F3"});this.makeMobile();
  const carTex=(!this.failed.has("distortion_asset")&&this.textures.exists("distortion_asset"))?"distortion_asset":"car_fallback";this.car=this.physics.add.sprite(carX,carY,carTex).setDepth(850);this.car.setScale(carTex==="distortion_asset"?.42:1);this.carHeading=0;this.car.rotation=this.carHeading+CAR_VISUAL_OFFSET;
  this.hasDonnySheet=!this.failed.has("donny_real")&&this.textures.exists("donny_real");this.player=this.physics.add.sprite(spawnX,spawnY,this.hasDonnySheet?"donny_real":"donny_down").setDepth(900).setCollideWorldBounds(true);this.player.setScale(this.hasDonnySheet?.22:1.25);if(this.hasDonnySheet){this.player.setFrame(0);this.player.body.setSize(66,58);this.player.body.setOffset(63,210);}
  this.playerLabel=this.label("DONNY",this.player.x,this.player.y-68,1000,"#9befff");this.carLabel=this.label("DISTORTION",this.car.x,this.car.y-78,1000,"#e0c7ff");this.locator=this.add.graphics().setDepth(899);this.headlightLayer=this.add.graphics().setDepth(840).setBlendMode(Phaser.BlendModes.ADD);this.inCar=false;this.makeHud();this.makePrompt();this.makeDebug();this.input.keyboard.on("keydown-F3",()=>this.debugText.setVisible(!this.debugText.visible));if(this.failed.has("map_mask"))this.flash("Collision mask not found. Map works; collision disabled until mask path is fixed.",3600);this.updateCamera();}
 makeFallbacks(){const g=this.add.graphics();const mk=(key,up)=>{g.clear();g.fillStyle(0,0.3).fillEllipse(24,58,30,9);g.fillStyle(0x16263a,1).fillRect(16,40,8,22).fillRect(26,40,8,22);g.fillStyle(0x202020,1).fillRoundedRect(11,20,28,30,6);g.fillStyle(0xb98158,1).fillCircle(25,13,10);g.fillStyle(0x111111,1);if(up)g.fillRect(16,4,18,11);else{g.fillRect(14,3,22,7);g.fillCircle(21,13,2);g.fillCircle(29,13,2);}g.fillStyle(0xcfcfcf,1).fillRect(23,21,5,26);g.generateTexture(key,52,68);};mk("donny_down",false);mk("donny_up",true);mk("donny_side",false);g.clear();g.fillStyle(0x222222,1).fillRoundedRect(0,0,90,46,10);g.fillStyle(0x8b2cff,1).fillRect(10,6,18,5).fillRect(10,35,18,5);g.fillStyle(0x89d8ff,1).fillRoundedRect(42,8,26,30,6);g.lineStyle(3,0xcccccc,1).strokeRoundedRect(0,0,90,46,10);g.generateTexture("car_fallback",90,46);g.destroy();}
 makeDonnyAnims(){if(!this.textures.exists("donny_real"))return;[["down",0,3],["right",4,7],["left",8,11],["up",12,15]].forEach(([d,s,e])=>{if(!this.anims.exists("donny_"+d))this.anims.create({key:"donny_"+d,frames:this.anims.generateFrameNumbers("donny_real",{start:s,end:e}),frameRate:8,repeat:-1});});}
 setupMask(){if(this.failed.has("map_mask")||!this.textures.exists("map_mask"))return;try{const img=this.textures.get("map_mask").getSourceImage();const c=document.createElement("canvas");c.width=img.width;c.height=img.height;const ctx=c.getContext("2d",{willReadFrequently:true});ctx.drawImage(img,0,0);this.maskCanvas=c;this.maskCtx=ctx;}catch(e){console.warn("Mask setup failed",e);this.maskCanvas=null;this.maskCtx=null;}}
 showMissingMapError(){this.add.text(40,40,"MAP BASE DID NOT LOAD\n\n"+MAP_BASE_PATH+"\n\nCheck exact path and filename capitalization in GitHub.",{fontFamily:"monospace",fontSize:"24px",color:"#ff7777",backgroundColor:"rgba(0,0,0,.75)",padding:{x:12,y:10},wordWrap:{width:850}}).setDepth(10);}
 label(t,x,y,d,c){return this.add.text(x,y,t,{fontFamily:"monospace",fontSize:"13px",color:c,backgroundColor:"rgba(0,0,0,.75)",padding:{x:5,y:2}}).setOrigin(.5).setDepth(d);}
 makeMobile(){this.mobile={joyX:0,joyY:0,pointer:null,buttons:{gas:false,brake:false,use:false,boost:false,lights:false},press:{use:false,lights:false}};const depth=1200,jx=105,jy=GAME_H-105,jr=70,kr=26;this.add.circle(jx,jy,jr,0x111111,.30).setScrollFactor(0).setDepth(depth).setStrokeStyle(3,0xffffff,.26);const knob=this.add.circle(jx,jy,kr,0xffffff,.20).setScrollFactor(0).setDepth(depth+1).setStrokeStyle(2,0xffffff,.35);const zone=this.add.zone(jx,jy,jr*2.4,jr*2.4).setScrollFactor(0).setDepth(depth+2).setInteractive();const setJoy=p=>{const dx=p.x-jx,dy=p.y-jy,max=jr-kr*.35,dist=Math.min(Math.hypot(dx,dy),max),a=Math.atan2(dy,dx);knob.setPosition(jx+Math.cos(a)*dist,jy+Math.sin(a)*dist);this.mobile.joyX=Phaser.Math.Clamp(dx/max,-1,1);this.mobile.joyY=Phaser.Math.Clamp(dy/max,-1,1);};const reset=()=>{this.mobile.joyX=0;this.mobile.joyY=0;this.mobile.pointer=null;knob.setPosition(jx,jy);};zone.on("pointerdown",p=>{this.mobile.pointer=p.id;setJoy(p);});zone.on("pointermove",p=>{if(this.mobile.pointer===p.id)setJoy(p);});this.input.on("pointerup",p=>{if(this.mobile.pointer===p.id)reset();});const btn=(id,a,b,x,y,col)=>{const c=this.add.circle(x,y,38,col,.36).setScrollFactor(0).setDepth(depth).setStrokeStyle(3,0xffffff,.3).setInteractive();this.add.text(x,y-10,a+"\n"+b,{fontFamily:"monospace",fontSize:"12px",color:"#fff",align:"center"}).setOrigin(.5).setScrollFactor(0).setDepth(depth+1);c.on("pointerdown",()=>{this.mobile.buttons[id]=true;if(id==="use")this.mobile.press.use=true;if(id==="lights")this.mobile.press.lights=true;c.setAlpha(.65);});const up=()=>{this.mobile.buttons[id]=false;c.setAlpha(1);};c.on("pointerup",up);c.on("pointerout",up);this.input.on("pointerup",up);};btn("gas","A","GAS",GAME_W-82,GAME_H-92,0x2e7d32);btn("brake","B","BRK",GAME_W-148,GAME_H-54,0x8a2020);btn("use","X","USE",GAME_W-148,GAME_H-130,0x245b9a);btn("lights","Y","LTS",GAME_W-214,GAME_H-92,0x8d7a21);btn("boost","R","BST",GAME_W-82,GAME_H-174,0x7b36c7);}
 mobileInput(){const m=this.mobile,o={joyX:m.joyX,joyY:m.joyY,gas:m.buttons.gas,brake:m.buttons.brake,use:m.buttons.use,usePressed:m.press.use,boost:m.buttons.boost,lightsPressed:m.press.lights};m.press.use=false;m.press.lights=false;return o;}
 makeHud(){this.hud=this.add.container(12,10).setScrollFactor(0).setDepth(1100);const bg=this.add.rectangle(0,0,540,104,0x000000,.72).setOrigin(0).setStrokeStyle(2,0xa66cff,.9);this.hTitle=this.add.text(12,8,"WESTGATE / BLACKLIGHT CONNECTOR",{fontFamily:"monospace",fontSize:"13px",color:"#9befff"});this.hMode=this.add.text(12,30,"",{fontFamily:"monospace",fontSize:"12px",color:"#fff"});this.hHp=this.add.text(12,52,"",{fontFamily:"monospace",fontSize:"12px",color:"#fff"});this.hpBar=this.add.rectangle(86,60,180,11,0x3fc46b,1).setOrigin(0,.5);this.hFuel=this.add.text(12,72,"",{fontFamily:"monospace",fontSize:"12px",color:"#fff"});this.fuelBar=this.add.rectangle(86,80,180,11,0x9b6cff,1).setOrigin(0,.5);this.hud.add([bg,this.hTitle,this.hMode,this.hHp,this.hpBar,this.hFuel,this.fuelBar]);}
 makePrompt(){this.prompt=this.add.text(16,GAME_H-94,"",{fontFamily:"monospace",fontSize:"15px",color:"#fff1b8",backgroundColor:"rgba(0,0,0,.76)",padding:{x:8,y:5},wordWrap:{width:620}}).setScrollFactor(0).setDepth(1150).setVisible(false);}
 makeDebug(){this.debugText=this.add.text(GAME_W-455,82,"",{fontFamily:"monospace",fontSize:"11px",color:"#9befff",backgroundColor:"rgba(0,0,0,.72)",padding:{x:8,y:6},wordWrap:{width:430}}).setScrollFactor(0).setDepth(1300).setVisible(false);}
 update(time,delta){const m=this.mobileInput(),use=Phaser.Input.Keyboard.JustDown(this.keys.interact)||m.usePressed,lights=Phaser.Input.Keyboard.JustDown(this.keys.lights)||m.lightsPressed;if(lights)CAR.headlightsOn=!CAR.headlightsOn;if(use)this.handleUse();this.inCar?this.updateCar(delta,m):this.updatePlayer(delta,m);this.updateCamera();this.updateLabels();this.drawLocator();this.drawHeadlights();this.checkPrompts();this.updateHud();this.updateDebug();}
 canMoveTo(x,y,radius=18){if(!this.maskCtx||!this.maskCanvas)return true;const sx=Math.round((x/this.mapW)*this.maskCanvas.width),sy=Math.round((y/this.mapH)*this.maskCanvas.height);const pts=[[sx,sy],[sx-radius,sy],[sx+radius,sy],[sx,sy-radius],[sx,sy+radius]];for(const[px,py]of pts){if(px<0||py<0||px>=this.maskCanvas.width||py>=this.maskCanvas.height)return false;const d=this.maskCtx.getImageData(px,py,1,1).data,bright=(d[0]+d[1]+d[2])/3;if(bright<128)return false;}return true;}
 updatePlayer(delta,m){const left=this.keys.left.isDown||m.joyX<-.22,right=this.keys.right.isDown||m.joyX>.22,up=this.keys.up.isDown||m.joyY<-.22,down=this.keys.down.isDown||m.joyY>.22;let vx=(right?1:0)-(left?1:0),vy=(down?1:0)-(up?1:0),mag=Math.hypot(vx,vy);if(mag>0){vx/=mag;vy/=mag;const dt=delta/1000,nx=this.player.x+vx*DONNY.walkSpeed*dt,ny=this.player.y+vy*DONNY.walkSpeed*dt;if(this.canMoveTo(nx,ny,15))this.player.setPosition(nx,ny);if(this.hasDonnySheet){if(Math.abs(vx)>Math.abs(vy))this.player.anims.play(vx<0?"donny_left":"donny_right",true);else this.player.anims.play(vy<0?"donny_up":"donny_down",true);}else{if(Math.abs(vx)>Math.abs(vy)){this.player.setTexture("donny_side");this.player.setFlipX(vx<0);}else{this.player.setTexture(vy<0?"donny_up":"donny_down");this.player.setFlipX(false);}}}else{if(this.hasDonnySheet)this.player.anims.stop();}}
 updateCar(delta,m){const dt=delta/1000,gas=this.keys.up.isDown||m.gas||m.joyY<-.45,brake=this.keys.down.isDown||this.keys.brake.isDown||m.brake||m.joyY>.45,left=this.keys.left.isDown||m.joyX<-.35,right=this.keys.right.isDown||m.joyX>.35,boost=(this.keys.boost.isDown||m.boost)&&CAR.fuel>0&&Math.abs(CAR.speed)>80;if(gas&&CAR.fuel>0){CAR.speed+=CAR.accel*dt*(boost?1.6:1);CAR.fuel=Math.max(0,CAR.fuel-dt*(boost?1.35:.55));CAR.condition=boost?"Boosting":"Driving";}else if(brake){CAR.speed-=CAR.accel*dt*.76;CAR.condition="Braking";}else{CAR.speed*=Math.pow(CAR.drag,delta/16.6667);if(Math.abs(CAR.speed)<4)CAR.speed=0;CAR.condition="Coasting";}CAR.speed=Phaser.Math.Clamp(CAR.speed,-CAR.reverseSpeed,boost?720:CAR.maxSpeed);if(Math.abs(CAR.speed)>10){const steer=(right?1:0)-(left?1:0),reverse=CAR.speed<0?-1:1,ratio=Phaser.Math.Clamp(Math.abs(CAR.speed)/CAR.maxSpeed,.18,1);this.carHeading+=steer*reverse*CAR.turnSpeed*dt*ratio;}const nx=this.car.x+Math.cos(this.carHeading)*CAR.speed*dt,ny=this.car.y+Math.sin(this.carHeading)*CAR.speed*dt;if(this.canMoveTo(nx,ny,28)){this.car.setPosition(Phaser.Math.Clamp(nx,48,this.mapW-48),Phaser.Math.Clamp(ny,48,this.mapH-48));}else{CAR.speed*=-.18;CAR.condition="Blocked";}this.car.rotation=this.carHeading+CAR_VISUAL_OFFSET;}
 handleUse(){if(this.inCar){this.exitCar();return;}if(Phaser.Math.Distance.Between(this.player.x,this.player.y,this.car.x,this.car.y)<115)this.enterCar();}
 enterCar(){this.inCar=true;CAR.condition="Driving";this.player.setVisible(false);CAR.speed=0;this.flash("Entered Distortion.",1300);}
 exitCar(){const side=this.carHeading+Math.PI/2,nx=this.car.x+Math.cos(side)*78,ny=this.car.y+Math.sin(side)*78;this.player.setPosition(nx,ny);this.player.setVisible(true);this.inCar=false;CAR.speed=0;CAR.condition="Parked";this.flash("Exited Distortion.",1300);}
 updateCamera(){const cam=this.cameras.main,a=this.inCar?this.car:this.player,ratio=Phaser.Math.Clamp(Math.abs(CAR.speed)/CAR.maxSpeed,0,1);cam.setZoom(this.inCar?Phaser.Math.Linear(ZOOM.carSlow,ZOOM.carFast,ratio):ZOOM.foot);const vw=cam.width/cam.zoom,vh=cam.height/cam.zoom;cam.scrollX=Phaser.Math.Clamp(a.x-vw/2,0,Math.max(0,this.mapW-vw));cam.scrollY=Phaser.Math.Clamp(a.y-vh/2,0,Math.max(0,this.mapH-vh));}
 updateLabels(){this.playerLabel.setPosition(this.player.x,this.player.y-72).setVisible(!this.inCar);this.carLabel.setPosition(this.car.x,this.car.y-80).setVisible(this.inCar||Phaser.Math.Distance.Between(this.player.x,this.player.y,this.car.x,this.car.y)<200);}
 drawLocator(){this.locator.clear();const a=this.inCar?this.car:this.player;this.locator.lineStyle(4,0x9befff,.85).strokeCircle(a.x,a.y,this.inCar?55:42);}
 drawHeadlights(){this.headlightLayer.clear();if(!this.inCar||!CAR.headlightsOn)return;const a=this.carHeading,fx=this.car.x+Math.cos(a)*52,fy=this.car.y+Math.sin(a)*52,len=280,width=90,ex=fx+Math.cos(a)*len,ey=fy+Math.sin(a)*len,sx=Math.cos(a+Math.PI/2),sy=Math.sin(a+Math.PI/2);this.headlightLayer.fillStyle(0x9befff,.035);this.headlightLayer.fillTriangle(fx,fy,ex+sx*width,ey+sy*width,ex-sx*width,ey-sy*width);}
 checkPrompts(){if(this.tempPrompt)return;let msg="";if(!this.inCar&&Phaser.Math.Distance.Between(this.player.x,this.player.y,this.car.x,this.car.y)<115)msg="Press E / X to enter Distortion";else if(this.inCar)msg="E / X exits vehicle";this.prompt.setText(msg).setVisible(!!msg);}
 flash(text,ms){this.tempPrompt=true;this.prompt.setText(text).setVisible(true);this.time.delayedCall(ms,()=>{this.tempPrompt=false;this.prompt.setVisible(false);});}
 updateHud(){this.hMode.setText("Mode: "+(this.inCar?"Driving Distortion":"On foot")+"   Map: real Westgate/Blacklight");this.hHp.setText("HP: "+DONNY.hp+"/"+DONNY.hpMax);this.hpBar.width=180*(DONNY.hp/DONNY.hpMax);this.hFuel.setText("Fuel: "+Math.round(CAR.fuel/CAR.fuelMax*100)+"% "+CAR.condition);this.fuelBar.width=180*(CAR.fuel/CAR.fuelMax);}
 updateDebug(){if(!this.debugText.visible)return;const a=this.inCar?this.car:this.player;this.debugText.setText("WESTGATE BLACKLIGHT CONNECTOR v01\nBASE: "+MAP_BASE_PATH+"\nMASK: "+MAP_MASK_PATH+"\nMAP SIZE: "+this.mapW+"x"+this.mapH+"\nACTIVE: "+Math.round(a.x)+","+Math.round(a.y)+"\nDONNY: "+(this.hasDonnySheet?"staging sheet":"fallback")+"\nMASK: "+(this.maskCtx?"loaded pixel collision":"not loaded / disabled")+"\nFAILED: "+(this.failed.size?Array.from(this.failed).join(", "):"none"));}
}
new Phaser.Game({type:Phaser.AUTO,width:GAME_W,height:GAME_H,backgroundColor:"#050505",pixelArt:true,scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},physics:{default:"arcade",arcade:{debug:false}},scene:[MainScene]});
</script>
</body>
</html>
