  }

  init(data){this.startPage=data?.pageId||'GLASSWELL_C3';this.startSpawn=data?.spawn||'donny_city_start'}

  create(){
    setupTouch();
    this.keys=this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT,SPACE,X,J,B,K,Y,E,R,ENTER,I,TAB,ESC');
    this.input.keyboard.on('keydown-SPACE',()=>this.handleA());
    this.input.keyboard.on('keydown-X',()=>this.handleX());
    this.input.keyboard.on('keydown-J',()=>this.handleX());
    this.input.keyboard.on('keydown-B',()=>this.handleB());
    this.input.keyboard.on('keydown-K',()=>this.handleB());
    this.yKeyDownAt=0;
    this.input.keyboard.on('keydown-Y',e=>{
      if(e.repeat)return;
      this.yKeyDownAt=this.time.now;
    });
    this.input.keyboard.on('keyup-Y',()=>{
      const held=this.time.now-(this.yKeyDownAt||0);
      this.yKeyDownAt=0;
      if(this.inVan && held>=520)this.toggleHeadlights();
      else this.handleY();
    });

    // E remains a quick interact key for desktop testing.
    this.input.keyboard.on('keydown-E',()=>this.handleY());
    this.input.keyboard.on('keydown-R',()=>this.refillVanFuel(FUEL.max));
    this.input.keyboard.on('keydown-ENTER',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-I',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-TAB',()=>this.toggleInventory());
    this.input.keyboard.on('keydown-ESC',()=>this.isInventoryOpen?this.toggleInventory():this.scene.start('TitleScene'));

    this.worldClockStartMs=this.time.now;
    this.makeHud();
    this.loadPage(this.startPage,this.startSpawn);
  }

  makeHud(){
    // Day/night overlay stays below HUD but above the map.
    this.dayNightOverlay=this.add.graphics().setScrollFactor(0).setDepth(18000);

    // Left corner world HUD: weekday, time, city/world/district.
    this.worldHud=this.add.text(10,8,'',{
      fontFamily:'Arial Black',
      fontSize:'12px',
      color:'#d7faff',
      backgroundColor:'rgba(0,0,0,.62)',
      padding:{x:8,y:5}
    }).setScrollFactor(0).setDepth(20002);

    // Donny HP / control state sits under the world HUD so it does not fight the location line.
    this.hud=this.add.text(10,34,'',{
      fontFamily:'Arial Black',
      fontSize:'12px',
      color:'#ffffff',
      backgroundColor:'rgba(0,0,0,.55)',
      padding:{x:8,y:5}
    }).setScrollFactor(0).setDepth(20001);

    this.status=this.add.text(GAME_W-14,8,'',{fontFamily:'Arial Black',fontSize:'13px',color:'#f0e5be',backgroundColor:'rgba(0,0,0,.55)',padding:{x:8,y:5}}).setOrigin(1,0).setScrollFactor(0).setDepth(20000);
    this.prompt=this.add.text(10,GAME_H-34,'',{fontFamily:'Arial',fontSize:'14px',color:'#f0e5be',backgroundColor:'rgba(0,0,0,.62)',padding:{x:8,y:6}}).setScrollFactor(0).setDepth(20000);

    // In-car HUD gauges: Donny HP on top, car fuel under it.
    this.carGauge=this.add.graphics().setScrollFactor(0).setDepth(20001).setVisible(false);
    this.hpGaugeLabel=this.add.text(12,64,'',{fontFamily:'Arial Black',fontSize:'12px',color:'#ffffff'}).setScrollFactor(0).setDepth(20002).setVisible(false);
    this.fuelGaugeLabel=this.add.text(12,86,'',{fontFamily:'Arial Black',fontSize:'12px',color:'#ffffff'}).setScrollFactor(0).setDepth(20002).setVisible(false);

    this.updateWorldClockHud();
  }

  updateCarHudGauges(){
    if(!this.carGauge || !this.hpGaugeLabel || !this.fuelGaugeLabel)return;
    const show=!!this.inVan;
    this.carGauge.setVisible(show);
    this.hpGaugeLabel.setVisible(show);
    this.fuelGaugeLabel.setVisible(show);

    if(!show){
      this.carGauge.clear();
      return;
    }

    const x=10;
    const y=62;
    const w=180;
    const h=10;
    const gap=22;

    const hpPct=clamp((this.playerHp||0)/(this.playerMaxHp||100),0,1);
    const fuelPct=clamp((this.vanFuel||0)/(FUEL.max||100),0,1);

    this.carGauge.clear();

    // HP backing and fill.
    this.carGauge.fillStyle(0x08090b,.88).fillRoundedRect(x,y,w,h,3);
    this.carGauge.fillStyle(0x1fef69,1).fillRoundedRect(x,y,w*hpPct,h,3);
    this.carGauge.lineStyle(1,0xffffff,.7).strokeRoundedRect(x,y,w,h,3);

    // Fuel backing and fill.
    this.carGauge.fillStyle(0x08090b,.88).fillRoundedRect(x,y+gap,w,h,3);
    this.carGauge.fillStyle(0xffc43b,1).fillRoundedRect(x,y+gap,w*fuelPct,h,3);
    this.carGauge.lineStyle(1,0xffffff,.7).strokeRoundedRect(x,y+gap,w,h,3);

    this.hpGaugeLabel.setText(`DONNY HP ${Math.ceil(this.playerHp||0)}/${this.playerMaxHp||100}`).setPosition(x,y-17);
    this.fuelGaugeLabel.setText(`ASTRO VAN FUEL ${Math.ceil(this.vanFuel||0)}%`).setPosition(x,y+gap-17);
  }


  worldClockMinutes(){
    // Starts at Monday 06:00 and advances continuously from scene start.
    const cfg=WORLD_TIME;
    const start=(cfg.startDay*1440)+(cfg.startHour*60)+(cfg.startMinute||0);
    const elapsedSec=(this.time.now-(this.worldClockStartMs||0))/1000;
    const gameMinutes=elapsedSec*(1440/(cfg.realSecondsPerGameDay||720));
    return Math.floor(start+gameMinutes);
  }

  worldClockInfo(){
    const total=this.worldClockMinutes();
    const dayIndex=Math.floor(total/1440)%7;
    const minuteOfDay=((total%1440)+1440)%1440;
    const hour=Math.floor(minuteOfDay/60);
    const minute=minuteOfDay%60;
    const weekday=(WORLD_TIME.weekdays||['MON','TUE','WED','THU','FRI','SAT','SUN'])[dayIndex]||'MON';
    const hh=String(hour).padStart(2,'0');
    const mm=String(minute).padStart(2,'0');
    return {weekday,hour,minute,time:`${hh}:${mm}`,minuteOfDay};
  }

  currentLocationInfo(){
    return PAGE_LOCATION[this.pageId] || {world:'DUST-9',city:'UNKNOWN CITY',district:this.pageId||'UNKNOWN'};
  }

  updateWorldClockHud(){
    if(!this.worldHud)return;
    const t=this.worldClockInfo();
    const loc=this.currentLocationInfo();
    this.worldHud.setText(`${t.weekday} ${t.time} | ${loc.city}, ${loc.world} | ${loc.district}`);
  }

  dayNightAlpha(){
    const t=this.worldClockInfo();
    const h=t.hour + t.minute/60;

    // Brightest noon, darkest late night. Smooth enough for testing.
    if(h>=6 && h<8)return Phaser.Math.Linear(.46,.12,(h-6)/2);       // dawn
    if(h>=8 && h<18)return .06;                                      // day
    if(h>=18 && h<20)return Phaser.Math.Linear(.10,.48,(h-18)/2);    // dusk
    if(h>=20 || h<5)return .58;                                      // night
    return .42;                                                       // pre-dawn
  }

  updateDayNightCycle(){
    if(!this.dayNightOverlay)return;

    const alpha=this.dayNightAlpha();
    const t=this.worldClockInfo();
    this.dayNightOverlay.clear();

    // Night shade.
    this.dayNightOverlay.fillStyle(0x050914,alpha);
    this.dayNightOverlay.fillRect(0,0,GAME_W,GAME_H);

    // Slight blue/cyan Dust-9 pre-dawn tint.
    if(t.hour>=5 && t.hour<7){
      this.dayNightOverlay.fillStyle(0x122840,.13);
      this.dayNightOverlay.fillRect(0,0,GAME_W,GAME_H);
    }

    // Red-orange dusk tint.
    if(t.hour>=18 && t.hour<20){
      this.dayNightOverlay.fillStyle(0x4a1808,.12);
      this.dayNightOverlay.fillRect(0,0,GAME_W,GAME_H);
    }

    // Keep the overlay below UI.
    this.dayNightOverlay.setDepth(18000);
  }


  loadPage(id,spawnId){
    this.children.list.filter(o=>o.mapObj).forEach(o=>o.destroy());
    this.pageId=id;
    const p=PAGES[id];
    let w,h;
    if(p.synthetic){w=p.width;h=p.height;this.createDesertMap(w,h);}
    else{
      const tex=this.textures.exists(key(id,'base'))?key(id,'base'):null;
      if(tex){
        const img=this.textures.get(tex).getSourceImage();
        w=img.width;h=img.height;
        this.add.image(0,0,tex).setOrigin(0).setDepth(0).setData('mapObj',true);
      } else {
        w=1536;h=1152;this.createDesertMap(w,h);
      }
    }
    this.mapW=w;this.mapH=h;this.data=buildPageData(id,w,h);

    const sp=this.data.spawns[spawnId]||this.data.spawns.donny_city_start||Object.values(this.data.spawns)[0]||{x:w*.5,y:h*.55};
    this.playerX=sp.x;this.playerY=sp.y;
    this.createPlayerSprites();

    if(!this.van || id==='GLASSWELL_C3'){
      this.spawnVanNearDonny();
    } else {
      this.van.setVisible(id===this.vanPage);
    }

    this.spawnStartingFuelCan();
    this.spawnCivicPatrolSceneProps();

    if(!p.synthetic && this.textures.exists(key(id,'fg'))){
      this.add.image(0,0,key(id,'fg')).setOrigin(0).setDepth(9000).setData('mapObj',true);
    }
    this.cameras.main.setBounds(0,0,w,h);
    this.cameras.main.startFollow(this.inVan?this.van:this.player,true,.12,.12);
    this.message(p.label);
    this.updateWorldClockHud();
    this.updateDayNightCycle();
  }


  spawnCivicPatrolSceneProps(){
    if(this.pageId!=='GLASSWELL_C3')return;

    // Clear old Civic Patrol refs when reloading this map.
    this.civicGuards=[];
    this.civicCars=[];

    // Three guards placed near the white-dot marks from the screenshot.
    const guardPositions=[
      {x:this.mapW*.435,y:this.mapH*.315,dir:'right',armed:false},
      {x:this.mapW*.500,y:this.mapH*.285,dir:'right',armed:true},
      {x:this.mapW*.570,y:this.mapH*.315,dir:'left',armed:false}
    ];

    guardPositions.forEach((p,i)=>{
      const key=p.dir==='left' && this.textures.exists('civic_patrol_walk_left_8f') ? 'civic_patrol_walk_left_8f' : 'civic_patrol_walk_right_8f';
      const guard=this.add.sprite(p.x,p.y,key,0)
        .setOrigin(.5,.88)
        .setScale(CIVIC_PATROL.guardScale)
        .setDepth(p.y+1300)
        .setData('mapObj',true)
        .setData('civicPatrolGuard',true)
        .setData('armed',p.armed)
        .setData('alive',true)
        .setData('hp',p.armed?42:34)
        .setData('dir',p.dir)
        .setData('nextAttackAt',0)
        .setData('hurtUntil',0)
        .setData('money',Math.floor(1+Math.random()*90))
        .setData('equippedWeapon',p.armed?'civic_patrol_pistol':null);

      if(this.anims.exists(key+'_anim'))guard.play(key+'_anim');

      // One guard only gets the pistol overlay. Other two stay empty-hand.
      let gun=null;
      if(p.armed && this.textures.exists('civic_patrol_pistol_held_right')){
        gun=this.add.image(p.x+24,p.y-54,'civic_patrol_pistol_held_right')
          .setOrigin(.5,.5)
          .setScale(.19)
          .setDepth(p.y+1302)
          .setData('mapObj',true)
          .setData('civicPatrolWeapon',true);
      }

      guard.setData('weaponSprite',gun);
      this.civicGuards.push(guard);
    });

    // Two Civic Patrol cars placed near the white-line marks from the screenshot.
    const cars=[
      {x:this.mapW*.395,y:this.mapH*.432,frame:1,angle:-13,handlingKey:'civicPatrolCruiser',vehicleName:'Civic Patrol Cruiser',spriteKey:'civic_patrol_car_8dir',vehicleScale:2.65},
      {x:this.mapW*.612,y:this.mapH*.432,frame:7,angle:13,handlingKey:'civicPatrolBlockade',vehicleName:'Civic Patrol Blockade Car',spriteKey:'civic_patrol_blockade_car_8dir',vehicleScale:1.42}
    ];

    cars.forEach(c=>{
      if(!this.textures.exists(c.spriteKey||'civic_patrol_car_8dir'))return;
      const car=this.add.sprite(c.x,c.y,c.spriteKey||'civic_patrol_car_8dir',c.frame)
        .setOrigin(.5,.62)
        .setScale(c.vehicleScale || CIVIC_PATROL.carScale)
        .setAngle(c.angle)
        .setDepth(c.y+800)
        .setData('mapObj',true)
        .setData('civicPatrolCar',true)
        .setData('civicPatrolCarFrame',c.frame)
        .setData('maxHp',c.handlingKey==='civicPatrolBlockade'?150:110)
        .setData('hp',c.handlingKey==='civicPatrolBlockade'?150:110)
        .setData('cover',true)
        .setData('solidVehicle',true)
        .setData('vehicleWeight',c.handlingKey==='civicPatrolBlockade'?2600:1800)
        .setData('impactDamage',70)
        .setData('impactKnockback',c.handlingKey==='civicPatrolBlockade'?142:118)
        .setData('aiVel',{x:0,y:0})
        .setData('impactCooldown',0)
        .setData('wrecked',false);

      // Small HP bar over the car so damage testing is visible.
      const hpBar=this.add.graphics().setDepth(c.y+1400).setData('mapObj',true);
      car.setData('hpBar',hpBar);
      this.drawCivicCarHpBar(car);

      this.civicCars.push(car);

      // Simple parked-car collision bodies for later combat/vehicle testing.
      if(this.physics && this.physics.add){
        this.physics.add.existing(car,true);
        if(car.body){
          car.body.setSize(60,38);
          car.body.setOffset(2,20);
        }
      }
    });
  }

  spawnStartingFuelCan(){
    if(this.pageId!=='GLASSWELL_C3')return;
    if(this.startFuelCanPicked)return;

    if(this.startFuelCan && this.startFuelCan.destroy)this.startFuelCan.destroy();

    const x=clamp((this.playerX||this.mapW*.5)+92,60,this.mapW-60);
    const y=clamp((this.playerY||this.mapH*.55)+46,60,this.mapH-60);

    const tex=this.textures.exists('fuel_can_pickup') ? 'fuel_can_pickup' : 'pickup_dot';
    this.startFuelCan=this.add.image(x,y,tex)
      .setOrigin(.5,1)
      .setScale(tex==='fuel_can_pickup' ? .55 : 1)
      .setDepth(y+700)
      .setData('mapObj',true);
  }

  nearFuelPickup(){
    return !!(this.startFuelCan && this.startFuelCan.visible && !this.inVan && dist(this.playerX,this.playerY,this.startFuelCan.x,this.startFuelCan.y)<58);
  }

  addToPlayer(id,qty=1){
    const item=makeInventoryItem(id,qty);
    if(this.getPlayerWeight()+itemStackWeight(item)>this.playerWeightLimit){
      this.message('Donny inventory full');
      return false;
    }
    const existing=this.playerInventory.find(x=>x.id===id);
    if(existing)existing.qty=(existing.qty||1)+qty;
    else this.playerInventory.push(item);
    this.bag=this.playerInventory;
    this.syncInventoryFlags();
    return true;
  }

  pickupStartingFuelCan(){
    if(!this.nearFuelPickup())return false;
    if(!this.addToPlayer('fuel_can',1))return true;

    this.startFuelCanPicked=true;
    if(this.startFuelCan)this.startFuelCan.destroy();
    this.startFuelCan=null;
    this.message('Picked up fuel can');
    return true;
  }

  createDesertMap(w,h){
    const g=this.add.graphics().setDepth(0).setData('mapObj',true);
    g.fillStyle(0x171411,1).fillRect(0,0,w,h);
    g.fillStyle(0x2a241c,1);
    for(let y=0;y<h;y+=96)g.fillRect(0,y+46,w,2);
    g.fillStyle(0x3a3127,.8);
    for(let x=0;x<w;x+=160)g.fillRect(x,0,2,h);
    g.lineStyle(4,0x6f6254,.9);
    g.strokeRect(80,80,w-160,h-160);
  }

  createPlayerSprites(){
    if(!this.player){
      const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
      this.player=this.add.sprite(this.playerX,this.playerY,texture,0).setOrigin(.5,DONNY.originY || .90).setScale(DONNY.scale).setDepth(this.playerY+1000);
      this.gun=this.add.sprite(this.playerX,this.playerY,GUN_PROP.key,0).setOrigin(.5,.5).setScale(GUN_PROP.scale).setVisible(false).setDepth(this.playerY+1005);
      this.holster=this.add.sprite(this.playerX,this.playerY,HOLSTER.key,0).setOrigin(.5,.5).setScale(HOLSTER.scale).setVisible(false).setDepth(this.playerY+1004);
      this.fuelCan=this.add.sprite(this.playerX,this.playerY,FUEL_CAN_PROP.key,0).setOrigin(.5,.5).setScale(FUEL_CAN_PROP.scale).setVisible(false).setDepth(this.playerY+1007);
    }
    this.player.setPosition(this.playerX,this.playerY).setVisible(!this.inVan).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.updateFuelCanOverlay();
    this.setDonnyIdle();
  }

  spawnVanNearDonny(){
    // Van starts visible with safe fallback, then upgrades to runtime-cropped real sheet.
    const vx=clamp(this.mapW*.46,100,this.mapW-100);
    const vy=clamp(this.mapH*.56,100,this.mapH-100);

    const safeTex=(this.safeVanTextureForDir ? this.safeVanTextureForDir('right') : 'astro_van_safe_right');

    if(!this.van){
      this.van=this.add.sprite(vx,vy,safeTex,0).setOrigin(.5,.68).setScale(VAN.renderScale).setDepth(vy+900);
    } else {
      this.van.setPosition(vx,vy).setVisible(true).setTexture(safeTex);
    }

    this.vanX=this.van.x;
    this.vanY=this.van.y;
    this.vanPage=this.pageId;
    this.vanDir='right';
    this.astroVan=this.van;
    this.activeVehicle=this.van;
    this.activeVehicleType='astro';

    this.updateVanVisual(false);
    this.createVanLightObjects();
    this.enableVanPhysics();
  }

  inputVector(){
    let x = Number(TOUCH.moveX) || 0;
    let y = Number(TOUCH.moveY) || 0;

    if(this.keys.LEFT.isDown||this.keys.A.isDown)x-=1;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)x+=1;
    if(this.keys.UP.isDown||this.keys.W.isDown)y-=1;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)y+=1;

    if(!Number.isFinite(x))x=0;
    if(!Number.isFinite(y))y=0;

    // Small deadzone only. Do not erase vertical movement.
    if(Math.abs(x)<.05)x=0;
    if(Math.abs(y)<.05)y=0;

    const len0=Math.hypot(x,y);
    if(len0>1){x/=len0;y/=len0}

    const len=Math.min(1,Math.hypot(x,y));

    return {
      x:Number.isFinite(x)?x:0,
      y:Number.isFinite(y)?y:0,
      len:Number.isFinite(len)?len:0
    };
  }

  directionFromVector(x,y,last='down'){
    x=Number(x)||0;
    y=Number(y)||0;

    const ax=Math.abs(x);
    const ay=Math.abs(y);
    if(ax<.05 && ay<.05)return last;

    // Prioritize vertical if it is a real input.
    if(ay>.08 && ay>=ax*.55)return y>0?'down':'up';
    if(ax>.08)return x>0?'right':'left';
    return y>0?'down':'up';
  }

  vanDirectionFromVector(x,y,last='right'){
    if(Math.abs(x)<.05 && Math.abs(y)<.05)return last;
    const ang=Math.atan2(y,x);
    const oct=Math.round(ang/(Math.PI/4));
    const dirs={0:'right',1:'downRight',2:'down',3:'downLeft',4:'left',"-4":'left',"-3":'upLeft',"-2":'up',"-1":'upRight'};
    return dirs[oct]||last;
  }

  getVanFootprint(){
    if(!this.van || !this.van.visible || this.inVan)return null;
    const bw=Math.max(124,VAN.body?.w || 112);
    const bh=Math.max(48,VAN.body?.h || 48);
    const oy=VAN.body?.offsetY || -24;
    return {
      x:this.van.x-bw/2,
      y:this.van.y+oy-bh/2,
      w:bw,
      h:bh,
      car:this.van,
      solid:true,
      weight:3200
    };
  }

  pointInRect(r,x,y){
    return !!r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h;
  }

  rectsOverlap(a,b){
    return !!(a&&b && a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y);
  }

  getDonnyFootBox(x=this.playerX,y=this.playerY){
    // Small physical footprint at Donny's feet. This stops him walking through cars
    // without making his whole hat/body collide.
    return {x:x-14,y:y-13,w:28,h:20};
  }

  getCivicCarFootprint(car,atX=null,atY=null){
    if(!car || !car.active || !car.visible)return null;

    const cx=atX===null ? car.x : atX;
    const cy=atY===null ? car.y : atY;
    const isBlockade=car.getData && car.getData('handlingKey')==='civicPatrolBlockade';

    // Weighted solid vehicle footprint.
    // This is intentionally wider than the visual wheels/body so Donny cannot
    // squeeze through parked cars or barricades by touching only a pixel gap.
    const w=Math.max(isBlockade?150:132,(car.displayWidth||170)*(isBlockade?.98:.94));
    const h=Math.max(isBlockade?76:66,(car.displayHeight||105)*(isBlockade?.66:.62));
    return {
      x:cx-w/2,
      y:cy-h/2+10,
      w,
      h,
      car,
      solid:true,
      weight:car.getData ? (car.getData('vehicleWeight')||1800) : 1800
    };
  }

  getVehicleFootprint(vehicle,atX=null,atY=null){
    if(!vehicle || !vehicle.active || !vehicle.visible)return null;
    if(vehicle.getData && vehicle.getData('civicPatrolCar')){
      return this.getCivicCarFootprint(vehicle,atX,atY);
    }
    const cx=atX===null ? vehicle.x : atX;
    const cy=atY===null ? vehicle.y : atY;
    const bw=VAN.body?.w || 112;
    const bh=VAN.body?.h || 48;
    const oy=VAN.body?.offsetY || -24;
    return {x:cx-bw/2,y:cy+oy-bh/2,w:bw,h:bh,car:vehicle};
  }

  getBlockingCivicCarAt(x,y,ignore=null){
    if(!this.civicCars || !this.civicCars.length)return null;
    for(const car of this.civicCars){
      if(ignore && car===ignore)continue;
      const r=this.getCivicCarFootprint(car);
      if(this.pointInRect(r,x,y))return r;
    }
    return null;
  }

  segmentBlockedByCivicCar(x1,y1,x2,y2){
    if(!this.civicCars || !this.civicCars.length)return null;
    const steps=Math.max(8,Math.ceil(Math.hypot(x2-x1,y2-y1)/18));
    for(let i=1;i<=steps;i++){
      const t=i/steps;
      const x=Phaser.Math.Linear(x1,x2,t);
      const y=Phaser.Math.Linear(y1,y2,t);
      const r=this.getBlockingCivicCarAt(x,y);
      if(r)return r.car;
    }
    return null;
  }

  drawCivicCarHpBar(car){
    const g=car?.getData('hpBar');
    if(!g || !car || !car.active)return;

    const max=car.getData('maxHp')||100;
    const hp=clamp(car.getData('hp')||0,0,max);
    const pct=max>0 ? hp/max : 0;
    const w=78;
    const h=6;
    const x=car.x-w/2;
    const y=car.y-(car.displayHeight||90)*.34-18;

    g.clear();
    g.setDepth(car.y+1400);

    // Show full bar only when damaged; show a faint cover marker at full HP.
    const alpha=hp<max ? .95 : .40;
    g.fillStyle(0x08090b,alpha).fillRect(x,y,w,h);
    g.fillStyle(hp>45 ? 0x43ef68 : (hp>20 ? 0xffc43b : 0xff3344),alpha).fillRect(x,y,w*pct,h);
    g.lineStyle(1,0xffffff,alpha*.75).strokeRect(x,y,w,h);
  }

  updateCivicCarHpBars(){
    if(!this.civicCars)return;
    this.civicCars.forEach(car=>this.drawCivicCarHpBar(car));
  }

  spawnCivicCarDamageFx(car,heavy=false){
    if(!car || !car.active)return;

    // Placeholder damage FX until you make real car damage / door sprites.
    const smoke=this.add.circle(
      car.x+Phaser.Math.Between(-12,12),
      car.y-Phaser.Math.Between(16,34),
      heavy?9:6,
      0x6f7576,
      .55
    ).setDepth(car.y+1600).setData('mapObj',true);

    this.tweens.add({
      targets:smoke,
      y:smoke.y-24,
      alpha:0,
      scale:heavy?2.4:1.8,
      duration:520,
      onComplete:()=>smoke.destroy()
    });
  }

  damageCivicPatrolCar(car,damage,label='Hit'){
    if(!car || !car.active)return false;

    const max=car.getData('maxHp')||100;
    const before=car.getData('hp')||max;
    const hp=clamp(before-damage,0,max);
    car.setData('hp',hp);

    car.setTintFill(0xff3344);
    this.time.delayedCall(90,()=>{
      if(car && car.active){
        if(hp<=0)car.setTint(0x555555);
        else car.clearTint();
      }
    });

    this.spawnCivicCarDamageFx(car,hp<=0 || damage>=18);
    this.drawCivicCarHpBar(car);

    if(hp<=0 && !car.getData('wrecked')){
      car.setData('wrecked',true);
      car.setAlpha(.88);
      this.message(`${label}: Civic Patrol car disabled`);
    } else {
      this.message(`${label}: car HP ${hp}/${max}`);
    }

    return true;
  }

  hitCivicPatrolCar(range,damage,label='Hit'){
    if(!this.civicCars || !this.civicCars.length)return false;

    const v=this.civicFacingVector ? this.civicFacingVector(this.playerDir) : ({x:1,y:0});
    let best=null;
    let bestD=999999;

    this.civicCars.forEach(car=>{
      if(!car || !car.active)return;
      const gx=car.x-this.playerX;
      const gy=car.y-this.playerY;
      const d=Math.hypot(gx,gy);
      if(d>range || d>=bestD)return;

      const dot=(gx*v.x+gy*v.y)/Math.max(1,d);
      if(range<100 && dot<-0.15)return;
      if(range>=100 && dot<0.10)return;

      best=car;
      bestD=d;
    });

    if(!best)return false;

    // Vehicles take less from body hits, more from pistol.
    const finalDamage=range>=180 ? damage : Math.ceil(damage*.55);
    return this.damageCivicPatrolCar(best,finalDamage,label);
  }

  civicGuardCanStandAt(x,y,ignoreGuard=null){
    const feet={x:x-14,y:y-13,w:28,h:20};
    if(this.civicCars && this.civicCars.length){
      for(const car of this.civicCars){
        const r=this.getCivicCarFootprint(car);
        if(this.rectsOverlap(r,feet))return false;
      }
    }
    return true;
  }


  canDonnyStandAt(x,y){
    // Keep Donny in the page.
    if(x<20 || y<20 || x>this.mapW-20 || y>this.mapH-20)return false;

    const nextFeet=this.getDonnyFootBox(x,y);
    const oldFeet=this.getDonnyFootBox(this.playerX,this.playerY);
    const blocks=[];

    // Van uses a small body/footprint, not the full image rectangle.
    const vanBox=this.getVanFootprint();
    if(vanBox)blocks.push(vanBox);

    // Civic Patrol cars are physical cover. Donny cannot walk through them.
    if(this.civicCars && this.civicCars.length){
      this.civicCars.forEach(car=>{
        const r=this.getCivicCarFootprint(car);
        if(r)blocks.push(r);
      });
    }

    for(const box of blocks){
      const currentlyInside=this.rectsOverlap(box,oldFeet);
      const nextInside=this.rectsOverlap(box,nextFeet);
      if(!nextInside)continue;

      // If Donny somehow starts inside a body, allow only the direction that escapes.
      if(currentlyInside){
        const cx=box.x+box.w/2;
        const cy=box.y+box.h/2;
        const oldD=Math.hypot(this.playerX-cx,this.playerY-cy);
        const newD=Math.hypot(x-cx,y-cy);
        if(newD>oldD)continue;
      }
      return false;
    }

    return true;
  }

  moveDonnyWithCollision(dx,dy){
    if(!dx && !dy)return;

    // First try normal collision-safe move.
    const nx=this.playerX+dx;
    const ny=this.playerY+dy;
    if(this.canDonnyStandAt(nx,ny)){
      this.playerX=nx;
      this.playerY=ny;
      return;
    }

    // Axis separation. This prevents the van from blocking north/south if only one axis is bad.
    if(dy && this.canDonnyStandAt(this.playerX,this.playerY+dy)){
      this.playerY+=dy;
      return;
    }
    if(dx && this.canDonnyStandAt(this.playerX+dx,this.playerY)){
      this.playerX+=dx;
      return;
    }

    // Emergency escape only if Donny is already inside the Astro Van footprint.
    // Do not bypass Civic Patrol car cover collision.
    const vanBox=this.getVanFootprint();
    if(vanBox && this.pointInRect(vanBox,this.playerX,this.playerY) && Math.abs(dy)>Math.abs(dx)*.75){
      this.playerY=clamp(this.playerY+dy,20,this.mapH-20);
    }
  }

  enableVanPhysics(){
    if(!this.physics || !this.van)return;
    if(!this.van.body)this.physics.add.existing(this.van);
    if(this.van.body){
      this.van.body.setAllowGravity(false);
      this.van.body.setImmovable(true);
      this.van.body.setSize(VAN.body?.w || 112, VAN.body?.h || 48, false);
      this.van.body.setOffset(
        (VAN.driveFrame.w-(VAN.body?.w || 112))/2,
        (VAN.driveFrame.h*.58)+(VAN.body?.offsetY || -24)
      );
    }
  }

  burnVanFuel(inputLen,delta){
    if(!this.inVan)return;
    if(this.vanFuel<=0)return;

    const h=this.activeVehicleHandling ? this.activeVehicleHandling() : ASTRO_VAN_HANDLING;
    const burnRate=(FUEL.burnPerSecond||2.8) * ((h.fuelBurnDrive||0.028)/0.028);
    const burn=burnRate*Math.max(0,inputLen||0)*delta/1000;
    this.vanFuel=clamp(this.vanFuel-burn,0,FUEL.max);

    if(this.vanFuel<=0){
      this.vanFuel=0;
      this.message('Out of fuel');
    }
  }

  canDriveVan(inputLen){
    if((inputLen||0)<=.08)return false;
    if(this.vanFuel>0)return true;

    if(this.time.now-this.lastFuelWarning>(FUEL.emptyWarningCooldown||1400)){
      this.lastFuelWarning=this.time.now;
      this.message('Out of fuel — refill at a fuel station');
    }
    return false;
  }

  refillVanFuel(amount=FUEL.max){
    const before=this.vanFuel;
    this.vanFuel=clamp(this.vanFuel+amount,0,FUEL.max);
    if(this.vanFuel>before)this.message(`Fuel refilled: ${Math.round(this.vanFuel)}%`);
  }

  fuelText(){
    return `${Math.max(0,Math.ceil(this.vanFuel))}%`;
  }

  realVanFrameForDir(dir=this.vanDir,animated=false){
    const base=VAN.idleFrame[dir] ?? 0;

    if(VAN.activeLayout==='8dir11'){
      const step=animated ? Math.floor(this.time.now/95)%11 : 0;
      return base + step;
    }

    if(VAN.activeLayout==='4dir4'){
      const step=animated ? Math.floor(this.time.now/130)%4 : 0;
      return base + step;
    }

    return base;
  }

  safeVanTextureForDir(dir=this.vanDir){
    const keyMap={
      right:'astro_van_safe_right',
      left:'astro_van_safe_left',
      down:'astro_van_safe_down',
      up:'astro_van_safe_up',
      downRight:'astro_van_safe_downRight',
      upRight:'astro_van_safe_upRight',
      downLeft:'astro_van_safe_downLeft',
      upLeft:'astro_van_safe_upLeft'
    };
    return keyMap[dir] || 'astro_van_safe_right';
  }

  realVanFrameForDir(dir=this.vanDir,animated=false){
    const base=VAN.idleFrame[dir] ?? 0;

    if(VAN.activeLayout==='8dir11'){
      const step=animated ? Math.floor(this.time.now/110)%11 : 0;
      return base + step;
    }

    if(VAN.activeLayout==='4dir4'){
      const step=animated ? Math.floor(this.time.now/140)%4 : 0;
      return base + step;
    }

    return 0;
  }

  canUseRealVan(){
    return !!(VAN.activeDriveKey && this.textures.exists(VAN.activeDriveKey) && VAN.activeDriveKey!=='astro_van_drive_fallback');
  }

  vanTextureForDir(dir=this.vanDir){
    const keyMap={
      right:'astro_van_generated_right',
      left:'astro_van_generated_left',
      down:'astro_van_generated_down',
      up:'astro_van_generated_up',
      downRight:'astro_van_generated_downRight',
      upRight:'astro_van_generated_upRight',
      downLeft:'astro_van_generated_downLeft',
      upLeft:'astro_van_generated_upLeft'
    };
    return keyMap[dir] || 'astro_van_generated_right';
  }

  ensureVanCropTexture(){
    if(this.vanCropReady)return this.textures.exists(VAN.cropKey);

    if(!this.textures.exists(VAN.fullImageKey))return false;

    const src=this.textures.get(VAN.fullImageKey).getSourceImage();
    if(!src || !src.width || !src.height)return false;

    const cols=11;
    const rows=8;
    const fw=Math.max(1,Math.floor(src.width/cols));
    const fh=Math.max(1,Math.floor(src.height/rows));

    VAN.cropFrame={w:fw,h:fh};
    VAN.columns=cols;
    VAN.cropReady=true;

    if(this.textures.exists(VAN.cropKey))this.textures.remove(VAN.cropKey);
    this.textures.createCanvas(VAN.cropKey,fw,fh);

    this.vanCropReady=true;
    this.updateVanVisual(false);
    return true;
  }

  vanRuntimeCropAvailable(){
    return !!(this.textures.exists(VAN.fullImageKey) && this.textures.get(VAN.fullImageKey)?.getSourceImage());
  }

  cleanVanRuntimeCrop(ctx,fw,fh){
    // Removes disconnected frame fragments caused by bad sheet slicing.
    // Keeps components that overlap the center of the van frame, plus large components.
    let img;
    try{ img=ctx.getImageData(0,0,fw,fh); }catch(e){ return; }

    const data=img.data;
    const total=fw*fh;
    const seen=new Uint8Array(total);
    const keep=new Uint8Array(total);
    const qx=[];
    const qy=[];

    const alphaAt=(i)=>data[i*4+3];

    for(let y=0;y<fh;y++){
      for(let x=0;x<fw;x++){
        const start=y*fw+x;
        if(seen[start] || alphaAt(start)<18)continue;

        let head=0;
        qx.length=0;
        qy.length=0;
        qx.push(x);
        qy.push(y);
        seen[start]=1;

        const pts=[];
        let minX=x,maxX=x,minY=y,maxY=y;

        while(head<qx.length){
          const cx=qx[head];
          const cy=qy[head++];
          const idx=cy*fw+cx;
          pts.push(idx);

          if(cx<minX)minX=cx;
          if(cx>maxX)maxX=cx;
          if(cy<minY)minY=cy;
          if(cy>maxY)maxY=cy;

          const neighbors=[
            [cx+1,cy],
            [cx-1,cy],
            [cx,cy+1],
            [cx,cy-1]
          ];

          for(const [nx,ny] of neighbors){
            if(nx<0||ny<0||nx>=fw||ny>=fh)continue;
            const ni=ny*fw+nx;
            if(seen[ni]||alphaAt(ni)<18)continue;
            seen[ni]=1;
            qx.push(nx);
            qy.push(ny);
          }
        }

        const area=pts.length;
        const overlapsCenter = maxX>=fw*.18 && minX<=fw*.82 && maxY>=fh*.30;
        const largeEnough = area>=65;
        const huge = area>=380;

        if((largeEnough && overlapsCenter) || huge){
          for(const p of pts)keep[p]=1;
        }
      }
    }

    for(let i=0;i<total;i++){
      if(alphaAt(i)>=18 && !keep[i]){
        data[i*4+3]=0;
      }
    }

    ctx.putImageData(img,0,0);
  }

  renderVanRuntimeCrop(animated=false){
    if(!this.van || !this.vanRuntimeCropAvailable())return false;

    const img=this.textures.get(VAN.fullImageKey).getSourceImage();
    if(!img || !img.width || !img.height)return false;

    const cols=11;
    const rows=8;

    // Use true image dimensions. This still supports imperfect exported sheets.
    const fw=Math.floor(img.width/cols);
    const fh=Math.floor(img.height/rows);

    if(fw<16 || fh<16)return false;

    // Direction correction:
    // - left/downLeft mirror the right/downRight rows.
    // - upRight/upLeft were visually reading as BACK-facing/reversing in-game.
    //   They now use the front diagonal row so NE/NW do not look like the van
    //   is driving backward.
    const sourceDirMap={
      left:'right',
      downLeft:'downRight',
      upRight:'downRight',
      upLeft:'downRight'
    };

    const sourceDir=sourceDirMap[this.vanDir] || this.vanDir;
    const flipX=(this.vanDir==='left' || this.vanDir==='downLeft' || this.vanDir==='upLeft');

    const rowMap={
      down:0,
      downRight:1,
      right:2,
      upRight:3,
      up:4,
      upLeft:5,
      left:6,
      downLeft:7
    };

    const row=rowMap[sourceDir] ?? 2;

    // Freeze to frame 0 for now. This stops cycling through any bad/cropped
    // drive frames until the van sheet is re-exported perfectly.
    const col=0;

    const key=VAN.cropKey || 'astro_van_drive_cropped_runtime';

    if(!this.textures.exists(key)){
      this.textures.createCanvas(key,fw,fh);
      VAN.cropFrame={w:fw,h:fh};
    }

    const tex=this.textures.get(key);
    const canvas=tex.getSourceImage();

    if(canvas.width!==fw || canvas.height!==fh){
      this.textures.remove(key);
      this.textures.createCanvas(key,fw,fh);
    }

    const tex2=this.textures.get(key);
    const ctx=tex2.getContext();

    ctx.clearRect(0,0,fw,fh);
    ctx.save();

    if(flipX){
      ctx.translate(fw,0);
      ctx.scale(-1,1);
      ctx.drawImage(img,col*fw,row*fh,fw,fh,0,0,fw,fh);
    } else {
      ctx.drawImage(img,col*fw,row*fh,fw,fh,0,0,fw,fh);
    }

    ctx.restore();

    // Remove any disconnected edge fragments from neighboring frames.
    if(this.cleanVanRuntimeCrop)this.cleanVanRuntimeCrop(ctx,fw,fh);

    tex2.refresh();

    this.van.setTexture(key);
    this.van.setOrigin(.5,.68);
    this.van.setScale(VAN.renderScale);
    return true;
  }

  updateVanVisual(animated=false){
    // Civic Patrol cars use a simple 8-direction 64x64 Phaser sheet.
    if(this.activeVehicleType==='civic' && this.van && this.van.getData && this.van.getData('civicPatrolCar')){
      const frameMap={down:0,downRight:1,right:2,upRight:3,up:4,upLeft:5,left:6,downLeft:7};
      const frame=frameMap[this.vanDir] ?? 2;
      const spriteKey=this.van.getData('vehicleSpriteKey') || 'civic_patrol_car_8dir';
      this.van.setTexture(spriteKey,frame);
      this.van.setOrigin(.5,.62);
      this.van.setScale(this.van.getData('vehicleScale') || CIVIC_PATROL.carScale);
      this.van.setAngle(0);
      return;
    }

    if(!this.van)return;

    // First choice: runtime crop from the exact full Astro Van sheet.
    // This prevents cut-off frames and multiple cars showing in one frame.
    if(this.renderVanRuntimeCrop && this.renderVanRuntimeCrop(animated)){
      return;
    }

    // Second choice: safe generated fallback, never invisible.
    const tex=this.safeVanTextureForDir ? this.safeVanTextureForDir(this.vanDir) : 'astro_van_safe_right';
    if(this.textures.exists(tex) && this.van.texture.key!==tex){
      this.van.setTexture(tex);
    }

    this.van.setOrigin(.5,.68);
    this.van.setScale(VAN.renderScale);
  }

  createVanLightObjects(){
    if(this.headlightBeam)return;

    this.headlightBeam=this.add.graphics()
      .setDepth(50)
      .setVisible(false);

    this.headlightCore=this.add.graphics()
      .setDepth(51)
      .setVisible(false);
  }

  getVanForwardVector(){
    const dir=this.vanDir || 'right';
    const map={
      right:{x:1,y:0},
      left:{x:-1,y:0},
      down:{x:0,y:1},
      up:{x:0,y:-1},
      downRight:{x:.707,y:.707},
      downLeft:{x:-.707,y:.707},
      upRight:{x:.707,y:-.707},
      upLeft:{x:-.707,y:-.707}
    };
    return map[dir] || map.right;
  }

  updateVanHeadlights(){
    if(!this.van || !this.headlightBeam || !this.headlightCore)return;

    const visible=this.headlightsOn && this.van.visible;
    this.headlightBeam.setVisible(visible);
    this.headlightCore.setVisible(visible);

    if(!visible){
      this.headlightBeam.clear();
      this.headlightCore.clear();
      return;
    }

    const f=this.getVanForwardVector();
    const side={x:-f.y,y:f.x};
    const originX=this.van.x + f.x*44;
    const originY=this.van.y + f.y*24 - 8;

    const leftLamp={
      x:originX + side.x*HEADLIGHTS.sideSpread,
      y:originY + side.y*HEADLIGHTS.sideSpread
    };
    const rightLamp={
      x:originX - side.x*HEADLIGHTS.sideSpread,
      y:originY - side.y*HEADLIGHTS.sideSpread
    };

    const tip={
      x:originX + f.x*HEADLIGHTS.length,
      y:originY + f.y*HEADLIGHTS.length
    };

    const sideWide={
      x:side.x*HEADLIGHTS.width,
      y:side.y*HEADLIGHTS.width
    };

    this.headlightBeam.clear();
    this.headlightCore.clear();

    // Wide soft cone.
    this.headlightBeam.fillStyle(HEADLIGHTS.color, HEADLIGHTS.alpha);
    this.headlightBeam.beginPath();
    this.headlightBeam.moveTo(leftLamp.x,leftLamp.y);
    this.headlightBeam.lineTo(tip.x+sideWide.x,tip.y+sideWide.y);
    this.headlightBeam.lineTo(tip.x-sideWide.x,tip.y-sideWide.y);
    this.headlightBeam.lineTo(rightLamp.x,rightLamp.y);
    this.headlightBeam.closePath();
    this.headlightBeam.fillPath();

    // Bright center cone.
    this.headlightCore.fillStyle(HEADLIGHTS.coreColor, HEADLIGHTS.coreAlpha);
    this.headlightCore.beginPath();
    this.headlightCore.moveTo(leftLamp.x,leftLamp.y);
    this.headlightCore.lineTo(tip.x+side.x*32,tip.y+side.y*32);
    this.headlightCore.lineTo(tip.x-side.x*32,tip.y-side.y*32);
    this.headlightCore.lineTo(rightLamp.x,rightLamp.y);
    this.headlightCore.closePath();
    this.headlightCore.fillPath();

    // Lamp bulbs.
    this.headlightCore.fillStyle(0xffffff, .95);
    this.headlightCore.fillCircle(leftLamp.x,leftLamp.y,5);
    this.headlightCore.fillCircle(rightLamp.x,rightLamp.y,5);

    this.headlightBeam.setDepth(this.van.y+850);
    this.headlightCore.setDepth(this.van.y+851);
  }

  toggleHeadlights(){
    this.headlightsOn=!this.headlightsOn;
    this.message(this.headlightsOn?'Headlights on':'Headlights off');
  }

  honkHorn(){
    this.hornUntil=this.time.now+380;
    this.message('HONK');
  }

  rearOfVanPoint(){
    if(!this.van)return {x:0,y:0};
    const f=this.getVanForwardVector ? this.getVanForwardVector() : {x:1,y:0};
    return {
      x:this.van.x - f.x*58,
      y:this.van.y - f.y*42
    };
  }

  nearRearOfVan(){
    if(!this.van || !this.van.visible || this.inVan)return false;
    const rear=this.rearOfVanPoint();
    return dist(this.playerX,this.playerY,rear.x,rear.y)<74;
  }

  refuelVanWithCan(){
    if(this.inVan)return false;
    if(!this.hasFuelCan || !this.fuelCanEquipped)return false;
    if(!this.nearRearOfVan())return false;

    if(this.vanFuel>=FUEL.max){
      this.message('Van fuel already full');
      return true;
    }

    // Reuse empty pistol/aiming pose; the fuel can overlay sits at the hand.
    this.actionType='refuel';
    this.actionUntil=this.time.now+650;
    const anim=`donny_shoot_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);

    this.refillVanFuel(FUEL.max);
    this.message('Refueled Astro Van');
    return true;
  }

  handleA(){
    if(this.rearMenuOpen){this.selectRearMenuOption();return}
    if(this.isInventoryOpen){this.useInventory();return}
    if(this.inVan){this.handBrakeVan();return}
    if(this.jumpZ>1 || this.isCrawling)return;
    this.jumpVel=8.8;
    this.actionType='jump';
    this.actionUntil=this.time.now+420;
    this.playDonnyAction('jump');
  }

  handleX(){
    if(this.rearMenuOpen){this.nextRearMenuOption();return}
    if(this.isInventoryOpen){this.nextInventory();return}
    if(this.inVan){
      this.toggleVanMusic();
      return;
    }
    if(this.fuelCanEquipped){
      this.actionType='hold_can';
      this.actionUntil=this.time.now+260;
      const anim=`donny_shoot_${this.playerDir}`;
      if(this.anims.exists(anim))this.player.play(anim,true);
      this.message('Fuel can ready');
      return;
    }
    if(this.weaponEquipped)this.shootPistol();
    else this.punch();
  }

  handleB(){
    if(this.rearMenuOpen){this.closeRearMenu();return}
    if(this.isInventoryOpen){this.dropInventory();return}
    if(this.inVan){this.brakeVan();return}
    if(this.nearRearOfVan && this.nearRearOfVan()){this.openRearMenu();return}
    const input=this.inputVector();
    if(this.isCrawling){this.isCrawling=false;this.setDonnyIdle();this.message('Crawl off');return}
    if(input.y>.55){this.isCrawling=true;this.message('Crawl on');return}
    if(input.len>.25){this.slide(input);return}
    this.kick();
  }

  activeVehicleHandling(){
    const vehicle=this.activeVehicle || this.van;
    const key=(vehicle && vehicle.getData && vehicle.getData('handlingKey')) || (this.activeVehicleType==='civic'?'civicPatrolCruiser':'astroVan');
    return VEHICLE_HANDLING[key] || ASTRO_VAN_HANDLING;
  }

  activeVehicleName(){
    const vehicle=this.activeVehicle || this.van;
    const h=this.activeVehicleHandling();
    return (vehicle && vehicle.getData && vehicle.getData('vehicleName')) || h.label || (this.activeVehicleType==='civic'?'Civic Patrol Car':'Astro Van');
  }

  getVanSpeed(){
    const v=this.vanVel||{x:0,y:0};
    return Math.hypot(v.x||0,v.y||0);
  }

  brakeVan(){
    const speed=this.getVanSpeed();
    if(speed<=18){
      this.exitVan();
      return;
    }
    const h=this.activeVehicleHandling ? this.activeVehicleHandling() : ASTRO_VAN_HANDLING;
    this.vanVel.x*=h.brakeFriction||0.45;
    this.vanVel.y*=h.brakeFriction||0.45;
    this.message(`${this.activeVehicleName()} brake`);
  }

  handBrakeVan(){
    if(!this.inVan)return;
    const h=this.activeVehicleHandling ? this.activeVehicleHandling() : ASTRO_VAN_HANDLING;
    this.vanHandBrakeUntil=this.time.now+(h.className==='heavy van'?560:420);
    this.vanVel.x*=h.handBrakeFriction||0.82;
    this.vanVel.y*=h.handBrakeFriction||0.82;
    this.message(`${this.activeVehicleName()} handbrake`);
  }

  toggleVanMusic(){
    this.musicOn=!this.musicOn;
    this.message(this.musicOn?'Music on':'Music off');
  }


  actorFootBox(actor,x=null,y=null){
    const ax=x===null ? actor.x : x;
    const ay=y===null ? actor.y : y;
    return {x:ax-14,y:ay-14,w:28,h:24};
  }

  vehicleImpactVector(vehicle,vel=null){
    const v=vel || (vehicle===this.van ? this.vanVel : (vehicle.getData ? vehicle.getData('aiVel') : null)) || {x:0,y:1};
    const mag=Math.max(1,Math.hypot(v.x||0,v.y||0));
    return {x:(v.x||0)/mag,y:(v.y||0)/mag,mag};
  }

  applyVehicleKnockbackToDonny(vehicle,vel){
    const h=this.activeVehicleHandling ? this.activeVehicleHandling() : ASTRO_VAN_HANDLING;
    const impact=this.vehicleImpactVector(vehicle,vel);
    const dmg=(vehicle.getData && vehicle.getData('impactDamage')) || h.impactDamage || 70;
    const kb=(vehicle.getData && vehicle.getData('impactKnockback')) || h.impactKnockback || 126;

    if(this.time.now-(this.lastVehicleHitAt||0)<700)return;
    this.lastVehicleHitAt=this.time.now;

    this.damageDonny(dmg,'Vehicle impact');

    const nx=clamp(this.playerX+impact.x*kb,20,this.mapW-20);
    const ny=clamp(this.playerY+impact.y*kb,20,this.mapH-20);
    this.playerX=nx;
    this.playerY=ny;
    this.player.setPosition(this.playerX,this.playerY-this.jumpZ).setDepth(this.playerY+1000);

    this.actionType='hurt';
    this.actionUntil=this.time.now+360;
    this.playDonnyAction('hurt');

    this.message(`Hit by car -${dmg} HP`);
  }

  applyVehicleKnockbackToGuard(vehicle,guard,vel){
    if(!guard || !guard.active || guard.getData('alive')===false)return;
    if(this.time.now-(guard.getData('lastVehicleHitAt')||0)<650)return;

    const impact=this.vehicleImpactVector(vehicle,vel);
    const h=(vehicle && vehicle.getData && VEHICLE_HANDLING[vehicle.getData('handlingKey')]) || this.activeVehicleHandling?.() || ASTRO_VAN_HANDLING;
    const dmg=(vehicle.getData && vehicle.getData('impactDamage')) || h.impactDamage || 70;
    const kb=(vehicle.getData && vehicle.getData('impactKnockback')) || h.impactKnockback || 126;

    guard.setData('lastVehicleHitAt',this.time.now);
    const hp=(guard.getData('hp')||34)-dmg;
    guard.setData('hp',hp);

    const dir=(guard.x<this.playerX)?'left':'right';
    guard.x=clamp(guard.x+impact.x*kb,20,this.mapW-20);
    guard.y=clamp(guard.y+impact.y*kb,20,this.mapH-20);
    guard.setDepth(guard.y+1300);

    if(hp<=0){
      guard.setData('alive',false);
      this.setCivicGuardAnim(guard,'ko',dir);
      guard.setScale(CIVIC_PATROL.koScale || (CIVIC_PATROL.guardScale*.55));
      guard.setOrigin(.5,.55);
      guard.y+=22;
      guard.setDepth(guard.y+420);

      if(this.spawnCivicPatrolKOInventoryDrops)this.spawnCivicPatrolKOInventoryDrops(guard);

      const gun=guard.getData('weaponSprite');
      if(gun && gun.active)gun.destroy();

      this.message('Vehicle impact: Civic Patrol down');
    } else {
      this.setCivicGuardAnim(guard,'hurt',dir);
      guard.setData('hurtUntil',this.time.now+350);
      this.message(`Vehicle impact: Civic Patrol HP ${Math.max(0,hp)}`);
    }
  }

  checkVehicleImpactAgainstActors(vehicle,nextX,nextY,vel=null){
    if(!vehicle || !vehicle.active || !vehicle.visible)return;

    const box=this.getVehicleFootprint(vehicle,nextX,nextY);
    if(!box)return;

    const impact=this.vehicleImpactVector(vehicle,vel);
    const minSpeed=52;
    if(impact.mag<minSpeed)return;

    // Player/Donny hit test. Do not hit Donny while he is the driver/passenger.
    if(!this.inVan){
      const feet=this.getDonnyFootBox(this.playerX,this.playerY);
      if(this.rectsOverlap(box,feet)){
        this.applyVehicleKnockbackToDonny(vehicle,vel);
      }
    }

    // Vehicle hits Civic Patrol guards too. This makes cars feel heavy and lets
    // driving into enemies behave like a real impact.
    if(this.civicGuards && this.civicGuards.length){
      this.civicGuards.forEach(guard=>{
        if(!guard || !guard.active || guard.getData('alive')===false)return;
        const gbox=this.actorFootBox(guard);
        if(this.rectsOverlap(box,gbox)){
          this.applyVehicleKnockbackToGuard(vehicle,guard,vel);
        }
      });
    }
  }

  solidVehicleBlockedAt(vehicle,nextX,nextY){
    const movingBox=this.getVehicleFootprint(vehicle,nextX,nextY);
    if(!movingBox)return null;

    // Civic patrol cars block every other car.
    if(this.civicCars && this.civicCars.length){
      for(const car of this.civicCars){
        if(!car || car===vehicle || !car.active || !car.visible)continue;
        const box=this.getCivicCarFootprint(car);
        if(this.rectsOverlap(movingBox,box))return car;
      }
    }

    // Astro Van blocks other drivable cars when Donny is not currently using it.
    if(this.astroVan && this.astroVan!==vehicle && this.astroVan.visible){
      const oldVan=this.van;
      const oldInVan=this.inVan;
      this.van=this.astroVan;
      this.inVan=false;
      const vbox=this.getVanFootprint();
      this.van=oldVan;
      this.inVan=oldInVan;
      if(this.rectsOverlap(movingBox,vbox))return this.astroVan;
    }

    return null;
  }


  updateVanDrivingPhysics(input,delta){
    if(!this.van)return;

    const dt=Math.min(.05,Math.max(0,delta/1000));
    const h=this.activeVehicleHandling ? this.activeVehicleHandling() : ASTRO_VAN_HANDLING;
    this.vanVel=this.vanVel||{x:0,y:0};

    const movingInput=(input && input.len>.08);
    const handBraking=this.time.now<this.vanHandBrakeUntil;

    if(movingInput && this.canDriveVan(input.len)){
      const ix=input.x/input.len;
      const iy=input.y/input.len;

      // 8-direction visual facing follows steering input immediately.
      this.vanDir=this.vanDirectionFromVector(input.x,input.y,this.vanDir);

      // Break velocity into forward/input and lateral drift.
      const vx=this.vanVel.x;
      const vy=this.vanVel.y;
      const forward=vx*ix + vy*iy;
      const fx=ix*forward;
      const fy=iy*forward;
      let lx=vx-fx;
      let ly=vy-fy;

      const grip=handBraking ? h.handBrakeGrip : h.lateralGrip;
      lx*=Math.pow(grip,delta/16.67);
      ly*=Math.pow(grip,delta/16.67);

      this.vanVel.x=fx+lx+ix*h.accel*input.len*dt;
      this.vanVel.y=fy+ly+iy*h.accel*input.len*dt;

      this.burnVanFuel(input.len*(.35+this.getVanSpeed()/Math.max(1,h.maxSpeed)),delta);
    } else {
      if(movingInput)this.canDriveVan(input.len);
    }

    const friction=handBraking ? h.handBrakeFriction : (movingInput ? h.driveFriction : h.coastFriction);
    const decay=Math.pow(friction,delta/16.67);
    this.vanVel.x*=decay;
    this.vanVel.y*=decay;

    // Clamp max speed.
    const speed=this.getVanSpeed();
    if(speed>h.maxSpeed){
      const s=h.maxSpeed/speed;
      this.vanVel.x*=s;
      this.vanVel.y*=s;
    }

    // Very slow speed snaps to zero.
    if(this.getVanSpeed()<3 && !movingInput){
      this.vanVel.x=0;
      this.vanVel.y=0;
    }

    let nx=this.van.x+this.vanVel.x*dt;
    let ny=this.van.y+this.vanVel.y*dt;

    // Simple crude collision/bounds bounce.
    let bounced=false;
    if(nx<20 || nx>this.mapW-20){
      nx=clamp(nx,20,this.mapW-20);
      this.vanVel.x*=-h.collisionBounce;
      bounced=true;
    }
    if(ny<20 || ny>this.mapH-20){
      ny=clamp(ny,20,this.mapH-20);
      this.vanVel.y*=-h.collisionBounce;
      bounced=true;
    }

    // Weighted vehicle-to-vehicle collision. Cars are solid objects and cannot
    // drive through each other.
    const blockedVehicle=this.solidVehicleBlockedAt ? this.solidVehicleBlockedAt(this.van,nx,ny) : null;
    if(blockedVehicle){
      nx=this.van.x;
      ny=this.van.y;
      const mass=(blockedVehicle.getData && blockedVehicle.getData('vehicleWeight')) || 2200;
      const bounce=mass>=2600 ? .18 : .28;
      this.vanVel.x*=-bounce;
      this.vanVel.y*=-bounce;
      bounced=true;
      if(this.getVanSpeed()>45 && blockedVehicle.getData && blockedVehicle.getData('civicPatrolCar')){
        this.damageCivicPatrolCar(blockedVehicle,6,'Vehicle impact');
      }
    }

    // Vehicle impacts against people: 70% HP damage and hard knockback.
    if(this.checkVehicleImpactAgainstActors){
      this.checkVehicleImpactAgainstActors(this.van,nx,ny,this.vanVel);
    }

    if(bounced && this.getVanSpeed()>35)this.message('Heavy impact');

    this.van.x=nx;
    this.van.y=ny;

    if(this.getVanSpeed()>18){
      this.vanDir=this.vanDirectionFromVector(this.vanVel.x,this.vanVel.y,this.vanDir);
    }

    if(this.van.body)this.van.body.updateFromGameObject();
    this.updateVanVisual(this.getVanSpeed()>10);
  }

  canEnterVanNow(){
    if(!this.nearestDrivableVehicle || !this.nearestDrivableVehicle(VAN.enterDistance))return false;
    const input=this.inputVector ? this.inputVector() : {len:0};
    if(input.len>.16){
      this.message('Stop moving, then press Y to enter');
      return false;
    }
    return true;
  }


  civicFacingVector(dir){
    return {
      right:{x:1,y:0},
      left:{x:-1,y:0},
      up:{x:0,y:-1},
      down:{x:0,y:1}
    }[dir] || {x:1,y:0};
  }

  setCivicGuardAnim(guard,base,dir){
    if(!guard || !guard.active)return;
    const left=dir==='left';
    let key=`civic_patrol_${base}_${left?'left':'right'}_8f`;

    // Attack/shoot/hurt/KO currently use right-facing strips and mirror left.
    if(!this.textures.exists(key)){
      key=`civic_patrol_${base}_right_8f`;
    }
    if(!this.textures.exists(key))return;

    guard.setTexture(key);
    guard.setFlipX(left && !key.includes('_left_'));

    const animKey=key+'_anim';
    if(this.anims.exists(animKey))guard.play(animKey,true);
  }

  updateCivicWeaponOverlay(guard,dir){
    const gun=guard?.getData('weaponSprite');
    if(!gun || !gun.active)return;

    const left=dir==='left';
    gun.setVisible(guard.getData('alive')!==false);
    gun.setFlipX(left);
    gun.setPosition(guard.x+(left?-21:21), guard.y-54);
    gun.setDepth(guard.y+1302);
  }

  damageDonny(amount,label='Civic Patrol'){
    if(this.playerHp<=0)return;
    const now=this.time.now;
    if(now-this.lastPlayerHitAt<220)return;
    this.lastPlayerHitAt=now;
    this.playerHp=clamp((this.playerHp||100)-amount,0,this.playerMaxHp||100);
    this.message(`${label} hit Donny -${amount} HP`);
    if(this.playerHp<=0){
      this.message('Donny is down — test reset with refresh');
    }
  }

  spawnCivicShot(guard,tx,ty){
    if(!guard || !this.textures.exists('laser_bolt'))return;
    const sx=guard.x + ((tx<guard.x)?-28:28);
    const sy=guard.y - 52;
    const bolt=this.add.image(sx,sy,'laser_bolt')
      .setScale(.65)
      .setTint(0xff3344)
      .setDepth(guard.y+1500)
      .setData('mapObj',true);

    const angle=Phaser.Math.RadToDeg(Math.atan2(ty-sy,tx-sx));
    bolt.setAngle(angle);

    this.tweens.add({
      targets:bolt,
      x:tx,
      y:ty-24,
      alpha:0,
      duration:180,
      onComplete:()=>bolt.destroy()
    });
  }


  updateCivicPatrolVehicleAI(delta){
    if(!this.civicCars || !this.civicCars.length)return;
    if(this.pageId!=='GLASSWELL_C3')return;

    const dt=Math.min(.05,Math.max(0,delta/1000));

    this.civicCars.forEach(car=>{
      if(!car || !car.active || !car.visible || car.getData('wrecked'))return;
      if(car===this.activeVehicle)return;

      const target=this.inVan ? (this.activeVehicle||this.van) : null;

      // For now, patrol cars only ram/chase when Donny is driving. They stay
      // solid cover while Donny is on foot.
      const vel=car.getData('aiVel') || {x:0,y:0};
      if(!target){
        vel.x*=Math.pow(.92,delta/16.67);
        vel.y*=Math.pow(.92,delta/16.67);
        car.setData('aiVel',vel);
        return;
      }

      const h=VEHICLE_HANDLING[car.getData('handlingKey')] || VEHICLE_HANDLING.civicPatrolCruiser || ASTRO_VAN_HANDLING;
      const dx=target.x-car.x;
      const dy=target.y-car.y;
      const d=Math.max(1,Math.hypot(dx,dy));
      const chaseRange=720;
      if(d>chaseRange){
        vel.x*=Math.pow(.94,delta/16.67);
        vel.y*=Math.pow(.94,delta/16.67);
        car.setData('aiVel',vel);
        return;
      }

      const ix=dx/d;
      const iy=dy/d;
      const aiAccel=h.accel*.42;
      const aiMax=h.maxSpeed*.42;

      vel.x+=ix*aiAccel*dt;
      vel.y+=iy*aiAccel*dt;

      const speed=Math.hypot(vel.x,vel.y);
      if(speed>aiMax){
        vel.x*=aiMax/speed;
        vel.y*=aiMax/speed;
      }

      vel.x*=Math.pow(h.driveFriction||.99,delta/16.67);
      vel.y*=Math.pow(h.driveFriction||.99,delta/16.67);

      let nx=car.x+vel.x*dt;
      let ny=car.y+vel.y*dt;
      let blocked=this.solidVehicleBlockedAt ? this.solidVehicleBlockedAt(car,nx,ny) : null;

      if(blocked){
        nx=car.x;
        ny=car.y;
        vel.x*=-((h.collisionBounce||.25)*.8);
        vel.y*=-((h.collisionBounce||.25)*.8);

        if(blocked===this.activeVehicle && blocked.getData && blocked.getData('civicPatrolCar')){
          this.damageCivicPatrolCar(blocked,8,'Patrol ram');
        }
      }

      this.checkVehicleImpactAgainstActors(car,nx,ny,vel);

      car.x=clamp(nx,20,this.mapW-20);
      car.y=clamp(ny,20,this.mapH-20);
      car.setDepth(car.y+800);
      car.setData('aiVel',vel);

      // Update 8-direction visual frame while AI moves.
      if(Math.hypot(vel.x,vel.y)>8){
        const dir=this.vanDirectionFromVector(vel.x,vel.y,'right');
        const frameMap={down:0,downRight:1,right:2,upRight:3,up:4,upLeft:5,left:6,downLeft:7};
        const frame=frameMap[dir] ?? car.getData('civicPatrolCarFrame') ?? 2;
        const spriteKey=car.getData('vehicleSpriteKey') || 'civic_patrol_car_8dir';
        car.setTexture(spriteKey,frame);
        car.setData('civicPatrolCarFrame',frame);
      }

      if(this.drawCivicCarHpBar)this.drawCivicCarHpBar(car);
    });
  }


  updateCivicPatrolCombat(delta){
    if(!this.civicGuards || !this.civicGuards.length)return;
    if(this.pageId!=='GLASSWELL_C3')return;

    const now=this.time.now;
    const dt=Math.min(.05,Math.max(0,delta/1000));

    this.civicGuards.forEach((guard,i)=>{
      if(!guard || !guard.active || guard.getData('alive')===false)return;

      const armed=!!guard.getData('armed');
      const dx=this.playerX-guard.x;
      const dy=this.playerY-guard.y;
      const d=Math.max(1,Math.hypot(dx,dy));
      const dir=dx<0?'left':'right';
      guard.setData('dir',dir);

      const targetVehicle=this.inVan ? (this.activeVehicle||this.van) : null;
      const targetX=targetVehicle ? targetVehicle.x : this.playerX;
      const targetY=targetVehicle ? targetVehicle.y : this.playerY;
      const tdx=targetX-guard.x;
      const tdy=targetY-guard.y;
      const td=Math.max(1,Math.hypot(tdx,tdy));

      const chaseRange=this.inVan ? (armed?560:470) : (armed?380:300);
      const attackRange=this.inVan ? (armed?255:74) : (armed?235:50);
      const speed=this.inVan ? (armed?72:82) : (armed?52:64);

      if(now < (guard.getData('hurtUntil')||0)){
        this.updateCivicWeaponOverlay(guard,dir);
        return;
      }

      if(td < chaseRange && td > attackRange){
        const nx=guard.x+(tdx/td)*speed*dt;
        const ny=guard.y+(tdy/td)*speed*dt;

        // Guards cannot walk through patrol cars either.
        if(this.civicGuardCanStandAt(nx,ny,guard)){
          guard.x=nx;
          guard.y=ny;
        } else if(this.civicGuardCanStandAt(nx,guard.y,guard)){
          guard.x=nx;
        } else if(this.civicGuardCanStandAt(guard.x,ny,guard)){
          guard.y=ny;
        }

        guard.setDepth(guard.y+1300);
        this.setCivicGuardAnim(guard,'walk',dir);
      } else if(td <= attackRange){
        if(now >= (guard.getData('nextAttackAt')||0)){
          if(armed){
            this.setCivicGuardAnim(guard,'shoot_emptyhand',dir);

            if(this.inVan && targetVehicle){
              this.spawnCivicShot(guard,targetVehicle.x,targetVehicle.y);
              if(targetVehicle.getData && targetVehicle.getData('civicPatrolCar')){
                this.damageCivicPatrolCar(targetVehicle,6,'Civic Patrol pistol');
              } else {
                this.message('Civic Patrol shooting the Astro Van');
              }
            } else {
              // Cars are cover: pistol shots cannot pass through them.
              const blocked=this.segmentBlockedByCivicCar(guard.x,guard.y-48,this.playerX,this.playerY-26);
              if(blocked){
                this.spawnCivicShot(guard,blocked.x,blocked.y);
                this.damageCivicPatrolCar(blocked,2,'Stray patrol shot');
                this.message('Civic Patrol shot blocked by car cover');
              } else {
                this.spawnCivicShot(guard,this.playerX,this.playerY);
                this.damageDonny(8,'Civic Patrol pistol');
              }
            }

            guard.setData('nextAttackAt',now+1150);
          } else {
            this.setCivicGuardAnim(guard,'attack_emptyhand',dir);
            if(this.inVan && targetVehicle){
              if(targetVehicle.getData && targetVehicle.getData('civicPatrolCar')){
                this.damageCivicPatrolCar(targetVehicle,3,'Civic Patrol strike');
              } else {
                this.message('Civic Patrol beating on the Astro Van');
              }
            } else {
              this.damageDonny(5,'Civic Patrol');
            }
            guard.setData('nextAttackAt',now+760);
          }
        }
      } else {
        this.setCivicGuardAnim(guard,'walk',dir);
      }

      this.updateCivicWeaponOverlay(guard,dir);
    });
  }

  hitCivicPatrolGuard(range,damage,label='Hit'){
    // Cars can be attacked and used as cover.
    if(this.hitCivicPatrolCar && this.hitCivicPatrolCar(range,damage,label))return true;

    if(!this.civicGuards || !this.civicGuards.length)return false;

    const v=this.civicFacingVector(this.playerDir);
    let best=null;
    let bestD=999999;

    this.civicGuards.forEach(guard=>{
      if(!guard || !guard.active || guard.getData('alive')===false)return;

      const gx=guard.x-this.playerX;
      const gy=guard.y-this.playerY;
      const d=Math.hypot(gx,gy);
      if(d>range || d>=bestD)return;

      // Friendly cone. Pistol gets stricter range but still forgiving for mobile testing.
      const dot=(gx*v.x+gy*v.y)/Math.max(1,d);
      if(range<100 && dot<-0.25)return;
      if(range>=100 && dot<0.15)return;

      best=guard;
      bestD=d;
    });

    if(!best)return false;

    const hp=(best.getData('hp')||30)-damage;
    best.setData('hp',hp);
    const dir=(best.x<this.playerX)?'left':'right';

    if(hp<=0){
      best.setData('alive',false);
      this.setCivicGuardAnim(best,'ko',dir);

      // KO frames are wider/taller than walk frames. Downscale and anchor them
      // like a body on the pavement, not a standing sprite.
      best.setScale(CIVIC_PATROL.koScale || (CIVIC_PATROL.guardScale*.55));
      best.setOrigin(.5,.55);
      best.y+=22;
      best.setDepth(best.y+420);

      // KO inventory drops: equipped weapon + random money.
      this.spawnCivicPatrolKOInventoryDrops(best);

      const gun=best.getData('weaponSprite');
      if(gun && gun.active)gun.destroy();
      this.message(`${label}: Civic Patrol down — drops spawned`);
    } else {
      best.setData('hurtUntil',this.time.now+250);
      this.setCivicGuardAnim(best,'hurt',dir);

      // Small knockback.
      const awayX=best.x-this.playerX;
      const awayY=best.y-this.playerY;
      const d=Math.max(1,Math.hypot(awayX,awayY));
      best.x += (awayX/d)*18;
      best.y += (awayY/d)*18;
      best.setDepth(best.y+1300);
      this.message(`${label}: Civic Patrol HP ${Math.max(0,hp)}`);
    }

    return true;
  }



  spawnWorldDrop(id,x,y,qty=1,source='drop'){
    this.worldDrops=this.worldDrops||[];

    let tex='pickup_dot';
    let scale=.75;
    let label='Item';

    if(id==='credchip'||id==='concord_credits'){
      tex=this.textures.exists('credchip_drop')?'credchip_drop':(this.textures.exists('credits_pickup')?'credits_pickup':'pickup_dot');
      scale=.62;
      label=`$${qty} credchip${qty===1?'':'s'}`;
    } else if(id==='civic_patrol_pistol'){
      tex=this.textures.exists('civic_patrol_pistol_drop')?'civic_patrol_pistol_drop':'pickup_dot';
      scale=.30;
      label='Civic Patrol Pistol';
    } else if(id==='civic_patrol_badge'){
      tex=this.textures.exists('civic_patrol_badge_drop')?'civic_patrol_badge_drop':'pickup_dot';
      scale=.48;
      label='Civic Patrol Badge';
    } else if(id==='water_ration'){
      tex=this.textures.exists('water_ration_drop')?'water_ration_drop':'pickup_dot';
      scale=.42;
      label='Water Ration Paper';
    }

    const drop=this.add.image(x,y,tex)
      .setOrigin(.5,1)
      .setScale(scale)
      .setDepth(y+1250)
      .setData('mapObj',true)
      .setData('worldDrop',true)
      .setData('itemId',id)
      .setData('qty',qty)
      .setData('source',source)
      .setData('label',label);

    this.worldDrops.push(drop);
    return drop;
  }

  spawnCivicPatrolKOInventoryDrops(guard){
    if(!guard || !guard.active)return;

    const money=Math.max(1,Math.min(90,Math.floor(guard.getData('money')||1)));
    this.spawnWorldDrop('credchip',guard.x-14,guard.y+12,money,'civic_patrol');

    const equipped=guard.getData('equippedWeapon');
    if(equipped){
      this.spawnWorldDrop(equipped,guard.x+16,guard.y+10,1,'civic_patrol');
    }

    // Water ration paper can drop as survival loot.
    if(Math.random()<.35){
      this.spawnWorldDrop('water_ration',guard.x+34,guard.y+13,1,'civic_patrol');
    }

    // Small badge drop chance for testing inventory/key-item pickups.
    if(Math.random()<.45){
      this.spawnWorldDrop('civic_patrol_badge',guard.x+36,guard.y+14,1,'civic_patrol');
    }
  }

  nearWorldDrop(){
    if(!this.worldDrops || !this.worldDrops.length || this.inVan)return null;
    let best=null;
    let bestD=999999;
    this.worldDrops.forEach(drop=>{
      if(!drop || !drop.active || !drop.visible)return;
      const d=dist(this.playerX,this.playerY,drop.x,drop.y);
      if(d<46 && d<bestD){
        best=drop;
        bestD=d;
      }
    });
    return best;
  }

  pickupWorldDrop(){
    const drop=this.nearWorldDrop();
    if(!drop)return false;

    const id=drop.getData('itemId');
    const qty=drop.getData('qty')||1;
    const label=drop.getData('label')||id;

    if(id==='credchip'||id==='concord_credits'){
      this.money=(this.money||0)+qty;
      this.message(`Picked up ${label}`);
    } else if(id==='water_ration'){
      this.waterRations=(this.waterRations||0)+qty;
      if(!this.addToPlayer(id,qty))return true;
      this.message(`Picked up ${label}`);
    } else {
      if(!this.addToPlayer(id,qty))return true;
      this.message(`Picked up ${label}`);
    }

    drop.destroy();
    this.worldDrops=this.worldDrops.filter(d=>d && d.active);
    return true;
  }


  handleY(){
    if(this.rearMenuOpen){this.closeRearMenu();return}
    if(this.isInventoryOpen){this.toggleInventory();return}
    if(this.inVan){
      this.honkHorn();
      return;
    }
    if(this.pickupStartingFuelCan && this.pickupStartingFuelCan())return;
    if(this.pickupWorldDrop && this.pickupWorldDrop())return;
    if(this.canEnterVanNow()){this.enterVan();return}
    this.message('No interaction here');
  }

  drivableVehicles(){
    const list=[];
    if(this.astroVan && this.astroVan.active && this.astroVan.visible){
      list.push({sprite:this.astroVan,type:'astro',name:'Astro Van'});
    }
    if(this.civicCars && this.civicCars.length){
      this.civicCars.forEach(car=>{
        if(car && car.active && car.visible && !car.getData('wrecked')){
          list.push({sprite:car,type:'civic',name:car.getData('vehicleName')||'Civic Patrol Car'});
        }
      });
    }
    return list;
  }

  nearestDrivableVehicle(maxDist=VAN.enterDistance){
    let best=null;
    let bestD=999999;
    this.drivableVehicles().forEach(v=>{
      const d=dist(this.playerX,this.playerY,v.sprite.x,v.sprite.y);
      if(d<maxDist && d<bestD){
        best={...v,d};
        bestD=d;
      }
    });
    return best;
  }

  nearVan(){return !!this.nearestDrivableVehicle(VAN.enterDistance)}

  enterVan(vehicleInfo=null){
    const info=vehicleInfo || this.nearestDrivableVehicle(VAN.enterDistance);
    if(!info || !info.sprite)return;

    this.activeVehicle=info.sprite;
    this.activeVehicleType=info.type;
    this.van=info.sprite;
    this.inVan=true;

    this.player.setVisible(false);
    this.gun.setVisible(false);
    this.holster.setVisible(false);
    if(this.fuelCan)this.fuelCan.setVisible(false);

    this.vanVel={x:0,y:0};
    this.vanDir=this.vanDir || 'right';

    this.cameras.main.startFollow(this.van,true,.12,.12);
    this.message(`Entered ${info.name} — B exits`);
  }

  exitVan(){
    const vehicle=this.activeVehicle || this.van;
    const off=VAN.exitOffset[this.playerDir]||VAN.exitOffset.down;
    this.inVan=false;
    this.playerX=clamp(vehicle.x+off.x,20,this.mapW-20);
    this.playerY=clamp(vehicle.y+off.y,20,this.mapH-20);
    this.player.setPosition(this.playerX,this.playerY).setVisible(true);
    this.cameras.main.startFollow(this.player,true,.12,.12);
    this.setDonnyIdle();
    const name=this.activeVehicleType==='civic'?'Civic Patrol Car':'Astro Van';
    this.activeVehicle=null;
    this.activeVehicleType='astro';
    this.van=this.astroVan || vehicle;
    this.message(`Exited ${name}`);
  }

  punch(){this.actionType='punch';this.actionUntil=this.time.now+280;this.playDonnyAction('punch');this.hitCivicPatrolGuard(62,10,'Punch');this.message('Punch')}
  kick(){this.actionType='kick';this.actionUntil=this.time.now+320;this.playDonnyAction('kick');this.hitCivicPatrolGuard(74,14,'Kick');this.message('Kick')}
  slide(input){
    this.actionType='slide';this.slideUntil=this.time.now+360;this.actionUntil=this.slideUntil;this.slideVec={x:input.x,y:input.y};
    this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    this.playDonnyAction('slide');
    this.message('Slide');
  }

  shootPistol(){
    if(this.pistolAmmo<=0){this.message('Pistol empty');return}
    this.pistolAmmo--;
    this.actionType='shoot';
    this.actionUntil=this.time.now+ACTION.shootDuration;
    this.playDonnyAction('shoot');
    this.spawnLaserBolt();
    this.hitCivicPatrolGuard(260,20,'Pistol');
    this.message('Pistol fired');
  }

  spawnLaserBolt(){
    const v={down:{x:0,y:1},right:{x:1,y:0},left:{x:-1,y:0},up:{x:0,y:-1}}[this.playerDir]||{x:1,y:0};
    const h=GUN_PROP.hand[this.playerDir]||GUN_PROP.hand.right;
    const bolt=this.add.image(this.playerX+h.x+v.x*34,this.playerY+h.y+v.y*34,'laser_bolt').setDepth(this.playerY+1200);
    if(this.playerDir==='down')bolt.setAngle(90);
    if(this.playerDir==='up')bolt.setAngle(-90);
    if(this.playerDir==='left')bolt.setAngle(180);
    this.tweens.add({targets:bolt,x:bolt.x+v.x*220,y:bolt.y+v.y*220,alpha:0,duration:280,onComplete:()=>bolt.destroy()});
  }

  setDonnyVisual(mode='idle'){
    if(!this.player)return;

    const tex=this.player.texture ? this.player.texture.key : '';
    const usingClean = tex==='donny_idle_4dir_clean' || tex==='donny_walk_right_clean' || tex==='donny_walk_up_clean' || tex==='donny_walk_down_clean' || tex==='donny_shoot_right_empty_clean';
    const dirScale=(DONNY.dirScale && DONNY.dirScale[this.playerDir]) ? DONNY.dirScale[this.playerDir] : DONNY.scale;
    this.player.setScale(usingClean ? DONNY.cleanScale : dirScale);
    this.player.setOrigin(.5,DONNY.originY || .90);
  }

  playDonnyAction(action){
    this.setDonnyVisual('action');

    // Use the new empty-hand shooting sheet for side shooting.
    // The gun stays a separate overlay and attaches to the hand.
    if(action==='shoot' && this.textures.exists('donny_shoot_right_empty_clean') && (this.playerDir==='right' || this.playerDir==='left')){
      this.player.stop();
      this.player.setTexture('donny_shoot_right_empty_clean');
      this.player.setFlipX(this.playerDir==='left');
      this.setDonnyVisual('action');
      if(this.anims.exists('donny_shoot_right_empty_clean_anim')){
        this.player.play('donny_shoot_right_empty_clean_anim',true);
      } else {
        this.player.setFrame(0);
      }
      return;
    }

    this.player.setFlipX(false);
    const keyName= action==='shoot' ? 'donny_shoot' : `donny_${action}`;
    const anim=`${keyName}_${this.playerDir}`;
    if(this.anims.exists(anim)){
      this.player.play(anim,true);
      return;
    }

    // Hard fallback for action sheets: keep every action wired even when
    // one animation key is missing.
    const textureMap={
      punch:'donny_punch',
      kick:'donny_kick',
      jump:'donny_jump',
      slide:'donny_slide',
      crawl:'donny_crawl',
      shoot:'donny_pistol'
    };
    const tex=textureMap[action];
    if(tex && this.textures.exists(tex)){
      const base=DONNY.directionFrame[this.playerDir] || 0;
      this.player.stop();
      this.player.setTexture(tex);
      this.player.setFrame(base);
      this.setDonnyVisual('action');
    }
  }

  forceDirectionalSheet(textureKey,mode='walk'){
    // Use transparent Phaser-ready clean sheets first.
    if(mode==='walk'){
      if((this.playerDir==='right' || this.playerDir==='left') && this.textures.exists('donny_walk_right_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_right_clean');
        this.player.setFlipX(this.playerDir==='left');
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_right_clean_anim')){
          this.player.play('donny_walk_right_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }

      if(this.playerDir==='up' && this.textures.exists('donny_walk_up_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_up_clean');
        this.player.setFlipX(false);
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_up_clean_anim')){
          this.player.play('donny_walk_up_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }

      if(this.playerDir==='down' && this.textures.exists('donny_walk_down_clean')){
        this.player.stop();
        this.player.setTexture('donny_walk_down_clean');
        this.player.setFlipX(false);
        this.setDonnyVisual('walk');
        if(this.anims.exists('donny_walk_down_clean_anim')){
          this.player.play('donny_walk_down_clean_anim',true);
        } else {
          this.player.setFrame(Math.floor(this.time.now/105)%8);
        }
        return true;
      }
    }

    this.player.setFlipX(false);
    if(!this.textures.exists(textureKey))return false;
    const base=DONNY.directionFrame[this.playerDir] ?? 0;
    const frame=base + (Math.floor(this.time.now/105)%8);
