<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Dust-9 World Update</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:#050403;overflow:hidden;touch-action:none}
#game{position:fixed;inset:0;width:100vw;height:100vh}
canvas{image-rendering:pixelated}
</style>
</head>
<body>
<div id="game"></div>
<script>
const VERSION = "dust9_world_update_2026_05_24";

class Dust9Atmosphere {
  constructor(scene) {
    this.scene = scene;
    this.timeOfDay = 0.50;
    this.timeSpeed = 0.00001;
    this.stormStrength = 0;
    this.targetStormStrength = 0;
    this.layer = scene.add.container(0,0).setScrollFactor(0).setDepth(900000);
    this.night = scene.add.rectangle(0,0,scene.scale.width,scene.scale.height,0x071022,0).setOrigin(0).setScrollFactor(0);
    this.sunset = scene.add.rectangle(0,0,scene.scale.width,scene.scale.height,0xff8a3d,0).setOrigin(0).setScrollFactor(0);
    this.dust = [];
    this.layer.add([this.sunset,this.night]);
    for(let i=0;i<80;i++){
      const p=scene.add.rectangle(Phaser.Math.Between(0,scene.scale.width),Phaser.Math.Between(0,scene.scale.height),Phaser.Math.Between(3,10),Phaser.Math.Between(1,4),0xd9a15f,0);
      p.setRotation(Phaser.Math.FloatBetween(-0.2,0.2));
      this.layer.add(p);
      this.dust.push({s:p, speed:Phaser.Math.FloatBetween(70,240), drift:Phaser.Math.FloatBetween(-20,25), a:Phaser.Math.FloatBetween(.08,.32)});
    }
  }
  setStorm(v){ this.targetStormStrength = Phaser.Math.Clamp(v,0,1); }
  update(delta){
    this.timeOfDay += delta*this.timeSpeed;
    if(this.timeOfDay>1)this.timeOfDay-=1;
    this.stormStrength = Phaser.Math.Linear(this.stormStrength,this.targetStormStrength,.018);
    let nightA=0, duskA=0, t=this.timeOfDay;
    if(t>=.85 || t<=.20) nightA=.48;
    if(t>.20 && t<.30){ const k=1-((t-.20)/.10); nightA=.48*k; duskA=.18*k; }
    if(t>.68 && t<.85){ const k=(t-.68)/.17; nightA=.48*k; duskA=.25*(1-Math.abs(k-.5)*2); }
    nightA += this.stormStrength*.18;
    this.night.setAlpha(Phaser.Math.Clamp(nightA,0,.72));
    this.sunset.setAlpha(Phaser.Math.Clamp(duskA*(1-this.stormStrength),0,.32));
    for(const d of this.dust){
      const s=d.s;
      s.x += d.speed*(delta/1000)*(0.3+this.stormStrength*2.5);
      s.y += d.drift*(delta/1000);
      s.setAlpha(d.a*this.stormStrength);
      if(s.x>this.scene.scale.width+30){s.x=-30;s.y=Phaser.Math.Between(0,this.scene.scale.height);}
      if(s.y<-20)s.y=this.scene.scale.height+20;
      if(s.y>this.scene.scale.height+20)s.y=-20;
    }
  }
}

const ASSET = (p) => p + "?v=" + VERSION;

const BUILDINGS = [
  {id:"saloon", sheet:"buildingsA", frame:4, x:980, y:780, scale:.72, label:"Saloon"},
  {id:"store", sheet:"buildingsA", frame:2, x:1500, y:650, scale:.66, label:"General Store"},
  {id:"repair", sheet:"buildingsA", frame:3, x:2760, y:770, scale:.70, label:"Repair"},
  {id:"clinic", sheet:"buildingsA", frame:5, x:3060, y:1510, scale:.62, label:"Clinic"},
  {id:"sheriff", sheet:"buildingsA", frame:6, x:2210, y:1500, scale:.62, label:"Sheriff/Jail"},
  {id:"dock", sheet:"buildingsA", frame:11, x:3450, y:600, scale:.62, label:"Dock"},
  {id:"boarding", sheet:"buildingsA", frame:9, x:1110, y:1640, scale:.74, label:"Boarding"},
  {id:"market", sheet:"buildingsA", frame:8, x:2860, y:1730, scale:.62, label:"Market"},
  {id:"tower", sheet:"buildingsA", frame:10, x:520, y:540, scale:.62, label:"Water"},
  {id:"shack", sheet:"buildingsB", frame:0, x:700, y:1350, scale:.60, label:"Shack"},
  {id:"trailer", sheet:"buildingsB", frame:1, x:540, y:1780, scale:.64, label:"Trailer"},
  {id:"corner", sheet:"buildingsB", frame:9, x:1770, y:1710, scale:.70, label:"Corner"}
];

const TOWN_NPCS = [
  {key:"townsfolk1", frame:0, x:1200, y:1030, name:"Townsfolk"},
  {key:"townsfolk2", frame:0, x:1780, y:1160, name:"Townsfolk"},
  {key:"townsfolk3", frame:0, x:2530, y:1290, name:"Miner"},
  {key:"dockWorker", frame:0, x:3500, y:900, name:"Dock Worker"},
  {key:"sheriff", frame:0, x:2150, y:1680, name:"Marshal Tessa"},
  {key:"deputy", frame:0, x:2300, y:1685, name:"Deputy"},
  {key:"secretContact", frame:0, x:3830, y:2020, name:"Sable Venn"}
];

class PreloadScene extends Phaser.Scene {
  constructor(){ super("PreloadScene"); }
  preload(){
    this.add.text(24,24,"Loading Dust-9 World Update...",{fontFamily:"monospace",fontSize:"20px",color:"#f5d18b"}).setScrollFactor(0);

    this.load.image("townRoad", ASSET("assets/backgrounds/dust9_town/dust9_town_empty_road_canvas_4096.png"));
    this.load.image("saloonLarge", ASSET("assets/backgrounds/dust9_town/interiors/dust9_saloon_large_interior.png"));
    this.load.spritesheet("multiInteriors", ASSET("assets/backgrounds/dust9_town/interiors/dust9_town_multiroom_interiors.png"), {frameWidth:1024, frameHeight:768});
    this.load.spritesheet("buildingsA", ASSET("assets/buildings/dust9_town/dust9_town_building_shells_A.png"), {frameWidth:512, frameHeight:512});
    this.load.spritesheet("buildingsB", ASSET("assets/buildings/dust9_town/dust9_town_building_shells_B.png"), {frameWidth:512, frameHeight:512});

    this.load.spritesheet("townHomeProps", ASSET("assets/props/dust9_town/dust9_town_outdoor_home_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("saloonProps", ASSET("assets/props/dust9_town/dust9_town_saloon_cantina_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("shopProps", ASSET("assets/props/dust9_town/dust9_town_shop_market_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("mechanicProps", ASSET("assets/props/dust9_town/dust9_town_mechanic_scrap_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("jailProps", ASSET("assets/props/dust9_town/dust9_town_jail_security_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("clinicProps", ASSET("assets/props/dust9_town/dust9_town_clinic_med_props.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("foodItems", ASSET("assets/props/dust9_town/dust9_town_food_drinks_credits_chems.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("icons", ASSET("assets/ui/dust9_town/dust9_town_interaction_icons.png"), {frameWidth:64, frameHeight:64});

    this.load.spritesheet("townsfolk1", ASSET("assets/sprites/npcs/dust9_town/dust9_townsfolk_common_01.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("townsfolk2", ASSET("assets/sprites/npcs/dust9_town/dust9_townsfolk_common_02.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("townsfolk3", ASSET("assets/sprites/npcs/dust9_town/dust9_townsfolk_common_03.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("bartender", ASSET("assets/sprites/npcs/dust9_town/dust9_bartender.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("shopkeeper", ASSET("assets/sprites/npcs/dust9_town/dust9_shopkeeper.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("mechanic", ASSET("assets/sprites/npcs/dust9_town/dust9_mechanic.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("doctor", ASSET("assets/sprites/npcs/dust9_town/dust9_doctor_named_female.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("clinicStaff", ASSET("assets/sprites/npcs/dust9_town/dust9_clinic_staff_female.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("saloonServer", ASSET("assets/sprites/npcs/dust9_town/dust9_saloon_server_female.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("sheriff", ASSET("assets/sprites/npcs/dust9_town/dust9_sheriff_jail_officer_female.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("deputy", ASSET("assets/sprites/npcs/dust9_town/dust9_deputy_01.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("inmate", ASSET("assets/sprites/npcs/dust9_town/dust9_town_inmate_01.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("dockWorker", ASSET("assets/sprites/npcs/dust9_town/dust9_dock_worker.png"), {frameWidth:128, frameHeight:128});
    this.load.spritesheet("secretContact", ASSET("assets/sprites/npcs/dust9_town/dust9_secret_contact_female.png"), {frameWidth:128, frameHeight:128});
  }
  create(){ this.scene.start("WorldScene"); }
}

class WorldScene extends Phaser.Scene {
  constructor(){ super("WorldScene"); }
  create(){
    this.mode = "town";
    this.root = this.add.container(0,0);
    this.keys = this.input.keyboard.addKeys("W,A,S,D,T,I,L,ONE,TWO,THREE,FOUR,FIVE,SIX,PLUS,MINUS");
    this.cursors = this.input.keyboard.createCursorKeys();
    this.atmosphere = new Dust9Atmosphere(this);
    this.makeAnimations();
    this.showTown();

    this.hud = this.add.text(14,14,
      "DUST-9 WORLD UPDATE\nT: Town  L: Saloon  I: Interior gallery\n1/2/3: Clear/Wind/Storm  4/5/6: Day/Dusk/Night\nWASD/Arrows: camera  +/-: zoom",
      {fontFamily:"monospace",fontSize:"14px",color:"#f9d48c",backgroundColor:"rgba(0,0,0,.55)",padding:{x:10,y:8}}
    ).setScrollFactor(0).setDepth(999999);
  }

  makeAnimations(){
    const make = (key, start, end, rate=8) => {
      const animKey = key+"_walk_down";
      if(!this.anims.exists(animKey)){
        this.anims.create({key:animKey, frames:this.anims.generateFrameNumbers(key,{start,end}), frameRate:rate, repeat:-1});
      }
    };
    ["townsfolk1","townsfolk2","townsfolk3","bartender","shopkeeper","mechanic","doctor","clinicStaff","saloonServer","sheriff","deputy","inmate","dockWorker","secretContact"].forEach(k=>make(k,10,19,8));
  }

  clearRoot(){
    this.root.removeAll(true);
  }

  showTown(){
    this.mode="town"; this.clearRoot();
    this.cameras.main.setBounds(0,0,4096,2304).setZoom(.42).centerOn(2048,1152);
    this.physics.world.setBounds(0,0,4096,2304);
    this.root.add(this.add.image(0,0,"townRoad").setOrigin(0,0));

    for(const b of BUILDINGS){
      const spr=this.add.sprite(b.x,b.y,b.sheet,b.frame).setScale(b.scale).setDepth(b.y);
      this.root.add(spr);
      const label=this.add.text(b.x-70,b.y+140,b.label,{fontFamily:"monospace",fontSize:"16px",color:"#f7d28b",backgroundColor:"rgba(0,0,0,.5)",padding:{x:4,y:2}}).setDepth(b.y+2);
      this.root.add(label);
    }

    // General placed props.
    const props = [
      ["townHomeProps",0,800,930],["townHomeProps",3,920,1010],["shopProps",0,1430,820],["shopProps",13,2940,1870],
      ["mechanicProps",15,2660,990],["mechanicProps",10,2860,960],["jailProps",22,2170,1780],["clinicProps",0,3090,1680],
      ["icons",2,980,980],["icons",7,1500,830],["icons",10,2760,950],["icons",12,2210,1720],["icons",30,3830,2120]
    ];
    for(const [key,frame,x,y] of props){
      const s=this.add.sprite(x,y,key,frame).setScale(key==="icons"?.8:.75).setDepth(y+10);
      this.root.add(s);
    }

    for(const n of TOWN_NPCS){
      const npc=this.add.sprite(n.x,n.y,n.key,n.frame).setScale(.72).setDepth(n.y+20);
      npc.play(n.key+"_walk_down");
      this.root.add(npc);
      const name=this.add.text(n.x-46,n.y+48,n.name,{fontFamily:"monospace",fontSize:"13px",color:"#ffffff",backgroundColor:"rgba(0,0,0,.45)",padding:{x:3,y:1}}).setDepth(n.y+25);
      this.root.add(name);
    }
  }

  showSaloon(){
    this.mode="saloon"; this.clearRoot();
    this.cameras.main.setBounds(0,0,1920,1080).setZoom(.62).centerOn(960,540);
    this.root.add(this.add.image(0,0,"saloonLarge").setOrigin(0,0));

    const place = (key, frame, x, y, scale=.75) => this.root.add(this.add.sprite(x,y,key,frame).setScale(scale).setDepth(y));
    place("bartender",0,540,300,.78).play("bartender_walk_down");
    place("saloonServer",0,860,620,.75).play("saloonServer_walk_down");
    place("secretContact",0,1430,320,.74).play("secretContact_walk_down");
    place("saloonProps",6,740,700,.8); place("saloonProps",8,690,730,.75); place("saloonProps",8,790,730,.75);
    place("saloonProps",15,380,700,.9); place("foodItems",16,680,330,.55); place("foodItems",23,730,330,.55);
    place("icons",0,545,225,.75); place("icons",9,1435,245,.75);
  }

  showInteriorGallery(){
    this.mode="interiors"; this.clearRoot();
    this.cameras.main.setBounds(0,0,3200,2400).setZoom(.45).centerOn(1536,1152);
    const names=["Saloon small","Rented rooms","Security office","Jail cells","Home","Bunkroom","Market","Repair","Boarding"];
    let i=0;
    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const x=520+c*1050, y=390+r*770;
        const s=this.add.sprite(x,y,"multiInteriors",i).setDepth(y);
        this.root.add(s);
        this.root.add(this.add.text(x-180,y+310,names[i],{fontFamily:"monospace",fontSize:"24px",color:"#f7d28b",backgroundColor:"rgba(0,0,0,.55)",padding:{x:6,y:4}}).setDepth(y+2));
        i++;
      }
    }
  }

  update(time,delta){
    this.atmosphere.update(delta);
    if(Phaser.Input.Keyboard.JustDown(this.keys.T)) this.showTown();
    if(Phaser.Input.Keyboard.JustDown(this.keys.L)) this.showSaloon();
    if(Phaser.Input.Keyboard.JustDown(this.keys.I)) this.showInteriorGallery();
    if(Phaser.Input.Keyboard.JustDown(this.keys.ONE)) this.atmosphere.setStorm(0);
    if(Phaser.Input.Keyboard.JustDown(this.keys.TWO)) this.atmosphere.setStorm(.45);
    if(Phaser.Input.Keyboard.JustDown(this.keys.THREE)) this.atmosphere.setStorm(1);
    if(Phaser.Input.Keyboard.JustDown(this.keys.FOUR)) this.atmosphere.timeOfDay=.50;
    if(Phaser.Input.Keyboard.JustDown(this.keys.FIVE)) this.atmosphere.timeOfDay=.75;
    if(Phaser.Input.Keyboard.JustDown(this.keys.SIX)) this.atmosphere.timeOfDay=.02;
    if(Phaser.Input.Keyboard.JustDown(this.keys.PLUS)) this.cameras.main.zoom = Phaser.Math.Clamp(this.cameras.main.zoom + .05, .25, 1.2);
    if(Phaser.Input.Keyboard.JustDown(this.keys.MINUS)) this.cameras.main.zoom = Phaser.Math.Clamp(this.cameras.main.zoom - .05, .25, 1.2);

    const cam=this.cameras.main, spd=700*(delta/1000)/cam.zoom;
    if(this.cursors.left.isDown || this.keys.A.isDown) cam.scrollX -= spd;
    if(this.cursors.right.isDown || this.keys.D.isDown) cam.scrollX += spd;
    if(this.cursors.up.isDown || this.keys.W.isDown) cam.scrollY -= spd;
    if(this.cursors.down.isDown || this.keys.S.isDown) cam.scrollY += spd;
  }
}

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: 960,
  height: 540,
  backgroundColor: "#050403",
  pixelArt: true,
  roundPixels: true,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
  scene: [PreloadScene, WorldScene]
};
new Phaser.Game(config);
</script>
</body>
</html>
