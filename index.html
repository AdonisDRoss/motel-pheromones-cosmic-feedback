    this.player.setTexture(textureKey);
    this.player.setFrame(frame);
    this.setDonnyVisual(mode);
    return true;
  }

  setDonnyIdle(){
    // Use the clean 4-direction idle sheet first.
    if(this.textures.exists('donny_idle_4dir_clean')){
      this.player.stop();
      this.player.setTexture('donny_idle_4dir_clean');
      this.player.setFlipX(false);

      const anim=`donny_idle_clean_${this.playerDir}`;
      if(this.anims.exists(anim)){
        this.player.play(anim,true);
      } else {
        const frame=(DONNY.cleanIdleFrame && DONNY.cleanIdleFrame[this.playerDir]) || 24;
        this.player.setFrame(frame);
      }

      this.setDonnyVisual('idle');
      return;
    }

    this.player.setFlipX(false);
    const texture=this.textures.exists('donny_idle')?'donny_idle':(this.textures.exists('donny_overhead')?'donny_overhead':'donny_fallback');
    this.player.stop();
    this.player.setTexture(texture);
    this.player.setFrame(DONNY.directionFrame[this.playerDir]||0);
    this.setDonnyVisual('idle');
  }

  updateFuelCanOverlay(){
    if(!this.fuelCan)return;

    const visible = this.fuelCanEquipped && !this.inVan && !this.isCrawling;
    const frame = FUEL_CAN_PROP.directionFrame[this.playerDir] ?? 1;
    const hand = FUEL_CAN_PROP.hand[this.playerDir] || FUEL_CAN_PROP.hand.right;

    this.fuelCan
      .setFrame(frame)
      .setScale(FUEL_CAN_PROP.scale)
      .setPosition(this.playerX+hand.x, this.playerY+hand.y-this.jumpZ)
      .setDepth(this.playerY+1007)
      .setVisible(visible);
  }

  updateGunOverlay(){
    if(!this.gun || !this.holster)return;

    const now=this.time?.now||0;
    const shooting =
      this.weaponEquipped && !this.fuelCanEquipped &&
      this.actionType==='shoot' &&
      now>=this.actionUntil-ACTION.shootDuration+ACTION.gunShowDelay &&
      now<this.actionUntil-ACTION.gunHideBeforeEnd;

    const gunFrame = GUN_PROP.directionFrame[this.playerDir] ?? 1;
    const hand = GUN_PROP.hand[this.playerDir] || GUN_PROP.hand.right;

    this.gun
      .setFrame(gunFrame)
      .setScale(GUN_PROP.scale)
      .setPosition(this.playerX+hand.x, this.playerY+hand.y-this.jumpZ)
      .setDepth(this.playerY+1006)
      .setVisible(shooting && !this.inVan);

    const holsterFrame = HOLSTER.directionFrame[this.playerDir] ?? 0;
    const hip = HOLSTER.hip[this.playerDir] || HOLSTER.hip.down;

    // Hip placement matches the white dot reference from the screenshot.
    this.holster
      .setFrame(holsterFrame)
      .setScale(HOLSTER.scale)
      .setPosition(this.playerX+hip.x, this.playerY+hip.y-this.jumpZ)
      .setDepth(this.playerY+1004)
      .setVisible(HOLSTER.enabled && this.weaponEquipped && !this.fuelCanEquipped && !shooting && !this.inVan && !this.isCrawling);
  }

  toggleInventory(){
    this.isInventoryOpen=!this.isInventoryOpen;
    if(this.isInventoryOpen)this.openInventory(); else this.closeInventory();
  }
  getPlayerWeight(){
    return inventoryWeight(this.playerInventory);
  }

  getCarWeightLimit(){
    return this.carPurchased ? this.carPurchasedWeightLimit : this.carBaseWeightLimit;
  }

  getCarWeight(){
    return inventoryWeight(this.carInventory);
  }

  hasItem(id){
    return (this.playerInventory||[]).some(item=>item.id===id && (item.qty||1)>0);
  }

  removePlayerItem(id,qty=1){
    const item=(this.playerInventory||[]).find(x=>x.id===id);
    if(!item)return false;
    item.qty=(item.qty||1)-qty;
    if(item.qty<=0)this.playerInventory=this.playerInventory.filter(x=>x!==item);
    this.bag=this.playerInventory;
    return true;
  }

  addToCar(id,qty=1){
    const item=makeInventoryItem(id,qty);
    if(this.getCarWeight()+itemStackWeight(item)>this.getCarWeightLimit()){
      this.message('Car inventory full');
      return false;
    }
    const existing=this.carInventory.find(x=>x.id===id);
    if(existing)existing.qty=(existing.qty||1)+qty;
    else this.carInventory.push(item);
    return true;
  }

  syncInventoryFlags(){
    this.hasFuelCan=this.hasItem('fuel_can');
    if(!this.hasFuelCan)this.fuelCanEquipped=false;
    if(this.fuelCanEquipped)this.weaponEquipped=false;
  }

  openRearMenu(){
    if(this.rearMenuOpen)return;
    this.syncInventoryFlags();
    this.rearMenuOpen=true;
    this.rearMenuIndex=0;
    this.openRearMenuUI();
  }

  closeRearMenu(){
    this.rearMenuOpen=false;
    if(this.rearBox)this.rearBox.setVisible(false);
    this.message('Rear menu closed');
  }

  openRearMenuUI(){
    if(!this.rearBox){
      this.rearBox=this.add.container(0,0).setScrollFactor(0).setDepth(31000);
      const bg=this.add.rectangle(480,270,690,360,0x030506,.94).setStrokeStyle(3,0xff2aa1,.9);
      const title=this.add.text(150,92,'ASTRO VAN REAR MENU',{fontFamily:'Arial Black',fontSize:'22px',color:'#9ff4ff'});
      this.rearText=this.add.text(150,135,'',{fontFamily:'Courier New',fontSize:'16px',color:'#f4e7c2',lineSpacing:8});
      const help=this.add.text(150,410,'A select | X/Stick down next | B/Y walk away',{fontFamily:'Courier New',fontSize:'14px',color:'#d9b46a'});
      this.rearBox.add([bg,title,this.rearText,help]);
    }
    this.rearBox.setVisible(true);
    this.refreshRearMenu();
  }

  refreshRearMenu(){
    if(!this.rearText)return;
    const carLimit=this.getCarWeightLimit();
    const lines=[
      `Fuel: ${this.fuelText()}`,
      `Donny Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      `Car Storage: ${formatWeight(this.getCarWeight())} / ${formatWeight(carLimit)}${this.carPurchased?'':' (400 lb after purchase)'}`,
      '',
      'Rear Options:'
    ];

    this.rearMenuOptions.forEach((opt,i)=>{
      lines.push(`${i===this.rearMenuIndex?'▶':' '} ${opt}`);
    });

    this.rearText.setText(lines.join('\n'));
  }

  nextRearMenuOption(){
    this.rearMenuIndex=(this.rearMenuIndex+1)%this.rearMenuOptions.length;
    this.refreshRearMenu();
  }

  selectRearMenuOption(){
    const opt=this.rearMenuOptions[this.rearMenuIndex];
    if(opt==='Check Car Inventory'){
      this.showCarInventoryMenu();
      return;
    }
    if(opt==='Refuel'){
      this.refuelFromRearMenu();
      return;
    }
    this.closeRearMenu();
  }

  showCarInventoryMenu(){
    const carLimit=this.getCarWeightLimit();
    const lines=[
      `CAR INVENTORY`,
      `Storage: ${formatWeight(this.getCarWeight())} / ${formatWeight(carLimit)}`,
      this.carPurchased?'Purchased storage: 400 lb':'Unpurchased storage: 200 lb',
      '',
      ...(this.carInventory.length ? this.carInventory.map(item=>`- ${item.name} x${item.qty||1} = ${formatWeight(itemStackWeight(item))}`) : ['- empty']),
      '',
      `Donny Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      '',
      'B/Y = walk away'
    ];
    if(this.rearText)this.rearText.setText(lines.join('\n'));
  }

  refuelFromRearMenu(){
    this.syncInventoryFlags();
    if(!this.hasFuelCan){
      this.message('Need a fuel can');
      this.refreshRearMenu();
      return;
    }
    if(this.vanFuel>=FUEL.max){
      this.message('Van fuel already full');
      this.refreshRearMenu();
      return;
    }

    // Fuel can can be carried or equipped. If carried, Donny uses it for this action.
    this.fuelCanEquipped=true;
    this.weaponEquipped=false;

    this.actionType='refuel';
    this.actionUntil=this.time.now+650;
    const anim=`donny_shoot_${this.playerDir}`;
    if(this.anims.exists(anim))this.player.play(anim,true);

    this.refillVanFuel(FUEL.max);
    this.message('Refueled Astro Van');
    this.closeRearMenu();
  }

  updateRearMenuInput(now,input){
    if(!this.rearMenuOpen)return;
    if(now<this.rearMenuNavCooldown)return;
    if((input&&input.y>.45) || TOUCH.xBtn){
      TOUCH.xBtn=false;
      this.nextRearMenuOption();
      this.rearMenuNavCooldown=now+220;
    }
  }

  openInventory(){
    if(!this.invBox){
      this.invBox=this.add.container(0,0).setScrollFactor(0).setDepth(30000);
      const bg=this.add.rectangle(480,270,740,410,0x030506,.93).setStrokeStyle(3,0x67dce8,.85);
      this.invText=this.add.text(140,110,'',{fontFamily:'Courier New',fontSize:'16px',color:'#f4e7c2',lineSpacing:8});
      const title=this.add.text(140,70,'DONNY INVENTORY',{fontFamily:'Arial Black',fontSize:'24px',color:'#9ff4ff'});
      const help=this.add.text(140,430,'A equip/unequip/use | B drop | X next | Y/START close',{fontFamily:'Courier New',fontSize:'14px',color:'#d9b46a'});
      this.invBox.add([bg,title,this.invText,help]);
    }
    this.invBox.setVisible(true);this.refreshInventory();
  }
  closeInventory(){if(this.invBox)this.invBox.setVisible(false);this.message('Inventory closed')}
  refreshInventory(){
    if(!this.invText)return;
    this.syncInventoryFlags();
    const lines=[
      `DONNY INVENTORY`,
      `Load: ${formatWeight(this.getPlayerWeight())} / ${formatWeight(this.playerWeightLimit)}`,
      `Weapon: ${this.weaponEquipped?'Pistol equipped':'empty'}`,
      `Ammo: ${this.pistolAmmo}/24`,
      `Astro Van Fuel: ${this.fuelText()}`,
      '',
      'Items:'
    ];

    if(this.playerInventory.length){
      this.playerInventory.forEach(item=>{
        let tag='';
        if(item.id==='fuel_can' && this.fuelCanEquipped)tag=' [EQUIPPED]';
        if(item.id==='laser_pistol' && this.weaponEquipped)tag=' [EQUIPPED]';
        lines.push(`- ${item.name} x${item.qty||1} — ${formatWeight(itemStackWeight(item))}${tag}`);
      });
    } else {
      lines.push('- empty');
    }

    lines.push('');
    lines.push('A = toggle fuel can / pistol');
    lines.push('B = drop equipped fuel can or unequip pistol');

    this.invText.setText(lines.join('\n'));
  }
  useInventory(){
    this.syncInventoryFlags();
    if(this.hasFuelCan && !this.fuelCanEquipped){
      this.fuelCanEquipped=true;
      this.weaponEquipped=false;
      this.refreshInventory();
      this.message('Fuel can equipped');
      return;
    }

    if(this.fuelCanEquipped){
      this.fuelCanEquipped=false;
      this.weaponEquipped=this.hasItem('laser_pistol');
      this.refreshInventory();
      this.message(this.weaponEquipped?'Pistol equipped':'Hands empty');
      return;
    }

    this.weaponEquipped=!this.weaponEquipped;
    this.refreshInventory();
    this.message(this.weaponEquipped?'Pistol equipped':'Pistol unequipped');
  }
  nextInventory(){this.refreshInventory()}
  dropInventory(){
    if(this.fuelCanEquipped){
      this.fuelCanEquipped=false;
      this.hasFuelCan=false;
      this.refreshInventory();
      this.message('Dropped fuel can');
      return;
    }
    if(this.weaponEquipped){
      this.weaponEquipped=false;
      this.refreshInventory();
      this.message('Dropped/unequipped pistol');
    }
  }

  message(t){
    this.prompt.setText(t);
    this.time.delayedCall(1700,()=>{if(this.prompt.text===t)this.prompt.setText('')});
  }

  checkRoutes(){
    if(this.time.now<this.routeCooldown)return;

    const x=this.inVan?this.van.x:this.playerX;
    const y=this.inVan?this.van.y:this.playerY;

    // Reliable C3 test transitions.
    if(this.pageId==='GLASSWELL_C3'){
      if(y < this.mapH*.12){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_C2','south_entry_from_C3');return;}
      if(y > this.mapH*.88){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_C4','north_entry_from_C3');return;}
      if(x > this.mapW*.92){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_D3','west_entry_from_C3');return;}
      if(x < this.mapW*.08){this.routeCooldown=this.time.now+800;this.loadPage('GLASSWELL_B3_DESERT_TEST','east_entry_from_C3');return;}
    }

    const routes=this.data?.routes||[];
    const r=routes.find(rt=>rectHit(rt.r,x,y));
    if(r&&r.to){
      this.routeCooldown=this.time.now+800;
      this.loadPage(r.to,r.spawn);
    }
  }

  updateJump(delta){
    if(this.jumpZ>0 || this.jumpVel>0){
      this.jumpZ+=this.jumpVel*delta/16.67;
      this.jumpVel-=0.65*delta/16.67;
      if(this.jumpZ<=0){this.jumpZ=0;this.jumpVel=0}
    }
  }

  update(_,delta){
    const now=this.time.now;
    if(TOUCH.a){TOUCH.a=false;this.handleA()}
    if(TOUCH.xBtn){TOUCH.xBtn=false;this.handleX()}
    if(TOUCH.b){TOUCH.b=false;this.handleB()}
    if(TOUCH.yHold){TOUCH.yHold=false;if(this.inVan)this.toggleHeadlights();else this.handleY()}
    if(TOUCH.btnY){TOUCH.btnY=false;this.handleY()}
    if(TOUCH.start){TOUCH.start=false;this.toggleInventory()}

    this.updateJump(delta);
    this.updateWorldClockHud();
    this.updateDayNightCycle();
    this.updateVanHeadlights();
    this.updateCivicPatrolCombat(delta);
    this.updateCivicPatrolVehicleAI(delta);
    this.updateCivicCarHpBars();

    const input=this.inputVector();

    if(this.rearMenuOpen){
      this.updateRearMenuInput(now,input);
      this.updateGunOverlay();
      this.updateFuelCanOverlay();
      this.updateCarHudGauges();
      return;
    }

    if(this.isInventoryOpen){this.updateGunOverlay();this.updateFuelCanOverlay();this.updateCarHudGauges();return}

    let moving=input.len>.055;
    if(moving){
      this.lastMoveUntil=now+120;
      this.lastMoveInput={x:input.x,y:input.y};
    } else if(now<this.lastMoveUntil){
      moving=true;
      input.x=this.lastMoveInput.x;
      input.y=this.lastMoveInput.y;
      input.len=Math.min(1,Math.hypot(input.x,input.y));
    }

    if(this.inVan){
      this.updateVanDrivingPhysics(input,delta);
      this.van.setDepth(this.van.y+900);
      this.updateVanHeadlights();
      this.updateCarHudGauges();
      this.checkRoutes();
      this.hud.setText(`${this.activeVehicleName()} | Donny HP ${Math.ceil(this.playerHp||0)}/${this.playerMaxHp||100} | ${Math.round(this.van.x)},${Math.round(this.van.y)}`);
      const handling=this.activeVehicleHandling();
      this.status.setText(`Fuel ${this.fuelText()} | Speed ${Math.round(this.getVanSpeed())}/${handling.maxSpeed} | ${handling.className||'vehicle'} | ${this.musicOn?'Music on':'Music off'} | B brake/exit | A handbrake | cars solid | impact 70 HP | hold Y lights | tap Y horn`);
      return;
    }

    if(moving){
      if(this.moveHoldStart===0)this.moveHoldStart=now;
      this.playerDir=this.directionFromVector(input.x,input.y,this.playerDir);
    } else {
      this.moveHoldStart=0;
    }

    let speed=DONNY.speed;
    let mode='WALK';
    if(this.isCrawling){speed=DONNY.crawlSpeed;mode='CRAWL'}
    else if(false && moving && input.len>.72 && now-this.moveHoldStart>350){speed=DONNY.runSpeed;mode='RUN'}

    if(this.actionType==='slide' && now<this.slideUntil){
      const sv=this.slideVec||input;
      this.moveDonnyWithCollision(sv.x*390*delta/1000, sv.y*390*delta/1000);
    } else if(moving && !(now<this.actionUntil && ['punch','kick','shoot','refuel','hold_can'].includes(this.actionType))){
      this.moveDonnyWithCollision(input.x*speed*delta/1000, input.y*speed*delta/1000);
    }

    if(now>this.actionUntil && this.actionType){this.actionType='';}
    if(!this.actionType){
      if(this.isCrawling && moving && this.anims.exists(`donny_crawl_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('crawl');this.player.play(`donny_crawl_${this.playerDir}`,true);}
      else if(mode==='RUN' && moving && this.anims.exists(`donny_run_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('run');this.player.play(`donny_run_${this.playerDir}`,true);}
      else if(moving && this.forceDirectionalSheet('donny_overhead','walk')){}
      else if(moving && this.anims.exists(`donny_walk_${this.playerDir}`)){this.player.setFlipX(false);this.setDonnyVisual('walk');this.player.play(`donny_walk_${this.playerDir}`,true);}
      else this.setDonnyIdle();
    }

    this.player.setPosition(this.playerX,this.playerY-this.jumpZ).setDepth(this.playerY+1000);
    this.updateGunOverlay();
    this.updateFuelCanOverlay();
    this.updateVanHeadlights();
    this.checkRoutes();

    this.updateCarHudGauges();

    const nearDrop=this.nearWorldDrop ? this.nearWorldDrop() : null;
    if(this.nearFuelPickup && this.nearFuelPickup())this.prompt.setText('Y: pick up fuel can');
    else if(nearDrop)this.prompt.setText(`Y: pick up ${nearDrop.getData('label')||'item'}`);
    else if(this.nearRearOfVan && this.nearRearOfVan())this.prompt.setText('B: rear menu');
    else if(this.nearVan())this.prompt.setText('Y: enter nearby vehicle');
    this.hud.setText(`Donny | HP ${Math.ceil(this.playerHp||0)}/${this.playerMaxHp||100} | ${Math.round(this.playerX)},${Math.round(this.playerY)} | X punch/shoot | B kick`);
    this.status.setText(`${this.fuelCanEquipped?'Fuel can equipped':(this.weaponEquipped?'Pistol equipped':'Hands empty')} | Credchips $${this.money||0} | Water ${this.waterRations||0} | Load ${formatWeight(this.getPlayerWeight())}/${formatWeight(this.playerWeightLimit)} | Car ${formatWeight(this.getCarWeight())}/${formatWeight(this.getCarWeightLimit())} | Fuel ${this.fuelText()}`);
  }
}


// Safety guard against partial uploads/merge mistakes.
window.__GLASSWELL_WORLD_TIME_READY = typeof WORLD_TIME !== 'undefined';

new Phaser.Game({
  type:Phaser.AUTO,
  parent:'game',
  width:GAME_W,
  height:GAME_H,
  backgroundColor:'#000',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{
    default:'arcade',
    arcade:{
      gravity:{x:0,y:0},
      debug:false
    }
  },
  render:{pixelArt:true,antialias:false},
  scene:[BootScene,TitleScene,MapScene]
});
</script>
