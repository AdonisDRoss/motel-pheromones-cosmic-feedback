class Boot extends Phaser.Scene{
  constructor(){super('Boot')}
  preload(){
    this.load.on('loaderror',f=>console.warn('[asset missing]',f.key,f.url));
    this.load.video('title_video',A.video,'loadeddata',false,true);
    this.load.image('title_bg',A.titleBg);
    Object.values(ROOMS).forEach(r=>this.load.image(r.key,r.background));
    this.load.image('donny_raw',A.donnyWalk);
    this.load.image('donny_crawl_raw',A.donnyCrawl);
    this.load.image('donny_slide_raw',A.donnySlide);
    this.load.spritesheet('holster_empty',A.holsterEmpty,{frameWidth:128,frameHeight:128});
    this.load.spritesheet('holster_loaded',A.holsterLoaded,{frameWidth:128,frameHeight:128});
    this.load.image('donny_weapon',A.weapon);
    this.load.spritesheet('astro_van',A.van,{frameWidth:256,frameHeight:128});
    this.load.spritesheet('riff',A.riff,{frameWidth:222,frameHeight:222});
  }
  create(){
    const mk=(k,w,h,c)=>{
      if(this.textures.exists(k))return;
      const g=this.add.graphics();
      g.fillStyle(c,1).fillRect(0,0,w,h);
      g.lineStyle(2,0xffffff,.4).strokeRect(1,1,w-2,h-2);
      g.generateTexture(k,w,h);
      g.destroy();
    };
    mk('ph_bg',WORLD_W,H,0x17131c);
    mk('ph_player',64,96,0x314dff);
    mk('ph_holster',34,34,0x2b1a0b);
    mk('ph_van',220,110,0x3a2d1a);

    this.makeCleanDonnyTexture();
    this.makeDonnyAnims();
    this.makeRiffAnims();
    this.scene.start('Title');
  }
  makeCleanDonnyTexture(){
    if(!this.textures.exists('donny_raw'))return;
    const src=this.textures.get('donny_raw').getSourceImage();
    const ct=this.textures.createCanvas('donny_clean',src.width,src.height);
    const ctx=ct.getContext();
    ctx.drawImage(src,0,0);

    const img=ctx.getImageData(0,0,src.width,src.height);
    const d=img.data;
    for(let i=0;i<d.length;i+=4){
      const r=d[i],g=d[i+1],b=d[i+2];
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
      if(r>228 && g>228 && b>228 && (mx-mn)<28) d[i+3]=0;
    }
    ctx.putImageData(img,0,0);
    ct.refresh();

    const tex=this.textures.get('donny_clean');
    for(const dir of ['down','left','right','up']){
      DONNY_FRAMES[dir].forEach((r,i)=>{
        tex.add(dir+'_'+i,0,r[0],r[1],r[2],r[3]);
      });
    }
  }
  makeDonnyAnims(){
    if(!this.textures.exists('donny_clean')) return;
    ['down','left','right','up'].forEach(dir=>{
      this.anims.create({
        key:'walk_'+dir,
        frames:Array.from({length:DONNY_FRAMES[dir].length},(_,i)=>({key:'donny_clean',frame:dir+'_'+i})),
        frameRate:10,
        repeat:-1
      });
    });
  }

  makeRiffAnims(){
    if(!this.textures.exists('riff')) return;
    const rows={down:[0,7],left:[8,15],right:[16,23],up:[24,31]};
    Object.entries(rows).forEach(([dir,range])=>{
      this.anims.create({
        key:'riff_walk_'+dir,
        frames:this.anims.generateFrameNumbers('riff',{start:range[0],end:range[1]}),
        frameRate:8,
        repeat:-1
      });
    });
  }
}

class Title extends Phaser.Scene{
  constructor(){super('Title')}
  create(){
    if(this.cache.video.exists('title_video')){
      this.vid=this.add.video(W/2,H/2,'title_video');
      this.vid.setMute(true);
      this.vid.setLoop(true);
      this.vid.play(true);
      this.vid.once('play',()=>{
        const vw=this.vid.video.videoWidth||W;
        const vh=this.vid.video.videoHeight||H;
        this.vid.setScale(Math.max(W/vw,H/vh));
      });
    }else{
      this.add.image(W/2,H/2,this.textures.exists('title_bg')?'title_bg':'ph_bg').setDisplaySize(W,H);
    }

    this.add.rectangle(0,0,W,H,0x000000,.52).setOrigin(0);
    txt(this,W/2,70,'COSMIC FEEDBACK',44,'#fff').setOrigin(.5);
    txt(this,W/2,123,'The signal starts on Dust-9',17,'#8ff9ff').setOrigin(.5);

    const btn=(y,t,cb)=>{
      const b=this.add.text(W/2,y,t,{
        fontFamily:'monospace',
        fontSize:'22px',
        color:'#fff',
        backgroundColor:'#3b145c',
        padding:{x:26,y:14},
        stroke:'#000',
        strokeThickness:2
      }).setOrigin(.5).setInteractive({useHandCursor:true});
      b.on('pointerover',()=>b.setStyle({backgroundColor:'#7a1f9a'}));
      b.on('pointerout',()=>b.setStyle({backgroundColor:'#3b145c'}));
      b.on('pointerdown',cb);
    };

    btn(288,'START STORY',()=>this.goStory());
    btn(363,'TEST DUST-9 ROAD WORLD',()=>this.goRoom('checkpoint'));
    btn(438,'DIRECT ROAD TEST PAGE',()=>{location.href='dust9-road-test.html';});
    this.input.keyboard.once('keydown-ENTER',()=>this.goStory());
  }
  stopVid(){if(this.vid)this.vid.stop();}
  goStory(){this.stopVid();this.scene.start('SignalIntro');}
  goRoom(r){this.stopVid();this.scene.start('Dust9',{room:r});}
}

class SignalIntro extends Phaser.Scene{
  constructor(){super('SignalIntro')}
  create(){
    this.lines=[
      ['RIFF','Signal found. Outer Rim encryption. Dex signature. Broken. Repeating. Scared.'],
      ['RIFF','Donny. Wake up.'],
      ['DONNY','Riff, if this is about the toaster learning swear words again, let it grow.'],
      ['RIFF','Not toaster. Signal. It came through the old relay net under Dust-9.'],
      ['DEX / BROKEN MESSAGE','Donny... this is not a storm. It is feedback. It starts under Dust-9. Red Concord knows. Nova is listening. Bring the van. Trust Riff. Do not answer the return signal.'],
      ['OBJECTIVE','Leave Donny’s office, reach the Astro Van in the sand motel lot, and drive toward the hidden Red Concord camp to rescue Dex.']
    ];
    this.i=0;
    this.add.image(W/2,H/2,this.textures.exists('bg_office')?'bg_office':'ph_bg').setDisplaySize(W,H);
    this.add.rectangle(0,0,W,H,0x000000,.45).setOrigin(0);
    this.add.rectangle(W/2,H-100,W-70,165,0x0d0717,.94).setStrokeStyle(2,0x86f7ff,.5);
    this.speaker=txt(this,55,H-168,'',13,'#86f7ff');
    this.body=txt(this,55,H-138,'',16,'#f4e7ff');
    txt(this,W-45,H-32,'click / tap / ENTER',11,'#8b6eb0').setOrigin(1,.5);
    this.show();
    this.input.on('pointerdown',()=>this.next());
    this.input.keyboard.on('keydown-ENTER',()=>this.next());
    this.input.keyboard.on('keydown-SPACE',()=>this.next());
  }
  show(){
    const l=this.lines[this.i];
    this.speaker.setText('[ '+l[0]+' ]');
    this.body.setText(l[1]);
  }
  next(){
    this.i++;
    if(this.i>=this.lines.length) this.scene.start('Dust9',{room:'donny_office'});
    else this.show();
  }
}

class Dust9 extends Phaser.Scene{
  constructor(){
    super('Dust9');
    this.roomId='donny_office';
    this.facing='down';
    this.touch={left:false,right:false,up:false,down:false};
    this.pistol={state:'holstered',ammo:12,cooldown:0};
    this.mode='normal';
    this.jumpTimer=0;
    this.slideTimer=0;
    this.fireTimer=0;
    this.day=0;
  }
  init(d){
    if(d && d.room) this.roomId=d.room;
  }
  create(){
    this.cameras.main.setBounds(0,0,WORLD_W,H);
    this.keys=this.input.keyboard.addKeys('W,A,S,D,F,E,I,J,K,L,C,ESC');
    this.cursors=this.input.keyboard.createCursorKeys();
    this.drawRoom(this.roomId);
    this.makePlayer();
    this.makeHud();
    this.makeMobileControls();
  }
  has(k){ return this.textures.exists(k); }

  drawRoom(id){
    const r=ROOMS[id] || ROOMS.donny_office;
    this.roomId=id;
    this.room=r;

    ['bg','roomTxt','vanSprite','vanPrompt','dexMarker','notice'].forEach(k=>{
      if(this[k]){ this[k].destroy(); this[k]=null; }
    });

    this.bg=this.add.image(0,0,this.has(r.key)?r.key:'ph_bg')
      .setOrigin(0).setDepth(0).setDisplaySize(WORLD_W,H);

    this.roomTxt=txt(this,16,12,'DUST-9 / '+r.name,13,'#86f7ff').setScrollFactor(0).setDepth(100);

    if(id==='donny_office'){
      this.notice=txt(this,W/2,56,'Riff found Dex’s signal. Move right to leave Donny’s office.',12,'#ffe97a')
        .setOrigin(.5,0).setScrollFactor(0).setDepth(101);
    }
    if(id==='sand_motel_lot'){
      const vx=r.vanX,vy=r.vanY;
      this.vanSprite=this.add.sprite(vx,vy,this.has('astro_van')?'astro_van':'ph_van',0)
        .setOrigin(.5,1).setScale(.78).setDepth(10);
      this.vanPrompt=txt(this,vx,vy-108,'[E / A] Board Astro Van → hidden Red Concord route',13,'#ffe97a')
        .setOrigin(.5,1).setDepth(15).setAlpha(0);
    }
    if(id==='checkpoint'){
      this.notice=txt(this,W/2,56,'The camp is hidden far from Dustbowl Junction. Dex is deeper inside.',12,'#ff6633')
        .setOrigin(.5,0).setScrollFactor(0).setDepth(101);
    }
    if(r.dexMarker){
      this.dexMarker=txt(this,WORLD_W/2,300,'★ DEX IS HERE ★\nRescue objective marker',16,'#ff6699')
        .setOrigin(.5).setDepth(50);
    }
  }

  makePlayer(){
    const s=this.room.spawn;
    this.playerBody=this.add.zone(s.x,s.y,44,28).setOrigin(.5,.5);
    this.playerSprite=this.add.sprite(
      s.x,s.y,
      this.has('donny_clean')?'donny_clean':'ph_player',
      this.has('donny_clean')?'down_0':undefined
    ).setOrigin(.5,1).setScale(this.has('donny_clean')?.52:1).setDepth(20);

    this.riffSprite=this.add.sprite(
      s.x-96,s.y+6,
      this.has('riff')?'riff':'ph_player',
      0
    ).setOrigin(.5,1).setScale(this.has('riff')?.42:.6).setDepth(19);

    if(this.has('riff') && this.anims.exists('riff_walk_down')){
      this.riffSprite.play('riff_walk_down');
      this.riffSprite.anims.stop();
      this.riffSprite.setFrame(0);
    }

    this.riffLabel=txt(this,s.x-96,s.y-116,'RIFF: signal found',11,'#86f7ff')
      .setOrigin(.5,1).setDepth(100).setVisible(this.roomId==='donny_office');

    this.holsterSprite=this.add.sprite(
      s.x,s.y,
      this.has('holster_loaded')?'holster_loaded':(this.has('holster_empty')?'holster_empty':'ph_holster'),
      0
    ).setOrigin(.5,.5).setScale(.74).setDepth(21);

    this.handGunSprite=this.add.image(
      s.x,s.y,
      this.has('donny_weapon')?'donny_weapon':'ph_holster'
    ).setOrigin(.5,.5).setScale(.72).setDepth(22).setVisible(false);

    this.muzzleFx=this.add.graphics().setDepth(23);

    this.cameras.main.startFollow(this.playerBody,true,.08,.08);
    this.updateVisuals(false);
  }

  makeHud(){
    this.hpHud=txt(this,16,500,'HP: 100   VAN: OK   CREDITS: 25   INV: van keys, signal',12,'#f4e7ff')
      .setScrollFactor(0).setDepth(100);
    this.pHud=txt(this,W-16,500,this.pistolText(),13,'#ffe97a')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100);
    this.ammoHud=txt(this,W-16,517,'AMMO: '+this.pistol.ammo,12,'#ffd46a')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100);
    this.stateHud=txt(this,W/2,500,'STATE: NORMAL',12,'#a7ffec')
      .setOrigin(.5,0).setScrollFactor(0).setDepth(100);

    txt(this,W-16,12,'← Menu',12,'#86f7ff')
      .setOrigin(1,0).setScrollFactor(0).setDepth(100)
      .setInteractive({useHandCursor:true})
      .on('pointerdown',()=>this.scene.start('Title'));

    this.dayOverlay=this.add.rectangle(0,0,WORLD_W,H,0x00113a,0).setOrigin(0).setScrollFactor(0).setDepth(90);

    this.invText=txt(this,W/2,92,'INVENTORY: van keys / signal device / diner cash / repair kit',13,'#fff4aa')
      .setOrigin(.5,0).setScrollFactor(0).setDepth(130).setVisible(false);
  }

  pistolText(){
    return 'PISTOL: '+(this.pistol.state==='drawn'?'DRAWN':'HOLSTERED');
  }

  updateStateHud(){
    const st=this.mode.toUpperCase()+(this.fireTimer>0?' / FIRING':'');
    this.stateHud.setText('STATE: '+st);
    this.pHud.setText(this.pistolText());
    this.ammoHud.setText('AMMO: '+this.pistol.ammo);
  }

  makeMobileControls(){
    const baseX=124, baseY=H-104, rad=70;
    this.stickBase=this.add.circle(baseX,baseY,rad,0x241544,.52)
      .setStrokeStyle(4,0xbdb8ff,.55).setScrollFactor(0).setDepth(200).setInteractive();
    this.stickRing=this.add.circle(baseX,baseY,rad-18,0x000000,0)
      .setStrokeStyle(2,0x86f7ff,.25).setScrollFactor(0).setDepth(200);
    this.stickDot=this.add.circle(baseX,baseY,26,0xe9e8ff,.72)
      .setStrokeStyle(2,0xffffff,.5).setScrollFactor(0).setDepth(201);

    const reset=()=>{
      this.touch.left=this.touch.right=this.touch.up=this.touch.down=false;
      this.stickDot.setPosition(baseX,baseY);
    };
    const apply=(p)=>{
      const dx=p.x-baseX, dy=p.y-baseY;
      const len=Math.max(1,Math.hypot(dx,dy));
      const clamp=Math.min(rad-12,len);
      const nx=dx/len, ny=dy/len;
      this.stickDot.setPosition(baseX+nx*clamp,baseY+ny*clamp);
      this.touch.left=dx<-20; this.touch.right=dx>20;
      this.touch.up=dy<-20;   this.touch.down=dy>20;
    };
    this.stickBase.on('pointerdown',p=>apply(p));
    this.stickBase.on('pointermove',p=>{ if(p.isDown) apply(p); });
    ['pointerup','pointerout','pointerupoutside'].forEach(e=>this.stickBase.on(e,reset));

    const groupX=W-114, groupY=H-102, btnR=31;

    const snesBtn=(x,y,label,sub,color,cb)=>{
      const c=this.add.circle(x,y,btnR,color,.84)
        .setStrokeStyle(3,0xffffff,.38)
        .setScrollFactor(0).setDepth(200).setInteractive({useHandCursor:true});
      c.on('pointerdown',cb);
      this.add.text(x,y,label,{
        fontFamily:'monospace',fontSize:'28px',fontStyle:'bold',color:'#fff',
        stroke:'#000',strokeThickness:4
      }).setOrigin(.5).setScrollFactor(0).setDepth(201);
      if(sub){
        txt(this,x,y-btnR-16,sub,9,'#ffe7a3').setOrigin(.5).setScrollFactor(0).setDepth(201);
      }
    };

    snesBtn(groupX+52,groupY,'A','USE',0x5f57d6,()=>this.actionA());
    snesBtn(groupX,groupY-50,'X','FIRE',0x7360db,()=>this.firePistol());
    snesBtn(groupX,groupY+50,'B','JUMP',0x4d3dbb,()=>this.jump());
    snesBtn(groupX-52,groupY,'Y','SLIDE',0x5a49cc,()=>this.slide());

    const smallBtn=(x,y,label,cb)=>{
      const b=this.add.text(x,y,label,{
        fontFamily:'monospace',
        fontSize:'12px',
        color:'#fff',
        backgroundColor:'rgba(55,30,90,.82)',
        padding:{x:12,y:8},
        stroke:'#000',
        strokeThickness:2
      }).setOrigin(.5).setScrollFactor(0).setDepth(202).setInteractive();
      b.on('pointerdown',cb);
      return b;
    };

    smallBtn(W-238,H-152,'DRAW',()=>this.togglePistol());
    smallBtn(W-238,H-106,'CRAWL',()=>this.toggleCrawl());
    smallBtn(W/2,H-18,'MENU',()=>this.toggleInventory());
  }

  togglePistol(){
    this.pistol.state=this.pistol.state==='holstered'?'drawn':'holstered';
    this.updateStateHud();
  }

  firePistol(){
    if(this.pistol.state==='holstered') this.pistol.state='drawn';
    if(this.pistol.ammo<=0) return;
    if(this.fireTimer>0) return;

    this.pistol.ammo--;
    this.fireTimer=12;
    this.updateStateHud();
  }

  jump(){
    if(this.jumpTimer<=0){
      this.jumpTimer=24;
      this.mode='jump';
      this.updateStateHud();
    }
  }

  slide(){
    if(this.slideTimer<=0){
      this.slideTimer=22;
      this.mode='slide';
      const dash=32;
      if(this.facing==='left') this.playerBody.x-=dash;
      if(this.facing==='right') this.playerBody.x+=dash;
      if(this.facing==='up') this.playerBody.y-=dash;
      if(this.facing==='down') this.playerBody.y+=dash;
      this.updateStateHud();
    }
  }

  toggleCrawl(){
    this.mode=this.mode==='crawl'?'normal':'crawl';
    this.updateStateHud();
  }

  toggleInventory(){
    this.invText.setVisible(!this.invText.visible);
  }

  actionA(){
    if(this.roomId==='sand_motel_lot' && this.nearVan()) this.boardVan();
  }

  boardVan(){
    this.changeRoom('checkpoint','left');
  }

  nearVan(){
    return this.vanSprite &&
      Math.abs(this.playerBody.x-this.vanSprite.x)<170 &&
      Math.abs(this.playerBody.y-this.vanSprite.y)<130;
  }

  update(){
    if(!this.playerBody || !this.room) return;

    if(Phaser.Input.Keyboard.JustDown(this.keys.F)) this.togglePistol();
    if(Phaser.Input.Keyboard.JustDown(this.keys.J)) this.firePistol();
    if(Phaser.Input.Keyboard.JustDown(this.keys.K)) this.jump();
    if(Phaser.Input.Keyboard.JustDown(this.keys.L)) this.slide();
    if(Phaser.Input.Keyboard.JustDown(this.keys.C)) this.toggleCrawl();
    if(Phaser.Input.Keyboard.JustDown(this.keys.I)) this.toggleInventory();
    if(Phaser.Input.Keyboard.JustDown(this.keys.E)) this.actionA();

    if(this.jumpTimer>0){
      this.jumpTimer--;
      if(this.jumpTimer<=0 && this.mode==='jump') this.mode='normal';
    }
    if(this.slideTimer>0){
      this.slideTimer--;
      if(this.slideTimer<=0 && this.mode==='slide') this.mode='normal';
    }
    if(this.fireTimer>0) this.fireTimer--;

    const L=this.cursors.left.isDown || this.keys.A.isDown || this.touch.left;
    const R=this.cursors.right.isDown || this.keys.D.isDown || this.touch.right;
    const U=this.cursors.up.isDown || this.keys.W.isDown || this.touch.up;
    const D=this.cursors.down.isDown || this.keys.S.isDown || this.touch.down;

    let moving=false;
    let speed=this.mode==='crawl'?1.65:(this.mode==='slide'?4.8:3.2);

    if(L){ this.playerBody.x-=speed; this.facing='left'; moving=true; }
    else if(R){ this.playerBody.x+=speed; this.facing='right'; moving=true; }

    if(U){ this.playerBody.y-=speed; this.facing='up'; moving=true; }
    else if(D){ this.playerBody.y+=speed; this.facing='down'; moving=true; }

    const b=this.room.walk;
    this.playerBody.x=Phaser.Math.Clamp(this.playerBody.x,b.x+22,b.x+b.width-22);
    this.playerBody.y=Phaser.Math.Clamp(this.playerBody.y,b.y+44,b.y+b.height-5);

    this.updateVisuals(moving);
    if(this.vanPrompt) this.vanPrompt.setAlpha(this.nearVan()?1:0);

    const ex=this.room.exits || {};
    if(this.playerBody.x>WORLD_W-36 && ex.right) this.changeRoom(ex.right,'left');
    if(this.playerBody.x<36 && ex.left) this.changeRoom(ex.left,'right');

    this.day=(this.day+.00045)%1;
    const night=Math.max(0,Math.sin(this.day*Math.PI*2)*.28);
    this.dayOverlay.setAlpha(night);

    this.updateStateHud();
  }

  updateVisuals(moving){
    let visualY=this.playerBody.y;
    if(this.jumpTimer>0){
      const t=this.jumpTimer/24;
      visualY-=Math.sin(t*Math.PI)*38;
    }
    if(this.mode==='crawl'){
      this.playerSprite.setScale(.43);
    }else if(this.mode==='slide'){
      this.playerSprite.setScale(.49);
    }else{
      this.playerSprite.setScale(.52);
    }

    this.playerSprite.x=this.playerBody.x;
    this.playerSprite.y=visualY;
    this.playerSprite.setDepth(20 + this.playerBody.y/1000);

    if(this.has('donny_clean')){
      const walk='walk_'+this.facing;
      if(moving){
        if(this.playerSprite.anims.currentAnim?.key!==walk || !this.playerSprite.anims.isPlaying){
          this.playerSprite.play(walk,true);
        }
      }else{
        this.playerSprite.anims.stop();
        this.playerSprite.setFrame(this.facing+'_0');
      }
    }

    this.updateHolster();
    this.updateHandGun();
    this.updateMuzzleFx();
    this.updateRiffCompanion();
  }

  updateRiffCompanion(){
    if(!this.riffSprite || !this.playerBody) return;

    const targetX=this.playerBody.x-92;
    const targetY=this.playerBody.y+8;
    const dx=targetX-this.riffSprite.x;
    const dy=targetY-this.riffSprite.y;
    const dist=Math.hypot(dx,dy);

    let moving=false;
    if(dist>16){
      this.riffSprite.x+=dx*0.10;
      this.riffSprite.y+=dy*0.10;
      moving=true;
    }

    let dir='down';
    if(Math.abs(dx)>Math.abs(dy)){
      dir=dx<0?'left':'right';
    }else if(Math.abs(dy)>3){
      dir=dy<0?'up':'down';
    }

    this.riffSprite.setDepth(19+this.riffSprite.y/1000);

    if(this.has('riff')){
      const anim='riff_walk_'+dir;
      if(moving && this.anims.exists(anim)){
        if(this.riffSprite.anims.currentAnim?.key!==anim || !this.riffSprite.anims.isPlaying){
          this.riffSprite.play(anim,true);
        }
      }else{
        this.riffSprite.anims.stop();
        const idleFrame={down:0,left:8,right:16,up:24}[dir] || 0;
        this.riffSprite.setFrame(idleFrame);
      }
    }

    if(this.riffLabel){
      this.riffLabel.setPosition(this.riffSprite.x,this.riffSprite.y-116);
      this.riffLabel.setVisible(this.roomId==='donny_office');
      this.riffLabel.setDepth(101);
    }
  }

  updateHolster(){
    if(!this.holsterSprite) return;

    const off=HOLSTER_OFF[this.facing];
    const holsterTexture=this.pistol.state==='holstered'?'holster_loaded':'holster_empty';

    if(this.has(holsterTexture) && this.holsterSprite.texture.key!==holsterTexture){
      this.holsterSprite.setTexture(holsterTexture);
    }

    this.holsterSprite.setFrame(HOLSTER_F[this.facing]);
    this.holsterSprite.x=this.playerBody.x+off.x;
    this.holsterSprite.y=this.playerBody.y+off.y;
    this.holsterSprite.setDepth(this.playerSprite.depth+0.02);
    this.holsterSprite.setVisible(this.mode!=='crawl');
    this.holsterSprite.setAlpha(.95);
  }

  updateHandGun(){
    if(!this.handGunSprite) return;
    if(this.pistol.state!=='drawn'){
      this.handGunSprite.setVisible(false);
      return;
    }

    const off=HAND_GUN_OFF[this.facing];
    this.handGunSprite.setVisible(true);
    this.handGunSprite.setPosition(this.playerBody.x+off.x,this.playerBody.y+off.y);
    this.handGunSprite.setAngle(off.angle);
    this.handGunSprite.setFlipX(off.flipX);
    this.handGunSprite.setDepth(this.playerSprite.depth+0.04);
    this.handGunSprite.setScale(.62);
  }

  updateMuzzleFx(){
    this.muzzleFx.clear();
    if(this.fireTimer<=0 || this.pistol.state!=='drawn') return;

    const off=HAND_GUN_OFF[this.facing];
    const x=this.playerBody.x+off.x+off.mx;
    const y=this.playerBody.y+off.y+off.my;

    const alpha=Math.min(1,this.fireTimer/6);
    this.muzzleFx.fillStyle(0xfff0a0,alpha);
    this.muzzleFx.fillCircle(x,y,7);
    this.muzzleFx.fillStyle(0xff7a00,alpha*.8);
    this.muzzleFx.fillCircle(x,y,12);
  }

  changeRoom(id,enterFrom){
    const r=ROOMS[id];
    if(!r) return;
    this.drawRoom(id);
    this.playerBody.x=enterFrom==='left'?72:WORLD_W-72;
    this.playerBody.y=r.spawn.y;
    this.room=r;
    if(this.riffSprite){
      this.riffSprite.setPosition(this.playerBody.x-92,this.playerBody.y+8);
    }
    this.updateVisuals(false);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:'game',
  width:W,
  height:H,
  backgroundColor:'#000',
  pixelArt:true,
  roundPixels:true,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  input:{activePointers:8},
  scene:[Boot,Title,SignalIntro,Dust9]
});
})();
</script>
</body>
