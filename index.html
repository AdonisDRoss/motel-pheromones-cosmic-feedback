class Game extends Phaser.Scene{constructor(){super('Game');this.roomId='bounty_office';this.ui=null;this.joy={x:0,y:0};this.npcObjs=[];this.exitBoxes=[]}create(){this.hp=100;this.maxHP=100;this.inv=load(LS.inv,[]);this.eq=load(LS.eq,{weaponSlot:null,holsterSlot:null,maskSlot:null,quickItemSlot:null});this.cash=load(LS.cash,50);this.clock=load(LS.clock,{day:1,hour:8,minute:0,scale:10});this.story=load(LS.story,JSON.parse(JSON.stringify(DEFAULT_STORY)));if(!localStorage.getItem(LS.seed)){['stale_ration','dusty_med_pack','donny_holster','red_concord_mask','rusted_pipe','laser_revolver','raven_key_fragment'].forEach(id=>this.addItem(id,1,false));save(LS.seed,true);this.saveInv()}this.keys=this.input.keyboard.addKeys('W,A,S,D,E,I,ESC,ENTER,BACKSPACE,F9');this.cursors=this.input.keyboard.createCursorKeys();this.input.keyboard.on('keydown-E',()=>this.interact());this.input.keyboard.on('keydown-I',()=>this.menu('inventory'));this.input.keyboard.on('keydown-ESC',()=>this.handleEsc());this.input.keyboard.on('keydown-ENTER',()=>this.nextDialogue());this.input.keyboard.on('keydown-F9',()=>{if(STORY_DEBUG)this.menu('debug')});this.loadRoom(this.roomId);this.makeHUD();this.makeTouch();this.night=this.add.rectangle(0,0,W,H,0x000033,0).setOrigin(0).setDepth(55);this.time.addEvent({delay:500,loop:true,callback:()=>this.tick(.5)});this.toast('Story index ready. START/ESC opens menu.')}tex(k){return this.textures.exists(k)}choosePlayer(){return ['donny1','donny2','donny3'].find(k=>this.tex(k))}loadRoom(id){const r=ROOMS.find(x=>x.id===id)||ROOMS[0];this.room=r;this.roomId=r.id;if(this.bg)this.bg.destroy();this.bg=this.add.image(W/2,H/2,this.tex(r.bg)?r.bg:'ph_bg').setDisplaySize(W,H).setDepth(0);this.exitBoxes.forEach(x=>x.destroy());this.exitBoxes=[];(r.exits||[]).forEach(e=>{const g=this.add.graphics().setDepth(8);g.lineStyle(1,0x86f7ff,.25).strokeRect(e[2],e[3],e[4],e[5]);this.exitBoxes.push(g)});if(!this.player)this.makePlayer(r.spawn[0],r.spawn[1]);else{this.player.x=r.spawn[0];
