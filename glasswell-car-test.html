<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Glasswell Four-Map Car Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<style>
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#eee;
  font-family:monospace;touch-action:none;user-select:none;
}
body{position:fixed;inset:0;}
#game{position:fixed;inset:0;background:#000}
canvas{display:block}

#ui{position:fixed;inset:0;pointer-events:none;z-index:20}

#help{
  position:absolute;
  left:max(8px,env(safe-area-inset-left));
  top:max(8px,env(safe-area-inset-top));
  padding:5px 8px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.18);
  font-size:10px;
  line-height:1.15;
  max-width:720px;
  opacity:.75;
}

#stickWrap{
  position:absolute;
  left:max(22px,env(safe-area-inset-left));
  bottom:max(24px,env(safe-area-inset-bottom));
  width:174px;height:174px;
  pointer-events:auto;
}
#stick{
  position:absolute;left:0;top:0;width:154px;height:154px;
  border:3px solid rgba(125,238,255,.45);
  box-shadow:0 0 24px rgba(125,238,255,.20), inset 0 0 26px rgba(255,0,190,.18);
  border-radius:50%;
  background:rgba(80,110,120,.24);
}
#stick:after{
  content:"";position:absolute;left:37px;top:37px;width:76px;height:76px;
  border:3px solid rgba(255,255,255,.82);
  border-radius:50%;
  background:rgba(255,255,255,.18);
}
#knob{
  position:absolute;left:49px;top:49px;width:56px;height:56px;
  border-radius:50%;
  background:rgba(255,255,255,.30);
  border:2px solid rgba(255,255,255,.52);
}
#moveLabel{
  position:absolute;left:55px;top:142px;
  font:bold 18px monospace;letter-spacing:4px;color:rgba(255,255,255,.78);
  text-shadow:0 1px 3px #000;
}

#startBtn{
  position:absolute;
  left:50%;bottom:max(30px,env(safe-area-inset-bottom));
  transform:translateX(-50%);
  pointer-events:auto;
}
#btnStart{
  min-width:168px;height:48px;border-radius:26px;
  border:3px solid rgba(255,255,255,.42);
  background:rgba(24,24,24,.72);
  color:#fff;font:bold 19px monospace;letter-spacing:5px;
  text-shadow:0 1px 4px #000;
}

#buttons{
  position:absolute;
  right:max(28px,env(safe-area-inset-right));
  bottom:max(32px,env(safe-area-inset-bottom));
  width:320px;height:210px;
  pointer-events:auto;
}
.btn{
  position:absolute;width:76px;height:76px;border-radius:50%;
  border:4px solid rgba(255,255,255,.82);
  color:#fff;font:bold 24px monospace;
  text-shadow:0 2px 5px rgba(0,0,0,.9);
  box-shadow:0 0 22px rgba(255,255,255,.14), inset 0 0 22px rgba(255,255,255,.12);
}
.btn.pressed{filter:brightness(1.35);transform:scale(.96)}
#btnY{left:132px;top:0;background:rgba(186,38,155,.76)}
#btnX{left:42px;top:72px;background:rgba(175,139,31,.78)}
#btnA{left:226px;top:72px;background:rgba(28,122,132,.78)}
#btnB{left:132px;top:142px;background:rgba(53,142,67,.78)}

#error{
  position:absolute;left:10px;right:10px;bottom:10px;display:none;
  background:rgba(110,0,0,.85);border:2px solid #f44;padding:10px;white-space:pre-wrap;font-size:12px;
}

#rotate{
  display:none;position:fixed;inset:0;z-index:999;background:#050607;color:#fff;
  align-items:center;justify-content:center;text-align:center;padding:22px;font:bold 22px monospace;
}
@media (orientation:portrait){
  #rotate{display:flex}
}
</style>
</head>
<body>
<div id="game"></div>

<div id="ui">
  <div id="help">
    GLASSWELL CAR TEST · left stick drive · X boost · B brake · Y gate · A masks · START reset
  </div>

  <div id="stickWrap">
    <div id="stick"><div id="knob"></div></div>
    <div id="moveLabel">MOVE</div>
  </div>

  <div id="startBtn">
    <button class="btnWide" id="btnStart">START</button>
  </div>

  <div id="buttons">
    <button class="btn" id="btnY">Y</button>
    <button class="btn" id="btnX">X</button>
    <button class="btn" id="btnA">A</button>
    <button class="btn" id="btnB">B</button>
  </div>

  <div id="error"></div>
</div>

<div id="rotate">Turn your phone sideways to play Glasswell.</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script src="scripts/glasswell_four_map_car_test.js?v=003"></script>
</body>
</html>
