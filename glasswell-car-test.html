<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Glasswell Four-Map Car Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#eee;font-family:monospace;touch-action:none;user-select:none}
#game{position:fixed;inset:0;background:#000}
canvas{display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:20}
#help{position:absolute;left:max(10px,env(safe-area-inset-left));top:max(10px,env(safe-area-inset-top));padding:8px 10px;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.25);font-size:12px;line-height:1.25;max-width:760px}
#stick{position:absolute;left:max(22px,env(safe-area-inset-left));bottom:max(22px,env(safe-area-inset-bottom));width:142px;height:142px;border:2px solid rgba(255,255,255,.35);border-radius:50%;background:rgba(0,0,0,.22);pointer-events:auto}
#knob{position:absolute;left:43px;top:43px;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.45)}
#buttons{position:absolute;right:max(18px,env(safe-area-inset-right));bottom:max(24px,env(safe-area-inset-bottom));display:flex;gap:10px;pointer-events:auto}
.btn{width:58px;height:58px;border-radius:14px;border:2px solid rgba(255,255,255,.35);background:rgba(10,12,14,.72);color:#fff;font:bold 17px monospace}
#error{position:absolute;left:10px;right:10px;bottom:10px;display:none;background:rgba(110,0,0,.85);border:2px solid #f44;padding:10px;white-space:pre-wrap;font-size:12px}
</style>
</head>
<body>
<div id="game"></div>
<div id="ui">
  <div id="help">
    GLASSWELL FOUR-MAP CAR TEST<br>
    WASD / arrows = drive · SHIFT = boost · SPACE = brake<br>
    G = open/close C3 gate · M = masks · L = labels · R = reset
  </div>
  <div id="stick"><div id="knob"></div></div>
  <div id="buttons">
    <button class="btn" id="btnG">G</button>
    <button class="btn" id="btnM">M</button>
    <button class="btn" id="btnL">L</button>
    <button class="btn" id="btnR">R</button>
  </div>
  <div id="error"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script src="scripts/glasswell_four_map_car_test.js?v=001"></script>
</body>
</html>
