<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Glasswell City Runtime Test v125</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#050607; color:#ddd; font-family:monospace; touch-action:none; -webkit-user-select:none; user-select:none; }
    #game-wrap { width:100vw; height:100vh; overflow:hidden; position:fixed; inset:0; background:#000; }
    canvas { display:block; }
    .touch-ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
    #stickZone { position:absolute; left:max(24px, env(safe-area-inset-left)); bottom:max(24px, env(safe-area-inset-bottom)); width:150px; height:150px; border:2px solid rgba(255,255,255,.35); border-radius:50%; background:rgba(0,0,0,.25); pointer-events:auto; }
    #stickKnob { position:absolute; width:58px; height:58px; left:46px; top:46px; border-radius:50%; background:rgba(255,255,255,.28); border:2px solid rgba(255,255,255,.45); }
    .button-row { position:absolute; right:max(18px, env(safe-area-inset-right)); bottom:max(24px, env(safe-area-inset-bottom)); display:flex; gap:10px; pointer-events:auto; }
    .touch-btn { width:58px; height:58px; border-radius:14px; border:2px solid rgba(255,255,255,.35); color:#fff; background:rgba(10,12,14,.72); font-family:monospace; font-size:18px; font-weight:bold; }
    #topHelp { position:absolute; left:max(10px, env(safe-area-inset-left)); top:max(10px, env(safe-area-inset-top)); padding:8px 10px; background:rgba(0,0,0,.58); border:1px solid rgba(255,255,255,.22); font-size:12px; line-height:1.25; color:#eee; pointer-events:none; max-width:720px; }
  </style>
</head>
<body>
  <div id="game-wrap"></div>
  <div class="touch-ui">
    <div id="topHelp">GLASSWELL CITY TEST v125<br/>Uses existing Donny 4dir sheets + Astro Van + enter/exit test.<br/>WASD/arrows move · SHIFT run · E enter/exit van · M mask · L labels · R reset</div>
    <div id="stickZone"><div id="stickKnob"></div></div>
    <div class="button-row">
      <button class="touch-btn" id="btnE">E</button>
      <button class="touch-btn" id="btnM">M</button>
      <button class="touch-btn" id="btnL">L</button>
      <button class="touch-btn" id="btnR">R</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="scripts/donny_asset_registry.js?v=125"></script>
  <script src="scripts/glasswell_city_test.js?v=125"></script>
</body>
</html>
